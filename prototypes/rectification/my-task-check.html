<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>开始检查 - 我的面积检查任务</title>
    <link rel="stylesheet" href="../../shared/styles/shared.css" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      /* ============================================================
       * my-task-check.html 内联样式
       * 零污染原则：所有类名加注 .mc- 前缀，不修改 styles.css / app.js
       * ============================================================ */

      /* ---- 任务基本信息卡片 ---- */
      .mc-info-card {
        background: #ffffff;
        border-radius: 6px;
        padding: 20px 24px;
        margin-bottom: 16px;
        border: 1px solid #f0f0f0;
      }
      .mc-info-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 18px;
      }
      .mc-info-title-wrap {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .mc-info-title {
        font-size: 18px;
        font-weight: 600;
        color: #1d2129;
      }
      .mc-info-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px 24px;
      }
      .mc-info-item {
        display: flex;
        align-items: center;
        font-size: 14px;
        line-height: 22px;
        white-space: nowrap;
      }
      .mc-info-item.full-width {
        grid-column: span 3;
      }
      .mc-info-label {
        color: #8c8c8c;
        flex-shrink: 0;
      }
      .mc-info-value {
        color: #262626;
        font-weight: 400;
      }
      .mc-info-value.task-name {
        font-weight: 500;
        color: #1f1f1f;
      }
      .mc-font-highlight {
        font-weight: 500;
        color: #1890ff;
      }
      @media (max-width: 992px) {
        .mc-info-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .mc-info-item.full-width {
          grid-column: span 2;
        }
      }

      /* ---- 站点卡片 ---- */
      .mc-station-card {
        background: #ffffff;
        border-radius: 6px;
        border: 1px solid #f0f0f0;
        margin-bottom: 16px;
        overflow: hidden;
      }
      .mc-station-card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 20px;
        border-bottom: 1px solid #f0f0f0;
      }
      .mc-station-card-title {
        font-size: 14px;
        font-weight: 500;
        color: #1d2129;
      }
      .mc-station-card-stats {
        display: flex;
        gap: 16px;
        font-size: 13px;
        color: #595959;
        white-space: nowrap;
      }
      .mc-station-card-tabs {
        display: flex;
        gap: 0;
        flex-wrap: wrap;
        padding: 0 20px;
        border-bottom: 1px solid #f0f0f0;
      }
      .mc-station-tab {
        padding: 10px 16px;
        font-size: 13px;
        color: #8c95a6;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: color 0.2s, border-color 0.2s;
        user-select: none;
        white-space: nowrap;
        margin-bottom: -1px;
      }
      .mc-station-tab:hover {
        color: #4c78f5;
      }
      .mc-station-tab.active {
        color: #4c78f5;
        font-weight: 500;
        border-bottom-color: #4c78f5;
      }
      .mc-station-tab .mc-station-status {
        display: inline-block;
        padding: 0 6px;
        border-radius: 3px;
        font-size: 11px;
        margin-left: 6px;
        vertical-align: middle;
        line-height: 18px;
      }
      .mc-station-info-panel {
        padding: 18px 20px;
        border-bottom: 1px solid #f0f0f0;
      }
      .mc-station-info-title {
        font-size: 14px;
        font-weight: 500;
        color: #1d2129;
        margin-bottom: 14px;
      }
      .mc-station-info-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px 24px;
        font-size: 13px;
      }
      .mc-station-info-item {
        display: flex;
        align-items: center;
        white-space: nowrap;
      }
      .mc-station-info-label {
        color: #8c8c8c;
        flex-shrink: 0;
      }
      .mc-station-info-value {
        color: #262626;
      }
      .mc-station-info-value.full-width {
        grid-column: span 3;
      }
      .mc-station-status.status-done {
        background: #f6ffed;
        color: #52c41a;
        border: 1px solid #b7eb8f;
      }
      .mc-station-status.status-doing {
        background: #e6f7ff;
        color: #1890ff;
        border: 1px solid #91d5ff;
      }
      .mc-station-status.status-pending-rectify {
        background: #fff7e6;
        color: #fa8c16;
        border: 1px solid #ffd591;
      }
      .mc-station-status.status-sent-rectify {
        background: #fff7e6;
        color: #d48806;
        border: 1px solid #ffd591;
      }
      .mc-station-status.status-todo {
        background: #fafafa;
        color: #bfbfbf;
        border: 1px solid #d9d9d9;
      }

      /* ---- 内容Tab系统 ---- */
      .mc-tab-card {
        background: #ffffff;
        border-radius: 6px;
        border: 1px solid #f0f0f0;
        margin-bottom: 16px;
        overflow: hidden;
      }
      .mc-tab-header {
        display: flex;
        border-bottom: 1px solid #e8ecf1;
        padding: 0 20px;
      }
      .mc-tab-item {
        padding: 12px 20px;
        font-size: 14px;
        color: #8c95a6;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: color 0.2s, border-color 0.2s;
        user-select: none;
      }
      .mc-tab-item:hover {
        color: #4c78f5;
      }
      .mc-tab-item.active {
        color: #4c78f5;
        font-weight: 500;
        border-bottom-color: #4c78f5;
      }
      .mc-tab-body {
        padding: 20px;
      }
      .mc-tab-panel {
        display: none;
      }
      .mc-tab-panel.active {
        display: block;
      }

      /* ---- 面积比对核心区 ---- */
      .mc-area-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 24px;
      }
      .mc-area-card {
        border-radius: 6px;
        padding: 18px 20px;
        border: 1px solid;
        display: flex;
        align-items: flex-start;
        gap: 24px;
      }
      .mc-area-card.area-original {
        background: #f8f9fc;
        border-color: #e8ecf1;
      }
      .mc-area-card.area-current {
        background: #f6ffed;
        border-color: #d9f7be;
      }
      .mc-area-number {
        flex-shrink: 0;
        min-width: 140px;
      }
      .mc-area-value {
        font-size: 32px;
        font-weight: 700;
        line-height: 1.2;
      }
      .mc-area-value.blue {
        color: #1890ff;
      }
      .mc-area-value.green {
        color: #52c41a;
      }
      .mc-area-unit {
        font-size: 14px;
        font-weight: 400;
        color: #8c8c8c;
        margin-left: 2px;
      }
      .mc-area-label {
        font-size: 12px;
        color: #8c8c8c;
        margin-top: 4px;
      }
      .mc-area-diff {
        font-size: 13px;
        font-weight: 500;
        color: #ff4d4f;
        margin-top: 6px;
      }
      .mc-area-details {
        flex: 1;
        min-width: 0;
      }
      .mc-area-section {
        margin-bottom: 10px;
      }
      .mc-area-section:last-child {
        margin-bottom: 0;
      }
      .mc-area-section-title {
        font-size: 13px;
        font-weight: 500;
        color: #262626;
        margin-bottom: 4px;
      }
      .mc-area-section-title .subtotal {
        color: #595959;
        font-weight: 400;
        margin-left: 8px;
      }
      .mc-area-section-items {
        font-size: 12px;
        color: #8c8c8c;
        line-height: 1.8;
      }

      /* ---- 普查子Tab系统 ---- */
      .mc-subtab-header {
        display: flex;
        border-bottom: 1px solid #f0f0f0;
        margin-bottom: 16px;
        padding: 0 4px;
      }
      .mc-subtab-item {
        padding: 8px 16px;
        font-size: 13px;
        color: #8c95a6;
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: color 0.2s, border-color 0.2s;
        user-select: none;
        margin-bottom: -1px;
      }
      .mc-subtab-item:hover {
        color: #4c78f5;
      }
      .mc-subtab-item.active {
        color: #4c78f5;
        font-weight: 500;
        border-bottom-color: #4c78f5;
      }
      .mc-subtab-panel {
        display: none;
      }
      .mc-subtab-panel.active {
        display: block;
      }

      /* ---- 占位卡片（平面图/门头图片） ---- */
      .mc-placeholder-box {
        text-align: center;
        padding: 60px 0;
        background: #fafbfc;
        border-radius: 6px;
        border: 1px dashed #d9d9d9;
      }
      .mc-placeholder-icon {
        font-size: 36px;
        margin-bottom: 12px;
      }
      .mc-placeholder-title {
        font-size: 15px;
        font-weight: 500;
        color: #262626;
        margin-bottom: 8px;
      }
      .mc-placeholder-desc {
        font-size: 13px;
        color: #8c8c8c;
        margin-bottom: 20px;
      }
      .mc-placeholder-card-group {
        display: flex;
        justify-content: center;
        gap: 16px;
      }
      .mc-placeholder-card {
        width: 160px;
        height: 100px;
        background: #ffffff;
        border: 1px solid #f0f0f0;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        color: #595959;
      }

      /* ---- 详情弹窗 ---- */
      .mc-modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.3);
        z-index: 999;
        display: none;
        align-items: center;
        justify-content: center;
      }
      .mc-modal-container {
        background: #ffffff;
        border-radius: 8px;
        width: 760px;
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
      }
      .mc-modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 24px;
        border-bottom: 1px solid #f0f0f0;
      }
      .mc-modal-title {
        font-size: 16px;
        font-weight: 600;
        color: #1d2129;
      }
      .mc-modal-close {
        font-size: 20px;
        color: #8c8c8c;
        cursor: pointer;
        line-height: 1;
      }
      .mc-modal-close:hover {
        color: #262626;
      }
      .mc-modal-content {
        padding: 20px 24px;
      }
      .mc-modal-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px 24px;
      }
      .mc-modal-item {
        font-size: 13px;
        color: #262626;
      }
      .mc-modal-item.full-width {
        grid-column: span 2;
      }
      .mc-modal-label {
        color: #8c8c8c;
        margin-right: 6px;
      }
      .mc-modal-value {
        font-weight: 500;
      }
      .mc-modal-value-text {
        color: #595959;
      }
      .mc-modal-divider {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid #f0f0f0;
      }
      .mc-modal-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      .mc-modal-table th,
      .mc-modal-table td {
        padding: 8px 12px;
        border-bottom: 1px solid #f0f0f0;
        text-align: left;
      }
      .mc-modal-table th {
        background: #fafbfc;
        font-weight: 500;
        color: #5a5f6d;
      }
      .mc-modal-footer {
        padding: 12px 24px;
        border-top: 1px solid #f0f0f0;
        display: flex;
        justify-content: flex-end;
      }
      .mc-survey-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .mc-survey-title {
        font-size: 14px;
        font-weight: 500;
        color: #1f1f1f;
      }
      .mc-survey-count {
        font-size: 12px;
        color: #8c8c8c;
      }
      .mc-table-wrapper {
        overflow-x: auto;
        margin-bottom: 12px;
      }
      .mc-survey-table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
        min-width: 1500px;
      }
      .mc-survey-table th,
      .mc-survey-table td {
        padding: 10px 12px;
        border-bottom: 1px solid #f0f0f0;
        font-size: 13px;
        text-align: left;
        vertical-align: middle;
        height: 44px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .mc-survey-table th {
        background: #fafbfc;
        font-weight: 500;
        color: #5a5f6d;
      }
      /* 操作列 sticky 固定 */
      .mc-survey-table th:last-child,
      .mc-survey-table td:last-child {
        position: sticky;
        right: 0;
        z-index: 2;
        box-shadow: -2px 0 6px rgba(0,0,0,0.08);
      }
      .mc-survey-table th:last-child {
        background: #fafbfc;
      }
      .mc-survey-table td:last-child {
        background: #fff;
      }
      .mc-survey-table tbody tr:hover td:last-child {
        background: #f5f7fa;
      }
      .mc-survey-table tbody tr:hover {
        background: #f5f8ff;
      }
      .mc-survey-table .col-center {
        text-align: center;
      }
      .mc-survey-table .col-right {
        text-align: right;
      }
      .mc-text-green {
        color: #52c41a;
        font-weight: 500;
      }
      .mc-text-red {
        color: #f5222d;
        font-weight: 500;
      }
      .mc-survey-status {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 4px;
        font-size: 12px;
        background: #e6f7ff;
        color: #1890ff;
        border: 1px solid #91d5ff;
      }
      .mc-action-link {
        color: #1890ff;
        font-size: 13px;
        cursor: pointer;
        text-decoration: none;
      }
      .mc-action-link:hover {
        color: #4c78f5;
      }

      /* ---- 检查记录单弹窗表格样式 ---- */
      .mc-check-modal-card {
        background: #ffffff;
        border-radius: 6px;
        padding: 20px 24px;
      }
      .mc-check-modal-card .mc-record-main-title {
        font-size: 18px;
        font-weight: 600;
        color: #1d2129;
      }
      .mc-check-modal-card .mc-record-sub-title {
        font-size: 13px;
        color: #8c8c8c;
        margin-top: 4px;
        margin-bottom: 20px;
      }
      .mc-check-item {
        border: 1px solid #f0f0f0;
        border-radius: 6px;
        padding: 16px 20px;
        margin-bottom: 12px;
      }
      .mc-check-item-title {
        font-size: 14px;
        font-weight: 500;
        color: #262626;
        margin-bottom: 10px;
        line-height: 22px;
      }
      .mc-check-item-title .mc-check-index {
        color: #1890ff;
        font-weight: 600;
        margin-right: 4px;
      }
      .mc-check-radio-group {
        display: flex;
        gap: 24px;
        margin-bottom: 10px;
      }
      .mc-check-radio-group label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        color: #262626;
        cursor: pointer;
      }
      .mc-check-radio-group label input[type="radio"] {
        accent-color: #4c78f5;
        width: 16px;
        height: 16px;
        cursor: pointer;
      }
      .mc-check-sub-items {
        display: none;
        padding: 12px 16px;
        background: #fafbfc;
        border-radius: 4px;
        border: 1px solid #f0f0f0;
        margin-top: 4px;
      }
      .mc-check-sub-items.show {
        display: block;
      }
      .mc-check-sub-title {
        font-size: 13px;
        font-weight: 500;
        color: #595959;
        margin-bottom: 8px;
      }
      .mc-check-sub-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 6px 16px;
      }
      .mc-check-sub-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: #595959;
        cursor: pointer;
        line-height: 28px;
      }
      .mc-check-sub-item input[type="checkbox"] {
        accent-color: #4c78f5;
        width: 14px;
        height: 14px;
        cursor: pointer;
      }
      .mc-check-other-input {
        border: none;
        border-bottom: 1px solid #d9d9d9;
        background: transparent;
        font-size: 13px;
        color: #262626;
        padding: 2px 4px;
        width: 180px;
        outline: none;
      }
      .mc-check-other-input:focus {
        border-bottom-color: #4c78f5;
      }
      .mc-check-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 20px;
        padding-top: 16px;
        border-top: 1px solid #f0f0f0;
      }
      .mc-record-card {
        background: #ffffff;
        border: 1px solid #f0f0f0;
        border-radius: 6px;
        padding: 24px;
      }
      .mc-record-title-area {
        margin-bottom: 16px;
      }
      .mc-record-main-title {
        font-size: 18px;
        font-weight: 600;
        color: #1d2129;
      }
      .mc-record-sub-title {
        font-size: 13px;
        color: #8c8c8c;
        margin-top: 4px;
      }
      .mc-record-form-group {
        margin-bottom: 20px;
      }
      .mc-record-form-label {
        display: block;
        font-size: 14px;
        font-weight: 500;
        color: #262626;
        margin-bottom: 8px;
      }
      .mc-record-form-label .mc-required {
        color: #ff4d4f;
        margin-right: 4px;
      }
      .mc-record-radio-group {
        display: flex;
        gap: 24px;
        margin-bottom: 8px;
      }
      .mc-record-radio {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        color: #262626;
        cursor: pointer;
      }
      .mc-record-radio input[type="radio"] {
        accent-color: #4c78f5;
        width: 16px;
        height: 16px;
        cursor: pointer;
      }
      .mc-record-textarea {
        width: 100%;
        min-height: 100px;
        border: 1px solid #d9d9d9;
        border-radius: 6px;
        padding: 10px 12px;
        font-size: 14px;
        line-height: 22px;
        color: #262626;
        resize: vertical;
        transition: border-color 0.2s;
        box-sizing: border-box;
      }
      .mc-record-textarea:focus {
        outline: none;
        border-color: #4c78f5;
        box-shadow: 0 0 0 2px rgba(76, 120, 245, 0.1);
      }
      .mc-record-textarea::placeholder {
        color: #bfbfbf;
      }
      .mc-record-char-count {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid #f0f0f0;
      }

      /* ---- 检查记录单展示态 ---- */
      .mc-record-display-card {
        background: #ffffff;
        border: 1px solid #f0f0f0;
        border-radius: 6px;
        padding: 24px;
      }
      .mc-record-display-header {
        text-align: center;
        margin-bottom: 20px;
        position: relative;
        padding-top: 36px;
      }
      .mc-record-display-title {
        font-size: 18px;
        font-weight: 600;
        color: #1d2129;
        margin-bottom: 6px;
      }
      .mc-record-display-subtitle {
        font-size: 13px;
        color: #8c8c8c;
        margin-bottom: 12px;
      }
      .mc-record-display-tags {
        display: flex;
        justify-content: center;
        gap: 8px;
      }
      .mc-record-display-summary {
        background: #f8faff;
        border: 1px solid #e6efff;
        border-radius: 6px;
        padding: 14px 16px;
        margin-bottom: 20px;
        font-size: 14px;
        line-height: 1.7;
        color: #595959;
      }
      .mc-record-display-summary p {
        margin: 0 0 6px;
      }
      .mc-record-display-summary p:last-child {
        margin-bottom: 0;
      }
      .mc-record-display-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
        margin-bottom: 20px;
      }
      .mc-record-display-table th,
      .mc-record-display-table td {
        padding: 12px 10px;
        border: 1px solid #f0f0f0;
        color: #262626;
        vertical-align: top;
      }
      .mc-record-display-table th {
        background: #fafafa;
        font-weight: 500;
        color: #595959;
      }
      .mc-record-display-table td:first-child {
        line-height: 1.6;
      }
      .mc-record-display-footer {
        display: flex;
        gap: 32px;
        font-size: 14px;
        color: #595959;
        padding-top: 16px;
        border-top: 1px solid #f0f0f0;
      }

      /* ---- 整改通知书表单 ---- */
      .mc-notice-card {
        background: #ffffff;
        border: 1px solid #f0f0f0;
        border-radius: 6px;
        padding: 24px;

            '检查中': 'status-doing',
            '待整改': 'status-pending-rectify',

            '待检查': 'status-todo'
          };
          return map[status] || 'status-todo';
        }

        // 计算站点统计
        function calcSiteStats(sites) {
          var stats = { total: sites.length, done: 0, doing: 0, pendingRectify: 0, sentRectify: 0, todo: 0 };
          for (var i = 0; i < sites.length; i++) {
            var s = sites[i].checkStatus;
            if (s === '已检查') stats.done++;
            else if (s === '检查中') stats.doing++;
            else if (s === '待整改') stats.pendingRectify++;
            else if (s === '已发送/待整改') stats.sentRectify++;
            else if (s === '待检查') stats.todo++;

        // ---- 详情弹窗 ----
        function bindModalEvents() {
          var modal = document.getElementById('mc-detail-modal');
          var closeBtn = document.getElementById('mc-modal-close-btn');
          var cancelBtn = document.getElementById('mc-modal-cancel-btn');

          function closeModal() {
            if (modal) modal.style.display = 'none';
          }

          if (closeBtn) closeBtn.addEventListener('click', closeModal);
          if (cancelBtn) cancelBtn.addEventListener('click', closeModal);
          if (modal) modal.addEventListener('click', function (e) {
            if (e.target === modal) closeModal();
          });

          // 详情链接（排除"填写复核面积"入口）

            if (link.classList.contains('mc-action-review-area')) return;
            link.addEventListener('click', function () {
              var row = this.closest('tr');
              if (!row || !modal) return;

              var getAttr = function (name) {
                return row.getAttribute('data-' + name) || '—';
              };

              var setVal = function (id, val) {
                var el = document.getElementById(id);
                if (el) el.textContent = val;
              };
              var setStyle = function (id, prop, val) {
                var el = document.getElementById(id);
                if (el) el.style[prop] = val;
              };

              setVal('mc-modal-building-title', getAttr('building'));
              setVal('mc-modal-field-name', getAttr('building'));
              setVal('mc-modal-field-floors', getAttr('floors'));
              setVal('mc-modal-field-year', getAttr('year'));
              setVal('mc-modal-field-type', getAttr('heat-nature'));
              setVal('mc-modal-field-charge', getAttr('charge'));
              setVal('mc-modal-field-control', getAttr('control'));
              setVal('mc-modal-field-basis', getAttr('basis'));
              setVal('mc-modal-field-heating', getAttr('heating'));
              setVal('mc-modal-field-prev-area', getAttr('orig-area'));
              setVal('mc-modal-field-curr-area', getAttr('curr-area'));
              setVal('mc-modal-field-diff-area', getAttr('diff-area'));
              setVal('mc-modal-field-diff-rate', getAttr('diff-rate'));
              setVal('mc-modal-field-attachments', getAttr('attachment'));
              setVal('mc-modal-field-remark', getAttr('remark'));

              var diffArea = getAttr('diff-area');
              var diffColor = diffArea.indexOf('-') >= 0 ? '#f5222d' : '#52c41a';
              setStyle('mc-modal-field-diff-area', 'color', diffColor);
              setStyle('mc-modal-field-diff-rate', 'color', diffColor);

              setVal('mc-modal-table-card-no', getAttr('id'));
              setVal('mc-modal-table-area', getAttr('floors') + 'F');
              setVal('mc-modal-table-basis', getAttr('basis'));
              setVal('mc-modal-table-attachment', getAttr('attachment'));
              setVal('mc-modal-table-remark', getAttr('remark'));

              modal.style.display = 'flex';
            });
          });

        function bindChecklistEvents() {
          // 打开检查记录单弹窗（未填写态）
          var openBtn = document.getElementById('mc-btn-open-checklist');
          var clModal = document.getElementById('mc-checklist-modal');
          var clClose = document.getElementById('mc-modal-checklist-close');

          if (openBtn && clModal) {
            openBtn.addEventListener('click', function () {
              clModal.style.display = 'flex';
              bindChecklistRadioEvents();
            });
          }

          // 查看整改通知书（已填写态）
          var viewNoticeBtn = document.getElementById('mc-btn-view-notice');
          if (viewNoticeBtn) {
            viewNoticeBtn.addEventListener('click', function () {
              switchMainTab('notice');
            });
          }

          // 编辑检查记录单（已填写态）
          var editChecklistBtn = document.getElementById('mc-btn-edit-checklist');
          if (editChecklistBtn && clModal) {
            editChecklistBtn.addEventListener('click', function () {
              clModal.style.display = 'flex';
              bindChecklistRadioEvents();
            });
          }

          if (clClose && clModal) {
            clClose.addEventListener('click', function () {
              clModal.style.display = 'none';
            });
          }

          if (clModal) {
            clModal.addEventListener('click', function (e) {
              if (e.target === clModal) clModal.style.display = 'none';
            });
          }

          // 弹窗内字数统计
          var modalProblemDesc = document.getElementById('mc-modal-problem-desc');
          var modalProblemCount = document.getElementById('mc-modal-problem-count');
          if (modalProblemDesc && modalProblemCount) {
            modalProblemDesc.addEventListener('input', function () {
              modalProblemCount.textContent = this.value.length;
            });
          }
          var modalSiteNote = document.getElementById('mc-modal-site-note');
          var modalSiteNoteCount = document.getElementById('mc-modal-site-note-count');
          if (modalSiteNote && modalSiteNoteCount) {
            modalSiteNote.addEventListener('input', function () {
              modalSiteNoteCount.textContent = this.value.length;
            });
          }

          // 弹窗内暂存按钮
          var draftBtn = document.getElementById('mc-modal-checklist-draft');
          if (draftBtn) {
            draftBtn.addEventListener('click', function () {
              showToast('success', '✓', '检查记录已暂存');
            });
          }

          // 弹窗内提交按钮
          var submitBtn = document.getElementById('mc-modal-checklist-submit');
          if (submitBtn) {
            submitBtn.addEventListener('click', function () {
              // 校验所有检查项的radio
              var allChecked = true;
              var items = document.querySelectorAll('.mc-check-item');
              items.forEach(function (item) {
                var radios = item.querySelectorAll('input[type="radio"]');
                var checked = false;
                radios.forEach(function (r) {
                  if (r.checked) checked = true;
                });
                if (!checked) allChecked = false;
              });
              if (!allChecked) {
                showToast('warning', '⚠', '请完成所有检查项的选择');
                return;
              }

              // 获取当前站点
              var activeTab = document.querySelector('.mc-station-tab.active');
              var siteCode = activeTab ? activeTab.getAttribute('data-site-code') : null;
              var site = null;
              for (var k = 0; k < myCheckSites.length; k++) {
                if (myCheckSites[k].code === siteCode) {
                  site = myCheckSites[k];
                  break;
                }
              }

              // 收集检查项数据
              var storedItems = [];
              var hasRejected = false;
              var rejectedItems = [];
              items.forEach(function (item) {
                var itemId = parseInt(item.querySelector('.mc-check-index').textContent, 10);
                var checkedRadio = item.querySelector('input[type="radio"]:checked');
                var value = checkedRadio ? checkedRadio.value : '-';
                var reason = '-';

                if (value === '否') {
                  hasRejected = true;
                  var checkedBoxes = item.querySelectorAll('.mc-check-sub-box:checked');
                  var reasons = [];
                  checkedBoxes.forEach(function (cb) {
                    var label = cb.closest('.mc-check-sub-item');
                    if (label) {
                      // 提取 label 文本（去掉 input）
                      var text = label.childNodes[1] ? label.childNodes[1].textContent.trim() : '';
                      if (text) reasons.push(text);
                    }
                  });
                  var otherInput = item.querySelector('.mc-check-other-input');
                  if (otherInput && otherInput.value.trim()) {
                    reasons.push(otherInput.value.trim());
                  }
                  if (reasons.length > 0) reason = reasons.join('，');

                  var itemLabel = item.querySelector('.mc-check-item-title');
                  if (itemLabel) rejectedItems.push({ text: itemLabel.textContent.trim().replace(/^\d+\./, '').trim(), reason: reason });
                }

                storedItems.push({ id: itemId, value: value, reason: reason });
              });

              // 保存到状态 - 结论由系统根据检查项自动生成
              var systemConclusion = window.PrototypeStore && window.PrototypeStore.deriveCheckConclusion
                ? window.PrototypeStore.deriveCheckConclusion(storedItems)
                : (function(items){return items.some(function(i){return i.value==='否'})?'不合格':'合格';})(storedItems);
              var problemDesc = document.getElementById('mc-modal-problem-desc');
              var siteNote = document.getElementById('mc-modal-site-note');
              if (!taskCheckState[siteCode]) taskCheckState[siteCode] = {};
              var checklistRecord = {
                submitted: true,
                conclusion: systemConclusion,
                problemDesc: problemDesc ? problemDesc.value : '',
                siteNote: siteNote ? siteNote.value : '',
                items: storedItems,
                inspector: '赵立成',
                checkDate: new Date().toISOString().slice(0, 10),
                taskId: parseInt(taskId)
              };
              taskCheckState[siteCode].checklist = checklistRecord;

              // === PrototypeStore: 持久化检查记录 ===
              try {
                window.PrototypeStore.saveCheckRecord(siteCode, checklistRecord);
              } catch(e) {}

              // 刷新检查记录单面板
              var checklistPanel = document.getElementById('mc-tab-checklist');
              if (checklistPanel && site) {
                checklistPanel.innerHTML = renderChecklistPanel(site);
              }

              if (hasRejected || systemConclusion === '不合格') {
                showToast('success', '✓', '检查记录已提交，将进入双专家会签');
                if (clModal) clModal.style.display = 'none';
                // 自动切换到整改通知单Tab + 高亮提示
                switchMainTab('notice');
                var noticeForm = document.querySelector('.mc-notice-form');
                if (noticeForm) {
                  noticeForm.style.border = '2px solid #ff4d4f';
                  noticeForm.style.transition = 'border-color 0.3s';
                  setTimeout(function () {
                    noticeForm.style.border = '1px solid #f0f0f0';
                  }, 5000);
                }
                // 用问题描述预填整改内容
                var nfContent = document.getElementById('nf-content');
                if (nfContent && !nfContent.value.trim() && problemDesc && problemDesc.value.trim()) {
                  nfContent.value = problemDesc.value.trim();
                }
                // 重新绑定事件
                bindChecklistEvents();
                bindNoticeEvents();
                return;
              }

              showToast('success', '✓', '检查记录已提交');
              if (clModal) clModal.style.display = 'none';
              bindChecklistEvents();
            });
          }
        }

        function bindChecklistRadioEvents() {
          // 所有检查项radio change → 控制子项显示 + 更新系统判定
          document.querySelectorAll('.mc-check-item input[type="radio"]').forEach(function (radio) {
            radio.addEventListener('change', function () {
              // 找到所属的check-item容器
              var item = this.closest('.mc-check-item');
              if (!item) return;
              var subDiv = item.querySelector('.mc-check-sub-items');
              if (!subDiv) return;

              if (this.value === '否') {
                subDiv.classList.add('show');
              } else {
                subDiv.classList.remove('show');
                // 清空子项checkbox和其他输入
                item.querySelectorAll('.mc-check-sub-box').forEach(function (cb) {
                  cb.checked = false;
                });
                var otherInput = item.querySelector('.mc-check-other-input');
                if (otherInput) otherInput.value = '';
              }
              // 实时更新系统判定结果
              updateSystemConclusion();
            });
          });
          // 子项checkbox change也更新判定
          document.querySelectorAll('.mc-check-sub-box').forEach(function (cb) {
            cb.addEventListener('change', updateSystemConclusion);
          });
        }

        // 实时更新系统判定结果
        function updateSystemConclusion() {
          var allRadios = document.querySelectorAll('.mc-check-item input[type="radio"]');
          var allChecked = true;
          var hasNo = false;
          allRadios.forEach(function (r) {
            if (r.checked) {
              if (r.value === '否') hasNo = true;
            } else {
              allChecked = false;
            }
          });
          var el = document.getElementById('mc-system-conclusion');
          var hint = document.getElementById('mc-system-conclusion-hint');
          if (!el) return;
          if (!allChecked) {
            el.textContent = '待生成';
            el.style.color = '#999';
            if (hint) { hint.style.display = 'none'; }
            return;
          }
          if (hasNo) {
            el.textContent = '不合格';
            el.style.color = '#ff4d4f';
            if (hint) {
              hint.style.display = 'block';
              hint.style.background = '#fff2f0';
              hint.style.color = '#ff4d4f';
              hint.textContent = '存在不合格检查项，系统将自动判定为"不合格"。';
            }
          } else {
            el.textContent = '合格';
            el.style.color = '#52c41a';
            if (hint) {
              hint.style.display = 'block';
              hint.style.background = '#f6ffed';
              hint.style.color = '#52c41a';
              hint.textContent = '当前检查项均未发现问题，系统将自动判定为"合格"。';
            }
          }
        }

        // ---- 整改通知单事件绑定 ----
        function bindNoticeEvents() {
          // 暂存按钮（表单态）
          var draftBtn = document.getElementById('nf-draft');
          if (draftBtn) {
            draftBtn.addEventListener('click', function () {
              showToast('success', '✓', '整改通知单已暂存');
            });
          }

          // 提交按钮（表单态）
          var submitBtn = document.getElementById('nf-submit');
          if (submitBtn) {
            submitBtn.addEventListener('click', function () {
              // 校验必填字段
              var content = document.getElementById('nf-content');
              var opinion = document.getElementById('nf-opinion');
              var signature = document.getElementById('nf-signature');
              var phone = document.getElementById('nf-phone');
              var deadlineDays = document.getElementById('nf-deadline-days');
              var noticeNo = document.getElementById('nf-notice-no');
              var dept = document.getElementById('nf-dept');
              var inspector = document.getElementById('nf-inspector');

              if (!content || !content.value.trim()) {
                showToast('warning', '⚠', '请填写整改事项');
                if (content) content.focus();
                return;
              }
              if (!opinion || !opinion.value.trim()) {
                showToast('warning', '⚠', '请填写整改意见');
                if (opinion) opinion.focus();
                return;
              }
              if (!signature || !signature.value.trim()) {
                showToast('warning', '⚠', '请填写被检查单位人员');
                if (signature) signature.focus();
                return;
              }
              if (!phone || !phone.value.trim()) {
                showToast('warning', '⚠', '请填写检查人员联系方式');
                if (phone) phone.focus();
                return;
              }

              // 获取当前站点
              var activeTab = document.querySelector('.mc-station-tab.active');
              var siteCode = activeTab ? activeTab.getAttribute('data-site-code') : null;
              var site = null;
              for (var k = 0; k < myCheckSites.length; k++) {
                if (myCheckSites[k].code === siteCode) {
                  site = myCheckSites[k];
                  break;
                }
              }

              // 校验整改期限
              var deadlineVal = deadlineDays ? deadlineDays.value.trim() : '';
              if (!deadlineVal) {
                showToast('warning', '⚠', '请填写整改期限（工作日）');
                if (deadlineDays) deadlineDays.focus();
                return;
              }
              var days = parseInt(deadlineVal, 10);
              if (isNaN(days) || days < 1 || !/^\d+$/.test(deadlineVal)) {
                showToast('warning', '⚠', '整改期限必须为正整数');
                if (deadlineDays) { deadlineDays.value = ''; deadlineDays.focus(); }
                return;
              }

              // 保存到状态
              if (!taskCheckState[siteCode]) taskCheckState[siteCode] = {};
              var noticeRecord = {
                submitted: true,
                noticeNo: noticeNo ? noticeNo.value : ('ZG-' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '-' + (siteCode ? siteCode.slice(-3) : '001')),
                dept: dept ? dept.value : (site ? site.dept : ''),
                content: content ? content.value : '',
                opinion: opinion ? opinion.value : '',
                deadlineDays: days,
                inspectedPerson: signature ? signature.value : '',
                inspector: inspector ? inspector.value : '赵立成',
                phone: phone ? phone.value : '',
                status: '已发送',
                taskId: parseInt(taskId),
                siteCode: siteCode
              };
              taskCheckState[siteCode].notice = noticeRecord;

              // === PrototypeStore: 将整改通知书内容写入 Store ===
              try {
                var ps = window.PrototypeStore;
                // 查找当前站点对应的Store整改通知书
                var allNotices = ps.getRectificationNotices({ siteCode: siteCode });
                var targetNotice = allNotices && allNotices.length ? allNotices[0] : null;
                if (targetNotice && ps.updateRectificationNotice) {
                  ps.updateRectificationNotice(targetNotice.id, {
                    content: noticeRecord.content || '—',
                    opinion: noticeRecord.opinion || '',
                    deadlineDays: days,
                    deadlineUnit: '工作日',
                    inspectedPerson: noticeRecord.inspectedPerson || '—',
                    phone: noticeRecord.phone || '—',
                    inspector: noticeRecord.inspector || '赵立成'
                  });
                }
              } catch(e) { console.warn('notice save error', e); }

              // 刷新整改通知单面板为展示态
              var noticePanel = document.getElementById('mc-tab-notice');
              if (noticePanel && site) {
                noticePanel.innerHTML = renderNoticePanel(site);
              }

              showToast('success', '✓', '整改通知单已提交');
              bindNoticeEvents();
            });
          }

          // 编辑按钮（展示态）
          var editBtn = document.getElementById('nf-edit');
          if (editBtn) {
            editBtn.addEventListener('click', function () {
              var activeTab = document.querySelector('.mc-station-tab.active');
              var siteCode = activeTab ? activeTab.getAttribute('data-site-code') : null;
              if (taskCheckState[siteCode] && taskCheckState[siteCode].notice) {
                taskCheckState[siteCode].notice.submitted = false;
              }
              var noticePanel = document.getElementById('mc-tab-notice');
              var site = null;
              for (var k = 0; k < myCheckSites.length; k++) {
                if (myCheckSites[k].code === siteCode) {
                  site = myCheckSites[k];
                  break;
                }
              }
              if (noticePanel && site) {
                noticePanel.innerHTML = renderNoticePanel(site);
              }
              bindNoticeEvents();
            });
          }

          // 导出按钮（展示态）
          var exportBtn = document.getElementById('nf-export');
          if (exportBtn) {
            exportBtn.addEventListener('click', function () {
              showToast('success', '✓', '整改通知单导出中…');
            });
          }
        }

        // ============================================================
        // 跳转到实测复核Tab并定位到指定建筑物
        // ============================================================
        function jumpToVerificationBuilding(buildingId) {
          switchMainTab('verification');
          setTimeout(function () {

        // ============================================================
        // 普查明细表格"填写复核面积"入口事件绑定
        // ============================================================
        function bindReviewAreaEntryEvents() {

        // ---- 双专家确认事件绑定（调用 Store 真实会签） ----
        function bindConfirmEvents() {
          var confirmBtns = document.querySelectorAll('[id^="mc-confirm-"]');
          confirmBtns.forEach(function (btn) {
            btn.addEventListener('click', function () {
              var id = this.id;
              var parts = id.split('-');
              var type = parts[2]; // "checklist" or "notice"
              var expertNum = parseInt(parts[3], 10); // 1 or 2

              var activeTab = document.querySelector('.mc-station-tab.active');
              var siteCode = activeTab ? activeTab.getAttribute('data-site-code') : null;
              if (!siteCode) {
                showToast('warning', '⚠', '站点状态异常');
                return;
              }

              var ps = window.PrototypeStore;
              if (!ps) { showToast('warning', '⚠', 'Store未就绪'); return; }

              var expertName = expertNum === 1 ? '张建国' : '李建华';

              if (type === 'checklist') {
                // 检查记录单会签 — 调用 Store.signCheckRecord
                try {
                  var result = ps.signCheckRecord(siteCode, expertName, true);
                  if (result.status === 'rejected') {
                    showToast('warning', '⚠', result.message);
                  } else if (result.status === 'completed') {
                    showToast('success', '✓', '双专家会签完成，站点检查' +
                      (result.conclusion === '不合格' ? '不合格，已进入整改通知书流程' : '完成'));
                  } else {
                    showToast('success', '✓', expertName + ' 已同意');
                  }
                } catch(e) {
                  showToast('warning', '⚠', '会签失败: ' + e.message);
                }
              } else if (type === 'notice') {
                // 整改通知书会签 — 调用 Store.signRectificationNotice
                try {
                  var notices = ps.getRectificationNotices({ siteCode: siteCode });
                  var targetNotice = notices && notices.length ? notices[0] : null;
                  if (!targetNotice) {
                    showToast('warning', '⚠', '未找到当前站点的整改通知书');
                    return;
                  }
                  var result = ps.signRectificationNotice(targetNotice.id, expertName, true);
                  if (result.status === 'rejected') {
                    showToast('warning', '⚠', result.message);
                  } else if (result.status === 'auto_approved') {
                    showToast('success', '✓', '双专家会签通过，系统自动审核通过并已生成整改任务');
                  } else if (result.status === 'pending_review') {
                    showToast('success', '✓', '双专家会签通过，已进入业务管理员审核');
                  } else {
                    showToast('success', '✓', expertName + ' 已同意');
                  }
                } catch(e) {
                  showToast('warning', '⚠', '会签失败: ' + e.message);
                }
              }

              // 刷新当前面板
              var site = null;
              for (var k = 0; k < myCheckSites.length; k++) {
                if (myCheckSites[k].code === siteCode) { site = myCheckSites[k]; break; }
              }
              if (type === 'checklist') {
                var cp = document.getElementById('mc-tab-checklist');
                if (cp && site) cp.innerHTML = renderChecklistPanel(site);
                bindChecklistEvents();
              } else if (type === 'notice') {
                var np = document.getElementById('mc-tab-notice');
                if (np && site) np.innerHTML = renderNoticePanel(site);
                bindNoticeEvents();
              }
              bindConfirmEvents();
            });
          });
        }

        // ============================================================
        // 实测复核误差计算函数
        // ============================================================
        function calcRecheckTolerance(baseArea, recheckArea) {
          var base = parseFloat(baseArea);
          var recheck = parseFloat(recheckArea);

          if (isNaN(base) || base <= 0 || isNaN(recheck)) {
            return {
              valid: false,
              level: 'unknown',
              message: '无法计算',
              absDiff: null,
              relDiff: null,
              absDiffDisplay: '—',
              relDiffDisplay: '—',
              limitText: '无法计算',
              isOverLimit: false
            };
          }

          var absDiff = recheck - base;
          var absDiffValue = Math.abs(absDiff);
          var relDiff = absDiff / base * 100;
          var relDiffValue = Math.abs(relDiff);

          var limitText = '';
          var isOverLimit = false;

          if (base <= 500) {
            limitText = '≤500㎡，相对误差≤±3%';
            isOverLimit = relDiffValue > 3;
          } else if (base <= 2000) {
            limitText = '500㎡—2000㎡，相对误差≤±2%';
            isOverLimit = relDiffValue > 2;
          } else {
            limitText = '>2000㎡，绝对误差≤±60㎡';
            isOverLimit = absDiffValue > 60;
          }

          return {
            valid: true,
            level: isOverLimit ? 'over' : 'normal',
            message: isOverLimit ? '超过允许误差，请重点核查' : '误差正常',
            absDiff: absDiff,
            relDiff: relDiff,
            absDiffDisplay: (absDiff >= 0 ? '+' : '') + absDiff.toFixed(2) + '㎡',
            relDiffDisplay: (relDiff >= 0 ? '+' : '') + relDiff.toFixed(2) + '%',
            limitText: limitText,
            isOverLimit: isOverLimit
          };
        }

        function renderToleranceResult(tol) {
          if (!tol || !tol.valid) {
            return '<span style="color:#8c8c8c;font-size:11px;">无法计算</span>';
          }
          if (tol.isOverLimit) {
            return '\
              <div style="background:#fff2f0;border:1px solid #ffccc7;border-radius:6px;padding:6px 8px;font-size:11px;text-align:left;">\
                <div style="color:#ff4d4f;font-weight:600;margin-bottom:4px;">⚠ 超过允许误差，请重点核查</div>\
                <div style="color:#595959;"><span style="color:#888;">相对误差：</span>' + tol.relDiffDisplay + '</div>\
                <div style="color:#595959;"><span style="color:#888;">绝对误差：</span>' + tol.absDiffDisplay + '</div>\
                <div style="color:#bbb;font-size:10px;margin-top:2px;">适用标准：' + tol.limitText + '</div>\
              </div>';
          }
          return '\
            <div style="background:#f6ffed;border:1px solid #b7eb8f;border-radius:6px;padding:6px 8px;font-size:11px;text-align:left;">\
              <div style="color:#52c41a;font-weight:600;margin-bottom:4px;">误差正常</div>\
              <div style="color:#595959;"><span style="color:#888;">相对误差：</span>' + tol.relDiffDisplay + '</div>\
              <div style="color:#595959;"><span style="color:#888;">绝对误差：</span>' + tol.absDiffDisplay + '</div>\
              <div style="color:#bbb;font-size:10px;margin-top:2px;">适用标准：' + tol.limitText + '</div>\
            </div>';
        }

        // ---- 实测复核事件绑定 ----
        function bindVerificationEvents() {
          // 选择照片按钮
          document.querySelectorAll('.mc-ver-upload-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
              var buildingId = this.getAttribute('data-building');
              var fileInput = document.getElementById('mc-ver-file-' + buildingId);
              if (fileInput) fileInput.click();
            });
          });

          // 文件选择后显示文件名
          document.querySelectorAll('.mc-ver-file-input').forEach(function (input) {
            input.addEventListener('change', function () {
              var buildingId = this.getAttribute('data-building');
              var nameSpan = document.getElementById('mc-ver-name-' + buildingId);
              if (this.files && this.files.length > 0) {
                nameSpan.textContent = this.files[0].name;
                nameSpan.style.color = '#52c41a';
              }
            });
          });

          // 复查面积实时计算误差
          document.querySelectorAll('.mc-ver-area-input').forEach(function (input) {
            input.addEventListener('input', function () {
              var areaVal = this.value.trim();
              var buildingId = this.id.replace('mc-ver-area-', '');
              var tolCell = document.getElementById('mc-ver-tol-' + buildingId);
              if (!areaVal || !tolCell) {
                if (tolCell) tolCell.innerHTML = '<span style="color:#8c8c8c;font-size:11px;">输入后自动计算</span>';
                return;
              }
              // 查找对应的普查面积
              var surveyDetails = [];
              var activeTab = document.querySelector('.mc-station-tab.active');
              var siteCode = activeTab ? activeTab.getAttribute('data-site-code') : null;
              if (siteCode) surveyDetails = surveyDataMap[siteCode] || [];
              var b = null;
              for (var si = 0; si < surveyDetails.length; si++) {
                if (surveyDetails[si].id == buildingId) { b = surveyDetails[si]; break; }
              }
              if (!b) return;
              var tol = calcRecheckTolerance(b.currentArea, parseFloat(areaVal));
              if (!tol || !tol.valid) return;
              tolCell.innerHTML = renderToleranceResult(tol);
            });
          });

          // 保存复核数据
          var saveBtn = document.getElementById('mc-ver-submit');
          if (saveBtn) {
            saveBtn.addEventListener('click', function () {
              var activeTab = document.querySelector('.mc-station-tab.active');
              var siteCode = activeTab ? activeTab.getAttribute('data-site-code') : null;
              if (!siteCode || !taskCheckState[siteCode]) {
                showToast('warning', '⚠', '站点状态异常');
                return;
              }

              var surveyDetails = surveyDataMap[siteCode] || [];
              // 只取实测建筑物
              var measuredBuildings = [];
              for (var mi = 0; mi < surveyDetails.length; mi++) {
                if (surveyDetails[mi].basis && surveyDetails[mi].basis.indexOf('实测') !== -1) {
                  measuredBuildings.push(surveyDetails[mi]);
                }
              }

              var verData = {};
              var allFilled = true;
              var missingNames = [];

              for (var i = 0; i < measuredBuildings.length; i++) {
                var b = measuredBuildings[i];

                var fileInput = document.getElementById('mc-ver-file-' + b.id);
                var areaInput = document.getElementById('mc-ver-area-' + b.id);

                var photoName = (fileInput && fileInput.files && fileInput.files.length > 0) ? fileInput.files[0].name : '';
                var recheckArea = (areaInput && areaInput.value) ? areaInput.value : '';

                if (!photoName) {
                  allFilled = false;
                  missingNames.push(b.building + '（照片）');
                }
                if (!recheckArea) {
                  allFilled = false;
                  missingNames.push(b.building + '（复查面积）');
                }

                // 计算误差结果
                var tolResult = recheckArea ? calcRecheckTolerance(b.currentArea, parseFloat(recheckArea)) : null;
                verData[b.id] = {
                  photoName: photoName,
                  recheckArea: recheckArea,
                  baseArea: b.currentArea,
                  absDiff: tolResult && tolResult.valid ? tolResult.absDiff : null,
                  relDiff: tolResult && tolResult.valid ? tolResult.relDiff : null,
                  absDiffDisplay: tolResult && tolResult.valid ? tolResult.absDiffDisplay : '—',
                  relDiffDisplay: tolResult && tolResult.valid ? tolResult.relDiffDisplay : '—',
                  isOverLimit: tolResult && tolResult.valid ? tolResult.isOverLimit : false,
                  limitText: tolResult && tolResult.valid ? tolResult.limitText : '—',
                  reviewStatus: tolResult && tolResult.valid ? (tolResult.isOverLimit ? '重点核查' : '正常') : '未复核'
                };
              }

              if (!allFilled) {
                showToast('warning', '⚠', '以下数据不完整：' + missingNames.join('，'));
                return;
              }

              // 超限校验（不阻断，只提示）
              var overLimitNames = [];
              for (var key in verData) {
                if (verData[key].isOverLimit) {
                  overLimitNames.push(verData[key].reviewStatus);
                }
              }
              var hasOverLimit = Object.keys(verData).some(function (k) { return verData[k].isOverLimit; });
              if (hasOverLimit) {
                showToast('warning', '⚠', '存在建筑物复核误差超过允许范围，请重点核查');
              }

              if (!taskCheckState[siteCode].verification) taskCheckState[siteCode].verification = {};
              for (var key in verData) {
                taskCheckState[siteCode].verification[key] = verData[key];
              }

              if (!hasOverLimit) {
                showToast('success', '✓', '实测复核数据已保存');
              }
            });
          }
        }

        // ---- Toast提示 ----
        function showToast(type, icon, message) {
          var toast = document.getElementById('mc-toast');
          var toastText = document.getElementById('mc-toast-text');
          var toastIcon = toast ? toast.querySelector('.mc-toast-icon') : null;
          if (!toast || !toastText) return;

          toast.className = 'mc-toast ' + type;
          if (toastIcon) toastIcon.textContent = icon;
          toastText.textContent = message;

          toast.classList.add('show');
          setTimeout(function () {
            toast.classList.remove('show');
          }, 2500);
        }

        window.PageMyTaskCheck = { render: renderMyTaskCheckPage, bindEvents: bindMyTaskCheckEvents };

            showToast('info', '•', '当前为原型预览，分页未实现');

        });

        // ============================================================
        // 双专家会签全局函数
        // ============================================================
        window.signCheckRecord = function(siteCode, expertName, agree) {
          try {
            var ps = window.PrototypeStore;
            if (!ps || !ps.signCheckRecord) { showToast('warning', '⚠', 'Store未就绪'); return; }
            var result = ps.signCheckRecord(siteCode, expertName, agree);
            if (result.status === 'rejected') {
              showToast('warning', '⚠', result.message);
            } else if (result.status === 'completed') {
              showToast('success', '✓', '双专家会签完成，站点检查' + (result.conclusion === '不合格' ? '不合格，已进入整改通知书流程' : '完成'));
            } else {
              showToast('success', '✓', expertName + ' 已' + (agree ? '同意' : '不同意'));
            }
            // 刷新当前站点面板
            var activeTab = document.querySelector('.mc-station-tab.active');
            var sc = activeTab ? activeTab.getAttribute('data-site-code') : null;
            var site = null;
            for (var k = 0; k < myCheckSites.length; k++) {
              if (myCheckSites[k].code === sc) { site = myCheckSites[k]; break; }
            }
            if (site) {
              var checklistPanel = document.getElementById('mc-tab-checklist');
              if (checklistPanel) checklistPanel.innerHTML = renderChecklistPanel(site);
              var noticePanel = document.getElementById('mc-tab-notice');
              if (noticePanel) noticePanel.innerHTML = renderNoticePanel(site);
            }
          } catch(e) { showToast('warning', '⚠', '会签操作失败: ' + e.message); }
        };

        window.signNoticeSign = function(noticeId, expertName, agree) {
          try {
            var ps = window.PrototypeStore;
            if (!ps || !ps.signRectificationNotice) { showToast('warning', '⚠', 'Store未就绪'); return; }
            var result = ps.signRectificationNotice(parseInt(noticeId), expertName, agree);
            if (result.status === 'rejected') {
              showToast('warning', '⚠', result.message);
            } else if (result.status === 'auto_approved') {
              showToast('success', '✓', '双专家会签通过，系统自动审核通过并已生成整改任务');
            } else if (result.status === 'pending_review') {
              showToast('success', '✓', '双专家会签通过，已进入业务管理员审核');
            } else {
              showToast('success', '✓', expertName + ' 已' + (agree ? '同意' : '不同意'));
            }
            // 刷新
            var activeTab = document.querySelector('.mc-station-tab.active');
            var sc = activeTab ? activeTab.getAttribute('data-site-code') : null;
            var site = null;
            for (var k = 0; k < myCheckSites.length; k++) {
              if (myCheckSites[k].code === sc) { site = myCheckSites[k]; break; }
            }
            if (site) {
              var noticePanel = document.getElementById('mc-tab-notice');
              if (noticePanel) noticePanel.innerHTML = renderNoticePanel(site);
            }
          } catch(e) { showToast('warning', '⚠', '会签操作失败: ' + e.message); }
        };
      })();
