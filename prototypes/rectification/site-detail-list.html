<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>面积检查站点明细</title>
  <link rel="stylesheet" href="../../shared/styles/shared.css" />
  <link rel="stylesheet" href="./styles/pc-system-template.css" />
  <link rel="stylesheet" href="./styles.css" />
  <style>
    /* ===== 面积检查站点明细专用样式（sd- 前缀隔离） ===== */

    .sd-page {
      max-width: 1600px;
      margin: 0 auto;
    }

    .sd-layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .sd-sidebar-card .card-body {
      padding: 16px 0 12px;
    }

    .sd-sidebar-title {
      padding: 0 20px 12px;
      font-size: 15px;
      font-weight: 600;
      color: #262626;
      border-bottom: 1px solid #f0f0f0;
    }

    .sd-tree {
      padding: 12px 12px 4px;
      max-height: 720px;
      overflow: auto;
    }

    .sd-tree-node {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 8px;
      border-radius: 6px;
      transition: background 0.15s ease;
    }

    .sd-tree-node:hover {
      background: #f5f7fb;
    }

    .sd-tree-node.sd-tree-node--root {
      margin-bottom: 4px;
    }

    .sd-tree-node.sd-tree-node--child {
      padding-left: 30px;
    }

    .sd-tree-toggle {
      width: 16px;
      color: #8c8c8c;
      font-size: 12px;
      text-align: center;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
    }

    .sd-tree-toggle.sd-tree-toggle--hidden {
      visibility: hidden;
      cursor: default;
    }

    .sd-tree-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #262626;
      cursor: pointer;
      user-select: none;
      min-width: 0;
      flex: 1;
    }

    .sd-tree-count {
      color: #8c8c8c;
      font-size: 12px;
      flex-shrink: 0;
    }

    .sd-tree-children.sd-tree-children--collapsed {
      display: none;
    }

    .sd-tree-summary {
      margin: 0 20px 12px;
      padding: 10px 12px;
      background: #f7faff;
      border: 1px solid #d6e4ff;
      border-radius: 6px;
      color: #4c78f5;
      font-size: 12px;
      line-height: 1.5;
    }

    .sd-main {
      min-width: 0;
    }

    .sd-page-header {
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sd-page-title {
      font-size: 18px;
      font-weight: 600;
      color: #262626;
    }

    /* ── 筛选区域 ── */
    .sd-filter-card {
      margin-bottom: 16px;
    }
    .sd-filter-card .card-body {
      padding: 16px 20px;
    }
    .sd-filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 12px 20px;
      align-items: center;
    }
    .sd-filter-item {
      display: flex;
      align-items: center;
      min-width: 0;
      white-space: nowrap;
    }
    .sd-filter-item label {
      display: inline-flex;
      align-items: center;
      width: 88px;
      min-width: 88px;
      margin-right: 8px;
      font-size: 13px;
      color: var(--pc-color-text-3);
      font-weight: 500;
      white-space: nowrap;
    }
    .sd-filter-item .control,
    .sd-filter-item select.control {
      width: 100%;
    }
    .sd-filter-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
      grid-column: 3 / 5;
    }

    /* ── 表格 ── */
    .sd-table {
      min-width: 2200px;
      table-layout: fixed;
    }
    .sd-table .col-seq { width: 48px; text-align: center; }
    .sd-table .col-code { width: 100px; }
    .sd-table .col-name { width: 120px; }
    .sd-table .col-check-status { width: 90px; text-align: center; }
    .sd-table .col-dept { width: 100px; }
    .sd-table .col-area { width: 100px; }
    .sd-table .col-type { width: 80px; text-align: center; }
    .sd-table .col-office { width: 100px; }
    .sd-table .col-addr { width: 200px; }
    .sd-table .col-census { width: 100px; text-align: center; }
    .sd-table .col-year { width: 80px; text-align: center; }
    .sd-table .col-expert { width: 80px; }
    .sd-table .col-check-time { width: 100px; }
    .sd-table .col-result { width: 80px; text-align: center; }
    .sd-table .col-rectify-status { width: 80px; text-align: center; }
    .sd-table .col-rectify-time { width: 100px; }
    .sd-table .col-ops { width: 70px; text-align: center; }

    /* 操作列 sticky 固定 */
    .sd-table th:last-child,
    .sd-table td:last-child {
      position: sticky;
      right: 0;
      z-index: 2;
      box-shadow: -2px 0 6px rgba(0,0,0,0.08);
      background: #fff;
    }
    .sd-table th:last-child {
      background: #fafbfc;
      z-index: 3;
    }
    .sd-action-link {
      color: #4c78f5;
      font-weight: 500;
      cursor: pointer;
    }
    .sd-action-link:hover {
      text-decoration: underline;
    }

    .sd-col-center {
      text-align: center;
    }
    .sd-table th,
    .sd-table td {
      padding: 10px 8px;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 状态标签 */
    .sd-status-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 56px;
      height: 26px;
      padding: 0 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    .sd-status-tag.sd-status-check-todo { background: #fafafa; color: #bfbfbf; border: 1px solid #d9d9d9; }
    .sd-status-tag.sd-status-check-doing { background: #e6f7ff; color: #1890ff; border: 1px solid #91d5ff; }
    .sd-status-tag.sd-status-check-done { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
    .sd-status-tag.sd-status-check-pending-rectify { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }

    .sd-result-pass {
      background: #f6ffed;
      color: #52c41a;
      border: 1px solid #b7eb8f;
    }
    .sd-result-fail {
      background: #fff1f0;
      color: #ff4d4f;
      border: 1px solid #ffa39e;
    }

    .sd-rectify-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 56px;
      height: 24px;
      padding: 0 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }
    .sd-rectify-todo { background: #fff7e6; color: #d48806; border: 1px solid #ffe58f; }
    .sd-rectify-review { background: #f0f5ff; color: #4c78f5; border: 1px solid #adc6ff; }
    .sd-rectify-recheck { background: #f0fff4; color: #389e0d; border: 1px solid #b7eb8f; }
    .sd-rectify-archived { background: #f5f5f5; color: #8c8c8c; border: 1px solid #d9d9d9; }
    .sd-rectify-overdue { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }
    .sd-rectify-na { background: #fafafa; color: #d9d9d9; border: 1px solid #f0f0f0; }

    /* 站点类型标签 */
    .sd-type-tag {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 3px;
      font-size: 12px;
      line-height: 20px;
    }
    .sd-type-tag.sd-type-user { color: #1890ff; background: #e6f7ff; border: 1px solid #91d5ff; }
    .sd-type-tag.sd-type-self { color: #fa8c16; background: #fff7e6; border: 1px solid #ffd591; }

    /* 普查标记 */
    .sd-census-yes { color: #52c41a; font-weight: 500; }
    .sd-census-no { color: #bfbfbf; }

    /* 列表头 */
    .sd-list-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .sd-list-title {
      font-size: 15px;
      font-weight: 600;
      color: #262626;
    }
    .sd-count-badge {
      font-size: 13px;
      color: #8c8c8c;
    }

    /* 分页 */
    .sd-pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px 16px;
    }
    .sd-pagination-info {
      font-size: 13px;
      color: #8c8c8c;
    }

    /* 分页默认样式采用全局 .pagination */
  </style>
</head>
<body data-page="site-detail-list" data-menu="site-detail-list">
  <div id="app"></div>

  <script src="../../shared/components/Layout/layout.js"></script>

  <script src="./store/PrototypeStore.js"></script>

  <script>
    (function () {
      'use strict';

      // ============================================================
      // Mock 数据
      // ============================================================
      var mockData = [
        { id: 1, code: '60218B001', name: '裕华区中心站', checkStatus: '已检查', dept: '裕华管理部', area: '裕华一片区所', type: '用户站', office: '裕东街道', address: '裕华区槐安路与翟营大街交叉口东行200米路北', census: '是', buildYear: '2009年', expert: '赵立成', checkTime: '2026-07-03', result: '合格', rectifyStatus: '—', rectifyTime: '—', taskName: '2026 第27周 裕华片区常规面积核查任务' },
        { id: 2, code: '60218B004', name: '裕华区万达站', checkStatus: '待整改', dept: '裕华管理部', area: '裕华二片区所', type: '用户站', office: '裕华区', address: '裕华区槐中路与建华大街交口东南角', census: '是', buildYear: '2012年', expert: '赵立成', checkTime: '2026-07-03', result: '不合格', rectifyStatus: '待整改', rectifyTime: '—', taskName: '2026 第27周 裕华片区异常转派补查任务' },
        { id: 3, code: '60218B007', name: '裕华区东南站', checkStatus: '已检查', dept: '裕华管理部', area: '裕华二片区所', type: '用户站', office: '裕华区', address: '裕华区体育南大街与南二环交口', census: '是', buildYear: '2010年', expert: '赵立成', checkTime: '2026-06-28', result: '不合格', rectifyStatus: '待复查', rectifyTime: '2026-07-10', taskName: '2026 第27周 裕华片区常规面积核查任务' },
        { id: 4, code: '60218B010', name: '桥西区新百站', checkStatus: '已检查', dept: '桥西管理部', area: '桥西一片区所', type: '自管站', office: '中山西路', address: '桥西区中山西路与中华大街交口西南', census: '是', buildYear: '2005年', expert: '李志强', checkTime: '2026-06-30', result: '合格', rectifyStatus: '已归档', rectifyTime: '2026-07-05', taskName: '2026 第26周 桥西片区常规面积核查任务' },
        { id: 5, code: '60218B012', name: '长安区中山东路站', checkStatus: '已检查', dept: '长安管理部', area: '长安一片区所', type: '用户站', office: '中山东路', address: '长安区中山东路与青园街交叉口东行', census: '否', buildYear: '2008年', expert: '张伟', checkTime: '2026-06-25', result: '不合格', rectifyStatus: '已超期', rectifyTime: '—', taskName: '2026 第26周 长安片区管网排查任务' },
        { id: 6, code: '60218B015', name: '裕华区槐北站', checkStatus: '待检查', dept: '裕华管理部', area: '裕华一片区所', type: '自管站', office: '槐北路', address: '裕华区槐北路与富强大街交口', census: '是', buildYear: '2015年', expert: '赵立成', checkTime: '—', result: '—', rectifyStatus: '—', rectifyTime: '—', taskName: '2026 第27周 裕华片区常规面积核查任务' },
        { id: 7, code: '60218B018', name: '桥西区建设大街站', checkStatus: '检查中', dept: '桥西管理部', area: '桥西二片区所', type: '用户站', office: '建设大街', address: '桥西区建设大街与裕华路交口西北', census: '是', buildYear: '2011年', expert: '李志强', checkTime: '—', result: '—', rectifyStatus: '—', rectifyTime: '—', taskName: '2026 第27周 桥西片区常规面积核查任务' },
        { id: 8, code: '60218B020', name: '长安区和平路站', checkStatus: '待整改', dept: '长安管理部', area: '长安二片区所', type: '用户站', office: '和平东路', address: '长安区和平东路与建华大街交叉口东行', census: '是', buildYear: '2006年', expert: '张伟', checkTime: '2026-07-01', result: '不合格', rectifyStatus: '待审核', rectifyTime: '2026-07-04', taskName: '2026 第27周 长安片区常规面积核查任务' }
      ];

      // 原始数据副本用于重置
      var allData = mockData.slice();
      var selectedAreas = [];
      var treeExpandedState = {};

      // ============================================================
      // 渲染函数
      // ============================================================
      function checkStatusClass(s) {
        var map = { '待检查': 'sd-status-check-todo', '检查中': 'sd-status-check-doing', '已检查': 'sd-status-check-done', '待整改': 'sd-status-check-pending-rectify' };
        return 'sd-status-tag ' + (map[s] || 'sd-status-check-todo');
      }

      function resultClass(r) {
        if (r === '合格') return 'sd-status-tag sd-result-pass';
        if (r === '不合格') return 'sd-status-tag sd-result-fail';
        return '';
      }

      function rectifyClass(s) {
        var map = { '待整改': 'sd-rectify-todo', '待审核': 'sd-rectify-review', '待复查': 'sd-rectify-recheck', '已归档': 'sd-rectify-archived', '已超期': 'sd-rectify-overdue', '—': 'sd-rectify-na', '-': 'sd-rectify-na' };
        return 'sd-rectify-tag ' + (map[s] || 'sd-rectify-na');
      }

      function typeClass(t) {
        return 'sd-type-tag ' + (t === '用户站' ? 'sd-type-user' : 'sd-type-self');
      }

      function renderOps(r) {
        var html = '<a class="sd-action-link" href="./site-detail.html?code=' + r.code + '">详情</a>';
        if (r.type === '自管站') {
          html += '<span style="margin:0 6px;color:#e0e0e0;">|</span><span class="sd-action-link sd-export-detail" data-site-name="' + r.name + '">明细导出</span>';
        }
        return html;
      }

      function renderRows(data) {
        if (!data.length) {
          return '<tr><td colspan="17" class="sd-col-center" style="padding:32px 12px;color:#8c8c8c;">暂无匹配站点</td></tr>';
        }
        var html = '';
        for (var i = 0; i < data.length; i++) {
          var r = data[i];
          var resultHtml = r.result === '—' ? '<span style="color:#bfbfbf;">—</span>' : '<span class="' + resultClass(r.result) + '">' + r.result + '</span>';
          html += '\
            <tr>\
              <td class="sd-col-center">' + r.id + '</td>\
              <td>' + r.code + '</td>\
              <td>' + r.name + '</td>\
              <td class="sd-col-center"><span class="' + checkStatusClass(r.checkStatus) + '">' + r.checkStatus + '</span></td>\
              <td>' + r.dept + '</td>\
              <td>' + r.area + '</td>\
              <td class="sd-col-center"><span class="' + typeClass(r.type) + '">' + r.type + '</span></td>\
              <td>' + r.office + '</td>\
              <td>' + r.address + '</td>\
              <td class="sd-col-center"><span class="' + (r.census === '是' ? 'sd-census-yes' : 'sd-census-no') + '">' + r.census + '</span></td>\
              <td class="sd-col-center">' + r.buildYear + '</td>\
              <td>' + r.expert + '</td>\
              <td>' + r.checkTime + '</td>\
              <td class="sd-col-center">' + resultHtml + '</td>\
              <td class="sd-col-center"><span class="' + rectifyClass(r.rectifyStatus) + '">' + r.rectifyStatus + '</span></td>\
              <td>' + r.rectifyTime + '</td>\
              <td class="sd-col-center">' + renderOps(r) + '</td>\
            </tr>';
        }
        return html;
      }

      function buildTreeData() {
        var deptMap = {};
        allData.forEach(function (item) {
          if (!deptMap[item.dept]) {
            deptMap[item.dept] = { name: item.dept, count: 0, areas: {} };
          }
          deptMap[item.dept].count += 1;
          if (!deptMap[item.dept].areas[item.area]) {
            deptMap[item.dept].areas[item.area] = { name: item.area, count: 0 };
          }
          deptMap[item.dept].areas[item.area].count += 1;
        });

        return Object.keys(deptMap).sort().map(function (deptName) {
          var dept = deptMap[deptName];
          return {
            name: dept.name,
            count: dept.count,
            areas: Object.keys(dept.areas).sort().map(function (areaName) {
              return dept.areas[areaName];
            })
          };
        });
      }

      function isAreaSelected(areaName) {
        return selectedAreas.indexOf(areaName) > -1;
      }

      function areAllAreasSelected(areaList) {
        return areaList.length > 0 && areaList.every(function (area) {
          return isAreaSelected(area.name);
        });
      }

      function areSomeAreasSelected(areaList) {
        return areaList.some(function (area) {
          return isAreaSelected(area.name);
        });
      }

      function renderTree() {
        var treeEl = document.getElementById('sd-tree');
        var summaryEl = document.getElementById('sd-tree-summary');
        if (!treeEl || !summaryEl) return;

        var treeData = buildTreeData();
        var rootChecked = selectedAreas.length === 0;

        summaryEl.textContent = rootChecked
          ? '当前组织筛选：全部站点'
          : '当前组织筛选：已选 ' + selectedAreas.length + ' 个片区所';

        var html = [
          '<div class="sd-tree-node sd-tree-node--root">',
          '<span class="sd-tree-toggle sd-tree-toggle--hidden">•</span>',
          '<input type="checkbox" id="sd-tree-root" ' + (rootChecked ? 'checked' : '') + ' />',
          '<label class="sd-tree-label" for="sd-tree-root">全部站点<span class="sd-tree-count">(' + allData.length + ')</span></label>',
          '</div>'
        ];

        treeData.forEach(function (dept) {
          var expanded = treeExpandedState[dept.name] !== false;
          var allChecked = areAllAreasSelected(dept.areas);
          var someChecked = areSomeAreasSelected(dept.areas);
          html.push(
            '<div class="sd-tree-group">',
              '<div class="sd-tree-node">',
                '<span class="sd-tree-toggle" data-toggle-dept="' + dept.name + '">' + (expanded ? '▾' : '▸') + '</span>',
                '<input type="checkbox" class="sd-tree-dept-checkbox" id="sd-tree-dept-' + dept.name + '" data-dept="' + dept.name + '" ' + (allChecked ? 'checked' : '') + ' />',
                '<label class="sd-tree-label" for="sd-tree-dept-' + dept.name + '">' + dept.name + '<span class="sd-tree-count">(' + dept.count + ')</span></label>',
              '</div>',
              '<div class="sd-tree-children' + (expanded ? '' : ' sd-tree-children--collapsed') + '" data-children-dept="' + dept.name + '">'
          );
          dept.areas.forEach(function (area) {
            html.push(
              '<div class="sd-tree-node sd-tree-node--child">',
                '<span class="sd-tree-toggle sd-tree-toggle--hidden">•</span>',
                '<input type="checkbox" class="sd-tree-area-checkbox" id="sd-tree-area-' + area.name + '" data-dept="' + dept.name + '" data-area="' + area.name + '" ' + (isAreaSelected(area.name) ? 'checked' : '') + ' />',
                '<label class="sd-tree-label" for="sd-tree-area-' + area.name + '">' + area.name + '<span class="sd-tree-count">(' + area.count + ')</span></label>',
              '</div>'
            );
          });
          html.push('</div></div>');
        });

        treeEl.innerHTML = html.join('');

        treeData.forEach(function (dept) {
          var deptCheckbox = document.querySelector('.sd-tree-dept-checkbox[data-dept="' + dept.name + '"]');
          if (deptCheckbox) {
            deptCheckbox.indeterminate = !areAllAreasSelected(dept.areas) && areSomeAreasSelected(dept.areas);
          }
        });
      }

      function setDeptSelected(deptName, checked) {
        var treeData = buildTreeData();
        var dept = treeData.find(function (item) { return item.name === deptName; });
        if (!dept) return;
        dept.areas.forEach(function (area) {
          var index = selectedAreas.indexOf(area.name);
          if (checked && index === -1) selectedAreas.push(area.name);
          if (!checked && index > -1) selectedAreas.splice(index, 1);
        });
      }

      function setAreaSelected(areaName, checked) {
        var index = selectedAreas.indexOf(areaName);
        if (checked && index === -1) selectedAreas.push(areaName);
        if (!checked && index > -1) selectedAreas.splice(index, 1);
      }

      function getFilteredData() {
        var nameVal = (document.getElementById('sd-f-name').value || '').trim();
        var taskVal = (document.getElementById('sd-f-task').value || '').trim();
        var checkStatusVal = document.getElementById('sd-f-check-status').value;
        var censusVal = document.getElementById('sd-f-census').value;
        var resultVal = document.getElementById('sd-f-result').value;
        var rectifyVal = document.getElementById('sd-f-rectify').value;
        var checkTimeVal = (document.getElementById('sd-f-check-time').value || '').trim();
        var rectifyTimeVal = (document.getElementById('sd-f-rectify-time').value || '').trim();

        return allData.filter(function (r) {
          if (selectedAreas.length && selectedAreas.indexOf(r.area) === -1) return false;
          if (nameVal && r.name.indexOf(nameVal) === -1) return false;
          if (taskVal && r.taskName.indexOf(taskVal) === -1) return false;
          if (checkStatusVal && r.checkStatus !== checkStatusVal) return false;
          if (censusVal && r.census !== censusVal) return false;
          if (resultVal && r.result !== resultVal) return false;
          if (rectifyVal && r.rectifyStatus !== rectifyVal) return false;
          if (checkTimeVal && r.checkTime.indexOf(checkTimeVal) === -1) return false;
          if (rectifyTimeVal && r.rectifyTime.indexOf(rectifyTimeVal) === -1) return false;
          return true;
        });
      }

      // ============================================================
      // 事件绑定 + 筛选
      // ============================================================
      function bindEvents() {
        var queryBtn = document.getElementById('sd-btn-query');
        var resetBtn = document.getElementById('sd-btn-reset');

        if (queryBtn) queryBtn.addEventListener('click', applyFilters);
        if (resetBtn) {
          resetBtn.addEventListener('click', function () {
            ['sd-f-name','sd-f-task','sd-f-check-time','sd-f-rectify-time'].forEach(function (id) {
              var el = document.getElementById(id);
              if (el) el.value = '';
            });
            ['sd-f-check-status','sd-f-census','sd-f-result','sd-f-rectify'].forEach(function (id) {
              var el = document.getElementById(id);
              if (el) el.value = '';
            });
            selectedAreas = [];
            applyFilters();
          });
        }

        var treeEl = document.getElementById('sd-tree');
        if (treeEl) {
          treeEl.addEventListener('click', function (e) {
            var toggle = e.target.closest('[data-toggle-dept]');
            if (toggle) {
              var deptName = toggle.getAttribute('data-toggle-dept');
              treeExpandedState[deptName] = treeExpandedState[deptName] === false;
              renderTree();
            }
          });

          treeEl.addEventListener('change', function (e) {
            var target = e.target;
            if (target.id === 'sd-tree-root') {
              selectedAreas = [];
              applyFilters();
              return;
            }
            if (target.classList.contains('sd-tree-dept-checkbox')) {
              setDeptSelected(target.getAttribute('data-dept'), target.checked);
              applyFilters();
              return;
            }
            if (target.classList.contains('sd-tree-area-checkbox')) {
              setAreaSelected(target.getAttribute('data-area'), target.checked);
              applyFilters();
            }
          });
        }

        // 导出按钮
        var exportBtn = document.getElementById('sd-btn-export');
        if (exportBtn) {
          exportBtn.addEventListener('click', openExportPreview);
        }

        // 明细导出事件委托（表格内自管站按钮）
        var tableEl = document.querySelector('.sd-table');
        if (tableEl) {
          tableEl.addEventListener('click', function(e) {
            var target = e.target;
            if (target.classList.contains('sd-export-detail')) {
              var siteName = target.getAttribute('data-site-name');
              if (siteName) openDetailExport(siteName);
            }
          });
        }

        // 分页按钮原型提示
        document.querySelectorAll('.page-btn.disabled, .page-number').forEach(function (el) {
          el.addEventListener('click', function () {
            AppComponents.showToast('当前为原型预览，分页未实现', 'info');
          });
        });

        renderTree();
      }
