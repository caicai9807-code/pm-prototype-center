<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>部门领导App</title>
<link rel="stylesheet" href="../../shared/styles/app-phone.css">
<style>
/* ===== 部门领导App独有样式 ===== */
.cf-nav-bar{position:sticky;top:0;z-index:5;background:#fff;display:flex;align-items:center;height:36px;padding:0 12px;border-bottom:1px solid #edf0f2}
.cf-back-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#4b7cf4;font-size:20px;border-radius:14px;flex-shrink:0}
.cf-nav-title{flex:1;text-align:center;font-size:16px;font-weight:600;color:#111827;margin-right:28px}
.cf-content{background:#f5f6f8;padding:12px;overflow-y:auto}
.cf-card{background:#fff;border-radius:8px;padding:14px;margin-bottom:12px}
.cf-card-title{font-size:14px;font-weight:600;color:#111827;margin-bottom:14px}
.cf-field-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:0;height:34px;line-height:34px;border-bottom:1px solid #edf0f2}
.cf-field-row.cf-field-last{border-bottom:none}
.cf-label{color:#8a8f99;font-size:12px;white-space:nowrap;flex-shrink:0}
.cf-value{color:#111827;font-size:12px;text-align:right;overflow:hidden;text-overflow:ellipsis}

/* ===== 转派审核卡片 ===== */
.dl-card{background:#fff;border-radius:16px;padding:14px;margin:10px 12px;box-shadow:0 6px 18px rgba(31,41,55,.07)}
.dl-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}
.dl-card-name{font-size:15px;font-weight:700;color:#23324a;line-height:20px}
.dl-card-tag{font-size:11px;padding:3px 8px;border-radius:999px;white-space:nowrap}
.dl-card-row{display:flex;justify-content:space-between;gap:12px;min-height:24px;line-height:20px}
.dl-card-label{font-size:12px;color:#8a94a6;white-space:nowrap}
.dl-card-value{font-size:12px;color:#23324a;text-align:right}
.dl-card-btn-area{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid #edf0f2}
.dl-btn{flex:1;height:36px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.dl-btn-primary{background:#4b7cf4;color:#fff}
.dl-btn-primary:active{background:#3a6be0}
.dl-btn-default{background:#f0f2f6;color:#52607a;border:1px solid #e2e6ed}
.dl-btn-default:active{background:#e5e8ef}

/* ===== 审核弹窗 ===== */
.dl-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.dl-overlay.show{opacity:1;pointer-events:auto}
.dl-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:392px;padding:24px 20px 32px;max-height:80vh;overflow-y:auto}
.dl-sheet-title{font-size:18px;font-weight:700;color:#1f2b3d;margin-bottom:16px;text-align:center}
.dl-sheet-section{margin-bottom:16px}
.dl-sheet-label{font-size:13px;font-weight:600;color:#333;margin-bottom:6px}
.dl-sheet-text{font-size:12px;color:#555;line-height:1.6;background:#f8f9fc;padding:8px;border-radius:6px}
.dl-sheet-divider{height:1px;background:#edf0f2;margin:12px 0}
.dl-expert-card{display:flex;align-items:center;gap:10px;padding:10px;border:1px solid #e2e6ed;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.dl-expert-card:active{background:#f5f7fa}
.dl-expert-card.selected{border-color:#4b7cf4;background:#f0f5ff}
.dl-expert-avatar{width:36px;height:36px;border-radius:50%;background:#4b7cf4;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.dl-expert-info{flex:1;min-width:0}
.dl-expert-name{font-size:13px;font-weight:600;color:#1f2b3d}
.dl-expert-meta{font-size:11px;color:#8a94a6;margin-top:2px}
.dl-expert-radio{width:18px;height:18px;border-radius:50%;border:2px solid #d0d5dd;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dl-expert-card.selected .dl-expert-radio{border-color:#4b7cf4}
.dl-expert-card.selected .dl-expert-radio::after{content:'';width:10px;height:10px;border-radius:50%;background:#4b7cf4}
.dl-sheet-actions{display:flex;gap:10px;margin-top:16px}
.dl-sheet-btn{flex:1;height:44px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;text-align:center}
.dl-sheet-btn-cancel{background:#f0f2f6;color:#52607a}
.dl-sheet-btn-confirm{background:#4b7cf4;color:#fff}
.dl-sheet-btn-confirm:disabled{background:#b0c4f0;cursor:not-allowed}

/* ===== 底部Tab导航 ===== */
body{margin:0;background:#f5f6f8;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;min-height:100vh}

/* ===== 页面容器 ===== */
.app-page{position:relative;overflow-y:auto;overflow-x:hidden;background:#f5f6f8;-webkit-overflow-scrolling:touch}
.app-page.hidden{display:none}

/* ===== 站点详情Tab系统 ===== */
.dl-tabs{display:flex;gap:4px;padding:6px 12px;background:#f5f5f5;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.dl-tabs::-webkit-scrollbar{display:none}
.dl-tab{flex-shrink:0;padding:5px 10px;font-size:12px;font-weight:500;color:#666;cursor:pointer;white-space:nowrap;border-radius:6px;transition:all .15s}
.dl-tab.active{background:#1677ff;color:#fff;font-weight:600}
.dl-tab-panel{display:none;animation:dlFadeIn .2s ease}
.dl-tab-panel.active{display:block}
@keyframes dlFadeIn{0%{opacity:0;transform:translateY(4px)}100%{opacity:1;transform:translateY(0)}}
.dl-section-title{font-size:13px;font-weight:600;color:#111827;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #edf0f2}
.dl-bld-card{background:#fff;border-radius:8px;padding:12px;margin-bottom:8px}
.dl-bld-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.dl-bld-name{font-size:13px;font-weight:600;color:#111827}
.dl-bld-row{display:flex;justify-content:space-between;align-items:center;height:22px;line-height:22px;font-size:11px}
.dl-bld-label{color:#8a8f99}
.dl-bld-value{color:#111827}
.dl-photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.dl-photo-placeholder{aspect-ratio:16/10;background:#f0f2f5;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#999;border:1px dashed #d9d9d9}
</style>

// ===== 导航 =====
function navTo(page, opts) {
  opts = opts || {};
  var pages = {
    home: 'appPageHome',
    transferReview: 'appPageTransferReview',
    assignReview: 'appPageAssignReview',
    rectifyList: 'appPageRectifyList',
    siteDetail: 'appPageSiteDetail'
  };
  document.querySelectorAll('.app-page').forEach(function(p){ p.classList.add('hidden'); });
  var target = document.getElementById(pages[page]);
  if (target) target.classList.remove('hidden');
  _page = page;
  var titles = {
    home: '部门领导',
    transferReview: '转派审核',
    assignReview: '审核指派',
    rectifyList: '整改任务',
    siteDetail: '站点详情'
  };
  document.getElementById('appStatusBar').textContent = titles[page] || '部门领导';
  if (page === 'home') renderHome();
  else if (page === 'transferReview') renderTransferList();
  else if (page === 'assignReview') renderAssignReview();
  else if (page === 'rectifyList') renderRectifyList();
  else if (page === 'siteDetail') renderSiteDetail();
}

// ===== 首页 =====
function renderHome() {
  var allCount = DL_TRANSFER_TASKS.length;

    '<span class="stat-item"><span class="stat-num">' + allCount + '</span>全部</span>' +
    '<span class="stat-item highlight"><span class="stat-num">' + pendingCount + '</span>待处理</span>' +
    '<span class="stat-item"><span class="stat-num">' + doneCount + '</span>已处理</span>';
}

    : DL_TRANSFER_TASKS;

  var segmentItems = ['all', 'pending', 'done'];
  var segmentLabels = { all: '全部', pending: '待处理', done: '已处理' };
  var segmentHtml = segmentItems.map(function(k){
    var cnt = filtered.filter(function(t){
      if (k === 'all') return true;
      return t.status === k;
    }).length;
    return '<div class="app-segment-item' + (k === _transferTab ? ' active' : '') + '" onclick="switchTransferTab(\'' + k + '\')">' + segmentLabels[k] + '（' + cnt + '）</div>';
  }).join('');
  document.getElementById('dlTransferSegment').innerHTML = segmentHtml;

  var list = filtered.filter(function(t){
    if (_transferTab === 'all') return true;
    return t.status === _transferTab;
  });
  if (list.length === 0) {
    document.getElementById('dlTransferContent').innerHTML = '<div class="app-empty"><div class="empty-icon">📭</div><div class="empty-text">暂无任务</div></div>';
    return;
  }
  document.getElementById('dlTransferContent').innerHTML = list.map(function(t){
    var tagStyle, tagText;
    if (t.status === 'pending') {
      tagStyle = 'background:#fff7e6;color:#d48806';
      tagText = '待处理';
    } else if (t.status === 'done') {
      tagStyle = 'background:#f6ffed;color:#52c41a';
      tagText = '已转派';
    } else {
      tagStyle = 'background:#e6f7ff;color:#1890ff';
      tagText = '正常';
    }
    var assignInfo = t.status === 'done' && t.assignedTo
      ? '<div class="rt-row"><span class="rt-label">已转派给</span><span class="rt-value" style="color:#52c41a">' + t.assignedTo + '</span></div>' +
        '<div class="rt-row"><span class="rt-label">处理时间</span><span class="rt-value">' + t.assignTime + '</span></div>'
      : '';
    var rejectInfo = t.status === 'pending' && t.rejectReason
      ? '<div class="rt-row"><span class="rt-label" style="color:#d48806">拒绝原因</span><span class="rt-value" style="color:#8a8f99">' + t.rejectReason + '</span></div>'
      : '';
    var btnHtml = t.status === 'pending'
      ? '<div class="dl-card-btn-area"><button class="dl-btn dl-btn-primary" onclick="event.stopPropagation();openAssignReview(\'' + t.id + '\')">审核指派</button></div>'
      : t.status === 'done'
        ? '<div class="dl-card-btn-area"><button class="dl-btn dl-btn-default" onclick="event.stopPropagation();openAssignReview(\'' + t.id + '\')">查看转派</button></div>'
        : '';
    return '<div class="dl-card">' +
      '<div class="dl-card-top"><span class="dl-card-name">' + t.siteName + '</span><span class="dl-card-tag" style="' + tagStyle + '">' + tagText + '</span></div>' +
      '<div class="rt-row"><span class="rt-label">任务名称</span><span class="rt-value">' + t.taskName + '</span></div>' +
      '<div class="rt-row"><span class="rt-label">任务周期</span><span class="rt-value">' + t.period + '</span></div>' +
      '<div class="rt-row"><span class="rt-label">所属管理部</span><span class="rt-value">' + t.dept + '</span></div>' +
      '<div class="rt-row"><span class="rt-label">原专家</span><span class="rt-value" style="color:#d48806">' + t.originalExpert + '</span></div>' +
      rejectInfo +
      assignInfo +
      btnHtml +
    '</div>';
  }).join('');
}

function switchTransferTab(tab){ _transferTab = tab; renderTransferList(); }

function openAssignReview(id) {
  _selectedTransferId = id;
  navTo('assignReview');
}

// ===== 审核指派 =====
function renderAssignReview() {
  var t = DL_TRANSFER_TASKS.filter(function(item){ return item.id === _selectedTransferId; })[0];
  if (!t) { document.getElementById('dlAssignContent').innerHTML = '<div style="text-align:center;padding:40px;color:#999">未找到转派信息</div>'; return; }

  var experts = DL_AVAILABLE_EXPERTS[t.dept] || [];
  var expertsHtml = experts.map(function(e, i){
    return '<div class="dl-expert-card" onclick="selectExpert(this, \'' + e.name + '\')" data-name="' + e.name + '">' +
      '<div class="dl-expert-avatar">' + e.name.charAt(0) + '</div>' +
      '<div class="dl-expert-info">' +
        '<div class="dl-expert-name">' + e.name + '</div>' +
        '<div class="dl-expert-meta">' + e.dept + ' · ' + (e.recentTasks || '') + '</div>' +
      '</div>' +
      '<div class="dl-expert-radio"></div>' +
    '</div>';
  }).join('');

  document.getElementById('dlAssignContent').innerHTML = '' +
    '<div class="cf-card">' +
      '<div class="cf-card-title">任务摘要</div>' +
      '<div class="cf-field-row"><span class="cf-label">任务名称</span><span class="cf-value">' + t.taskName + '</span></div>' +
      '<div class="cf-field-row"><span class="cf-label">所属年度</span><span class="cf-value">' + (t.year || '—') + '</span></div>' +
      '<div class="cf-field-row"><span class="cf-label">任务周期</span><span class="cf-value">' + (t.period || '—') + '</span></div>' +
      '<div class="cf-field-row"><span class="cf-label">所属管理部</span><span class="cf-value">' + t.dept + '</span></div>' +
      '<div class="cf-field-row cf-field-last"><span class="cf-label">待处理站点数</span><span class="cf-value">' + (t.pendingCount || '—') + ' 个</span></div>' +
    '</div>' +
    '<div class="cf-card" style="background:#fff8e8;border:1px solid #ffe58f;">' +
      '<div class="cf-card-title" style="color:#d48806">原专家信息</div>' +
      '<div class="cf-field-row"><span class="cf-label">原专家</span><span class="cf-value" style="color:#d48806">' + t.originalExpert + '</span></div>' +
      '<div class="cf-field-row"><span class="cf-label">所属部门</span><span class="cf-value">' + t.dept + '</span></div>' +
      '<div class="cf-field-row"><span class="cf-label">拒绝原因</span><span class="cf-value" style="color:#8a8f99;text-align:left;font-weight:400">' + t.rejectReason + '</span></div>' +
      '<div class="cf-field-row cf-field-last"><span class="cf-label">拒绝时间</span><span class="cf-value">' + t.rejectTime + '</span></div>' +
    '</div>' +
    (t.logs && t.logs.length > 0 ? '<div class="cf-card"><div class="cf-card-title">转派日志</div><div id="dlLogTimeline">' + t.logs.map(function(log){
      return '<div style="display:flex;gap:8px;margin-bottom:8px;align-items:flex-start">' +
        '<div style="width:8px;height:8px;border-radius:50%;background:#4b7cf4;margin-top:4px;flex-shrink:0"></div>' +
        '<div style="flex:1"><div style="font-size:11px;color:#999;margin-bottom:2px">' + log.time + '</div><div style="font-size:12px;color:#333;line-height:1.4">' + log.text + '</div></div>' +
      '</div>';
    }).join('') + '</div></div>' : '') +
    '<div class="cf-card">' +
      '<div class="cf-card-title">选择新专家 <span style="font-weight:400;font-size:12px;color:#999">（' + t.dept + '）</span></div>' +
      '<div id="dlExpertList">' + expertsHtml + '</div>' +
      '<div id="dlSelectedExpert" style="margin-top:10px;display:none;padding:8px;background:#f0f5ff;border-radius:6px;font-size:12px;color:#4b7cf4;text-align:center">已选择：<span id="dlSelectedExpertName"></span></div>' +
    '</div>' +
    '<div style="display:flex;gap:10px;padding:4px 0">' +
      '<button class="dl-sheet-btn dl-sheet-btn-cancel" onclick="navTo(\'transferReview\')">取消</button>' +
      '<button class="dl-sheet-btn dl-sheet-btn-confirm" id="dlAssignConfirmBtn" onclick="confirmAssign()" disabled>确认转派</button>' +
    '</div>';
  _selectedExpertName = null;
}

var _selectedExpertName = null;

function selectExpert(el, name) {
  document.querySelectorAll('.dl-expert-card').forEach(function(c){ c.classList.remove('selected'); });
  el.classList.add('selected');
  _selectedExpertName = name;
  document.getElementById('dlSelectedExpert').style.display = 'block';
  document.getElementById('dlSelectedExpertName').textContent = name + '（' + el.querySelector('.dl-expert-name').textContent + '）';
  document.getElementById('dlAssignConfirmBtn').disabled = false;
}

function confirmAssign() {
  if (!_selectedExpertName) { showToast('请先选择新专家'); return; }
  // 更新Mock数据
  var t = DL_TRANSFER_TASKS.filter(function(item){ return item.id === _selectedTransferId; })[0];
  if (t) {
    t.status = 'done';
    t.assignedTo = _selectedExpertName;
    t.assignTime = new Date().toISOString().replace('T', ' ').slice(0, 16);
    if (!t.logs) t.logs = [];
    t.logs.push({ time: t.assignTime, text: '部门领导 王主任 转派给 ' + _selectedExpertName });
    // 模拟通知PC端：写入转派完成标记
    try { localStorage.setItem('transferDone_' + t.id, 'true'); } catch(e) {}
  }
  showToast('已转派给「' + _selectedExpertName + '」');
  setTimeout(function(){ navTo('transferReview'); }, 800);
}

// ===== 整改任务列表 =====
function renderRectifyList() {
  var kw = (document.getElementById('dlRectifySearch').value || '').trim().toLowerCase();
  var filtered = kw ? DL_RECTIFY_TASKS.filter(function(t){ return t.siteName.toLowerCase().indexOf(kw) >= 0; }) : DL_RECTIFY_TASKS;

  var segmentHtml = ['pending','done'].map(function(k){
    var cnt = filtered.filter(function(t){ return t.status === k; }).length;
    var label = k === 'pending' ? '待整改' : '已归档';
    return '<div class="app-segment-item' + (k === _rectifyTab ? ' active' : '') + '" onclick="switchRectifyTab(\'' + k + '\')">' + label + '（' + cnt + '）</div>';
  }).join('');
  document.getElementById('dlRectifySegment').innerHTML = segmentHtml;

  var list = filtered.filter(function(t){ return t.status === _rectifyTab; });
  if (list.length === 0) {
    document.getElementById('dlRectifyContent').innerHTML = '<div class="app-empty"><div class="empty-icon">📭</div><div class="empty-text">暂无任务</div></div>';
    return;
  }
  document.getElementById('dlRectifyContent').innerHTML = list.map(function(t){
    var tagStyle = t.status === 'pending' ? 'background:#fff7e6;color:#d48806' : 'background:#f5f5f5;color:#999';
    var tagText = t.status === 'pending' ? '待整改' : '已归档';
    return '<div class="rt-card" onclick="navTo(\'siteDetail\')">' +
      '<div class="rt-top"><span class="rt-name">' + t.siteName + '</span><span class="rt-tag" style="' + tagStyle + '">' + tagText + '</span></div>' +
      '<div class="rt-row"><span class="rt-label">用户编码</span><span class="rt-value">' + t.siteCode + '</span></div>' +
      '<div class="rt-row"><span class="rt-label">所属管理部</span><span class="rt-value">' + t.dept + '</span></div>' +
      '<div class="rt-row"><span class="rt-label">用热地址</span><span class="rt-value">' + t.address + '</span></div>' +
      '<div class="rt-row"><span class="rt-label">最近保存</span><span class="rt-value">' + t.lastSaveTime + '</span></div>' +
      '<button class="rt-btn">查看详情</button>' +
    '</div>';
  }).join('');
}

function switchRectifyTab(tab){ _rectifyTab = tab; renderRectifyList(); }

// ===== 站点详情 =====
function renderSiteDetail() {
  var site = DL_SITE_DATA['60218B001'];
  if (!site) { document.getElementById('dlSiteDetailContent').innerHTML = '<div style="text-align:center;padding:40px;color:#999">暂无站点数据</div>'; return; }
  document.getElementById('dlSiteDetailTitle').textContent = site.name;

  var isUnqualified = site.checkRecord && site.checkRecord.submitted && site.checkRecord.conclusion === '不合格';
  var statusTag = isUnqualified ? '<span class="status-tag tag-red">不合格</span>' : '<span class="status-tag tag-gray">' + site.statusText + '</span>';

  var orig = site.originalArea, curr = site.currentArea;

  // 建筑物卡片
  var bldHtml = (site.surveyDetails || []).map(function(d){
    var ds = d.diff >= 0 ? '+' : '';
    var dc = d.diff >= 0 ? 'color:#00b578' : 'color:#ff3141';
    return '<div class="dl-bld-card"><div class="dl-bld-top"><span class="dl-bld-name">' + d.building + '</span><span class="status-tag tag-green">' + d.status + '</span></div>' +
      '<div class="dl-bld-row"><span class="dl-bld-label">层数</span><span class="dl-bld-value">' + d.floors + '层</span></div>' +
      '<div class="dl-bld-row"><span class="dl-bld-label">用热性质</span><span class="dl-bld-value">' + d.heatNature + '</span></div>' +
      '<div class="dl-bld-row"><span class="dl-bld-label">建筑面积</span><span class="dl-bld-value">' + d.currentArea.toFixed(2) + ' ㎡</span></div>' +
      '<div class="dl-bld-row"><span class="dl-bld-label">面积变化</span><span class="dl-bld-value" style="' + dc + '">' + ds + d.diff.toFixed(2) + ' ㎡（' + d.rate + '）</span></div>' +
    '</div>';
  }).join('') || '<div style="text-align:center;padding:30px;color:#bbb;font-size:13px">暂无建筑物数据</div>';

  // 检查记录单
  var record = site.checkRecord;
  var checkHtml = !record.submitted
    ? '<div style="text-align:center;padding:30px;color:#bbb;font-size:13px">暂无检查记录</div>'
    : '<div class="adm-card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><span style="font-size:13px;font-weight:600">检查结论</span><span class="status-tag ' + (record.conclusion === '合格' ? 'tag-green' : 'tag-red') + '">' + record.conclusion + '</span></div>' +
      '<div class="info-row"><span class="info-label">检查人</span><span class="info-value">' + record.inspector + '</span></div>' +
      '<div class="info-row"><span class="info-label">检查日期</span><span class="info-value">' + record.checkDate + '</span></div>' +
      (record.problemDesc ? '<div style="margin-top:6px;padding:6px;background:#f8f9fc;border-radius:4px;font-size:11px;color:#666;line-height:1.5">' + record.problemDesc + '</div>' : '') +
      '</div>' +
      '<div class="adm-card"><div class="adm-card-title">检查项目</div>' + (record.items || []).map(function(item){
        var rc = item.result === '是' ? 'color:#00b578' : item.result === '否' ? 'color:#ff4d4f' : 'color:#999';
        var si = item.subItems.length > 0 ? '<div style="font-size:11px;color:#ff4d4f;margin-top:2px">不合格：' + item.subItems.join('、') + '</div>' : '';
        return '<div style="padding:4px 0;border-bottom:1px solid #f5f5f5;font-size:12px"><div style="display:flex;justify-content:space-between"><span style="color:#333">' + item.id + '. ' + item.title + '</span><span style="' + rc + '">' + item.result + '</span></div>' + si + '</div>';
      }).join('') + '</div>';

  // 面积汇总
  var diffSign = site.areaDiff >= 0 ? '+' : '';
  var areaHtml = '<div class="adm-card"><div class="area-number" style="font-size:22px;font-weight:700;color:#333">' + orig.total.toFixed(2) + '<span style="font-size:12px;color:#999;font-weight:400"> ㎡</span></div><div style="font-size:11px;color:#999;margin-bottom:6px">原面积</div>' +
    '<div style="font-size:11px;color:#666;line-height:1.8">住宅 ' + orig.residential.multiLayer.toFixed(2) + ' / ' + orig.residential.highRise.toFixed(2) + ' / ' + orig.residential.apartment.toFixed(2) + '<br>非住宅 ' + orig.nonResidential.nonResident.toFixed(2) + ' / ' + orig.nonResidential.nonCoop.toFixed(2) + '</div></div>' +
    '<div class="adm-card" style="background:#f6ffed;border:1px solid #d9f7be"><div class="area-number" style="font-size:22px;font-weight:700;color:#00b578">' + curr.total.toFixed(2) + '<span style="font-size:12px;color:#999;font-weight:400"> ㎡</span></div><div style="font-size:11px;color:#999;margin-bottom:6px">现面积</div>' +
    '<div style="font-size:11px;color:#ff4d4f;font-weight:500">差异：' + diffSign + site.areaDiff.toFixed(2) + ' ㎡</div></div>';

  document.getElementById('dlSiteDetailContent').innerHTML = '' +
    '<div class="adm-card"><div class="status-card-top"><span class="status-card-name">' + site.name + '</span>' + statusTag + '</div>' +
      '<div class="status-info-row"><span class="status-info-label">检查完成时间</span><span class="status-info-value">' + site.checkTime + '</span></div>' +
      '<div class="status-info-row"><span class="status-info-label">确认进度</span><span class="status-info-value">' + site.confirmProgress + '</span></div>' +
      '<div class="status-info-row"><span class="status-info-label">站点状态</span><span class="status-tag ' + (site.status === 'rectify' ? 'tag-orange' : 'tag-gray') + '">' + site.statusText + '</span></div>' +
    '</div>' +
    '<div class="dl-tabs" id="dlSiteTabs">' +
      '<div class="dl-tab active" onclick="switchDlTab(this,\'info\')">基础信息</div>' +
      '<div class="dl-tab" onclick="switchDlTab(this,\'area\')">面积汇总</div>' +
      '<div class="dl-tab" onclick="switchDlTab(this,\'buildings\')">建筑物</div>' +
      '<div class="dl-tab" onclick="switchDlTab(this,\'plan\')">平面图</div>' +
      '<div class="dl-tab" onclick="switchDlTab(this,\'door\')">门头图</div>' +
      '<div class="dl-tab" onclick="switchDlTab(this,\'check\')">检查记录单</div>' +
      (isUnqualified ? '<div class="dl-tab" onclick="switchDlTab(this,\'rectify\')">整改通知单</div>' : '') +
    '</div>' +
    '<div id="dlTabContent">' +
      '<div class="dl-tab-panel active" id="dlTabInfo"><div class="adm-card"><div class="dl-section-title">站点信息</div>' +
        ['站点名称','用户编码','站点类型','所属管理部','用热地址','联系人','联系电话','普查人','普查日期'].map(function(l){
          var keys = {站点名称:site.name,用户编码:site.code,站点类型:site.type,所属管理部:site.dept,用热地址:site.address,联系人:site.contact,联系电话:site.phone,普查人:site.censusUser,普查日期:site.censusDate};
          return '<div class="info-row"><span class="info-label">' + l + '</span><span class="info-value">' + (keys[l]||'—') + '</span></div>';
        }).join('') +
      '</div></div>' +
      '<div class="dl-tab-panel" id="dlTabArea">' + areaHtml + '</div>' +
      '<div class="dl-tab-panel" id="dlTabBuildings"><div class="adm-card"><div class="dl-section-title">建筑物</div>' + bldHtml + '</div></div>' +
      '<div class="dl-tab-panel" id="dlTabPlan"><div class="adm-card"><div class="dl-section-title">平面图</div><div class="dl-photo-grid"><div class="dl-photo-placeholder">平面图-1F</div><div class="dl-photo-placeholder">平面图-2F</div></div></div></div>' +
      '<div class="dl-tab-panel" id="dlTabDoor"><div class="adm-card"><div class="dl-section-title">门头图</div><div class="dl-photo-grid"><div class="dl-photo-placeholder">门头-东侧</div><div class="dl-photo-placeholder">门头-南侧</div></div></div></div>' +
      '<div class="dl-tab-panel" id="dlTabCheck">' + checkHtml + '</div>' +
      (isUnqualified ? '<div class="dl-tab-panel" id="dlTabRectify"><div class="adm-card" style="background:#fff8e8;border:1px solid #ffe58f"><div style="font-size:13px;font-weight:600;color:#d48806;margin-bottom:6px">整改通知单</div><div class="info-row"><span class="info-label">站点名称</span><span class="info-value">' + site.name + '</span></div><div class="info-row"><span class="info-label">存在问题</span><span class="info-value">' + (record.problemDesc||'—') + '</span></div></div></div>' : '') +
    '</div>';
}

var _dlTab = 'info';
function switchDlTab(el, tab) {
  document.querySelectorAll('.dl-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  document.querySelectorAll('.dl-tab-panel').forEach(function(p){ p.classList.remove('active'); });
  var panel = document.getElementById('dlTab' + tab.charAt(0).toUpperCase() + tab.slice(1));
  if (panel) panel.classList.add('active');
}

// ===== Toast =====
var _toastTimer = null;
function showToast(msg){
  if(_toastTimer) clearTimeout(_toastTimer);
  var el = document.getElementById('_toast');
  if(!el){
    el = document.createElement('div');
    el.id = '_toast';
    el.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;padding:10px 20px;border-radius:8px;background:rgba(0,0,0,.75);color:#fff;font-size:14px;font-weight:500;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .3s ease';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  if(_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ el.style.opacity = '0'; }, 1800);
}

// ===== 初始化 =====
renderHome();
</script>
