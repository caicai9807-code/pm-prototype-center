<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>专家App - 工作台</title>
  <style>
    /* ===== Reset & Base ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f5f5f5;
      color: #333;
      font-size: 14px;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    a { text-decoration: none; color: inherit; }
    :root {
      --adm-primary: #1677ff;
      --adm-success: #00b578;
      --adm-warning: #ff8f1f;
      --adm-danger: #ff3141;
      --adm-bg: #f5f5f5;
      --adm-card: #fff;
      --adm-text: #333;
      --adm-text-secondary: #999;
      --adm-border: #eee;
    }

    /* ===== 导航栏 ===== */
    .adm-nav-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      height: 40px;
      background: #fff;
      display: flex;
      align-items: center;
      padding: 0 8px;
      border-bottom: 1px solid #f0f0f0;
    }
    .adm-nav-bar .back {
      font-size: 20px;
      color: #333;
      padding: 2px 6px 2px 0;
      cursor: pointer;
      font-weight: 300;
    }
    .adm-nav-bar .title {
      flex: 1;
      text-align: center;
      font-size: 15px;
      font-weight: 500;
      margin-right: 32px;
    }

    /* ===== 页面头部 ===== */
    .adm-page-header {
      background: #fff;
      padding: 12px 12px 14px;
    }
    .adm-page-header h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 2px;
      color: #1a1a1a;
    }
    .adm-page-header p {
      font-size: 13px;
      color: #999;
    }

    /* ===== 内容区 ===== */
    .adm-content {
      padding: 8px 12px 16px;
    }

    /* ===== 卡片 ===== */
    .adm-card {
      background: #fff;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      display: block;
      transition: transform 0.15s ease;
    }
    .adm-card:active { transform: scale(0.98); }

    .card-top-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .card-icon.blue { background: #e7f1ff; }
    .card-icon.orange { background: #fff3e8; }

    .card-text-group {
      flex: 1;
      min-width: 0;
    }
    .card-text-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 1px;
      color: #1a1a1a;
    }
    .card-text-desc {
      font-size: 12px;
      color: #999;
      line-height: 1.3;
    }
    .card-arrow {
      font-size: 16px;
      color: #ccc;
      margin-top: 6px;
      flex-shrink: 0;
    }

    /* ===== 状态标签 ===== */
    .status-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #f5f5f5;
    }
    .adm-tag {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
    }
    .adm-tag .num { font-weight: 600; }
    .tag-yellow { background: #fff7e6; color: #d48806; }
    .tag-blue { background: #e7f1ff; color: #1677ff; }
    .tag-green { background: #ebfaf3; color: #00b578; }
    .tag-gray { background: #f5f5f5; color: #999; }
    .tag-red { background: #ffeeee; color: #ff3141; }

    /* ===== 底部标签栏 ===== */
    .adm-tab-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 44px;
      background: #fff;
      border-top: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-around;
      z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tab-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      font-size: 10px;
      color: #999;
      padding: 2px 12px;
      cursor: pointer;
    }
    .tab-item.active { color: #1677ff; }
    .tab-icon { font-size: 20px; line-height: 1; }
    .tab-label { font-size: 10px; }

    .safe-area { height: 44px; }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <div class="adm-nav-bar">
    <span></span>
    <span class="title">工作台</span>
  </div>

  <!-- 页面头部 -->
  <div class="adm-page-header">
    <h1>工作台</h1>
    <p>张建国 专家，您好</p>
  </div>

  <!-- 内容区 -->
  <div class="adm-content">

    <!-- 面积检查任务 -->
    <a href="./expert-app-task-list.html?type=area-check" class="adm-card">
      <div class="card-top-row">
        <div class="card-icon blue">📋</div>
        <div class="card-text-group">
          <div class="card-text-title">面积检查任务</div>
          <div class="card-text-desc">查看和处理面积检查相关任务</div>
        </div>
        <span class="card-arrow">›</span>
      </div>
      <div class="status-row">
        <span class="adm-tag tag-yellow"><span class="num">2</span>&nbsp;待确认</span>
        <span class="adm-tag tag-blue"><span class="num">2</span>&nbsp;待开始</span>
        <span class="adm-tag tag-green"><span class="num">2</span>&nbsp;进行中</span>
        <span class="adm-tag tag-gray"><span class="num">3</span>&nbsp;已结束</span>
      </div>
    </a>

    <!-- 整改任务 -->
    <a href="./expert-app-task-list.html?type=rectification" class="adm-card">
      <div class="card-top-row">
        <div class="card-icon orange">🔧</div>
        <div class="card-text-group">
          <div class="card-text-title">整改任务</div>
          <div class="card-text-desc">查看和处理整改相关任务</div>
        </div>
        <span class="card-arrow">›</span>
      </div>
      <div class="status-row">
        <span class="adm-tag tag-yellow"><span class="num">4</span>&nbsp;待审核</span>
        <span class="adm-tag tag-green"><span class="num">2</span>&nbsp;已审核</span>
      </div>
    </a>

  </div>

  <div class="safe-area"></div>

  <!-- 底部标签栏 -->
  <div class="adm-tab-bar">
    <div class="tab-item active" onclick="location.href='./expert-app.html'">
      <span class="tab-icon">🏠</span>
      <span class="tab-label">首页</span>
    </div>
    <div class="tab-item" onclick="location.href='./expert-app-task-list.html?type=area-check'">
      <span class="tab-icon">📋</span>
      <span class="tab-label">任务</span>
    </div>
    <div class="tab-item" onclick="location.href='./expert-app.html'">
      <span class="tab-icon">👤</span>
      <span class="tab-label">我的</span>
    </div>
  </div>
</body>
</html>
