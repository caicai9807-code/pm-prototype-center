index: 1000;\n      padding: 10px 20px;\n      border-radius: 8px;\n      background: rgba(0, 0, 0, 0.75);\n      color: #fff;\n      font-size: 14px;\n      font-weight: 500;\n      white-space: nowrap;\n      pointer-events: none;\n      opacity: 1;\n      transition: opacity 0.3s ease;\n    }\n    .adm-toast.hide { opacity: 0; }\n  </style>\n</head>\n<body>\n  <div class=\"adm-nav-bar\">\n    <a href=\"./expert-app.html\" class=\"back\">‹</a>\n    <span class=\"title\" id=\"pageTitle\">任务列表</span>\n  </div>\n\n  <div class=\"adm-search\" id=\"searchBar\">\n    <div class=\"adm-search-row\">\n      <div class=\"adm-search-wrap\">\n        <input type=\"text\" placeholder=\"搜索任务名称\" id=\"taskSearch\" oninput=\"renderTasksWithSearch()\">\n      </div>\n      <select class=\"adm-year-select\" id=\"taskYear\" onchange=\"renderTasks()\" aria-label=\"任务年度\">\n        <option value=\"all\">全部</option>\n        <option value=\"2026\">2026年</option>\n        <option value=\"2027\">2027年</option>\n      </select>\n    </div>\n  </div>\n\n  <div class=\"adm-segment\" id=\"taskSegment\"></div>\n\n  <div class=\"adm-list\" id=\"taskList\"></div>\n\n  <div class=\"safe-area\"></div>\n\n  <div class=\"adm-tab-bar\">\n    <a href=\"./expert-app.html\" class=\"tab-item\">\n      <span class=\"tab-icon\">🏠</span>\n      <span class=\"tab-label\">首页</span>\n    </a>\n    <a href=\"./expert-app-task-list.html?type=area-check\" class=\"tab-item active\">\n      <span class=\"tab-icon\">📋</span>\n      <span class=\"tab-label\">任务</span>\n    </a>\n    <a href=\"./expert-app.html\" class=\"tab-item\">\n      <span class=\"tab-icon\">👤</span>\n      <span class=\"tab-label\">我的</span>\n    </a>\n  </div>\n\n  <script>\n    var params = new URLSearchParams((window.__EXPERT_APP_QUERY__ !== undefined ? window.__EXPERT_APP_QUERY__ : window.location.search));\n    var taskType = params.get('type') || 'area-check';\n    var pageTitle = document.getElementById('pageTitle');\n    var taskSegment = document.getElementById('taskSegment');\n    var taskList = document.getElementById('taskList');\n    var taskYear = document.getElementById('taskYear');\n    var currentTab = taskType === 'area-check' ? 'pending' : 'all';\n    var currentYear = String(new Date().getFullYear());\n    if (Array.prototype.some.call(taskYear.options, function(option) { return option.value === currentYear; })) {\n      taskYear.value = currentYear;\n    }\n\n    var areaCheckTasks = [\n      { id: 'T20260701001', year: '2026', title: '2026年夏季面积普查-裕华区', status: 'confirm', statusText: '待确认', sites: '5个站点', expert: '张建国', date: '2026-07-01', deadline: '2026-07-15' },\n      { id: 'T20260701002', year: '2026', title: '2026年夏季面积普查-长安区', status: 'confirm', statusText: '待确认', sites: '4个站点', expert: '张建国', date: '2026-07-01', deadline: '2026-07-15' },\n      { id: 'T20260620001', year: '2026', title: '2026年夏季面积普查-桥西区', status: 'pending', statusText: '待开始', sites: '5个站点', expert: '张建国', date: '2026-06-20', deadline: '2026-07-10' },\n      { id: 'T20260620002', year: '2026', title: '2026年夏季面积普查-新华区', status: 'pending', statusText: '待开始', sites: '4个站点', expert: '张建国', date: '2026-06-20', deadline: '2026-07-10' },\n      { id: 'T20260615001', year: '2026', title: '2026年夏季面积普查-高新区', status: 'progress', statusText: '进行中', sites: '3/5个站点', expert: '张建国', date: '2026-06-15', deadline: '2026-07-05' },\n      { id: 'T20260615002', year: '2026', title: '2026年夏季面积普查-开发区', status: 'progress', statusText: '进行中', sites: '2/4个站点', expert: '张建国', date: '2026-06-15', deadline: '2026-07-05' },\n      { id: 'T20260601001', year: '2026', title: '2026年春季面积普查-裕华区', status: 'done', statusText: '已结束', sites: '5个站点', expert: '张建国', date: '2026-06-01', deadline: '2026-06-15' },\n      { id: 'T20260601002', year: '2026', title: '2026年春季面积普查-长安区', status: 'done', statusText: '已结束', sites: '4个站点', expert: '张建国', date: '2026-06-01', deadline: '2026-06-15' },\n      { id: 'T20260601003', year: '2026', title: '2026年春季面积普查-桥西区', status: 'done', statusText: '已结束', sites: '5个站点', expert: '张建国', date: '2026-06-01', deadline: '2026-06-15' },\n    ];\n\n    var rectificationTasks = [\n      { id: 'RT-202607-001', year: '2026', siteCode: '60218B001', siteName: '裕华区中心站', status: 'pending-review', statusText: '待审核', dept: '裕华管理部', address: '裕华区槐安路与翟营大街交叉口东行200米路北', lastSave: '2026-07-04 19:25:12' },\n      { id: 'RT-202607-002', year: '2026', siteCode: '60218B004', siteName: '裕华区万达站', status: 'pending-review', statusText: '待审核', dept: '裕华管理部', address: '裕华区槐中路与建华东大街交叉口东南角', lastSave: '2026-07-03 16:20:08' },\n      { id: 'RT-202607-003', year: '2026', siteCode: '60218B006', siteName: '桥西区北站', status: 'pending-review', statusText: '待审核', dept: '桥西管理部', address: '桥西区中山路与维明大街交叉口北行50米', lastSave: '2026-07-04 08:40:52' },\n      { id: 'RT-202607-004', year: '2026', siteCode: '60218B007', siteName: '长安区北站', status: 'pending-review', statusText: '待审核', dept: '长安管理部', address: '长安区和平路与建设大街交叉口西行100米', lastSave: '2026-07-04 18:18:00' },\n      { id: 'RT-202607-005', year: '2026', siteCode: '60218B008', siteName: '高新区南站', status: 'reviewed', statusText: '已审核', reviewResult: '本人已同意', dept: '高新管理部', address: '高新区长江大道与珠峰大街交叉口南行200米', lastSave: '2026-07-05 09:40:00' },\n      { id: 'RT-202607-006', year: '2026', siteCode: '60218B003', siteName: '桥西区南站', status: 'reviewed', statusText: '已审核', reviewResult: '本人已退回整改', dept: '桥西管理部', address: '桥西区中华南大街与槐安路交叉口南行150米', lastSave: '2026-07-01 17:30:00' },\n    ];\n\n    var config = taskType === 'area-check'\n      ? { title: '面积检查任务', data: areaCheckTasks, tagClass: { confirm:'tag-confirm', pending:'tag-pending', progress:'tag-progress', done:'tag-done' } }\n      : { title: '整改任务', data: rectificationTasks, tagClass: { 'pending-review':'tag-review', reviewed:'tag-reviewed' } };\n    pageTitle.textContent = config.title;\n    document.getElementById('taskSearch').placeholder = taskType === 'area-check' ? '搜索任务名称' : '搜索站点名称';\n\n    // 获取计数\n    function getCounts() {\n      var data = taskYear.value === 'all'\n        ? config.data\n        : config.data.filter(function(t) { return t.year === taskYear.value; });\n      var kw = (document.getElementById('taskSearch').value || '').trim().toLowerCase();\n      var filtered = kw ? data.filter(function(t) { return (t.title || t.siteName || '').toLowerCase().indexOf(kw) >= 0; }) : data;\n      if (taskType === 'area-check') {\n        var pending = filtered.filter(function(t) { return t.status === 'confirm'; });\n        var progress = filtered.filter(function(t) { return t.status === 'pending' || t.status === 'progress'; });\n        var done = filtered.filter(function(t) { return t.status === 'done'; });\n        return { pending: pending, progress: progress, done: done, all: filtered };\n      } else {\n        var pendingReview = filtered.filter(function(t) { return t.status === 'pending-review'; });\n        var reviewed = filtered.filter(function(t) { return t.status === 'reviewed'; });\n        return { pendingReview: pendingReview, reviewed: reviewed, all: filtered };\n      }\n    }\n\n    // 渲染段式切换器\n    function renderSegment() {\n      var counts = getCounts();\n      var tabs;\n      if (taskType === 'area-check') {\n        tabs = [\n          { key: 'pending', label: '待确认', count: counts.pending.length },\n          { key: 'progress', label: '进行中', count: counts.progress.length },\n          { key: 'done', label: '已结束', count: counts.done.length }\n        ];\n      } else {\n        tabs = [\n          { key: 'all', label: '全部', count: counts.all.length },\n          { key: 'pending-review', label: '待审核', count: counts.pendingReview.length },\n          { key: 'reviewed', label: '已审核', count: counts.reviewed.length }\n        ];\n      }\n      taskSegment.innerHTML = tabs.map(function(tab) {\n        return '<div class=\"adm-segment-item' + (tab.key === currentTab ? ' active' : '') + '\" data-key=\"' + tab.key + '\">' + tab.label + '<span class=\"count\">（' + tab.count + '）</span></div>';\n      }).join('');\n    }\n\n    // 确认任务\n    function confirmTask(id) {\n      window.__EXPERT_APP_NAVIGATE_EXPR__('./expert-app-task-confirm.html?id=' + id + '&type=' + taskType);\n    }\n\n    // 轻提示\n    function showToast(msg) {\n      var existing = document.querySelector('.adm-toast');\n      if (existing) existing.remove();\n      var toast = document.createElement('div');\n      toast.className = 'adm-toast';\n      toast.textContent = msg;\n      document.body.appendChild(toast);\n      setTimeout(function() { toast.classList.add('hide'); }, 1800);\n      setTimeout(function() { toast.remove(); }, 2200);\n    }\n\n    // 渲染整改任务列表（rt-card风格）\n    function renderRectifyTasks(list) {\n      return list.map(function(t) {\n        var tagClass = t.status === 'pending-review' ? 'tag-review' : 'tag-reviewed';\n        var tagHtml = '<span class=\"rt-tag ' + tagClass + '\">' + t.statusText + '</span>';\n        var reviewResult = t.reviewResult\n          ? '<div class=\"rt-row\"><span class=\"rt-label\">个人审核结果</span><span class=\"rt-value\">' + t.reviewResult + '</span></div>'\n          : '';\n        var actionLabel = t.status === 'pending-review' ? '去审核' : '查看整改';\n        return '<div class=\"rt-card\" onclick=\"location.href=\\'./expert-app-site-detail.html?code=' + t.siteCode + '\\'\">' +\n          '<div class=\"rt-top\"><span class=\"rt-name\">' + t.siteName + '</span>' + tagHtml + '</div>' +\n          '<div class=\"rt-row\"><span class=\"rt-label\">用户编码</span><span class=\"rt-value\">' + t.siteCode + '</span></div>' +\n          '<div class=\"rt-row\"><span class=\"rt-label\">所属管理部</span><span class=\"rt-value\">' + t.dept + '</span></div>' +\n          '<div class=\"rt-row\"><span class=\"rt-label\">用热地址</span><span class=\"rt-value\">' + t.address + '</span></div>' +\n          '<div class=\"rt-row\"><span class=\"rt-label\">最近保存</span><span class=\"rt-value\">' + t.lastSave + '</span></div>' +\n          reviewResult +\n          '<div class=\"rt-btn\" onclick=\"event.stopPropagation();location.href=\\'./expert-app-site-detail.html?code=' + t.siteCode + '\\'\">' + actionLabel + '</div>' +\n        '</div>';\n      }).join('');\n    }\n\n    // 渲染任务列表\n    function renderTasks() {\n      var counts = getCounts();\n      var list = [];\n\n      if (taskType === 'area-check') {\n        if (currentTab === 'pending') list = counts.pending;\n        else if (currentTab === 'progress') list = counts.progress;\n        else if (currentTab === 'done') list = counts.done;\n      } else {\n        if (currentTab === 'all') list = counts.all;\n        else if (currentTab === 'pending-review') list = counts.pendingReview;\n        else if (currentTab === 'reviewed') list = counts.reviewed;\n      }\n\n      renderSegment();\n\n      if (list.length === 0) {\n        taskList.innerHTML = '<div class=\"empty\"><div class=\"icon\">📭</div><p>暂无任务</p></div>';\n        return;\n      }\n\n      if (taskType === 'rectification') {\n        taskList.innerHTML = renderRectifyTasks(list);\n        return;\n      }\n\n      taskList.innerHTML = list.map(function(t) {\n        var tc = config.tagClass[t.status] || 'tag-done';\n        var actionBtn = '';\n        if (t.status === 'confirm') {\n          actionBtn = '<button class=\"list-item-btn btn-primary\" onclick=\"event.stopPropagation();event.preventDefault();confirmTask(\\'' + t.id + '\\')\">去确认</button>';\n        } else if (t.status === 'rectify') {\n          actionBtn = '<button class=\"list-item-btn btn-danger\" onclick=\"event.stopPropagation();event.preventDefault();alert(\\'进入整改填报\\')\">整改</button>';\n        } else if (t.status === 'reinspect') {\n          actionBtn = '<button class=\"list-item-btn btn-primary\" onclick=\"event.stopPropagation();event.preventDefault();alert(\\'进入复查\\')\">复查</button>';\n        }\n\n        var infoRows = taskType === 'area-check'\n          ? '<span>站点：<strong>' + t.sites + '</strong></span><span>专家：<strong>' + t.expert + '</strong></span>'\n          : '<span>站点：<strong>' + t.site + '</strong></span><span>通知单：<strong>' + t.notice + '</strong></span>';\n\n        var detailHref = './expert-app-task-detail.html?id=' + t.id + '&type=' + taskType;\n        if ((t.status === 'progress' || t.status === 'done') && taskType === 'area-check') {\n          detailHref = './expert-app-site-list.html?id=' + t.id + '&type=area-check' + (t.status === 'done' ? '&readonly=1' : '');\n        }\n\n        var isDisabled = t.status === 'pending';\n        var isClickable = t.status !== 'pending' && t.status !== 'confirm';\n        var cardTag = isClickable ? 'a' : 'div';\n        var hrefAttr = isClickable ? ' href=\"' + detailHref + '\"' : '';\n        var disabledClass = isDisabled ? ' disabled' : '';\n\n        return '<' + cardTag + hrefAttr + ' class=\"adm-list-item' + disabledClass + '\">' +\n          '<div class=\"list-item-top\">' +\n            '<div class=\"list-item-title\">' + t.title + '</div>' +\n            '<span class=\"list-item-tag ' + tc + '\">' + t.statusText + '</span>' +\n          '</div>' +\n          '<div class=\"list-item-info\">' + infoRows + '</div>' +\n          '<div class=\"list-item-bottom\">' +\n            '<span class=\"list-item-date\">截止：' + t.deadline + '</span>' +\n            actionBtn +\n          '</div>' +\n        '</' + cardTag + '>';\n      }).join('');\n    }\n\n    // 搜索后刷新\n    function renderTasksWithSearch() {\n      renderTasks();\n    }\n\n    renderTasks();\n\n    // 段式切换器点击事件\n    taskSegment.addEventListener('click', function(e) {\n      var item = e.target.closest('.adm-segment-item');\n      if (!item) return;\n      currentTab = item.dataset.key;\n      renderTasks();\n    });\n  <\/script>\n\n<script>\n(function () {\n  function isLocalHtmlTarget(target) {\n    return !!target && /^\\.{0,2}\\/[^?#]+\\.html(?:[?#].*)?$/i.test(target);\n  }\n\n  function extractInlineTarget(handler) {\n    if (!handler) return null;\n    var match = handler.match(/location\\.(?:href|assign|replace)\\s*(?:=|\\()\\s*['\"]([^'\"]+\\.html(?:[?#][^'\"]*)?)['\"]/i);\n    return match ? match[1] : null;\n  }\n\n  window.__EXPERT_APP_NAVIGATE__ = function (target) {\n    if (window.frameElement && parent && parent.__EXPERT_APP_GET_HTML__) {\n      window.frameElement.setAttribute('data-expert-src', target);\n      window.frameElement.srcdoc = parent.__EXPERT_APP_GET_HTML__(target);\n      return;\n    }\n    if (parent && parent.__EXPERT_APP_OPEN__) {\n      parent.__EXPERT_APP_OPEN__(target);\n      return;\n    }\n    window.location.href = target;\n  };\n\n  window.__EXPERT_APP_NAVIGATE_EXPR__ = function (target) {\n    if (typeof target === 'string' && isLocalHtmlTarget(target)) {\n      window.__EXPERT_APP_NAVIGATE__(target);\n      return;\n    }\n    window.location.href = target;\n  };\n\n  function bindLinks() {\n    document.addEventListener('click', function (event) {\n      var element = event.target && event.target.closest ? event.target.closest('a[href], [onclick]') : null;\n      if (!element) return;\n\n      if (element.matches && element.matches('a[href]')) {\n        var href = element.getAttribute('href');\n        if (isLocalHtmlTarget(href)) {\n          event.preventDefault();\n          window.__EXPERT_APP_NAVIGATE__(href);\n          return;\n        }\n      }\n\n      var inlineTarget = extractInlineTarget(element.getAttribute && element.getAttribute('onclick'));\n      if (isLocalHtmlTarget(inlineTarget)) {\n        event.preventDefault();\n        event.stopPropagation();\n        window.__EXPERT_APP_NAVIGATE__(inlineTarget);\n      }\n    }, true);\n  }\n\n  function initFrames() {\n    var frames = document.querySelectorAll('iframe[data-expert-src]');\n    frames.forEach(function (frame) {\n      var target = frame.getAttribute('data-expert-src');\n      if (!target || !parent || !parent.__EXPERT_APP_GET_HTML__) return;\n      frame.srcdoc = parent.__EXPERT_APP_GET_HTML__(target);\n    });\n  }\n\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', function () {\n      bindLinks();\n      initFrames();\n    }, { once: true });\n  } else {\n    bindLinks();\n    initFrames();\n  }\n})();\n<\/script>\n</body>\n</html>\n","expert-app.html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">\n  <title>专家App - 工作台</title>\n  <style>\n    /* ===== Reset & Base ===== */\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html, body {\n      font-family: -apple-system, BlinkMacSystemFont, \"PingFang SC\", \"Hiragino Sans GB\", \"Microsoft YaHei\", sans-serif;\n      background: #f5f5f5;\n      color: #333;\n      font-size: 14px;\n      min-height: 100vh;\n      -webkit-tap-highlight-color: transparent;\n    }\n    a { text-decoration: none; color: inherit; }\n    :root {\n      --adm-primary: #1677ff;\n      --adm-success: #00b578;\n      --adm-warning: #ff8f1f;\n      --adm-danger: #ff3141;\n      --adm-bg: #f5f5f5;\n      --adm-card: #fff;\n      --adm-text: #333;\n      --adm-text-secondary: #999;\n      --adm-border: #eee;\n    }\n\n    /* ===== 导航栏 ===== */\n    .adm-nav-bar {\n      position: sticky;\n      top: 0;\n      z-index: 100;\n      height: 40px;\n      background: #fff;\n      display: flex;\n      align-items: center;\n      padding: 0 8px;\n      border-bottom: 1px solid #f0f0f0;\n    }\n    .adm-nav-bar .back {\n      font-size: 20px;\n      color: #333;\n      padding: 2px 6px 2px 0;\n      cursor: pointer;\n      font-weight: 300;\n    }\n    .adm-nav-bar .title {\n      flex: 1;\n      text-align: center;\n      font-size: 15px;\n      font-weight: 500;\n      margin-right: 32px;\n    }\n\n    /* ===== 页面头部 ===== */\n    .adm-page-header {\n      background: #fff;\n      padding: 12px 12px 14px;\n    }\n    .adm-page-header h1 {\n      font-size: 20px;\n      font-weight: 600;\n      margin-bottom: 2px;\n      color: #1a1a1a;\n    }\n    .adm-page-header p {\n      font-size: 13px;\n      color: #999;\n    }\n\n    /* ===== 内容区 ===== */\n    .adm-content {\n      padding: 8px 12px 16px;\n    }\n\n    /* ===== 卡片 ===== */\n    .adm-card {\n      background: #fff;\n      border-radius: 10px;\n      padding: 12px;\n      margin-bottom: 8px;\n      box-shadow: 0 1px 4px rgba(0,0,0,0.04);\n      display: block;\n      transition: transform 0.15s ease;\n    }\n    .adm-card:active { transform: scale(0.98); }\n\n    .card-top-row {\n      display: flex;\n      align-items: flex-start;\n      gap: 8px;\n    }\n    .card-icon {\n      width: 36px;\n      height: 36px;\n      border-radius: 8px;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      font-size: 18px;\n      flex-shrink: 0;\n    }\n    .card-icon.blue { background: #e7f1ff; }\n    .card-icon.orange { background: #fff3e8; }\n\n    .card-text-group {\n      flex: 1;\n      min-width: 0;\n    }\n    .card-text-title {\n      font-size: 14px;\n      font-weight: 600;\n      margin-bottom: 1px;\n      color: #1a1a1a;\n    }\n    .card-text-desc {\n      font-size: 12px;\n      color: #999;\n      line-height: 1.3;\n    }\n    .card-arrow {\n      font-size: 16px;\n      color: #ccc;\n      margin-top: 6px;\n      flex-shrink: 0;\n    }\n\n    /* ===== 状态标签 ===== */\n    .status-row {\n      display: flex;\n      flex-wrap: wrap;\n      gap: 6px;\n      margin-top: 8px;\n      padding-top: 8px;\n      border-top: 1px solid #f5f5f5;\n    }\n    .adm-tag {\n      display: inline-flex;\n      align-items: center;\n      gap: 2px;\n      padding: 2px 8px;\n      border-radius: 4px;\n      font-size: 11px;\n      font-weight: 500;\n    }\n    .adm-tag .num { font-weight: 600; }\n    .tag-yellow { background: #fff7e6; color: #d48806; }\n    .tag-blue { background: #e7f1ff; color: #1677ff; }\n    .tag-green { background: #e  </div>\n    </a>\n\n    <!-- 整改任务 -->\n    <a href=\"./expert-app-task-list.html?type=rectification\" class=\"adm-card\">\n      <div class=\"card-top-row\">\n        <div class=\"card-icon orange\">🔧</div>\n        <div class=\"card-text-group\">\n          <div class=\"card-text-title\">整改任务</div>\n          <div class=\"card-text-desc\">查看和处理整改相关任务</div>\n        </div>\n        <span class=\"card-arrow\">›</span>\n      </div>\n      <div class=\"status-row\">\n        <span class=\"adm-tag tag-yellow\"><span class=\"num\">4</span>&nbsp;待审核</span>\n        <span class=\"adm-tag tag-green\"><span class=\"num\">2</span>&nbsp;已审核</span>\n      </div>\n    </a>\n\n  </div>\n\n  <div class=\"safe-area\"></div>\n\n  <!-- 底部标签栏 -->\n  <div class=\"adm-tab-bar\">\n    <div class=\"tab-item active\" onclick=\"location.href='./expert-app.html'\">\n      <span class=\"tab-icon\">🏠</span>\n      <span class=\"tab-label\">首页</span>\n    </div>\n    <div class=\"tab-item\" onclick=\"location.href='./expert-app-task-list.html?type=area-check'\">\n      <span class=\"tab-icon\">📋</span>\n      <span class=\"tab-label\">任务</span>\n    </div>\n    <div class=\"tab-item\" onclick=\"location.href='./expert-app.html'\">\n      <span class=\"tab-icon\">👤</span>\n      <span class=\"tab-label\">我的</span>\n    </div>\n  </div>\n\n<script>\n(function () {\n  function isLocalHtmlTarget(target) {\n    return !!target && /^\\.{0,2}\\/[^?#]+\\.html(?:[?#].*)?$/i.test(target);\n  }\n\n  function extractInlineTarget(handler) {\n    if (!handler) return null;\n    var match = handler.match(/location\\.(?:href|assign|replace)\\s*(?:=|\\()\\s*['\"]([^'\"]+\\.html(?:[?#][^'\"]*)?)['\"]/i);\n    return match ? match[1] : null;\n  }\n\n  window.__EXPERT_APP_NAVIGATE__ = function (target) {\n    if (window.frameElement && parent && parent.__EXPERT_APP_GET_HTML__) {\n      window.frameElement.setAttribute('data-expert-src', target);\n      window.frameElement.srcdoc = parent.__EXPERT_APP_GET_HTML__(target);\n      return;\n    }\n    if (parent && parent.__EXPERT_APP_OPEN__) {\n      parent.__EXPERT_APP_OPEN__(target);\n      return;\n    }\n    window.location.href = target;\n  };\n\n  window.__EXPERT_APP_NAVIGATE_EXPR__ = function (target) {\n    if (typeof target === 'string' && isLocalHtmlTarget(target)) {\n      window.__EXPERT_APP_NAVIGATE__(target);\n      return;\n    }\n    window.location.href = target;\n  };\n\n  function bindLinks() {\n    document.addEventListener('click', function (event) {\n      var element = event.target && event.target.closest ? event.target.closest('a[href], [onclick]') : null;\n      if (!element) return;\n\n      if (element.matches && element.matches('a[href]')) {\n        var href = element.getAttribute('href');\n        if (isLocalHtmlTarget(href)) {\n          event.preventDefault();\n          window.__EXPERT_APP_NAVIGATE__(href);\n          return;\n        }\n      }\n\n      var inlineTarget = extractInlineTarget(element.getAttribute && element.getAttribute('onclick'));\n      if (isLocalHtmlTarget(inlineTarget)) {\n        event.preventDefault();\n        event.stopPropagation();\n        window.__EXPERT_APP_NAVIGATE__(inlineTarget);\n      }\n    }, true);\n  }\n\n  function initFrames() {\n    var frames = document.querySelectorAll('iframe[data-expert-src]');\n    frames.forEach(function (frame) {\n      var target = frame.getAttribute('data-expert-src');\n      if (!target || !parent || !parent.__EXPERT_APP_GET_HTML__) return;\n      frame.srcdoc = parent.__EXPERT_APP_GET_HTML__(target);\n    });\n  }\n\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', function () {\n      bindLinks();\n      initFrames();\n    }, { once: true });\n  } else {\n    bindLinks();\n    initFrames();\n  }\n})();\n<\/script>\n</body>\n</html>\n"};
    const viewer = document.getElementById('viewer');
    const defaultEntry = "expert-app.html";

    function normalizeTarget(target) {
      const parsed = new URL(target, 'https://expert-app.local/');
      const parts = parsed.pathname.split('/');
      const fileName = parts[parts.length - 1] || defaultEntry;
      return { fileName, search: parsed.search, hash: parsed.hash };
    }

    function getHtml(target) {
      const normalized = normalizeTarget(target);
      const pageHtml = embeddedPages[normalized.fileName] || embeddedPages[defaultEntry];
      const runtimeScript = '<script>(function(){window.__EXPERT_APP_QUERY__='
        + JSON.stringify(normalized.search || '')
        + ';window.__EXPERT_APP_HASH__='
        + JSON.stringify(normalized.hash || '')
        + ';window.__EXPERT_APP_PATHNAME__='
        + JSON.stringify('/' + normalized.fileName)
        + ';})();<\/script>';

      if (pageHtml.includes('</head>')) {
        return pageHtml.replace('</head>', runtimeScript + '\n</head>');
      }
      return runtimeScript + pageHtml;
    }

    function openPage(target) {
      const normalized = normalizeTarget(target);
      const fileName = embeddedPages[normalized.fileName] ? normalized.fileName : defaultEntry;
      const finalTarget = fileName + (normalized.search || '') + (normalized.hash || '');
      viewer.srcdoc = getHtml(finalTarget);
      if (window.location.hash !== '#/' + finalTarget) {
        window.location.hash = '#/' + finalTarget;
      }
    }

    window.__EXPERT_APP_GET_HTML__ = getHtml;
    window.__EXPERT_APP_OPEN__ = openPage;

    const initial = window.location.hash && window.location.hash.startsWith('#/')
      ? window.location.hash.slice(2)
      : defaultEntry;
    openPage(initial);

    window.addEventListener('hashchange', function () {
      const next = window.location.hash && window.location.hash.startsWith('#/')
        ? window.location.hash.slice(2)
        : defaultEntry;
      viewer.srcdoc = getHtml(next);
    });
  </script>
