218B006';\n    var taskId = params.get('task') || '';\n\n    // 检查项数据（与PC端7项检查清单一致）\n    var checkItems = [\n      { id: 1, title: '面积核查汇总表是否完整、数据填写正确、项目填写齐全？', hasNA: false, issues: ['数据填写不正确', '项目填写不齐全', '表格不完整'], hasOther: true },\n      { id: 2, title: '用热范围平面图是否具备绘制人、审批流程是否完整、绘制日期，且方位正确？', hasNA: false, issues: ['无绘制人签字', '无绘制日期', '方位标注不正确', '现场建筑名称与图纸不一致', '楼号/层数不一致', '未入网建筑与平面图不符'], hasOther: true },\n      { id: 3, title: '面积核查依据（确权书及相关证明材料）是否有效且齐全？', hasNA: false, issues: ['确权书缺失或无效', '证明材料不齐全', '面积计算依据不明确', '审批流程缺失', '确权书过期', '缺面积确权总表', '实地/图纸/实测依据登记表不明确', '缺确权单批次明细表', '确权单批次明细表与实际不一致', '三方认证与实际不符', '现场面积与确权面积不符'], hasOther: true },\n      { id: 4, title: '是否存在面积变化情况？', hasNA: false, issues: [], hasOther: false },\n      { id: 5, title: '面积核查汇总表与用热现场是否一致（建筑名称、楼号、层数、未入网建筑等）？', hasNA: false, issues: ['建筑名称不一致', '楼号与现场不一致', '层数与现场不一致', '未入网建筑未标注', '现场存在未入网建筑', '商铺与现场不一致'], hasOther: true },\n      { id: 6, title: '商业门头平面图与现场顺序是否一致？', hasNA: true, issues: ['平面图顺序与现场不一致', '商业门头位置错误', '标识不清或缺失'], hasOther: true },\n      { id: 7, title: '实测计算是否满足制度要求？', hasNA: true, issues: ['偏差值大于3%', '偏差值大于2%', '偏差值大于±60m²'], hasOther: false },\n    ];\n\n    // 表单状态\n    var formState = {};\n    checkItems.forEach(function(item) {\n      formState[item.id] = { result: '', issues: [], other: '' };\n    });\n\n    function renderForm() {\n      var html = '';\n      // 检查结论\n      html += '<div class=\"cf-card\">';\n      html += '<div class=\"cf-card-title\">检查结论 <span style=\"color:#ff4d4f\">*</span></div>';\n      html += '<div class=\"conclusion-row\">';\n      html += '<label><input type=\"radio\" name=\"conclusion\" value=\"合格\" onchange=\"window._conclusion=this.value\"> 合格</label>';\n      html += '<label><input type=\"radio\" name=\"conclusion\" value=\"不合格\" onchange=\"window._conclusion=this.value\"> 不合格</label>';\n      html += '</div>';\n      html += '</div>';\n\n      // 检查项\n      checkItems.forEach(function(item) {\n        var state = formState[item.id];\n        html += '<div class=\"cf-card\">';\n        html += '<div class=\"check-item\">';\n        html += '<div class=\"check-q\">' + item.id + '. ' + item.title + '</div>';\n        html += '<div class=\"check-choices\">';\n        html += '<label class=\"check-choice\" onclick=\"selectChoice(' + item.id + ', \\'是\\')\"><input type=\"radio\" name=\"check_' + item.id + '\" value=\"是\"' + (state.result === '是' ? ' checked' : '') + '> 是</label>';\n        html += '<label class=\"check-choice\" onclick=\"selectChoice(' + item.id + ', \\'否\\')\"><input type=\"radio\" name=\"check_' + item.id + '\" value=\"否\"' + (state.result === '否' ? ' checked' : '') + '> 否</label>';\n        if (item.hasNA) {\n          html += '<label class=\"check-choice\" onclick=\"selectChoice(' + item.id + ', \\'不适用\\')\"><input type=\"radio\" name=\"check_' + item.id + '\" value=\"不适用\"' + (state.result === '不适用' ? ' checked' : '') + '> 不适用</label>';\n        }\n        html += '</div>';\n        // 不满足项\n        if (item.issues.length > 0) {\n          var show = state.result === '否' ? ' show' : '';\n          html += '<div class=\"issue-group' + show + '\" id=\"issueGroup_' + item.id + '\">';\n          item.issues.forEach(function(issue, idx) {\n            var checked = state.issues.indexOf(issue) >= 0 ? ' checked' : '';\n            html += '<div class=\"issue-item\"><input type=\"checkbox\" value=\"' + issue + '\"' + checked + ' onchange=\"toggleIssue(' + item.id + ', this)\"><span>' + issue + '</span></div>';\n          });\n          if (item.hasOther) {\n            html += '<div class=\"issue-other\"><input type=\"text\" placeholder=\"其他问题...\" value=\"' + state.other + '\" oninput=\"formState[' + item.id + '].other=this.value\"></div>';\n          }\n          html += '</div>';\n        }\n        html += '</div></div>';\n      });\n\n      // 问题描述\n      html += '<div class=\"cf-card\">';\n      html += '<div class=\"cf-card-title\">问题描述</div>';\n      html += '<textarea class=\"cf-textarea\" id=\"problemDesc\" placeholder=\"请描述检查中发现的问题...\" maxlength=\"500\"></textarea>';\n      html += '<div style=\"text-align:right;font-size:12px;color:#bbb;margin-top:4px;\">0/500</div>';\n      html += '</div>';\n\n      // 现场说明\n      html += '<div class=\"cf-card\">';\n      html += '<div class=\"cf-card-title\">现场说明</div>';\n      html += '<textarea class=\"cf-textarea\" id=\"siteNote\" placeholder=\"请补充现场情况说明...\" maxlength=\"500\"></textarea>';\n      html += '<div style=\"text-align:right;font-size:12px;color:#bbb;margin-top:4px;\">0/500</div>';\n      html += '</div>';\n\n      // 电子签名\n      html += '<div class=\"e-sign-card\">';\n      html += '<div class=\"e-sign-title\">电子签名</div>';\n      html += '<div class=\"e-sign-box\" onclick=\"location.href=\\'./expert-app-signature.html\\'\">';\n      html += '<span class=\"e-sign-name\">张建国</span>';\n      html += '</div>';\n      html += '<div class=\"e-sign-hint\">提交记录前请完成第一名专家确认签字</div>';\n      html += '</div>';\n\n      // 提交按钮\n      html += '<button class=\"cf-submit\" onclick=\"submitForm()\">提交检查记录单</button>';\n\n      document.getElementById('formContent').innerHTML = html;\n    }\n\n    // 选择检查项结果\n    function selectChoice(itemId, value) {\n      formState[itemId].result = value;\n      var group = document.getElementById('issueGroup_' + itemId);\n      if (group) {\n        group.classList.toggle('show', value === '否');\n      }\n      // 如果不是\"否\"，清空子项\n      if (value !== '否') {\n        formState[itemId].issues = [];\n        formState[itemId].other = '';\n      }\n    }\n\n    // 切换子项\n    function toggleIssue(itemId, checkbox) {\n      var state = formState[itemId];\n      if (checkbox.checked) {\n        if (state.issues.indexOf(checkbox.value) < 0) state.issues.push(checkbox.value);\n      } else {\n        var idx = state.issues.indexOf(checkbox.value);\n        if (idx >= 0) state.issues.splice(idx, 1);\n      }\n    }\n\n    // 提交校验\n    function submitForm() {\n      if (!window._conclusion) {\n        showToast('请选择检查结论');\n        return;\n      }\n      var allDone = true;\n      checkItems.forEach(function(item) {\n        var state = formState[item.id];\n        if (!state.result) { allDone = false; }\n      });\n      if (!allDone) {\n        showToast('请完成所有检查项');\n        return;\n      }\n      showToast('检查记录单提交成功');\n      // 模拟通知站点详情页：结论不合格时显示整改通知单Tab\n      if (window._conclusion === '不合格') {\n        try { sessionStorage.setItem('needRectify', 'true'); } catch(e) {}\n      }\n      setTimeout(function() {\n        history.back();\n      }, 1200);\n    }\n\n    function showToast(msg) {\n      var existing = document.querySelector('.adm-toast');\n      if (existing) existing.remove();\n      var toast = document.createElement('div');\n      toast.className = 'adm-toast';\n      toast.textContent = msg;\n      document.body.appendChild(toast);\n      setTimeout(function() { toast.classList.add('hide'); }, 1800);\n      setTimeout(function() { toast.remove(); }, 2200);\n    }\n\n    renderForm();\n\n    // 字数统计（事件委托）\n    document.addEventListener('input', function(e) {\n      if (e.target.id === 'problemDesc' || e.target.id === 'siteNote') {\n        var len = e.target.value.length;\n        var next = e.target.nextElementSibling;\n        if (next) next.textContent = len + '/500';\n      }\n    });\n  <\/script>\n\n<script>\n(function () {\n  function isLocalHtmlTarget(target) {\n    return !!target && /^\\.{0,2}\\/[^?#]+\\.html(?:[?#].*)?$/i.test(target);\n  }\n\n  function extractInlineTarget(handler) {\n    if (!handler) return null;\n    var match = handler.match(/location\\.(?:href|assign|replace)\\s*(?:=|\\()\\s*['\"]([^'\"]+\\.html(?:[?#][^'\"]*)?)['\"]/i);\n    return match ? match[1] : null;\n  }\n\n  window.__EXPERT_APP_NAVIGATE__ = function (target) {\n    if (window.frameElement && parent && parent.__EXPERT_APP_GET_HTML__) {\n      window.frameElement.setAttribute('data-expert-src', target);\n      window.frameElement.srcdoc = parent.__EXPERT_APP_GET_HTML__(target);\n      return;\n    }\n    if (parent && parent.__EXPERT_APP_OPEN__) {\n      parent.__EXPERT_APP_OPEN__(target);\n      return;\n    }\n    window.location.href = target;\n  };\n\n  window.__EXPERT_APP_NAVIGATE_EXPR__ = function (target) {\n    if (typeof target === 'string' && isLocalHtmlTarget(target)) {\n      window.__EXPERT_APP_NAVIGATE__(target);\n      return;\n    }\n    window.location.href = target;\n  };\n\n  function bindLinks() {\n    document.addEventListener('click', function (event) {\n      var element = event.target && event.target.closest ? event.target.closest('a[href], [onclick]') : null;\n      if (!element) return;\n\n      if (element.matches && element.matches('a[href]')) {\n        var href = element.getAttribute('href');\n        if (isLocalHtmlTarget(href)) {\n          event.preventDefault();\n          window.__EXPERT_APP_NAVIGATE__(href);\n          return;\n        }\n      }\n\n      var inlineTarget = extractInlineTarget(element.getAttribute && element.getAttribute('onclick'));\n      if (isLocalHtmlTarget(inlineTarget)) {\n        event.preventDefault();\n        event.stopPropagation();\n        window.__EXPERT_APP_NAVIGATE__(inlineTarget);\n      }\n    }, true);\n  }\n\n  function initFrames() {\n    var frames = document.querySelectorAll('iframe[data-expert-src]');\n    frames.forEach(function (frame) {\n      var target = frame.getAttribute('data-expert-src');\n      if (!target || !parent || !parent.__EXPERT_APP_GET_HTML__) return;\n      frame.srcdoc = parent.__EXPERT_APP_GET_HTML__(target);\n    });\n  }\n\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', function () {\n      bindLinks();\n      initFrames();\n    }, { once: true });\n  } else {\n    bindLinks();\n    initFrames();\n  }\n})();\n<\/script>\n</body>\n</html>\n","expert-app-preview.html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n  <meta charset=\"UTF-8\">\n  < ce-between; margin-bottom: 6px;\n    }\n    .status-card-name {\n      font-size: 18px; font-weight: 600; color: #1a1a1a;\n    }\n    .status-tag {\n      display: inline-block; padding: 2px 10px; border-radius: 12px;\n      font-size: 12px; font-weight: 500;\n    }\n    .tag-gray { background: #f5f5f5; color: #999; }\n    .tag-green { background: #ebfaf3; color: #00b578; }\n    .tag-blue { background: #e7f1ff; color: #1677ff; }\n    .tag-orange { background: #fff7e6; color: #d48806; }\n    .tag-red { background: #ffeeee; color: #ff3141; }\n\n    .status-info-row {\n      display: flex; justify-content: space-between; align-items: center;\n      padding: 5px 0;\n      border-bottom: 1px solid #f0f2f5; font-size: 13px;\n    }\n    .status-info-row:last-child { border-bottom: none; }\n    .status-info-label { color: #999; }\n    .status-info-value { color: #333; font-weight: 500; }\n\n    .action-btn-full {\n      width: 100%; height: 36px; border-radius: 18px;\n      font-size: 14px; font-weight: 600; border: none;\n      cursor: pointer; display: flex; align-items: center; justify-content: center;\n      transition: opacity 0.15s; margin-top: 6px;\n    }\n    .action-btn-full:active { opacity: 0.8; }\n    .btn-primary { background: #1677ff; color: #fff; }\n    .btn-green { background: #00b578; color: #fff; }\n    .btn-gray { background: #f5f5f5; color: #666; border: 1px solid #e8e8e8; }\n\n    /* Tab 栏 - Pill 风格 */\n    .adm-tabs {\n      display: flex; gap: 4px; padding: 6px 12px;\n      background: #f5f5f5; overflow-x: auto;\n      -webkit-overflow-scrolling: touch; scrollbar-width: none;\n    }\n    .adm-tabs::-webkit-scrollbar { display: none; }\n    .adm-tab {\n      flex-shrink: 0; padding: 5px 10px;\n      font-size: 12px; font-weight: 500; color: #666;\n      cursor: pointer; white-space: nowrap;\n      border-radius: 6px; transition: all 0.15s;\n    }\n    .adm-tab.active {\n      background: #1677ff; color: #fff; font-weight: 600;\n    }\n    .adm-tab.acti actionsHtml}\n        `;\n      }\n\n      document.getElementById('checkRecord').innerHTML = `\n        <div class=\"adm-card\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;\">\n            <span style=\"font-size:14px;font-weight:600;\">检查结论</span>\n            ${conclusionTag}\n          </div>\n          <div class=\"info-row\"><span class=\"info-label\">检查人</span><span class=\"info-value\">${record.inspector}</span></div>\n          <div class=\"info-row\"><span class=\"info-label\">检查日期</span><span class=\"info-value\">${record.checkDate}</span></div>\n          ${record.problemDesc ? `<div style=\"margin-top:8px;padding:8px;background:#f8f9fc;border-radius:6px;font-size:12px;color:#666;line-height:1.6;\">${record.problemDesc}</div>` : ''}\n        </div>\n        <div class=\"adm-card\" style=\"margin-top:8px;\">\n          <div class=\"adm-card-title\">检查项目</div>\n          ${itemsHtml}\n        </div>\n        ${confirmationHtml}\n      `;\n    }\n    renderCheckRecordPanel();\n\n    // 动态添加整改通知单Tab（仅检查不合格时显示）\n    var showRectify = site.checkRecord && site.checkRecord.submitted && site.checkRecord.conclusion === '不合格';\n    var tabBar = document.getElementById('tabBar');\n    if (showRectify) {\n      var tab = document.createElement('div');\n      tab.className = 'adm-tab';\n      tab.dataset.tab = 'rectify';\n      tab.textContent = '整改通知单';\n      tabBar.appendChild(tab);\n      // 渲染整改通知单内容\n      document.getElementById('rectifyContent').innerHTML = `\n        <div class=\"adm-card\" style=\"background:#fff8e8;border:1px solid #ffe58f;\">\n          <div style=\"font-size:14px;font-weight:600;color:#d48806;margin-bottom:10px;\">整改通知单</div>\n          <div class=\"info-row\"><span class=\"info-label\">编号</span><span class=\"info-value\">ZG-2026-${site.code}</span></div>\n          <div class=\"info-row\"><span class=\"info-label\">站点名称</span><span class=\"info-value\">${site.name}</span></div>\n          <div class=\"info-row\"><span class=\"info-label\">存在问题</span><span class=\"info-value\">${site.checkRecord.problemDesc || '—'}</span></div>\n          <div style=\"margin-top:10px;padding:8px;background:#fff;border-radius:6px;font-size:12px;color:#666;line-height:1.6;\">\n            <strong style=\"color:#d48806;\">整改要求：</strong>请于收到通知后7个工作日内完成整改，并提交整改报告及相关证明材料。\n          </div>\n        </div>\n      `;\n    }\n\n    // 渲染整改告知书（展示PC端上传的整改反馈）\n    var letter = site.rectifyLetter;\n    if (letter && letter.fixDesc) {\n      var attHtml = (letter.attachments || []).map(function(a) {\n        return '<div class=\"letter-attachment\">' +\n          '<div class=\"letter-att-icon\">📄</div>' +\n          '<div class=\"letter-att-info\">' +\n            '<div class=\"letter-att-name\">' + a.name + '</div>' +\n            '<div class=\"letter-att-meta\">' + (a.size || '—') + '</div>' +\n          '</div>' +\n          '<span class=\"letter-att-status\">已上传</span>' +\n        '</div>';\n      }).join('');\n      document.getElementById('letterContent').innerHTML = '' +\n        '<div class=\"adm-card letter-card\">' +\n          '<div class=\"letter-title\">📋 整改告知书</div>' +\n          '<div class=\"letter-desc-box\">' + letter.fixDesc + '</div>' +\n          '<div class=\"letter-meta\">整改人：<strong>' + (letter.rectifier || '—') + '</strong> &nbsp;&nbsp; 最近保存：<strong>' + (letter.lastSaveTime || '—') + '</strong></div>' +\n          (attHtml ? '<div style=\"margin-top:10px;\"><div style=\"font-size:13px;font-weight:500;color:#333;margin-bottom:6px;\">整改附件</div>' + attHtml + '</div>' : '') +\n        '</div>';\n    } else {\n      document.getElementById('letterContent').innerHTML = '' +\n        '<div class=\"adm-card\">' +\n          '<div class=\"letter-empty\">' +\n            '<div class=\"letter-empty-icon\">📋</div>' +\n            '<div class=\"letter-empty-text\">暂无整改告知书</div>' +\n            '<div style=\"font-size:12px;color:#bbb;margin-top:6px;\">整改负责人上传告知书后将在此展示</div>' +\n          '</div>' +\n        '</div>';\n    }\n\n    // Tab 切换\n    function activateTab(tabName) {\n      const tab = document.querySelector('.adm-tab[data-tab=\"' + tabName + '\"]');\n      if (!tab) return;\n      document.querySelectorAll('.adm-tab').forEach(t => t.classList.remove('active'));\n      tab.classList.add('active');\n      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));\n      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');\n      if (tabName === 'record') {\n        setTimeout(function() { tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' }); }, 0);\n      }\n    }\n    document.getElementById('tabBar').addEventListener('click', function(e) {\n      const tab = e.target.closest('.adm-tab');\n      if (!tab) return;\n      activateTab(tab.dataset.tab);\n    });\n\n    function openCheckConfirmation() {\n      var target = './expert-app-check-confirm.html?code=' + encodeURIComponent(siteCode) + '&task=' + encodeURIComponent(taskId);\n      if (window.__EXPERT_APP_NAVIGATE__) window.__EXPERT_APP_NAVIGATE__(target);\n      else window.location.href = target;\n    }\n\n    function startExpert2Signature() {\n      var returnTarget = './expert-app-site-detail.html?code=' + encodeURIComponent(siteCode) + '&task=' + encodeURIComponent(taskId) + '&tab=record';\n      var signatureTarget = './expert-app-signature.html?name=' + encodeURIComponent(record.confirmation.expert2.name) +\n        '&mode=check-confirm&code=' + encodeURIComponent(siteCode) + '&return=' + encodeURIComponent(returnTarget);\n      if (window.__EXPERT_APP_NAVIGATE__) window.__EXPERT_APP_NAVIGATE__(signatureTarget);\n      else window.location.href = signatureTarget;\n    }\n\n    function openRecordReject() {\n      document.getElementById('recordRejectOverlay').classList.add('show');\n      setTimeout(function() { document.getElementById('recordRejectReason').focus(); }, 220);\n    }\n\n    function closeRecordReject() {\n      document.getElementById('recordRejectOverlay').classList.remove('show');\n    }\n\n    function submitRecordReject() {\n      var reason = document.getElementById('recordRejectReason').value.trim();\n      if (!reason) { showToast('请填写退回原因'); return; }\n      sessionStorage.setItem(checkConfirmStorageKey, 'rejected');\n      record.confirmation.expert2.status = '已退回';\n      site.confirmProgress = '0/2';\n      site.statusText = '待修改';\n      var rows = document.querySelectorAll('#statusCard .status-info-row');\n      if (rows[1]) rows[1].querySelector('.status-info-value').textContent = '0/2';\n      if (rows[2]) {\n        var statusEl = rows[2].querySelector('.status-tag');\n        statusEl.className = 'status-tag tag-orange';\n        statusEl.textContent = '待修改';\n      }\n      var topStatusEl = document.querySelector('#statusCard .status-card-top .status-tag');\n      if (topStatusEl) {\n        topStatusEl.className = 'status-tag tag-orange';\n        topStatusEl.textContent = '待修改';\n      }\n      var statusButton = document.querySelector('#statusCard .action-btn-full');\n      if (statusButton) statusButton.remove();\n      renderCheckRecordPanel();\n      closeRecordReject();\n      showToast('已退回专家一修改');\n    }\n\n    document.getElementById('recordRejectOverlay').addEventListener('click', function(e) {\n      if (e.target === this) closeRecordReject();\n    });\n    document.getElementById('recordRejectReason').addEventListener('input', function() {\n      document.getElementById('recordRejectCount').textContent = this.value.length;\n    });\n\n    if (params.get('tab') === 'record') activateTab('record');\n\n    function showConfirmedNotice() {\n      document.getElementById('confirmedNoticeOverlay').classList.add('show');\n    }\n\n    function closeConfirmedNotice() {\n      document.getElementById('confirmedNoticeOverlay').classList.remove('show');\n    }\n\n    document.getElementById('confirmedNoticeOverlay').addEventListener('click', function(e) {\n      if (e.target === this) closeConfirmedNotice();\n    });\n\n    // 审核弹窗\n    function showRectifyAudit() {\n      document.getElementById('auditOverlay').classList.add('show');\n    }\n    function closeRectifyAudit() {\n      document.getElementById('auditOverlay').classList.remove('show');\n      document.getElementById('auditRejectReason').value = '';\n      document.getElementById('rejectSection').style.display = 'none';\n      document.getElementById('auditCount').textContent = '0';\n      // 重置radio为\"通过\"\n      var passRadio = document.querySelector('input[name=\"auditResult\"][value=\"pass\"]');\n      if (passRadio) passRadio.checked = true;\n    }\n    // 点击背景关闭sheet\n    document.getElementById('auditOverlay').addEventListener('click', function(e) {\n      if (e.target === this) closeRectifyAudit();\n    });\n    function submitRectifyAudit() {\n      var result = document.querySelector('input[name=\"auditResult\"]:checked');\n      if (!result) { showToast('请选择审核结果'); return; }\n      if (result.value === 'reject') {\n        var reason = document.getElementById('auditRejectReason').value.trim();\n        if (!reason) { showToast('请填写驳回原因'); return; }\n      }\n      showToast('审核提交成功');\n      closeRectifyAudit();\n    }\n    // 审核结果radio联动驳回原因\n    document.addEventListener('change', function(e) {\n      if (e.target.name === 'auditResult') {\n        document.getElementById('rejectSection').style.display = e.target.value === 'reject' ? 'block' : 'none';\n      }\n    });\n    // 驳回原因字数统计\n    document.addEventListener('input', function(e) {\n      if (e.target.id === 'auditRejectReason') {\n        document.getElementById('auditCount').textContent = e.target.value.length;\n      }\n    });\n\n    // ====== 复核弹窗（完整版） ======\n    var reviewModal = null;\n    var reviewBuildingId = null;\n    var reviewPhotos = [];\n\n    function openReviewModal(buildingId) {\n      var bd = window._reviewBuildings && window._reviewBuildings[buildingId];\n      if (!bd) { showToast('建筑数据未找到'); return; }\n      reviewBuildingId = buildingId;\n      reviewPhotos = [];\n      if (!reviewModal) {\n        reviewModal = document.createElement('div');\n        reviewModal.id = 'reviewModal';\n        reviewModal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity 0.2s ease;';\n        reviewModal.addEventListener('click', function(e) { if (e.target === this) closeReviewModal(); });\n        document.body.appendChild(reviewModal);\n      }\n      // 构建弹窗内容\n      reviewModal.innerHTML =\n        '<div style=\"background:#fff;border-radius:12px;width:100%;max-width:340px;max-height:90vh;overflow-y:auto;\">' +\n          '<div style=\"display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:0.5px solid #f0f0f0;\">' +\n            '<span style=\"font-size:17px;font-weight:600;color:#1a1a1a;\">建筑物复核</span>' +\n            '<span onclick=\"closeReviewModal()\" style=\"width:28px;height:28px;border-radius:50%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:16px;color:#999;cursor:pointer;\">✕</span>' +\n          '</div>' +\n          '<div style=\"padding:16px 20px;\">' +\n            // 建筑信息提示\n            '<div style=\"background:#f8f9fc;border-radius:8px;padding:10px 12px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;\">' +\n              '<span style=\"font-size:13px;font-weight:500;color:#1a1a1a;\">' + bd.building + '</span>' +\n              '<span style=\"font-size:12px;color:#999;\">普查面积 <b style=\"color:#333;\">' + bd.currentArea.toLocaleString('en-US', {minimumFractionDigits: 2}) + ' ㎡</b></span>' +\n            '</div>' +\n            // 复核照片\n            '<div style=\"margin-bottom:16px;\">' +\n              '<div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;\">' +\n                '<span style=\"font-size:13px;font-weight:500;color:#1a1a1a;\">复核照片</span>' +\n                '<span style=\"font-size:11px;color:#999;\" id=\"reviewPhotoCount\">0 张</span>' +\n              '</div>' +\n              '<div style=\"display:flex;gap:8px;flex-wrap:wrap;\" id=\"reviewPhotoList\"></div>' +\n              '<div onclick=\"document.getElementById(\\'reviewFileInput\\').click()\" style=\"margin-top:8px;width:100%;height:44px;border:1px dashed #d9d9d9;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#1677ff;cursor:pointer;\">+ 上传复核照片</div>' +\n              '<input type=\"file\" id=\"reviewFileInput\" accept=\"image/*\" multiple style=\"display:none\" onchange=\"handleReviewPhotoSelect(this)\">' +\n            '</div>' +\n            // 复查面积\n            '<div style=\"margin-bottom:16px;\">' +\n              '<label style=\"font-size:13px;font-weight:500;color:#1a1a1a;display:block;margin-bottom:6px;\">复查面积 <span style=\"color:#e24b4a;\">*</span></label>' +\n              '<div style=\"display:flex;align-items:center;border:0.5px solid #d9d9d9;border-radius:8px;padding:0 12px;height:40px;background:#fafafa;\">' +\n                '<input type=\"number\" id=\"reviewAreaInput\" step=\"0.01\" min=\"0\" placeholder=\"请输入复查面积\" style=\"flex:1;border:none;outline:none;font-size:14px;color:#333;background:transparent;\" value=\"' + bd.currentArea.toFixed(2) + '\">' +\n                '<span style=\"font-size:12px;color:#999;flex-shrink:0;\">㎡</span>' +\n              '</div>' +\n            '</div>' +\n          '</div>' +\n          '<div style=\"display:flex;padding:12px 20px 20px;gap:12px;\">' +\n            '<button onclick=\"closeReviewModal()\" style=\"flex:1;height:40px;border-radius:20px;border:0.5px solid #d9d9d9;background:#fff;font-size:14px;color:#333;cursor:pointer;\">取消</button>' +\n            '<button onclick=\"submitReview()\" style=\"flex:1;height:40px;border-radius:20px;border:none;background:#1677ff;font-size:14px;color:#fff;cursor:pointer;font-weight:500;\">提交复核</button>' +\n          '</div>' +\n        '</div>';\n      setTimeout(function() { reviewModal.style.opacity = '1'; reviewModal.style.pointerEvents = 'auto'; }, 10);\n    }\n\n    function closeReviewModal() {\n      if (reviewModal) {\n        reviewModal.style.opacity = '0';\n        reviewModal.style.pointerEvents = 'none';\n      }\n    }\n\n    function handleReviewPhotoSelect(input) {\n      var files = input.files;\n      if (!files || files.length === 0) return;\n      for (var i = 0; i < files.length; i++) {\n        var f = files[i];\n        var reader = new FileReader();\n        reader.onload = (function(fileName) {\n          return function(e) {\n            reviewPhotos.push({ name: fileName, dataUrl: e.target.result });\n            renderReviewPhotos();\n          };\n        })(f.name);\n        reader.readAsDataURL(f);\n      }\n      input.value = '';\n    }\n\n    function renderReviewPhotos() {\n      var list = document.getElementById('reviewPhotoList');\n      var count = document.getElementById('reviewPhotoCount');\n      if (!list) return;\n      if (reviewPhotos.length === 0) {\n        list.innerHTML = '';\n        if (count) count.textContent = '0 张';\n        return;\n      }\n      var html = '';\n      for (var i = 0; i < reviewPhotos.length; i++) {\n        html +=\n          '<div style=\"position:relative;width:72px;height:72px;border-radius:6px;overflow:hidden;border:0.5px solid #e8e8e8;\">' +\n            '<img src=\"' + reviewPhotos[i].dataUrl + '\" style=\"width:100%;height:100%;object-fit:cover;\">' +\n            '<span onclick=\"removeReviewPhoto(' + i + ')\" style=\"position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,0.5);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;\">✕</span>' +\n          '</div>';\n      }\n      list.innerHTML = html;\n      if (count) count.textContent = reviewPhotos.length + ' 张';\n    }\n\n    function removeReviewPhoto(index) {\n      reviewPhotos.splice(index, 1);\n      renderReviewPhotos();\n    }\n\n    function submitReview() {\n      var areaInput = document.getElementById('reviewAreaInput');\n      var area = parseFloat(areaInput.value);\n      if (reviewPhotos.length === 0) {\n        var toast = document.getElementById('toast');\n        if (toast) { toast.textContent = '请至少上传 1 张复核照片'; toast.className = 'toast toast-warning show'; setTimeout(function(){toast.className='toast'},2000); }\n        return;\n      }\n      if (isNaN(area) || area <= 0) {\n        var toast = document.getElementById('toast');\n        if (toast) { toast.textContent = '请输入有效的复查面积'; toast.className = 'toast toast-warning show'; setTimeout(function(){toast.className='toast'},2000); }\n        return;\n      }\n      // 保存复核数据\n      reviewDisplay[reviewBuildingId] = {\n        photos: reviewPhotos.map(function(p) { return p.name; }),\n        area: area,\n        date: new Date().toISOString().slice(0,10)\n      };\n      closeReviewModal();\n      // 刷新建筑物卡片\n      if (typeof renderSiteBuildings === 'function') {\n        renderSiteBuildings();\n      } else {\n        // 手动触发刷新：找到当前站点的surveyDetails重新渲染\n        var sc = getSiteCode ? getSiteCode() : '';\n        if (sc && window._reviewBuildings) {\n          // 重新执行卡片渲染逻辑\n          var bldContainer = document.getElementById('buildingCards');\n          if (bldContainer && window._currentSiteData) {\n            var s = window._currentSiteData;\n            if (s.surveyDetails && s.surveyDetails.length > 0) {\n              bldContainer.innerHTML = s.surveyDetails.map(function(bi) {\n                var ds = bi.diff >= 0 ? '+' : '';\n                var dc = bi.diff >= 0 ? 'green' : 'red';\n                var rd = reviewDisplay[bi.id];\n                var im = bi.basis && bi.basis.indexOf('实测') >= 0;\n                var rb = im && rd ? '<div class=\"bld-review-badge\"><span class=\"badge-icon\">✓</span> 已复核（' + rd.area.toLocaleString('en-US', {minimumFractionDigits: 2}) + ' ㎡' + (rd.photos && rd.photos.length > 0 ? ' · ' + rd.photos.length + '张照片' : '') + '）</div>' : '';\n                return '<div class=\"bld-card\">' +\n                  '<div class=\"bld-top\"><span class=\"bld-name\">' + bi.building + '</span><span class=\"status-tag tag-green\">' + bi.status + '</span></div>' +\n                  '<div class=\"bld-grid\">' +\n                    '<div class=\"bld-gitem\"><span class=\"bld-glabel\">层数</span><span class=\"bld-gvalue\">' + bi.floors + '层</span></div>' +\n                    '<div class=\"bld-gitem\"><span class=\"bld-glabel\">用热性质</span><span class=\"bld-gvalue\">' + bi.heatNature + '</span></div>' +\n                    '<div class=\"bld-gitem\"><span class=\"bld-glabel\">收费类别</span><span class=\"bld-gvalue\">' + bi.chargeType + '</span></div>' +\n                    '<div class=\"bld-gitem\"><span class=\"bld-glabel\">普查依据</span><span class=\"bld-gvalue\">' + bi.basis + '</span></div>' +\n                  '</div>' +\n                  '<div class=\"bld-area-row\">' +\n                    '<div class=\"bld-area-card\"><span class=\"acl\">建筑面积</span><span class=\"acv\">' + bi.currentArea.toLocaleString('en-US', {minimumFractionDigits: 2}) + '<span class=\"acu\">㎡</span></span></div>' +\n                    '<div class=\"bld-area-card ' + dc + '\"><span class=\"acl\">面积变化</span><span class=\"acv\">' + ds + bi.diff.toLocaleString('en-US', {minimumFractionDigits: 2}) + '<span class=\"acu\">㎡</span></span><span class=\"acr\">' + bi.rate + '</span></div>' +\n                  '</div>' +\n                  rb +\n                  '<div class=\"bld-footer\">' + (isReadonly ? '' : '<button class=\"bld-btn-review\" onclick=\"event.stopPropagation();openReviewModal(' + bi.id + ')\">复核</button>') + '<span class=\"bld-link\" onclick=\"event.stopPropagation();location.href=\\'./expert-app-building-detail.html?id=' + bi.id + '&code=' + sc + (isReadonly ? '&readonly=1' : '') + '\\'\">查看详情 ›</span></div>' +\n                '</div>';\n              }).join('');\n            }\n          }\n        }\n      }\n      showToast('✓ 复核数据已提交');\n    }\n\n    // ====== Toast 提示 ======\n    function showToast(msg) {\n      var el = document.getElementById('toast');\n      if (!el) return;\n      el.textContent = msg;\n      el.className = 'toast show';\n      setTimeout(function() { el.className = 'toast'; }, 2200);\n    }\n  <\/script>\n\n<script>\n(function () {\n  function isLocalHtmlTarget(target) {\n    return !!target && /^\\.{0,2}\\/[^?#]+\\.html(?:[?#].*)?$/i.test(target);\n  }\n\n  function extractInlineTarget(handler) {\n    if (!handler) return null;\n    var match = handler.match(/location\\.(?:href|assign|replace)\\s*(?:=|\\()\\s*['\"]([^'\"]+\\.html(?:[?#][^'\"]*)?)['\"]/i);\n    return match ? match[1] : null;\n  }\n\n  window.__EXPERT_APP_NAVIGATE__ = function (target) {\n    if (window.frameElement && parent && parent.__EXPERT_APP_GET_HTML__) {\n      window.frameElement.setAttribute('data-expert-src', target);\n      window.frameElement.srcdoc = parent.__EXPERT_APP_GET_HTML__(target);\n      return;\n    }\n    if (parent && parent.__EXPERT_APP_OPEN__) {\n      parent.__EXPERT_APP_OPEN__(target);\n      return;\n    }\n    window.location.href = target;\n  };\n\n  window.__EXPERT_APP_NAVIGATE_EXPR__ = function (target) {\n    if (typeof target === 'string' && isLocalHtmlTarget(target)) {\n      window.__EXPERT_APP_NAVIGATE__(target);\n      return;\n    }\n    window.location.href = target;\n  };\n\n  function bindLinks() {\n    document.addEventListener('click', function (event) {\n      var element = event.target && event.target.closest ? event.target.closest('a[href], [onclick]') : null;\n      if (!element) return;\n\n      if (element.matches && element.matches('a[href]')) {\n        var href = element.getAttribute('href');\n        if (isLocalHtmlTarget(href)) {\n          event.preventDefault();\n          window.__EXPERT_APP_NAVIGATE__(href);\n          return;\n        }\n      }\n\n      var inlineTarget = extractInlineTarget(element.getAttribute && element.getAttribute('onclick'));\n      if (isLocalHtmlTarget(inlineTarget)) {\n        event.preventDefault();\n        event.stopPropagation();\n        window.__EXPERT_APP_NAVIGATE__(inlineTarget);\n      }\n    }, true);\n  }\n\n  function initFrames() {\n    var frames = document.querySelectorAll('iframe[data-expert-src]');\n    frames.forEach(function (frame) {\n      var target = frame.getAttribute('data-expert-src');\n      if (!target || !parent || !parent.__EXPERT_APP_GET_HTML__) return;\n      frame.srcdoc = parent.__EXPERT_APP_GET_HTML__(target);\n    });\n  }\n\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', function () {\n      bindLinks();\n      initFrames();\n    }, { once: true });\n  } else {\n    bindLinks();\n    initFrames();\n  }\n})();\n<\/script>\n</body>\n</html>\n","expert-app-site-list.html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">\n  <title>站点列表</title>\n  <style>\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html, body {\n      font-family: -apple-system, BlinkMacSystemFont, \"PingFang SC\", \"Hiragino Sans GB\", \"Microsoft YaHei\", sans-serif;\n      background: #f5f5f5;\n      color: #333;\n      font-size: 14px;\n      min-height: 100vh;\n      -webkit-tap-highlight-color: transparent;\n    }\n    a { text-decoration: none; color: inherit; }\n\n    /* ===== 导航栏 ===== */\n    .adm-nav-bar {\n      position: sticky;\n      top: 0;\n      z-index: 100;\n      height: 40px;\n      background: #fff;\n      display: flex;        <span class=\"site-info-label\">用户编码</span>\n          <span class=\"site-info-value\">${s.userCode}</span>\n        </div>\n        <div class=\"site-info-row\">\n          <span class=\"site-info-label\">用热地址</span>\n          <span class=\"site-info-value\">${s.address}</span>\n        </div>\n        <div class=\"site-info-row\">\n          <span class=\"site-info-label\">办事处</span>\n          <span class=\"site-info-value\">${s.office}</span>\n        </div>\n        <div class=\"site-info-row\">\n          <span class=\"site-info-label\">片区所</span>\n          <span class=\"site-info-value\">${s.districtOffice}</span>\n        </div>\n        ${getBtnHtml(s)}\n      </div>\n    `).join('');\n  <\/script>\n\n<script>\n(function () {\n  function isLocalHtmlTarget(target) {\n    return !!target && /^\\.{0,2}\\/[^?#]+\\.html(?:[?#].*)?$/i.test(target);\n  }\n\n  function extractInlineTarget(handler) {\n    if (!handler) return null;\n    var match = handler.match(/location\\.(?:href|assign|replace)\\s*(?:=|\\()\\s*['\"]([^'\"]+\\.html(?:[?#][^'\"]*)?)['\"]/i);\n    return match ? match[1] : null;\n  }\n\n  window.__EXPERT_APP_NAVIGATE__ = function (target) {\n    if (window.frameElement && parent && parent.__EXPERT_APP_GET_HTML__) {\n      window.frameElement.setAttribute('data-expert-src', target);\n      window.frameElement.srcdoc = parent.__EXPERT_APP_GET_HTML__(target);\n      return;\n    }\n    if (parent && parent.__EXPERT_APP_OPEN__) {\n      parent.__EXPERT_APP_OPEN__(target);\n      return;\n    }\n    window.location.href = target;\n  };\n\n  window.__EXPERT_APP_NAVIGATE_EXPR__ = function (target) {\n    if (typeof target === 'string' && isLocalHtmlTarget(target)) {\n      window.__EXPERT_APP_NAVIGATE__(target);\n      return;\n    }\n    window.location.href = target;\n  };\n\n  function bindLinks() {\n    document.addEventListener('click', function (event) {\n      var element = event.target && event.target.closest ? event.target.closest('a[href], [onclick]') : null;\n      if (!element) return;\n\n      if (element.matches && element.matches('a[href]')) {\n        var href = element.getAttribute('href');\n        if (isLocalHtmlTarget(href)) {\n          event.preventDefault();\n          window.__EXPERT_APP_NAVIGATE__(href);\n          return;\n        }\n      }\n\n      var inlineTarget = extractInlineTarget(element.getAttribute && element.getAttribute('onclick'));\n      if (isLocalHtmlTarget(inlineTarget)) {\n        event.preventDefault();\n        event.stopPropagation();\n        window.__EXPERT_APP_NAVIGATE__(inlineTarget);\n      }\n    }, true);\n  }\n\n  function initFrames() {\n    var frames = document.querySelectorAll('iframe[data-expert-src]');\n    frames.forEach(function (frame) {\n      var target = frame.getAttribute('data-expert-src');\n      if (!target || !parent || !parent.__EXPERT_APP_GET_HTML__) return;\n      frame.srcdoc = parent.__EXPERT_APP_GET_HTML__(target);\n    });\n  }\n\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', function () {\n      bindLinks();\n      initFrames();\n    }, { once: true });\n  } else {\n    bindLinks();\n    initFrames();\n  }\n})();\n<\/script>\n</body>\n</html>\n","expert-app-standalone.html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">\n<title>专家App</title>\n<link rel=\"stylesheet\" href=\"../../shared/styles/app-phone.css\">\n<style>\n/* ===== 独立App独有样式 ===== */\n.cf-nav-bar{position:sticky;top:0;z-index:5;background:#fff;display:flex;align-items:center;height:36px;padding:0 12px;border-bottom:1px solid #edf0f2}\n.cf-back-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#4b7cf4;font-size:20px;border-radius:14px;flex-shrink:0}\n.cf-nav-title{flex:1;text-align:center;font-size:16px;font-weight:600;color:#111827;margin-right:28px}\n.cf-content{background:#f5f6f8;padding:12px;overflow-y:auto}\n.cf-card{background:#fff;border-radius:8px;padding:14px;margin-bottom:12px}\n.cf-card-title{font-size:14px;font-weight:600;color:#111827;margin-bottom:14px}\n.cf-field-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:0;height:34px;line-height:34px;border-bottom:1px solid #edf0f2}\n.cf-field-row.cf-field-last{border-bottom:none}\n.cf-label{color:#8a8f99;font-size:12px;white-space:nowrap;flex-shrink:0}\n.cf-value{color:#111827;font-size:12px;text-align:right;overflow:hidden;text-overflow:ellipsis}\n.cf-btn-row{display:flex;gap:12px;padding:4px 0}\n.cf-btn-reject{flex:1;height:44px;border:1px solid #ff4d4f;border-radius:8px;background:#fff;color:#ff4d4f;font-size:15px;font-weight:600;cursor:pointer}\n.cf-btn-reject:active{background:#fff1f0}\n.cf-btn-confirm{flex:1;height:44px;border:none;border-radius:8px;background:#4b7cf4;color:#fff;font-size:15px;font-weight:600;cursor:pointer}\n.cf-btn-confirm:active{background:#3a6be0}\n.app-demo-info{flex:1;min-width:0}\n.app-demo-info .info-card{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}\n.app-demo-info .info-card .info-title{font-size:16px;font-weight:600;color:#1d2129;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}\n.app-demo-info .info-card .info-block{margin-bottom:12px}\n.app-demo-info .info-card .info-block .block-label{font-size:13px;font-weight:600;color:#1d2129;margin-bottom:4px}\n.app-demo-info .info-card .info-block .block-content{font-size:13px;color:#5a6577;line-height:1.8}\n.app-reject-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}\n.app-reject-overlay.show{opacity:1;pointer-events:auto}\n.app-reject-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:392px;padding:24px 20px 32px}\n.app-reject-sheet .sheet-title{font-size:18px;font-weight:700;color:#1f2b3d;margin-bottom:16px;text-align:center}\n.app-reject-sheet textarea{width:100%;min-height:100px;border:1px solid #dce0e8;border-radius:12px;padding:12px;font-size:14px;font-family:inherit;resize:none;outline:none;background:#fafafa;color:#1f2b3d}\n.app-reject-sheet .sheet-actions{display:flex;gap:10px;margin-top:16px}\n.app-reject-sheet .app-btn{flex:1;height:44px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;text-align:center}\n.app-reject-sheet .app-btn-default{background:#f0f2f6;color:#52607a}\n.app-reject-sheet .app-btn-danger{background:#fff1f0;color:#f04438}\nbody.embedded-mode{background:transparent !important;display:block !important;min-height:auto !important}\nbody.embedded-mode .app-demo-layout{display:block !important;padding:0 !important}\nbody.embedded-mode .app-phone-shell{width:100% !important;min-width:0 !important;max-width:none !important;border:none !important;box-shadow:none !important;background:transparent !important;padding:0 !important}\nbody.embedded-mode .app-phone-screen{border-radius:0 !important;box-shadow:none !important;height:100vh !important}\nbody.embedded-mode .app-phone-notch,\nbody.embedded-mode .app-phone-homebar,\nbody.embedded-mode .app-phone-home-bar,\nbody.embedded-mode #appDemoInfo{display:none !important}\n</style>\n</head>\n<body style=\"margin:0;background:#eef0f5;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif\">\n\n<div class=\"app-demo-layout\" style=\"padding:0\">\n  <div class=\"app-phone-shell\">\n    <div class=\"app-phone-screen\">\n      <div class=\"app-phone-notch\"></div>\n      <div class=\"app-phone-statusbar\" id=\"appStatusBar\">面积核查</div>\n\n      <!-- 页面1：入口页 -->\n      <div class=\"app-page\" id=\"appPageHome\">\n        <div class=\"app-home-header\">\n          <div class=\"greeting\">工作台</div>\n          <div class=\"sub-greeting\">张建国 专家，您好</div>\n        </div>\n        <div style=\"padding-top:4px\">\n          <div class=\"app-entry-card\" onclick=\"navTo('taskList')\">\n            <div class=\"entry-hd\">\n              <div class=\"entry-icon check\">📋</div>\n              <div>\n                <div class=\"entry-title\">面积检查任务</div>\n                <div class=\"entry-desc\">查看和处理面积检查相关任务</div>\n              </div>\n            </div>\n            <div class=\"entry-stats\" id=\"appCheckStats\"></div>\n          </div>\n          <div class=\"app-entry-card\" onclick=\"navTo('rectifyList')\">\n            <div class=\"entry-hd\">\n              <div class=\"entry-icon rectify\">🔧</div>\n              <div>\n                <div class=\"entry-title\">整改任务</div>\n                <div class=\"entry-desc\">查看和处理整改相关任务</div>\n              </div>\n            </div>\n            <div class=\"entry-stats\" id=\"appRectifyStats\"></div>\n          </div>\n        </div>\n      </div>\n\n      <!-- 页面2：任务列表 -->\n      <div class=\"app-page hidden\" id=\"appPageTaskList\">\n        <div class=\"app-nav-bar\">\n          <div class=\"back-btn\" onclick=\"navTo('home')\">‹</div>\n          <div class=\"nav-title\">任务列表</div>\n        </div>\n        <div class=\"app-search-bar\">\n          <input type=\"text\" placeholder=\"搜索任务名称\" id=\"appTaskSearch\" oninput=\"renderTaskList()\">\n        </div>\n        <div class=\"app-segment\" id=\"appTaskSegment\"></div>\n        <div id=\"appTaskListContent\" style=\"padding-bottom:12px\"></div>\n      </div>\n\n      <!-- 页面3：任务确认 -->\n      <div class=\"app-page hidden\" id=\"appPageTaskConfirm\">\n        <div class=\"cf-nav-bar\">\n          <div class=\"cf-back-btn\" onclick=\"navTo('taskList')\">‹</div>\n          <div class=\"cf-nav-title\">任务确认</div>\n        </div>\n        <div id=\"appTaskConfirmContent\" class=\"cf-content\"></div>\n        <div class=\"app-reject-overlay\" id=\"appRejectOverlay\">\n          <div class=\"app-reject-sheet\">\n            <div class=\"sheet-title\">拒绝原因</div>\n            <textarea id=\"appRejectReason\" placeholder=\"请输入拒绝原因...\"></textarea>\n            <div class=\"sheet-actions\">\n              <button class=\"app-btn app-btn-default\" onclick=\"closeReject()\">取消</button>\n              <button class=\"app-btn app-btn-danger\" onclick=\"confirmReject()\">确认拒绝</button>\n            </div>\n          </div>\n        </div>\n      </div>\n\n      <!-- 页面4：整改任务 -->\n      <div class=\"app-page hidden\" id=\"appPageRectifyList\">\n        <div class=\"app-nav-bar\">\n          <div class=\"back-btn\" onclick=\"navTo('home')\">‹</div>\n          <div class=\"nav-title\">整改任务</div>\n        </div>\n        <div class=\"app-segment\" id=\"appRectifySegment\"></div>\n        <div id=\"appRectifyListContent\" style=\"padding-bottom:12px\"></div>\n      </div>\n\n      <!-- 页面5：站点列表 -->\n      <div class=\"app-page hidden\" id=\"appPageSiteList\">\n        <div class=\"cf-nav-bar\">\n          <div class=\"cf-back-btn\" onclick=\"navTo('taskList')\">‹</div>\n          <div class=\"cf-nav-title\">站点列表</div>\n        </div>\n        <div id=\"appSiteListContent\" class=\"cf-content\"></div>\n      </div>\n\n      <!-- 页面6：站点详情 -->\n      <div class=\"app-page hidden\" id=\"appPageSiteDetail\">\n        <div class=\"cf-nav-bar\">\n          <div class=\"cf-back-btn\" onclick=\"navTo('siteList')\">‹</div>\n          <div class=\"cf-nav-title\" id=\"appSiteDetailTitle\">站点详情</div>\n        </div>\n        <div id=\"appSiteDetailContent\" class=\"cf-content\"></div>\n      </div>\n\n      <!-- 页面7：检查记录单 -->\n      <div class=\"app-page hidden\" id=\"appPageCheckRecordForm\">\n        <div class=\"cf-nav-bar\">\n          <div class=\"cf-back-btn\" onclick=\"navTo('siteDetail')\">‹</div>\n          <div class=\"cf-nav-title\">填写检查记录单</div>\n        </div>\n        <div id=\"appCheckRecordFormContent\" class=\"cf-content\"></div>\n      </div>\n\n      <!-- 页面8：楼栋详情 -->\n      <div class=\"app-page hidden\" id=\"appPageBuildingDetail\">\n        <div class=\"cf-nav-bar\">\n          <div class=\"cf-back-btn\" onclick=\"navTo('siteDetail')\">‹</div>\n          <div class=\"cf-nav-title\">楼栋详情</div>\n        </div>\n        <div id=\"appBuildingDetailContent\" class=\"cf-content\"></div>\n      </div>\n\n    </div>\n  </div>\n\n  <!-- 右侧说明区 -->\n  <div class=\"app-demo-info\" id=\"appDemoInfo\">\n    <div class=\"info-card\">\n      <div class=\"info-title\">📱 专家App — 功能说明</div>\n      <div class=\"info-block\">\n        <div class=\"block-label\">页面导航</div>\n        <div class=\"block-content\">\n          <ul>\n            <li>工作台 → 面积检查任务 → 任务列表（搜索+segment切换）</li>\n            <li>工作台 → 整改任务 → 整改列表（待复查/已归档）</li>\n            <li>任务列表 → 点击卡片 → 站点列表 → 站点详情</li>\n            <li>任务列表 → 确认/拒绝 → 确认任务</li>\n          </ul>\n        </div>\n      </div>\n    </div>\n  </div>\n</div>\n\n<!-- 复查审核弹窗 -->\n<div class=\"app-reject-overlay\" id=\"appAuditOverlay\" onclick=\"if(event.target===this)closeAuditSheet()\">\n  <div class=\"app-reject-sheet\" onclick=\"event.stopPropagation()\">\n    <div class=\"sheet-title\" style=\"font-size:16px\">复查结果</div>\n    <div style=\"margin-bottom:16px\">\n      <div style=\"display:flex;gap:24px;margin-bottom:16px\">\n        <label style=\"display:flex;align-items:center;gap:6px;font-size:14px;font-weight:500;cursor:pointer;color:#333\"><input type=\"radio\" name=\"auditResult\" value=\"pass\" checked style=\"accent-color:#1677ff;width:16px;height:16px\"> 通过</label>\n        <label style=\"display:flex;align-items:center;gap:6px;font-size:14px;font-weight:500;cursor:pointer;color:#333\"><input type=\"radio\" name=\"auditResult\" value=\"reject\" style=\"accent-color:#1677ff;width:16px;height:16px\"> 驳回</label>\n      </div>\n      <div id=\"auditRejectSection\" style=\"display:none\">\n        <div style=\"font-size:14px;font-weight:600;color:#333;margin-bottom:8px\">驳回原因 <span style=\"color:#ff3141\">*</span></div>\n        <textarea id=\"auditRejectReason\" placeholder=\"请输入驳回原因\" maxlength=\"300\" style=\"width:100%;min-height:100px;border:1px solid #dce0e8;border-radius:12px;padding:12px;font-size:14px;font-family:inherit;resize:none;outline:none;background:#fafafa;color:#1f2b3d\"></textarea>\n        <div style=\"text-align:right;font-size:12px;color:#bbb;margin-top:4px\"><span id=\"auditCharCount\">0</span>/300</div>\n      </div>\n    </div>\n    <div class=\"sheet-actions\">\n      <button class=\"app-btn app-btn-default\" onclick=\"closeAuditSheet()\">取消</button>\n      <button class=\"app-btn app-btn-danger\" style=\"background:#1677ff;color:#fff\" onclick=\"submitAudit()\">提交</button>\n    </div>\n  </div>\n</div>\n\n<script>\n// ===== Mock 数据 =====\nvar APP_STATUS_MAP = {pending:'待确认',confirmed:'待开始',doing:'进行中',done:'已结束'};\nvar APP_STATUS_TAG = {pending:'background:#fff7e6;color:#faad14',confirmed:'background:#e6f7ff;color:#1890ff',doing:'background:#e6f7ff;color:#1890ff',done:'background:#f6ffed;color:#52c41a'};\n\nvar SHARED_TASKS = [\n  {id:'AT01',name:'2026 第27周 裕华片区常规面积核查任务',status:'doing',dept:'裕华管理部',period:'2026-07-01 至 2026-07-07',siteCount:3},\n  {id:'AT02',name:'2026 第27周 长安片区补充面积核查任务',status:'confirmed',dept:'长安管理部',period:'2026-07-01 至 2026-07-07',siteCount:2},\n  {id:'AT03',name:'2026 第26周 桥西片区专项面积核查任务',status:'done',dept:'桥西管理部',period:'2026-06-24 至 2026-06-30',siteCount:2},\n  {id:'AT04',name:'2026 第28周 长安中心站联合复核准备任务',status:'pending',dept:'长安管理部',period:'2026-07-08 至 2026-07-14',siteCount:1},\n  {id:'AT05',name:'2026 第27周 裕华片区异常转派补查任务',status:'doing',dept:'裕华管理部',period:'2026-07-01 至 2026-07-07',siteCount:1},\n];\n\nvar APP_RECTIFY_TASKS = [\n  {id:'RT-202607-001',siteCode:'60218B001',siteName:'裕华区中心站',status:'pending',dept:'裕华管理部',address:'裕华区槐安路与翟营大街交叉口东行200米路北',lastSaveTime:'2026-07-04 19:25:12'},\n  {id:'RT-202607-002',siteCode:'60218B004',siteName:'裕华区万达站 ).forEach(function(p){p.classList.add('hidden')});\n  var target = document.getElementById(pages[page]);\n  if(target) target.classList.remove('hidden');\n  _page = page;\n  var titles = {home:'面积核查',taskList:'任务列表',taskConfirm:'任务确认',rectifyList:'整改任务',siteList:'站点列表',siteDetail:'站点详情',checkRecordForm:'填写检查记录单',buildingDetail:'楼栋详情'};\n  document.getElementById('appStatusBar').textContent = titles[page] || '面积核查';\n  if(page==='home') renderHome();\n  else if(page==='taskList') renderTaskList();\n  else if(page==='taskConfirm') renderTaskConfirm();\n  else if(page==='rectifyList') renderRectifyList();\n  else if(page==='siteList') renderSiteList();\n  else if(page==='siteDetail') renderSiteDetail();\n  else if(page==='checkRecordForm') renderCheckRecordForm();\n  else if(page==='buildingDetail') renderBuildingDetail();\n}\n\nfunction getInitialPage() {\n  var params = new URLSearchParams((window.__EXPERT_APP_QUERY__ !== undefined ? window.__EXPERT_APP_QUERY__ : window.location.search));\n  var page = params.get('page');\n  if (page === 'taskList' || page === 'rectifyList' || page === 'taskConfirm' || page === 'siteList' || page === 'siteDetail' || page === 'checkRecordForm' || page === 'buildingDetail') {\n    return page;\n  }\n  return 'home';\n}\n\n// ===== 首页 =====\nfunction renderHome() {\n  var checkStats = [\n    {label:'待确认',count:1,hide:false},{label:'进行中',count:2,hide:false},{label:'已结束',count:1,hide:false}\n  ];\n  document.getElementById('appCheckStats').innerHTML = checkStats.map(function(s){\n    return '<span class=\"stat-item\"><span class=\"stat-num\">'+s.count+'</span>'+s.label+'</span>';\n  }).join('');\n  var rectifyStats = [\n    {label:'待复查',count:5,hide:false},{label:'已归档',count:1,hide:false}\n  ];\n  document.getElementById('appRectifyStats').innerHTML = rectifyStats.map(function(s){\n    return '<span class=\"stat-item highlight\"><span class=\"stat-num\">'+s.count+'</span>'+s.label+'</span>';\n  }).join('');\n}\n\n// ===== 任务列表 =====\nfunc ventDefault();\n          window.__EXPERT_APP_NAVIGATE__(href);\n          return;\n        }\n      }\n\n      var inlineTarget = extractInlineTarget(element.getAttribute && element.getAttribute('onclick'));\n      if (isLocalHtmlTarget(inlineTarget)) {\n        event.preventDefault();\n        event.stopPropagation();\n        window.__EXPERT_APP_NAVIGATE__(inlineTarget);\n      }\n    }, true);\n  }\n\n  function initFrames() {\n    var frames = document.querySelectorAll('iframe[data-expert-src]');\n    frames.forEach(function (frame) {\n      var target = frame.getAttribute('data-expert-src');\n      if (!target || !parent || !parent.__EXPERT_APP_GET_HTML__) return;\n      frame.srcdoc = parent.__EXPERT_APP_GET_HTML__(target);\n    });\n  }\n\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', function () {\n      bindLinks();\n      initFrames();\n    }, { once: true });\n  } else {\n    bindLinks();\n    initFrames();\n  }\n})();\n<\/script>\n</body>\n</html>\n","expert-app-task-confirm.html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">\n  <title>任务确认</title>\n  <style>\n    /* ===== Reset & Base ===== */\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html, body {\n      font-family: -apple-system, BlinkMacSystemFont, \"PingFang SC\", \"Hiragino Sans GB\", \"Microsoft YaHei\", sans-serif;\n      background: #f5f5f5;\n      color: #333;\n      font-size: 14px;\n      min-height: 100vh;\n      -webkit-tap-highlight-color: transparent;\n    }\n    a { text-decoration: none; color: inherit; }\n    :root {\n      --adm-primary: #1677ff;\n      --adm-danger: #ff3141;\n    }\n\n    /* ===== 导航栏 ===== */\n    .adm-nav-bar {\n      position: sticky;\n      top: 0;\n      z-index: 100;\n      height: 40px;\n      background: #fff;\n      display: flex;\n      align-items: center;\n      padding: 0 8px;\n      border-bottom: 1px solid #f0f0f0;\n    }\n    .adm-nav-bar .back {\n      font-size: 20px;\n      color: #333;\n      padding: 2px 6px 2px 0;\n      cursor: pointer;\n      font-weight: 300;\n    }\n    .adm-nav-bar .title {\n      flex: 1;\n      text-align: center;\n      font-size: 15px;\n      font-weight: 500;\n      margin-right: 32px;\n    }\n\n    /* ===== 内容区 ===== */\n    .adm-content {\n      padding: 8px 12px 16px;\n    }\n\n    /* ===== 卡片 ===== */\n    .adm-card {\n      background: #fff;\n      border-radius: 10px;\n      padding: 12px;\n      margin-bottom: 8px;\n      box-shadow: 0 1px 4px rgba(0,0,0,0.04);\n    }\n    .adm-card-title {\n      font-size: 14px;\n      font-weight: 600;\n      color: #1a1a1a;\n      margin-bottom: 8px;\n    }\n\n    /* ===== 信息行 ===== */\n    .info-row {\n      display: flex;\n      justify-content: space-between;\n      align-items: center;\n      padding: 8px 0;\n      border-bottom: 1px solid #f5f5f5;\n    }\n    .info-row:last-child { border-bottom: none; }\n    .info-label {\n      font-size: 13px;\n      color: #999;\n      flex-shrink: 0;\n    }\n    .info-value {\n      font-size: 14px;\n      font-weight: 500;\n      color: #1a1a1a;\n      text-align: right;\n      word-break: break-all;\n    }\n\n    /* ===== 须知列表 ===== */\n    .notice-list {\n      padding: 0;\n      margin: 0;\n      list-style: none;\n    }\n    .notice-item {\n      font-size: 13px;\n      color: #666;\n      line-height: 1.6;\n      padding: 4px 0;\n      position: relative;\n      padding-left: 18px;\n    }\n    .notice-item::before {\n      content: attr(data-index);\n      position: absolute;\n      left: 0;\n      top: 4px;\n      font-weight: 500;\n      color: #666;\n    }\n\n    /* ===== 底部操作按钮 ===== */\n    .action-bar {\n      position: fixed;\n      bottom: 0;\n      left: 0;\n      right: 0;\n      background: #fff;\n      border-top: 1px solid #f0f0f0;\n      padding: 8px 12px calc(8px + env(safe-area-inset-bottom));\n      display: flex;\n      gap: 8px;\n      z-index: 100;\n    }\n    .action-bar .btn {\n      flex: 1;\n      height: 40px;\n      border-radius: 8px;\n      font-size: 14px;\n      font-weight: 600;\n      border: none;\n      cursor: pointer;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      transition: opacity 0.15s;\n    }\n    .action-bar .btn:active { opacity: 0.8; }\n    .btn-reject {\n      background: #fff;\n      color: #ff3141;\n      border: 1px solid #ffccc7;\n    }\n    .btn-primary {\n      background: #1677ff;\n      color: #fff;\n    }\n    .btn-primary.disabled {\n      background: #bae0ff;\n      pointer-events: none;\n    }\n\n    .safe-area { height: 60px; }\n\n    /* ===== 轻提示 Toast ===== */\n    .adm-toast {\n      position: fixed;\n      top: 50%;\n      left: 50%;\n      transform: translate(-50%, -50%);\n      z-index: 1000;\n      padding: 12px 24px;\n      border-radius: 8px;\n      background: rgba(0, 0, 0, 0.75);\n      color: #fff;\n      font-size: 14px;\n      font-weight: 500;\n      white-space: nowrap;\n      pointer-events: none;\n      opacity: 1;\n      transition: opacity 0.3s ease;\n    }\n    .adm-toast.hide { opacity: 0; }\n\n    /* ===== 拒绝弹窗 ===== */\n    .modal-overlay {\n      position: fixed;\n      inset: 0;\n      background: rgba(0,0,0,0.45);\n      z-index: 999;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      padding: 16px;\n      opacity: 0;\n      pointer-events: none;\n      transition: opacity 0.2s ease;\n    }\n    .modal-overlay.show { opacity: 1; pointer-events: auto; }\n    .modal-card {\n      background: #fff;\n      border-radius: 12px;\n      width: 100%;\n      max-width: 340px;\n      overflow: hidden;\n    }\n    .modal-header {\n      padding: 20px 20px 16px;\n      font-size: 18px;\n      font-weight: 600;\n      text-align: center;\n      color: #1a1a1a;\n    }\n    .modal-body {\n      padding: 0 20px 20px;\n    }\n    .modal-textarea {\n      width: 100%;\n      min-height: 120px;\n      border: 1px solid #e8e8e8;\n      border-radius: 8px;\n      padding: 14px;\n      font-size: 14px;\n      color: #333;\n      resize: none;\n      outline: none;\n      font-family: inherit;\n      background: #fafafa;\n    }\n    .modal-textarea::placeholder {\n      color: #bbb;\n    }\n    .modal-textarea:focus {\n      border-color: #ff3141;\n      background: #fff;\n    }\n    .modal-hint {\n      font-size: 12px;\n      color: #999;\n      margin-top: 6px;\n      text-align: right;\n    }\n    .modal-footer {\n      display: flex;\n      padding: 0 20px 20px;\n      gap: 12px;\n    }\n    .modal-btn {\n      flex: 1;\n      height: 44px;\n      border-radius: 22px;\n      border: none;\n      font-size: 15px;\n      font-weight: 500;\n      cursor: pointer;\n      transition: opacity 0.15s;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n    }\n    .modal-btn:active { opacity: 0.8; }\n    .modal-btn-cancel {\n      background: #f5f5f5;\n      color: #666;\n    }\n    .modal-btn-confirm {\n      background: #ffeeee;\n      color: #ff3141;\n      font-weight: 600;\n    }\n  </style>\n</head>\n<body>\n  <div class=\"adm-nav-bar\">\n    <a href=\"javascript:history.back()\" class=\"back\">‹</a>\n    <span class=\"title\">任务确认</span>\n  </div>\n\n  <div class=\"adm-content\">\n    <!-- 任务信息 -->\n    <div class=\"adm-card\">\n      <div class=\"adm-card-title\">任务信息</div>\n      <div class=\"info-row\">\n        <span class=\"info-label\">任务名称</span>\n        <span class=\"info-value\" id=\"taskName\">2026 第29周 常规合同面积检查任务</span>\n      </div>\n      <div class=\"info-row\">\n        <span class=\"info-label\">所属年度</span>\n        <span class=\"info-value\" id=\"taskYear\">2026</span>\n      </div>\n      <div class=\"info-row\">\n        <span class=\"info-label\">任务周期</span>\n        <span class=\"info-value\" id=\"task if (!element) return;\n\n      if (element.matches && element.matches('a[href]')) {\n        var href = element.getAttribute('href');\n        if (isLocalHtmlTarget(href)) {\n          event.preventDefault();\n          window.__EXPERT_APP_NAVIGATE__(href);\n          return;\n        }\n      }\n\n      var inlineTarget = extractInlineTarget(element.getAttribute && element.getAttribute('onclick'));\n      if (isLocalHtmlTarget(inlineTarget)) {\n        event.preventDefault();\n        event.stopPropagation();\n        window.__EXPERT_APP_NAVIGATE__(inlineTarget);\n      }\n    }, true);\n  }\n\n  function initFrames() {\n    var frames = document.querySelectorAll('iframe[data-expert-src]');\n    frames.forEach(function (frame) {\n      var target = frame.getAttribute('data-expert-src');\n      if (!target || !parent || !parent.__EXPERT_APP_GET_HTML__) return;\n      frame.srcdoc = parent.__EXPERT_APP_GET_HTML__(target);\n    });\n  }\n\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', function () {\n      bindLinks();\n      initFrames();\n    }, { once: true });\n  } else {\n    bindLinks();\n    initFrames();\n  }\n})();\n<\/script>\n</body>\n</html>\n","expert-app-task-detail.html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">\n  <title>专家App - 任务详情</title>\n  <style>\n    /* ===== Reset & Base ===== */\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html, body {\n      font-family: -apple-system, BlinkMacSystemFont, \"PingFang SC\", \"Hiragino Sans GB\", \"Microsoft YaHei\", sans-serif;\n      background: #f5f5f5;\n      color: #333;\n      font-size: 14px;\n      min-height: 100vh;\n      -webkit-tap-highlight-color: transparent;\n    }\n    a { text-decoration: none; color: inherit; }\n    :root {\n      --adm-primary: #1677ff;\n      --adm-success: #00b578;\n      --adm-warning: #ff8f1f;\n      --adm-danger: #ff3141;\n    }\n\n    /* ===== 导航栏 ===== */\n    .adm-nav-bar {\n      position: sticky;\n      top: 0;\n      z-index: 100;\n      height: 40px;\n      background: #fff;\n      display: flex;\n      align-items: center;\n      padding: 0 8px;\n      border-bottom: 1px solid #f0f0f0;\n    }\n    .adm-nav-bar .back {\n      font-size: 20px;\n      color: #333;\n      padding: 2px 6px 2px 0;\n      cursor: pointer;\n      font-weight: 300;\n    }\n    .adm-nav-bar .title {\n      flex: 1;\n      text-align: center;\n      font-size: 15px;\n      font-weight: 500;\n      margin-right: 32px;\n      overflow: hidden;\n      text-overflow: ellipsis;\n      white-space: nowrap;\n    }\n\n    /* ===== 状态卡片 ===== */\n    .status-card {\n      background: #fff;\n      padding: 12px;\n      margin-bottom: 6px;\n    }\n    .status-card .tag {\n      display: inline-block;\n      padding: 2px 8px;\n      border-radius: 4px;\n      font-size: 12px;\n      font-weight: 500;\n      margin-bottom: 6px;\n    }\n    .tag-confirm { background: #fff7e6; color: #d48806; }\n    .tag-pending { background: #e7f1ff; color: #1677ff; }\n    .tag-progress { background: #ebfaf3; color: #00b578; }\n    .tag-done { background: #f5f5f5; color: #999; }\n    .tag-rectify { background: #ffeeee; color: #ff3141; }\n    .tag-reinspect { background: #e7f1ff; color: #1677ff; }\n\n    .status-card h2 {\n      font-size: 16px;\n      font-weight: 600;\n      margin-bottom: 4px;\n      color: #1a1a1a;\n    }\n    .status-card .meta {\n      font-size: 12px;\n      color: #999;\n      display: flex;\n      flex-wrap: wrap;\n      gap: 4px 10px;\n    }\n\n    /* ===== 信息区块 ===== */\n    .info-section {\n      background: #fff;\n      padding: 12px;\n      margin-bottom: 6px;\n    }\n    .info-section-title {\n      font-size: 14px;\n      font-weight: 600;\n      margin-bottom: 8px;\n      padding-bottom: 6px;\n      border-bottom: 1px solid #f5f5f5;\n      color: #1a1a1a;\n    }\n    .info-row {\n      display: flex;\n      padding: 6px 0;\n      border-bottom: 1px solid #f5f5f5;\n    }\n    .info-row:last-child { border-bottom: none; }\n    .info-label {\n      width: 80px;\n      color: #999;\n      font-size: 12px;\n      flex-shrink: 0;\n    }\n    .info-value {\n      flex: 1;\n      font-size: 13px;\n      font-weight: 500;\n      color: #333;\n      word-break: break-all;\n    }\n\n    /* ===== 站点列表 ===== */\n    .site-section {\n      padding: 0 12px 16px;\n    }\n    .site-card {\n      background: #fff;\n      border-radius: 10px;\n      padding: 10px 12px;\n      margin-bottom: 6px;\n      box-shadow: 0 1px 4px rgba(0,0,0,0.04);\n      display: block;\n    }\n    .site-card-top {\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      margin-bottom: 4px;\n    }\n    .site-card-name {\n      font-size: 14px;\n      font-weight: 600;\n      color: #1a1a1a;\n    }\n    .site-card-code {\n      font-size: 11px;\n      color: #bbb;\n    }\n    .site-card-info {\n      display: flex;\n      flex-wrap: wrap;\n      gap: 4px 10px;\n      font-size: 12px;\n      color: #999;\n    }\n    .site-card-info strong {\n      color: #333;\n      font-weight: 500;\n    }\n    .site-tag {\n      display: inline-block;\n      padding: 1px 7px;\n      border-radius: 4px;\n      font-size: 11px;\n      font-weight: 500;\n    }\n    .site-checked { background: #ebfaf3; color: #00b578; }\n    .site-unchecked { background: #fff7e6; color: #d48806; }\n    .site-rectify { background: #ffeeee; color: #ff3141; }\n\n    /* ===== 已结束任务只读信息 ===== */\n    .readonly-tip { margin-top: 8px; padding: 8px 10px; border-radius: 6px; background: #f5f5f5; color: #666; font-size: 12px; line-height: 1.6; }\n    .attachment-item { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid #f5f5f5; }\n    .attachment-item:last-child { border-bottom: none; }\n    .attachment-main { flex: 1; min-width: 0; }\n    .attachment-name { font-size: 13px; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }\n    .attachment-meta { margin-top: 2px; font-size: 11px; color: #999; }\n    .attachment-link { color: #1677ff; font-size: 12px; white-space: nowrap; }\n    .history-item { padding: 8px 0; border-bottom: 1px solid #f5f5f5; }\n    .history-item:last-child { border-bottom: none; }\n    .history-item summary { cursor: pointer; list-style: none; }\n    .history-item summary::-webkit-details-marker { display: none; }\n    .history-title { display: flex; justify-content: space-between; gap: 8px; font-size: 13px; }\n    .history-time { flex-shrink: 0; color: #999; font-size: 11px; }\n    .history-detail { padding-top: 5px; color: #666; font-size: 12px; line-height: 1.6; }\n\n    /* ===== 操作按钮区 ===== */\n    .action-bar {\n      position: fixed;\n      bottom: 0;\n      left: 0;\n      right: 0;\n      background: #fff;\n      border-top: 1px solid #f0f0f0;\n      padding: 8px 12px calc(8px + env(safe-area-inset-bottom));\n      display: flex;\n      gap: 8px;\n      z-index: 100;\n    }\n    .action-bar .btn {\n      flex: 1;\n      height: 38px;\n      border-radius: 18px;\n      font-size: 14px;\n      font-weight: 500;\n      border: none;\n      cursor: pointer;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      transition: opacity 0.15s;\n    }\n    .action-bar .btn:active { opacity: 0.7; }\n    .btn-primary { background: #1677ff; color: #fff; }\n    .btn-warn { background: #fff7e6; color: #d48806; border: 1px solid #ffe58f; }\n    .btn-danger { background: #ffeeee; color: #ff3141; border: 1px solid #ffccc7; }\n    .btn-default { background: #f5f5f5; color: #666; border: 1px solid #ddd; }\n\n    .safe-area { height: 60px; }\n  </style>\n</head>\n<body>\n  <div class=\"adm-nav-bar\">\n    <a href=\"javascript:history.back()\" class=\"back\">‹</a>\n    <span class=\"title\" id=\"pageTitle\">任务详情</span>\n  </div>\n\n  <div id=\"content\"></div>\n  <div class=\"safe-area\"></div>\n\n  <div class=\"action-bar\" id=\"actionBar\"></div>\n\n  <script>\n    const params = new URLSearchParams((window.__EXPERT_APP_QUERY__ !== undefined ? window.__EXPERT_APP_QUERY__ : window.location.search));\n    const taskId = params.get('id');\n    const taskType = params.get('type') || 'area-check';\n    const emptyText = '暂无/—';\n    const displayValue = value => value === undefined || value === null || value === '' ? emptyText : value;\n\n    const areaCheckData = {\n      'T20250701001': {\n        title: '2025年夏季面积普查-裕华区', status: 'confirm', statusText: '待确认',\n        taskNo: 'RW-20250701-001', type: '面积普查', area: '裕华区',\n        sites: 5, startDate: '2025-07-01', endDate: '2025-07-15',\n        expert: '张建国', dept: '裕华区管理部',\n        sitesList: [\n          { code: '60218A001', name: '裕华区万达站', type: '中心站', status: 'unchecked', statusText: '待检查' },\n          { code: '60218A002', name: '裕华区世纪站', type: '子站', status: 'unchecked', statusText: '待检查' },\n          { code: '60218A003', name: '裕华区新百站', type: '中心站', status: 'unchecked', statusText: '待检查' },\n          { code: '60218A004', name: '裕华区怀特站', type: '子站', status: 'unchecked', statusText: '待检查' },\n          { code: '60218A005', name: '裕华区槐底站', type: '子站', status: 'unchecked', statusText: '待检查' },\n        ]\n      },\n      'T20250615001': {\n        title: '2025年夏季面积普查-高新区', status: 'progress', statusText: '进行中',\n        taskNo: 'RW-20250615-001', type: '面积普查', area: '高新区',\n        sites: 5, startDate: '2025-06-15', endDate: '2025-07-05',\n        expert: '张建国', dept: '高新区管理部',\n        sitesList: [\n          { code: '60218C001', name: '高新区南站', type: '中心站', status: 'checked', statusText: '已检查' },\n          { code: '60218C002', name: '高新区北站', type: '子站', status: 'rectify', statusText: '待整改' },\n          { code: '60218C003', name: '高新区东站', type: '子站', status: 'unchecked', statusText: '待检查' },\n          { code: '60218C004', name: '高新区西站', type: '子站', status: 'checked', statusText: '已检查' },\n          { code: '60218C005', name: '高新区中站', type: '中心站', status: 'unchecked', statusText: '待检查' },\n        ]\n      },\n      'T20250601001': {\n        title: '2025年春季面积普查-裕华区', status: 'done', statusText: '已结束',\n        taskNo: 'RW-20250601-001', type: '面积普查', area: '裕华区', sites: 5,\n        startDate: '2025-06-01', endDate: '2025-06-15', expert: '张建国', dept: '裕华区管理部',\n        completedAt: '2025-06-15 17:30', completedBy: '系统自动结束',\n        conclusion: '5个站点已全部完成检查', endReason: '任务范围内站点均已完成',\n        sitesList: [\n          { code: '60218B001', name: '裕华区中心站', type: '中心站', status: 'checked', statusText: '已检查' },\n          { code: '60218B004', name: '裕华区万达站', type: '自管站', status: 'checked', statusText: '已检查' },\n          { code: '60218B003', name: '桥西区南站', type: '用户站', status: 'checked', statusText: '已检查' },\n          { code: '60218B009', name: '桥西区东站', type: '用户站', status: 'checked', statusText: '已检查' },\n          { code: '60218B012', name: '桥西区西站', type: '中心站', status: 'checked', statusText: '已检查' }\n        ],\n        attachments: [\n          { name: '任务检查结果汇总.txt', size: '2.1 KB', url: 'data:text/plain;charset=utf-8,%E4%BB%BB%E5%8A%A1%E6%A3%80%E6%9F%A5%E7%BB%93%E6%9E%9C%E6%B1%87%E6%80%BB' },\n          { name: '现场检查归档说明.txt', size: '1.4 KB', url: 'data:text/plain;charset=utf-8,%E7%8E%B0%E5%9C%BA%E6%A3%80%E6%9F%A5%E5%BD%92%E6%A1%A3%E8%AF%B4%E6%98%8E' }\n        ],\n        history: [\n          { title: '任务自动结束', time: '2025-06-15 17:30', detail: '全部5个站点完成检查，系统将任务状态更新为已结束。' },\n          { title: '最后一个站点完成检查', time: '2025-06-15 17:28', detail: '桥西区西站检查完成，任务进度更新为5/5。' },\n          { title: '任务开始', time: '2025-06-01 09:00', detail: '任务到达开始时间，状态由待开始更新为进行中。' }\n        ]\n      },\n      'T20250601002': {\n        title: '2025年春季面积普查-长安区', status: 'done', statusText: '已结束',\n        taskNo: 'RW-20250601-002', type: '面积普查', area: '长安区', sites: 4,\n        startDate: '2025-06-01', endDate: '2025-06-15', expert: '张建国', dept: '长安区管理部',\n        completedAt: '2025-06-14 16:20', completedBy: '系统自动结束',\n        conclusion: '4个站点已全部完成检查', endReason: '任务范围内站点均已完成',\n        sitesList: [\n          { code: '60218B001', name: '长安区中心站', type: '中心站', status: 'checked', statusText: '已检查' },\n          { code: '60218B006', name: '桥西区北站', type: '用户站', status: 'rectify', statusText: '待整改' },\n          { code: '60218B003', name: '长安区南站', type: '子站', status: 'checked', statusText: '已检查' },\n          { code: '60218B004', name: '长安区北站', type: '子站', status: 'checked', statusText: '已检查' }\n        ],\n        attachments: [],\n        history: [{ title: '任务自动结束', time: '2025-06-14 16:20', detail: '全部4个站点完成检查，系统将任务状态更新为已结束。' }]\n      },\n      'T20250601003': {\n        title: '2025年春季面积普查-桥西区', status: 'done', statusText: '已结束',\n        taskNo: 'RW-20250601-003', type: '面积普查', area: '桥西区', sites: 5,\n        startDate: '2025-06-01', endDate: '2025-06-15', expert: '张建国', dept: '桥西区管理部',\n        completedAt: '', completedBy: '', conclusion: '', endReason: '', sitesList: [], attachments: [], history: []\n      },\n    };\n\n    const rectData = {\n      'R20250701001': {\n        title: '裕华区万达站整改', status: 'rectify', statusText: '待整改',\n        noticeNo: '整改2025-007', site: '裕华区万达站', code: '60218A001',\n        deadline: '2025-08-01', issue: '供热面积与实际不符',\n        rectification: '重新核实供热面积并补齐相关资料',\n        sitesList: []\n      },\n      'R20250620001': {\n        title: '长安区东站整改复查', status: 'reinspect', statusText: '待专家复查',\n        noticeNo: '整改2025-006', site: '长安区东站', code: '60218B002',\n        deadline: '2025-07-20', issue: '建筑年代信息缺失',\n        rectification: '补充建筑年代证明材料',\n        sitesList: []\n      },\n    };\n\n    const data = taskType === 'area-check' ? areaCheckData : rectData;\n    const task = data[taskId] || {\n      title: '任务详情', status: 'done', statusText: emptyText, taskNo: '', type: '', area: '',\n      sites: '', startDate: '', endDate: '', expert: '', dept: '', sitesList: [], attachments: [], history: []\n    };\n    document.getElementById('pageTitle').textContent = task.title;\n\n    const tagMap = {\n      confirm: 'tag-confirm', pending: 'tag-pending', progress: 'tag-progress',\n      done: 'tag-done', rectify: 'tag-rectify', reinspect: 'tag-reinspect'\n    };\n\n    let html = `\n      <div class=\"status-card\">\n        <span class=\"tag ${tagMap[task.status] || 'tag-done'}\">${task.statusText}</span>\n        <h2>${task.title}</h2>\n        <div class=\"meta\">\n          ${taskType === 'area-check'\n            ? `<span>任务编号：${displayValue(task.taskNo)}</span><span>检查类型：${displayValue(task.type)}</span><span>区域：${displayValue(task.area)}</span><span>站点：${task.sites === '' ? emptyText : task.sites + '个'}</span>`\n            : `<span>通知单：${displayValue(task.noticeNo)}</span><span>站点：${displayValue(task.site)}</span><span>编码：${displayValue(task.code)}</span>`}\n        </div>\n        ${task.status === 'done' ? '<div class=\"readonly-tip\">该任务已结束，当前页面仅支持查看。</div>' : ''}\n      </div>\n    `;\n\n    if (taskType === 'area-check') {\n      html += `\n        <div class=\"info-section\">\n          <div class=\"info-section-title\">任务信息</div>\n          <div class=\"info-row\"><div class=\"info-label\">任务编号</div><div class=\"info-value\">${displayValue(task.taskNo)}</div></div>\n          <div class=\"info-row\"><div class=\"info-label\">检查类型</div><div class=\"info-value\">${displayValue(task.type)}</div></div>\n          <div class=\"info-row\"><div class=\"info-label\">检查区域</div><div class=\"info-value\">${displayValue(task.area)}</div></div>\n          <div class=\"info-row\"><div class=\"info-label\">站点数量</div><div class=\"info-value\">${task.sites === '' ? emptyText : task.sites + '个'}</div></div>\n          <div class=\"info-row\"><div class=\"info-label\">开始日期</div><div class=\"info-value\">${displayValue(task.startDate)}</div></div>\n          <div class=\"info-row\"><div class=\"info-label\">截止日期</div><div class=\"info-value\">${displayValue(task.endDate)}</div></div>\n          <div class=\"info-row\"><div class=\"info-label\">指派专家</div><div class=\"info-value\">${displayValue(task.expert)}</div></div>\n          <div class=\"info-row\"><div class=\"info-label\">所属管理部</div><div class=\"info-value\">${displayValue(task.dept)}</div></div>\n        </div>\n        ${task.status === 'done' ? `<div class=\"info-section\">\n          <div class=\"info-section-title\">结束信息</div>\n          <div class=\"info-row\"><div class=\"info-label\">结束时间</div><div class=\"info-value\">${displayValue(task.completedAt)}</div></div>\n          <div class=\"info-row\"><div class=\"info-label\">处理人</div><div class=\"info-value\">${displayValue(task.completedBy)}</div></div>\n          <div class=\"info-row\"><div class=\"info-label\">最终结论</div><div class=\"info-value\">${displayValue(task.conclusion)}</div></div>\n          <div class=\"info-row\"><div class=\"info-label\">结束原因</div><div class=\"info-value\">${displayValue(task.endReason)}</div></div>\n        </div>` : ''}\n        <div class=\"info-section\">\n          <div class=\"info-section-title\">站点列表</div>\n      `;\n      if (task.sitesList && task.sitesList.length > 0) {\n        html += task.sitesList.map(s => {\n          const sc = s.status === 'checked' ? 'site-checked' : s.status === 'rectify' ? 'site-rectify' : 'site-unchecked';\n          const readonlyParam = task.status === 'done' ? '&readonly=1' : '';\n          return `<a href=\"./expert-app-site-detail.html?code=${s.code}&task=${taskId}${readonlyParam}\" class=\"site-card\">\n            <div class=\"site-card-top\">\n              <span class=\"site-card-name\">${s.name}</span>\n              <span class=\"site-tag ${sc}\">${s.statusText}</span>\n            </div>\n            <div class=\"site-card-info\">\n              <span>编码：<strong>${s.code}</strong></span>\n              <span>类型：<strong>${s.type}</strong></span>\n            </div
