tml')>=0&&parent&&parent.__MERGED_GET_HTML__){\n      fr.setAttribute('data-merged-src',t);\n      fr.srcdoc=parent.__MERGED_GET_HTML__(t);\n    }\n  });\n})();\n})();<\\/script>\n<\/body>\n<\/html>\n"},"expert-app-standalone":{"title":"专家App(独立版)","file":"expert-app-standalone.html","html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">\n<title>专家App<\/title>\n<style data-src=\"../../shared/styles/app-phone.css\">\n/* app-phone.css — 专家App手机壳样式组件 */\n/* 来源: expert-app-standalone.html (原 area_checker_static/styles/app.css) */\n\n/* ===== 专家App演示稿 — 手机壳 ===== */\n.app-demo-layout{display:flex;gap:32px;height:100%;padding:24px;align-items:flex-start}\n.app-phone-shell{width:392px;min-width:392px;height:824px;background:linear-gradient(180deg,#3e434d 0%,#12151b 100%);border-radius:44px;padding:9px;box-shadow:0 18px 48px rgba(15,23,42,.24),0 6px 16px rgba(15,23,42,.12),inset 0 0 0 1px rgba(255,255,255,.14);position:relative;flex-shrink:0}\n.app-phone-shell::before{content:'';position:absolute;inset:5px;border-radius:42px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);pointer-events:none}\n.app-phone-shell::after{content:'';position:absolute;right:-4px;top:152px;width:4px;height:64px;border-radius:2px;background:linear-gradient(180deg,#59606d 0%,#2f3440 100%);box-shadow:0 96px 0 0 rgba(60,65,76,.95)}\n.app-phone-screen{width:100%;height:100%;background:#f6f7fb;border-radius:35px;overflow:hidden;position:relative;box-shadow:inset 0 0 0 1px rgba(255,255,255,.68)}\n.app-phone-screen::after{content:'';position:absolute;left:50%;bottom:9px;transform:translateX(-50%);width:136px;height:5px;border-radius:999px;background:rgba(17,24,39,.18);z-index:12}\n.app-phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:198px;height:34px;background:#15181f;border-radius:0 0 22px 22px;z-index:10;box-shadow:0 8px 18px rgba(0,0,0,.12)}\n.app-phone-notch::before{content:'';position:absolute;left:50%;top:16px;transform:translateX(-50%);width:72px;height:7px;border-radius:999px;background:rgba(255,255,255,.12)}\n.app-phone-notch::after{content:'';position:absolute;right:32px;top:13px;width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.3),rgba(255,255,255,.05) 55%,rgba(0,0,0,.35) 100%)}\n.app-phone-statusbar{height:52px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:14px 20px 0;font-size:12px;color:#1f2937;font-weight:700;position:relative;z-index:5}\n.app-phone-statusbar::before{content:'9:41';letter-spacing:.2px}\n.app-phone-statusbar::after{content:'100%';letter-spacing:.2px}\n.app-page{position:absolute;top:52px;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;background:#f6f7fb;-webkit-overflow-scrolling:touch}\n.app-page.hidden{display:none}\n\n/* ===== 导航栏 ===== */\n.app-nav-bar{position:sticky;top:0;z-index:5;background:#fff;display:flex;align-items:center;height:60px;padding:8px 16px 6px}\n.app-nav-bar .back-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#52607a;font-size:22px;border-radius:16px}\n.app-nav-bar .nav-title{flex:1;text-align:center;font-size:17px;font-weight:700;color:#1f2b3d;margin-right:32px;letter-spacing:.2px}\n\n/* ===== 搜索栏 ===== */\n.app-search-bar{padding:10px 16px 4px;position:relative}\n.app-search-bar::before{content:'⌕';position:absolute;left:31px;top:26px;transform:translateY(-50%);font-size:15px;color:#b8bfcb;pointer-events:none}\n.app-search-bar input{width:100%;height:44px;border-radius:16px;border:none;padding:0 16px 0 38px;font-size:15px;color:#2c3e50;background:#eef0f6;outline:none;box-shadow:inset 0 0 0 1px rgba(233,236,243,.7)}\n.app-search-bar input::placeholder{color:#aab2bf}\n\n/* ===== 段式切换器 ===== */\n.app-segment{display:flex;gap:8px;padding:4px 16px 6px}\n.app-segment-item{flex:1;text-align:center;padding:8px 0;border-radius:12px;font-size:13px;color:#7b8797;cursor:pointer;transition:all .2s;background:#edf1f7;font-weight:600}\n.app-segment-item.active{color:#1677ff;background:#e8f1ff;box-shadow:inset 0 0 0 1px rgba(22,119,255,.12)}\n\n/* ===== 任务卡片 ===== */\n.app-task-card{background:#fff;margin:8px 16px;border-radius:18px;padding:14px 14px 0;border:none;box-shadow:0 6px 18px rgba(31,41,55,.07);cursor:pointer;overflow:hidden}\n.app-task-card .card-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}\n.app-task-card .card-hd .t-name{font-size:16px;font-weight:700;color:#23324a;flex:1;line-height:1.4}\n.app-task-card .card-hd .t-status{font-size:12px;padding:5px 10px;border-radius:13px;white-space:nowrap;font-weight:600}\n.app-task-card .card-info{display:flex;align-items:center;gap:8px;font-size:12px;color:#738198;margin-top:6px;line-height:20px}\n.app-task-card .card-info .label{color:#738198;font-weight:600}\n.app-task-card .card-info .value{color:#556277}\n.app-task-card .card-progress{height:8px;background:#dfe4ec;border-radius:999px;overflow:hidden;margin:6px 0 10px}\n.app-task-card .card-progress-fill{height:100%;background:linear-gradient(90deg,#5c8dff 0%,#4b7cf4 100%);border-radius:999px}\n.app-task-card .card-ft{display:flex;justify-content:center;align-items:center;margin-top:2px;padding:12px 0 13px;border-top:1px solid #eef1f5}\n.app-task-card .card-ft .ft-right{font-size:15px;color:#336dff;font-weight:700;letter-spacing:.1px}\n\n/* ===== 详情区段 ===== */\n.app-detail-section{background:#fff;margin:10px 16px;border-radius:18px;padding:15px 14px;box-shadow:0 6px 18px rgba(31,41,55,.07)}\n.app-detail-section .sec-title{font-size:15px;font-weight:700;color:#23324a;margin-bottom:10px}\n.app-detail-row{display:flex;justify-content:space-between;gap:12px;padding:5px 0;font-size:13px;line-height:20px}\n.app-detail-row .d-label{color:#7b8797;font-weight:600;white-space:nowrap}\n.app-detail-row .d-value{color:#23324a;font-weight:600;text-align:right;max-width:64%}\n\n/* ===== 空状态 ===== */\n.app-empty{text-align:center;padding:56px 20px 20px;color:#94a0b2}\n.app-empty .empty-icon{font-size:42px;margin-bottom:10px;color:#c9d0dc}\n.app-empty .empty-text{font-size:13px;line-height:22px}\n\n/* ===== 首页入口 ===== */\n.app-home-header{padding:22px 20px 10px;background:transparent}\n.app-home-header .greeting{font-size:27px;font-weight:800;line-height:1.2;margin-bottom:4px;letter-spacing:.2px;color:#1f2b3d}\n.app-home-header .sub-greeting{font-size:14px;color:#7b8797}\n.app-entry-card{background:#fff;margin:10px 16px;border-radius:18px;padding:15px 14px;box-shadow:0 6px 18px rgba(31,41,55,.07);cursor:pointer}\n.app-entry-card .entry-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px}\n.app-entry-card .entry-icon{width:40px;height:40px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px}\n.app-entry-card .entry-icon.check{background:#e9f1ff}\n.app-entry-card .entry-icon.rectify{background:#fff4e5}\n.app-entry-card .entry-title{font-size:16px;font-weight:700;color:#23324a;line-height:1.3}\n.app-entry-card .entry-desc{font-size:12px;color:#7b8797;margin-top:3px;line-height:18px}\n.app-entry-card .entry-stats{display:flex;gap:8px;flex-wrap:wrap}\n.app-entry-card .stat-item{background:#f2f4f8;border-radius:999px;padding:4px 9px;font-size:11px;color:#66758a}\n.app-entry-card .stat-item .stat-num{font-weight:700;color:#23324a;margin-right:3px}\n.app-entry-card .stat-item.highlight{background:#fff3df;color:#cf7b12}\n.app-entry-card .stat-item.highlight .stat-num{color:#cf7b12}\n\n/* ===== 整改任务卡片 ===== */\n.rt-card{background:#fff;border-radius:16px;padding:14px;margin:10px 12px;box-shadow:0 6px 18px rgba(31,41,55,.07)}\n.rt-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}\n.rt-name{font-size:15px;font-weight:700;color:#23324a;line-height:20px}\n.rt-tag{font-size:11px;padding:3px 8px;border-radius:999px;white-space:nowrap}\n.rt-row{display:flex;justify-content:space-between;gap:12px;min-height:24px;line-height:20px}\n.rt-label{font-size:12px;color:#8a94a6;white-space:nowrap}\n.rt-value{font-size:12px;color:#23324a;text-align:right}\n.rt-btn{width:100%;height:34px;border:none;border-top:1px solid #edf0f2;background:#fff;color:#4b7cf4;font-size:13px;font-weight:700;margin-top:10px;padding-top:9px;cursor:pointer}\n\n/* ===== 站点列表卡片 ===== */\n.sl-card{background:#fff;border-radius:8px;padding:14px;margin-bottom:10px}\n.sl-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}\n.sl-card-name{font-size:14px;font-weight:600;color:#111827;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}\n.sl-card-status{font-size:11px;padding:2px 8px;border-radius:10px;white-space:nowrap;margin-left:8px;flex-shrink:0}\n.sl-card-row{display:flex;justify-content:space-between;align-items:center;height:28px;line-height:28px}\n.sl-card-label{color:#8a8f99;font-size:12px;white-space:nowrap;flex-shrink:0}\n.sl-card-value{color:#111827;font-size:12px;text-align:right;margin-left:8px}\n.sl-card-btn{width:100%;height:36px;border:none;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;margin-top:10px}\n.sl-card-btn.primary{background:#4b7cf4;color:#fff}\n.sl-card-btn.done{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}\n\n/* ===== 站点详情 ===== */\n.sd-main-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:10px}\n.sd-main-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}\n.sd-main-name{font-size:17px;font-weight:700;color:#111827;line-height:24px}\n.sd-result-badge{font-size:11px;padding:4px 9px;border-radius:999px;white-space:nowrap;font-weight:600;flex-shrink:0}\n.sd-main-row{display:flex;justify-content:space-between;align-items:center;height:28px;line-height:28px}\n.sd-main-label{color:#8a8f99;font-size:12px;white-space:nowrap}\n.sd-main-value{color:#111827;font-size:12px;text-align:right;margin-left:8px}\n.sd-tabs{display:flex;background:#fff;border-radius:8px;padding:4px;margin-bottom:10px;gap:2px}\n.sd-tab{flex:1;text-align:center;font-size:12px;padding:7px 0;border-radius:6px;cursor:pointer;color:#66758a;transition:all .15s;white-space:nowrap}\n.sd-tab.active{background:#4b7cf4;color:#fff;font-weight:600}\n.sd-tab-panel{display:none}\n.sd-tab-panel.active{display:block}\n.sd-info-card{background:#fff;border-radius:8px;padding:14px;margin-bottom:10px}\n.sd-info-title{font-size:13px;font-weight:600;color:#111827;margin-bottom:10px}\n.sd-info-row{display:flex;justify-content:space-between;align-items:center;height:30px;line-height:30px;border-bottom:1px solid #f0f2f5}\n.sd-info-row:last-child{border-bottom:none}\n.sd-info-label{color:#8a8f99;font-size:12px;white-space:nowrap;flex-shrink:0}\n.sd-info-value{color:#111827;font-size:12px;text-align:right;margin-left:8px}\n\n/* ===== 建筑物卡片 ===== */\n.sd-bld-card{background:#fff;border-radius:8px;padding:14px;margin-bottom:8px;cursor:pointer}\n.sd-bld-card:active{background:#f9fafb}\n.sd-bld-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}\n.sd-bld-name{font-size:13px;font-weight:600;color:#111827}\n.sd-bld-tag{font-size:11px;padding:2px 6px;border-radius:8px;background:#e6f7ff;color:#1890ff}\n.sd-bld-row{display:flex;justify-content:space-between;align-items:center;height:24px;line-height:24px}\n.sd-bld-label{color:#8a8f99;font-size:11px}\n.sd-bld-value{color:#111827;font-size:11px}\n.sd-bld-link{font-size:12px;color:#1677ff;text-align:center;padding:6px 0 0;margin-top:4px;border-top:1px solid #f0f2f5}\n\n<\/style>\n<style>\n/* ===== 独立App独有样式 ===== */\n.cf-nav-bar{position:sticky;top:0;z-index:5;background:#fff;display:flex;align-items:center;height:36px;padding:0 12px;border-bottom:1px solid #edf0f2}\n.cf-back-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#4b7cf4;font-size:20px;border-radius:14px;flex-shrink:0}\n.cf-nav-title{flex:1;text-align:center;font-size:16px;font-weight:600;color:#111827;margin-right:28px}\n.cf-content{background:#f5f6f8;padding:12px;overflow-y:auto}\n.cf-card{background:#fff;border-radius:8px;padding:14px;margin-bottom:12px}\n.cf-card-title{font-size:14px;font-weight:600;color:#111827;margin-bottom:14px}\n.cf-field-row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:0;height:34px;line-height:34px;border-bottom:1px solid #edf0f2}\n.cf-field-row.cf-field-last{border-bottom:none}\n.cf-label{color:#8a8f99;font-size:12px;white-space:nowrap;flex-shrink:0}\n.cf-value{color:#111827;font-size:12px;text-align:right;overflow:hidden;text-overflow:ellipsis}\n.cf-btn-row{display:flex;gap:12px;padding:4px 0}\n.cf-btn-reject{flex:1;height:44px;border:1px solid #ff4d4f;border-radius:8px;background:#fff;color:#ff4d4f;font-size:15px;font-weight:600;cursor:pointer}\n.cf-btn-reject:active{background:#fff1f0}\n.cf-btn-confirm{flex:1;height:44px;border:none;border-radius:8px;background:#4b7cf4;color:#fff;font-size:15px;font-weight:600;cursor:pointer}\n.cf-btn-confirm:active{background:#3a6be0}\n.app-demo-info{flex:1;min-width:0}\n.app-demo-info .info-card{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:16px}\n.app-demo-info .info-card .info-title{font-size:16px;font-weight:600;color:#1d2129;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f0f0f0}\n.app-demo-info .info-card .info-block{margin-bottom:12px}\n.app-demo-info .info-card .info-block .block-label{font-size:13px;font-weight:600;color:#1d2129;margin-bottom:4px}\n.app-demo-info .info-card .info-block .block-content{font-size:13px;color:#5a6577;line-height:1.8}\n.app-reject-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}\n.app-reject-overlay.show{opacity:1;pointer-events:auto}\n.app-reject-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:392px;padding:24px 20px 32px}\n.app-reject-sheet .sheet-title{font-size:18px;font-weight:700;color:#1f2b3d;margin-bottom:16px;text-align:center}\n.app-reject-sheet textarea{width:100%;min-height:100px;border:1px solid #dce0e8;border-radius:12px;padding:12px;font-size:14px;font-family:inherit;resize:none;outline:none;background:#fafafa;color:#1f2b3d}\n.app-reject-sheet .sheet-actions{display:flex;gap:10px;margin-top:16px}\n.app-reject-sheet .app-btn{flex:1;height:44px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;border:none;text-align:center}\n.app-reject-sheet .app-btn-default{background:#f0f2f6;color:#52607a}\n.app-reject-sheet .app-btn-danger{background:#fff1f0;color:#f04438}\nbody.embedded-mode{background:transparent !important;display:block !important;min-height:auto !important}\nbody.embedded-mode .app-demo-layout{display:block !important;padding:0 !important}\nbody.embedded-mode .app-phone-shell{width:100% !important;min-width:0 !important;max-width:none !important;border:none !important;box-shadow:none !important;background:transparent !important;padding:0 !important}\nbody.embedded-mode .app-phone-screen{border-radius:0 !important;box-shadow:none !important;height:100vh !important}\nbody.embedded-mode .app-phone-notch,\nbody.embedded-mode .app-phone-homebar,\nbody.embedded-mode .app-phone-home-bar,\nbody.embedded-mode #appDemoInfo{display:none !important}\n<\/style>\n<\/head>\n<body style=\"margin:0;background:#eef0f5;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif\">\n\n<div class=\"app-demo-layout\" style=\"padding:0\">\n  <div class=\"app-phone-shell\">\n    <div class=\"app-phone-screen\">\n      <div class=\"app-phone-notch\"><\/div>\n      <div class=\"app-phone-statusbar\" id=\"appStatusBar\">面积核查<\/div>\n\n      <!-- 页面1：入口页 -->\n      <div class=\"app-page\" id=\"appPageHome\">\n        <div class=\"app-home-header\">\n          <div class=\"greeting\">工作台<\/div>\n          <div class=\"sub-greeting\">张建国 专家，您好<\/div>\n        <\/div>\n        <div style=\"padding-top:4px\">\n          <div class=\"app-entry-card\" onclick=\"navTo('taskList')\">\n            <div class=\"entry-hd\">\n              <div class=\"entry-icon check\">📋<\/div>\n              <div>\n                <div class=\"entry-title\">面积检查任务<\/div>\n                <div class=\"entry-desc\">查看和处理面积检查相关任务<\/div>\n              <\/div>\n            <\/div>\n            <div class=\"entry-stats\" id=\"appCheckStats\"><\/div>\n          <\/div>\n          <div class=\"app-entry-card\" onclick=\"navTo('rectifyList')\">\n            <div class=\"entry-hd\">\n              <div class=\"entry-icon rectify\">🔧<\/div>\n              <div>\n                <div class=\"entry-title\">整改任务<\/div>\n                <div class=\"entry-desc\">查看和处理整改相关任务<\/div>\n              <\/div>\n            <\/div>\n            <div class=\"entry-stats\" id=\"appRectifyStats\"><\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n\n      <!-- 页面2：任务列表 -->\n      <div class=\"app-page hidden\" id=\"appPageTaskList\">\n        <div class=\"app-nav-bar\">\n          <div class=\"back-btn\" onclick=\"navTo('home')\">‹<\/div>\n          <div class=\"nav-title\">任务列表<\/div>\n        <\/div>\n        <div class=\"app-search-bar\">\n          <input type=\"text\" placeholder=\"搜索任务名称\" id=\"appTaskSearch\" oninput=\"renderTaskList()\">\n        <\/div>\n        <div class=\"app-segment\" id=\"appTaskSegment\"><\/div>\n        <div id=\"appTaskListContent\" style=\"padding-bottom:12px\"><\/div>\n      <\/div>\n\n      <!-- 页面3：任务确认 -->\n      <div class=\"app-page hidden\" id=\"appPageTaskConfirm\">\n        <div class=\"cf-nav-bar\">\n          <div class=\"cf-back-btn\" onclick=\"navTo('taskList')\">‹<\/div>\n          <div class=\"cf-nav-title\">任务确认<\/div>\n        <\/div>\n        <div id=\"appTaskConfirmContent\" class=\"cf-content\"><\/div>\n        <div class=\"app-reject-overlay\" id=\"appRejectOverlay\">\n          <div class=\"app-reject-sheet\">\n            <div class=\"sheet-title\">拒绝原因<\/div>\n            <textarea id=\"appRejectReason\" placeholder=\"请输入拒绝原因...\"><\/textarea>\n            <div class=\"sheet-actions\">\n              <button class=\"app-btn app-btn-default\" onclick=\"closeReject()\">取消<\/button>\n              <button class=\"app-btn app-btn-danger\" onclick=\"confirmReject()\">确认拒绝<\/button>\n            <\/div>\n          <\/div>\n        <\/div>\n      <\/div>\n\n      <!-- 页面4：整改任务 -->\n      <div class=\"app-page hidden\" id=\"appPageRectifyList\">\n        <div class=\"app-nav-bar\">\n          <div class=\"back-btn\" onclick=\"navTo('home')\">‹<\/div>\n          <div class=\"nav-title\">整改任务<\/div>\n        <\/div>\n        <div class=\"app-segment\" id=\"appRectifySegment\"><\/div>\n        <div id=\"appRectifyListContent\" style=\"padding-bottom:12px\"><\/div>\n      <\/div>\n\n      <!-- 页面5：站点列表 -->\n      <div class=\"app-page hidden\" id=\"appPageSiteList\">\n        <div class=\"cf-nav-bar\">\n          <div class=\"cf-back-btn\" onclick=\"navTo('taskList')\">‹<\/div>\n          <div class=\"cf-nav-title\">站点列表<\/div>\n        <\/div>\n        <div id=\"appSiteListContent\" class=\"cf-content\"><\/div>\n      <\/div>\n\n      <!-- 页面6：站点详情 -->\n      <div class=\"app-page hidden\" id=\"appPageSiteDetail\">\n        <div class=\"cf-nav-bar\">\n          <div class=\"cf-back-btn\" onclick=\"navTo('siteList')\">‹<\/div>\n          <div class=\"cf-nav-title\" id=\"appSiteDetailTitle\">站点详情<\/div>\n        <\/div>\n        <div id=\"appSiteDetailContent\" class=\"cf-content\"><\/div>\n      <\/div>\n\n      <!-- 页面7：检查记录单 -->\n      <div class=\"app-page hidden\" id=\"appPageCheckRecordForm\">\n        <div class=\"cf-nav-bar\">\n          <div class=\"cf-back-btn\" onclick=\"navTo('siteDetail')\">‹<\/div>\n          <div class=\"cf-nav-title\">填写检查记录单<\/div>\n        <\/div>\n        <div id=\"appCheckRecordFormContent\" class=\"cf-content\"><\/div>\n      <\/div>\n\n      <!-- 页面8：楼栋详情 -->\n      <div class=\"app-page hidden\" id=\"appPageBuildingDetail\">\n        <div class=\"cf-nav-bar\">\n          <div class=\"cf-back-btn\" onclick=\"navTo('siteDetail')\">‹<\/div>\n          <div class=\"cf-nav-title\">楼栋详情<\/div>\n        <\/div>\n        <div id=\"appBuildingDetailContent\" class=\"cf-content\"><\/div>\n      <\/div>\n\n    <\/div>\n  <\/div>\n\n  <!-- 右侧说明区 -->\n  <div class=\"app-demo-info\" id=\"appDemoInfo\">\n    <div class=\"info-card\">\n      <div class=\"info-title\">📱 专家App — 功能说明<\/div>\n      <div class=\"info-block\">\n        <div class=\"block-label\">页面导航<\/div>\n        <div class=\"block-content\">\n          <ul>\n            <li>工作台 → 面积检查任务 → 任务列表（搜索+segment切换）<\/li>\n            <li>工作台 → 整改任务 → 整改列表（待复查/已归档）<\/li>\n            <li>任务列表 → 点击卡片 → 站点列表 → 站点详情<\/li>\n            <li>任务列表 → 确认/拒绝 → 确认任务<\/li>\n          <\/ul>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/div>\n<\/div>\n\n<!-- 复查审核弹窗 -->\n<div class=\"app-reject-overlay\" id=\"appAuditOverlay\" onclick=\"if(event.target===this)closeAuditSheet()\">\n  <div class=\"app-reject-sheet\" onclick=\"event.stopPropagation()\">\n    <div class=\"sheet-title\" style=\"font-size:16px\">复查结果<\/div>\n    <div style=\"margin-bottom:16px\">\n      <div style=\"display:flex;gap:24px;margin-bottom:16px\">\n        <label style=\"display:flex;align-items:center;gap:6px;font-size:14px;font-weight:500;cursor:pointer;color:#333\"><input type=\"radio\" name=\"auditResult\" value=\"pass\" checked style=\"accent-color:#1677ff;width:16px;height:16px\"> 通过<\/label>\n        <label style=\"display:flex;align-items:center;gap:6px;font-size:14px;font-weight:500;cursor:pointer;color:#333\"><input type=\"radio\" name=\"auditResult\" value=\"reject\" style=\"accent-color:#1677ff;width:16px;height:16px\"> 驳回<\/label>\n      <\/div>\n      <div id=\"auditRejectSection\" style=\"display:none\">\n        <div style=\"font-size:14px;font-weight:600;color:#333;margin-bottom:8px\">驳回原因 <span style=\"color:#ff3141\">*<\/span><\/div>\n        <textarea id=\"auditRejectReason\" placeholder=\"请输入驳回原因\" maxlength=\"300\" style=\"width:100%;min-height:100px;border:1px solid #dce0e8;border-radius:12px;padding:12px;font-size:14px;font-family:inherit;resize:none;outline:none;background:#fafafa;color:#1f2b3d\"><\/textarea>\n        <div style=\"text-align:right;font-size:12px;color:#bbb;margin-top:4px\"><span id=\"auditCharCount\">0<\/span>/300<\/div>\n      <\/div>\n    <\/div>\n    <div class=\"sheet-actions\">\n      <button class=\"app-btn app-btn-default\" onclick=\"closeAuditSheet()\">取消<\/button>\n      <button class=\"app-btn app-btn-danger\" style=\"background:#1677ff;color:#fff\" onclick=\"submitAudit()\">提交<\/button>\n    <\/div>\n  <\/div>\n<\/div>\n\n<script>\n// ===== Mock 数据 =====\nvar APP_STATUS_MAP = {pending:'待确认',confirmed:'待开始',doing:'进行中',done:'已结束'};\nvar APP_STATUS_TAG = {pending:'background:#fff7e6;color:#faad14',confirmed:'background:#e6f7ff;color:#1890ff',doing:'background:#e6f7ff;color:#1890ff',done:'background:#f6ffed;color:#52c41a'};\n\nvar SHARED_TASKS = [\n  {id:'AT01',name:'2026 第27周 裕华片区常规面积核查任务',status:'doing',dept:'裕华管理部',period:'2026-07-01 至 2026-07-07',siteCount:3},\n  {id:'AT02',name:'2026 第27周 长安片区补充面积核查任务',status:'confirmed',dept:'长安管理部',period:'2026-07-01 至 2026-07-07',siteCount:2},\n  {id:'AT03',name:'2026 第26周 桥西片区专项面积核查任务',status:'done',dept:'桥西管理部',period:'2026-06-24 至 2026-06-30',siteCount:2},\n  {id:'AT04',name:'2026 第28周 长安中心站联合复核准备任务',status:'pending',dept:'长安管理部',period:'2026-07-08 至 2026-07-14',siteCount:1},\n  {id:'AT05',name:'2026 第27周 裕华片区异常转派补查任务',status:'doing',dept:'裕华管理部',period:'2026-07-01 至 2026-07-07',siteCount:1},\n];\n\nvar APP_RECTIFY_TASKS = [\n  {id:'RT-202607-001',siteCode:'60218B001',siteName:'裕华区中心站',status:'pending',dept:'裕华管理部',address:'裕华区槐安路与翟营大街交叉口东行200米路北',lastSaveTime:'2026-07-04 19:25:12'},\n  {id:'RT-202607-002',siteCode:'60218B004',siteName:'裕华区万达站',status:'pending',dept:'裕华管理部',address:'裕华区槐中路与建华东大街交叉口东南角',lastSaveTime:'2026-07-03 16:20:08'},\n  {id:'RT-202607-003',siteCode:'60218B006',siteName:'桥西区北站',status:'pending',dept:'桥西管理部',address:'桥西区中山路与维明大街交叉口北行50米',lastSaveTime:'2026-07-04 08:40:52'},\n  {id:'RT-202607-004',siteCode:'60218B007',siteName:'长安区北站',status:'pending',dept:'长安管理部',address:'长安区和平路与建设大街交叉口西行100米',lastSaveTime:'2026-07-04 18:18:20'},\n  {id:'RT-202607-005',siteCode:'60218B008',siteName:'高新区南站',status:'pending',dept:'高新管理部',address:'高新区长江大道与珠峰大街交叉口南行200米',lastSaveTime:'2026-07-05 09:40:18'},\n  {id:'RT-202607-006',siteCode:'60218B003',siteName:'桥西区南站',status:'done',dept:'桥西管理部',address:'桥西区中华南大街与槐安路交叉口南行150米路东',lastSaveTime:'2026-07-01 17:30:22'},\n];\n\nvar APP_SITES = [\n  {code:'60218B001',name:'裕华区中心站',dept:'裕华管理部',area:'裕华片区所',district:'裕华区',street:'裕东街道',address:'裕华区槐安路与翟营大街交叉口东行',contact:'王志强',phone:'138-0001-1001',status:'done',statusText:'已检查'},\n  {code:'60218B005',name:'裕华区南站',dept:'裕华管理部',area:'裕华片区所',district:'裕华区',street:'裕兴街道',address:'裕华区体育南大街与塔北路交叉口',contact:'—',phone:'—',status:'doing',statusText:'检查中'},\n  {code:'60218B006',name:'桥西区北站',dept:'桥西管理部',area:'桥西片区所',district:'桥西区',street:'维明街道',address:'桥西区中山路与维明大街交叉口',contact:'—',phone:'—',status:'unchecked',statusText:'待检查'},\n  {code:'60218B015',name:'桥西区中站',dept:'桥西管理部',area:'桥西片区所',district:'桥西区',street:'南长街道',address:'桥西区工农路与维明大街交口',contact:'刘工',phone:'138-0003-1003',status:'rectify',statusText:'待整改'},\n];\n\nvar _page = 'home', _taskTab = 'doing', _rectifyTab = 'pending', _selectedTaskId = null, _selectedSiteIdx = 0;\nvar _rejectTaskId = null;\n\n// ===== 导航 =====\nfunction navTo(page, opts) {\n  opts = opts || {};\n  var pages = {home:'appPageHome',taskList:'appPageTaskList',taskConfirm:'appPageTaskConfirm',rectifyList:'appPageRectifyList',siteList:'appPageSiteList',siteDetail:'appPageSiteDetail',checkRecordForm:'appPageCheckRecordForm',buildingDetail:'appPageBuildingDetail'};\n  document.querySelectorAll('.app-page').forEach(function(p){p.classList.add('hidden')});\n  var target = document.getElementById(pages[page]);\n  if(target) target.classList.remove('hidden');\n  _page = page;\n  var titles = {home:'面积核查',taskList:'任务列表',taskConfirm:'任务确认',rectifyList:'整改任务',siteList:'站点列表',siteDetail:'站点详情',checkRecordForm:'填写检查记录单',buildingDetail:'楼栋详情'};\n  document.getElementById('appStatusBar').textContent = titles[page] || '面积核查';\n  if(page==='home') renderHome();\n  else if(page==='taskList') renderTaskList();\n  else if(page==='taskConfirm') renderTaskConfirm();\n  else if(page==='rectifyList') renderRectifyList();\n  else if(page==='siteList') renderSiteList();\n  else if(page==='siteDetail') renderSiteDetail();\n  else if(page==='checkRecordForm') renderCheckRecordForm();\n  else if(page==='buildingDetail') renderBuildingDetail();\n}\n\nfunction getInitialPage() {\n  var params = new URLSearchParams((window.__NAV_QUERY__!==undefined?window.__NAV_QUERY__:window.location.search));\n  var page = params.get('page');\n  if (page === 'taskList' || page === 'rectifyList' || page === 'taskConfirm' || page === 'siteList' || page === 'siteDetail' || page === 'checkRecordForm' || page === 'buildingDetail') {\n    return page;\n  }\n  return 'home';\n}\n\n// ===== 首页 =====\nfunction renderHome() {\n  var checkStats = [\n    {label:'待确认',count:1,hide:false},{label:'进行中',count:2,hide:false},{label:'已结束',count:1,hide:false}\n  ];\n  document.getElementById('appCheckStats').innerHTML = checkStats.map(function(s){\n    return '<span class=\"stat-item\"><span class=\"stat-num\">'+s.count+'<\/span>'+s.label+'<\/span>';\n  }).join('');\n  var rectifyStats = [\n    {label:'待复查',count:5,hide:false},{label:'已归档',count:1,hide:false}\n  ];\n  document.getElementById('appRectifyStats').innerHTML = rectifyStats.map(function(s){\n    return '<span class=\"stat-item highlight\"><span class=\"stat-num\">'+s.count+'<\/span>'+s.label+'<\/span>';\n  }).join('');\n}\n\n// ===== 任务列表 =====\nfunction renderTaskList() {\n  var kw = (document.getElementById('appTaskSearch').value||'').trim().toLowerCase();\n  var filtered = kw ? SHARED_TASKS.filter(function(t){return t.name.toLowerCase().indexOf(kw)>=0}) : SHARED_TASKS;\n  var segmentItems = ['pending','confirmed','doing','done'];\n  var tabsHtml = segmentItems.map(function(k){\n    var cnt = filtered.filter(function(t){return t.status===k}).length;\n    var label = APP_STATUS_MAP[k] || k;\n    return '<div class=\"app-segment-item'+(k===_taskTab?' active':'')+'\" onclick=\"switchTaskTab(\\''+k+'\\')\">'+label+'（'+cnt+'）<\/div>';\n  }).join('');\n  document.getElementById('appTaskSegment').innerHTML = tabsHtml;\n\n  var list = filtered.filter(function(t){return t.status===_taskTab});\n  if(list.length===0){\n    document.getElementById('appTaskListContent').innerHTML = '<div class=\"app-empty\"><div class=\"empty-icon\">📭<\/div><div class=\"empty-text\">暂无任务<\/div><\/div>';\n    return;\n  }\n  document.getElementById('appTaskListContent').innerHTML = list.map(function(t){\n    var tagStyle = APP_STATUS_TAG[t.status] || 'background:#f5f5f5;color:#999';\n    var progressHtml = (t.status==='doing') ? '<div class=\"card-progress\"><div class=\"card-progress-fill\" style=\"width:'+Math.round(t.siteCount>0?((t.siteCount-1)/t.siteCount*100):0)+'%\"><\/div><\/div>' : '';\n    var progTextHtml = (t.status==='doing') ? '<div class=\"card-info card-progress-text\"><span class=\"value\">'+(t.siteCount-1)+'/'+t.siteCount+' 站点已完成<\/span><\/div>' : '';\n    return '<div class=\"app-task-card\" onclick=\"onTaskClick(\\''+t.id+'\\')\">'+\n      '<div class=\"card-hd\"><span class=\"t-name\">'+t.name+'<\/span><span class=\"t-status\" style=\"'+tagStyle+'\">'+APP_STATUS_MAP[t.status]+'<\/span><\/div>'+\n      '<div class=\"card-info\"><span class=\"label\">部署：<\/span><span class=\"value\">'+t.dept+'<\/span><span class=\"label\">周期：<\/span><span class=\"value\">'+t.period+'<\/span><\/div>'+\n      progTextHtml+progressHtml+\n      '<div class=\"card-ft\"><span class=\"ft-right\">'+(t.status==='pending'?'等待开始 ›':t.status==='confirmed'?'查看详情 ›':t.status==='doing'?'继续检查 ›':'查看结果 ›')+'<\/span><\/div>'+\n    '<\/div>';\n  }).join('');\n}\n\nfunction switchTaskTab(tab){_taskTab=tab;renderTaskList();}\n\nfunction onTaskClick(id){\n  var t = SHARED_TASKS.filter(function(s){return s.id===id})[0];\n  if(!t) return;\n  if(t.status==='pending') { showToast('任务尚未开始'); return; }\n  if(t.status==='confirmed' || t.status==='doing') {\n    _selectedTaskId = id;\n    navTo('siteList');\n  } else if(t.status==='done') {\n    showToast('任务已结束');\n  }\n}\n\n// ===== 站点列表 =====\nfunction renderSiteList() {\n  var task = SHARED_TASKS.filter(function(t){return t.id===_selectedTaskId})[0] || SHARED_TASKS[0];\n  document.querySelector('#appPageSiteList .cf-nav-title').textContent = task ? task.name+' - 站点列表' : '站点列表';\n  var listHtml = APP_SITES.map(function(site,idx){\n    var statusTag = site.status==='done'?'background:#f6ffed;color:#52c41a':site.status==='doing'?'background:#e6f7ff;color:#1890ff':site.status==='rectify'?'background:#fff7e6;color:#faad14':'background:#f5f5f5;color:#999';\n    var btnHtml = (site.status==='unchecked'||site.status==='doing')\n      ? '<button class=\"sl-card-btn primary\" onclick=\"event.stopPropagation();navTo(\\'siteDetail\\')\">开始检查<\/button>'\n      : '<button class=\"sl-card-btn done\" onclick=\"event.stopPropagation();navTo(\\'siteDetail\\')\">查看详情<\/button>';\n    return '<div class=\"sl-card\" onclick=\"navTo(\\'siteDetail\\')\">'+\n      '<div class=\"sl-card-top\"><span class=\"sl-card-name\">'+site.name+'<\/span><span class=\"sl-card-status\" style=\"'+statusTag+'\">'+site.statusText+'<\/span><\/div>'+\n      '<div class=\"sl-card-row\"><span class=\"sl-card-label\">用户编码<\/span><span class=\"sl-card-value\">'+site.code+'<\/span><\/div>'+\n      '<div class=\"sl-card-row\"><span class=\"sl-card-label\">用热地址<\/span><span class=\"sl-card-value\">'+site.address+'<\/span><\/div>'+\n      btnHtml+'<\/div>';\n  }).join('');\n  document.getElementById('appSiteListContent').innerHTML = listHtml;\n}\n\n// ===== 站点详情（简版） =====\nfunction renderSiteDetail() {\n  var site = APP_SITES[0];\n  document.getElementById('appSiteDetailTitle').textContent = (site||{}).name||'站点详情';\n  document.getElementById('appSiteDetailContent').innerHTML = ''+\n    '<div class=\"sd-main-card\">'+\n      '<div class=\"sd-main-top\"><span class=\"sd-main-name\">'+(site.name||'')+'<\/span><span class=\"sd-result-badge\" style=\"background:#ffeeee;color:#ff3141\">不合格<\/span><\/div>'+\n      '<div class=\"sd-main-row\"><span class=\"sd-main-label\">检查完成时间<\/span><span class=\"sd-main-value\">2026-07-02<\/span><\/div>'+\n      '<div class=\"sd-main-row\"><span class=\"sd-main-label\">确认进度<\/span><span class=\"sd-main-value\">2/2<\/span><\/div>'+\n      '<div class=\"sd-main-row\"><span class=\"sd-main-label\">站点状态<\/span><span class=\"sd-main-value\" style=\"color:#d48806\">待整改<\/span><\/div>'+\n      '<button class=\"action-btn-full btn-primary\" style=\"margin-top:10px\" onclick=\"showAuditSheet()\">审核<\/button>'+\n    '<\/div>'+\n    '<div class=\"sd-tabs\">'+\n      '<div class=\"sd-tab active\" onclick=\"switchSiteTab(this,\\'info\\')\">基础信息<\/div>'+\n      '<div class=\"sd-tab\" onclick=\"switchSiteTab(this,\\'area\\')\">面积汇总<\/div>'+\n      '<div class=\"sd-tab\" onclick=\"switchSiteTab(this,\\'buildings\\')\">建筑物<\/div>'+\n      '<div class=\"sd-tab\" onclick=\"switchSiteTab(this,\\'plan\\')\">平面图<\/div>'+\n      '<div class=\"sd-tab\" onclick=\"switchSiteTab(this,\\'door\\')\">门头图<\/div>'+\n      '<div class=\"sd-tab\" onclick=\"switchSiteTab(this,\\'check\\')\">检查记录单<\/div>'+\n      '<div class=\"sd-tab\" onclick=\"switchSiteTab(this,\\'rectify\\')\">整改通知 etElementById('appRejectOverlay').classList.add('show')}\nfunction closeReject(){document.getElementById('appRejectOverlay').classList.remove('show');document.getElementById('appRejectReason').value=''}\nfunction confirmReject(){\n  var reason = document.getElementById('appRejectReason').value.trim();\n  if(!reason){showToast('请填写拒绝原因');return}\n  closeReject();showToast('已拒绝任务');setTimeout(function(){navTo('taskList')},800);\n}\nfunction confirmTask(){showToast('确认成功');setTimeout(function(){navTo('taskList')},800);}\n\n// ===== Toast =====\nvar _toastTimer=null;\nfunction showToast(msg){\n  if(_toastTimer) clearTimeout(_toastTimer);\n  var el = document.getElementById('_toast');\n  if(!el){\n    el = document.createElement('div');\n    el.id='_toast';\n    el.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;padding:10px 20px;border-radius:8px;background:rgba(0,0,0,.75);color:#fff;font-size:14px;font-weight:500;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .3s ease';\n    document.body.appendChild(el);\n  }\n  el.textContent=msg;\n  el.style.opacity='1';\n  if(_toastTimer) clearTimeout(_toastTimer);\n  _toastTimer=setTimeout(function(){el.style.opacity='0'},1800);\n}\n\n// 审核弹窗\nfunction showAuditSheet(){\n  document.getElementById('appAuditOverlay').classList.add('show');\n}\nfunction closeAuditSheet(){\n  document.getElementById('appAuditOverlay').classList.remove('show');\n  document.getElementById('auditRejectReason').value='';\n  document.getElementById('auditRejectSection').style.display='none';\n  document.getElementById('auditCharCount').textContent='0';\n  var radios=document.querySelectorAll('input[name=\"auditResult\"]');\n  if(radios.length) radios[0].checked=true;\n}\nfunction submitAudit(){\n  var result=document.querySelector('input[name=\"auditResult\"]:checked');\n  if(!result){showToast('请选择审核结果');return;}\n  if(result.value==='reject'){\n    var reason=document.getElementById('auditRejectReason').value.trim();\n    if(!reason){showToast('请填写驳回原因');return;}\n  }\n  showToast('审核提交成功');\n  closeAuditSheet();\n}\n// radio联动驳回原因\nvar _auditRadioListener=function(e){\n  if(e.target.name==='auditResult'){\n    document.getElementById('auditRejectSection').style.display=e.target.value==='reject'?'block':'none';\n  }\n  if(e.target.id==='auditRejectReason'){\n    document.getElementById('auditCharCount').textContent=e.target.value.length;\n  }\n};\ndocument.addEventListener('change',_auditRadioListener);\ndocument.addEventListener('input',_auditRadioListener);\n\n// ===== 初始化 =====\nnavTo(getInitialPage());\n\nif (new URLSearchParams((window.__NAV_QUERY__!==undefined?window.__NAV_QUERY__:window.location.search)).get('embedded') === '1') {\n  document.body.classList.add('embedded-mode');\n}\n<\/script>\n<script>\n(function(){\nwindow.__MERGED_NAVIGATE__=function(t){\n  if(window.parent&&window.parent.__MERGED_NAVIGATE__){window.parent.__MERGED_NAVIGATE__(t)}\n  else if(window.frameElement&&parent.__MERGED_GET_HTML__){\n    window.frameElement.setAttribute('data-merged-src',t);\n    window.frameElement.srcdoc=parent.__MERGED_GET_HTML__(t);\n  }\n};\ndocument.addEventListener('click',function(e){\n  var a=e.target.closest?e.target.closest('a[href]'):null;\n  if(!a){var el=e.target;while(el&&el.tagName!=='A')el=el.parentNode;a=el}\n  if(a&&a.tagName==='A'){\n    var h=a.getAttribute('href');\n    if(h&&/^\\.{0,2}\\/[^?#]+\\.html(?:[?#].*)?$/i.test(h)){\n      e.preventDefault();\n      window.__MERGED_NAVIGATE__(h);\n    }\n  }\n},true);\n(function(){\n  var f=document.querySelectorAll('iframe');\n  f.forEach(function(fr){\n    var t=fr.getAttribute('data-merged-src')||fr.getAttribute('src');\n    if(t&&t.indexOf('.html')>=0&&parent&&parent.__MERGED_GET_HTML__){\n      fr.setAttribute('data-merged-src',t);\n      fr.srcdoc=parent.__MERGED_GET_HTML__(t);\n    }\n  });\n})();\n})();<\\/script>\n<\/body>\n<\/html>\n"}};

var ENTRY = 'expert-app-preview';

var frame = document.getElementById('frame');

function getHtml(target, search) {
  search = search || '';
  var key = (ALIAS[target] || target).replace(/\.html$/, '');
  var p = PAGES[key];
  if (!p) { key = ENTRY; p = PAGES[key]; }
  var html = p.html;
  if (search) {
    var s = '<script>window.__NAV_QUERY="' + search.replace(/"/g,'&quot;') + '";' +
      '(function(){try{var d=Object.getOwnPropertyDescriptor(window.Location.prototype,"search");' +

      '}catch(e){}})();' +

  return html;
}

function getDataUrl(target, search) {
  var aliasTarget = ALIAS[target] || target;
  var html = getHtml(aliasTarget, search);
  var bytes = [];
  for (var i = 0; i < html.length; i++) {
    var c = html.charCodeAt(i);
    if (c < 128) bytes.push(c);
    else if (c < 2048) bytes.push(192 | (c >> 6), 128 | (c & 63));
    else bytes.push(224 | (c >> 12), 128 | ((c >> 6) & 63), 128 | (c & 63));
  }
  var binary = '';
  for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]);
  return 'data:text/html;charset=utf-8;base64,' + btoa(binary);
}

function navigate(href) {
  var parts = href.split('?');
  var file = parts[0].replace(/^\.\//, '');
  var id = file.replace(/\.html$/, '');
  var search = parts[1] || '';

  if (!PAGES[id]) {
    var found = Object.keys(PAGES).find(function(k) { return PAGES[k].file === file; });
    if (!found) return;
    id = found;
  }

  var p = PAGES[id];
  if (!p) return;

  history.replaceState(null, '', '#/' + id + (search ? '?' + search : ''));
  frame.srcdoc = getHtml(p.file, search);
}

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'navigate') navigate(e.data.url);
