<script>
var PAGES = {"expert-app-preview":{"title":"专家App预览","file":"expert-app-preview.html","html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>App 预览 / 专家首页入口<\/title>\n    <style data-src=\"../../shared/styles/shared.css\">\n/**\n * shared.css — 公共样式\n *\n * 适用于所有原型模块的通用样式，包括：\n *   CSS 变量、重置、布局骨架（topbar/sidebar/main）、\n *   通用组件（card/btn/table/pagination/status-tag 等）。\n *\n * ⚠️ 不包含：\n *   - 页面特定样式（body[data-page=\"...\"] 选择器）\n *   - 弹窗样式（site-modal-* / expert-modal-*）\n *   - 业务专属样式（.rule-* / .dept-* / .pool-* / .expert-* / .create-*）\n *\n * 用法：<link rel=\"stylesheet\" href=\"../../shared/styles/shared.css\">\n */\n\n:root {\n  --primary: #4c78f5;\n  --primary-dark: #4e7cf0;\n  --bg: #f3f6fa;\n  --card: #ffffff;\n  --border: #e8ecf1;\n  --text: #2c3e50;\n  --muted: #8c95a6;\n  --success: #389e0d;\n  --warning: #d48806;\n  --danger: #ff4d4f;\n  --shadow: 0 1px 4px rgba(0, 0, 0, 0.04);\n}\n\n* {\n  box-sizing: border-box;\n}\n\nhtml,\nbody {\n  margin: 0;\n  min-width: 1440px;\n  font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", \"PingFang SC\",\n    \"Hiragino Sans GB\", \"Microsoft YaHei\", \"Helvetica Neue\", Helvetica, Arial,\n    sans-serif;\n  background: var(--bg);\n  color: var(--text);\n  font-size: 14px;\n}\n\na {\n  color: inherit;\n  text-decoration: none;\n}\n\nbutton,\ninput,\nselect,\ntextarea {\n  font: inherit;\n}\n\n/* ── 布局骨架 ── */\n\n.layout {\n  min-height: 100vh;\n}\n\n.topbar {\n  height: 56px;\n  background: linear-gradient(135deg, #4c78f5 0%, #4e7cf0 100%);\n  color: #fff;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 0 20px 0 24px;\n  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);\n}\n\n.brand {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  font-size: 16px;\n  font-weight: 700;\n}\n\n.brand-badge {\n  width: 36px;\n  height: 36px;\n  border-radius: 8px;\n  background: rgba(255, 255, 255, 0.18);\n  display: grid;\n  place-items: center;\n  font-size: 20px;\n}\n\n.top-actions {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  font-size: 12px;\n  font-weight: 500;\n}\n\n.switch-group {\n  display: inline-flex;\n  border: 1px solid rgba(255, 255, 255, 0.2);\n  border-radius: 6px;\n  overflow: hidden;\n}\n\n.switch-item {\n  padding: 5px 14px;\n  background: rgba(255, 255, 255, 0.12);\n  border-right: 1px solid rgba(255, 255, 255, 0.16);\n}\n\n.switch-item:last-child {\n  border-right: 0;\n}\n\n.chip {\n  padding: 4px 10px;\n  border-radius: 999px;\n  background: rgba(255, 255, 255, 0.12);\n}\n\n.chip.demo {\n  background: #ff9f1a;\n  color: #fff;\n  font-weight: 700;\n}\n\n.avatar {\n  width: 32px;\n  height: 32px;\n  border-radius: 50%;\n  background: rgba(255, 255, 255, 0.18);\n  display: grid;\n  place-items: center;\n}\n\n.body {\n  display: grid;\n  grid-template-columns: 220px minmax(0, 1fr);\n}\n\n.sidebar {\n  background: #fff;\n  border-right: 1px solid var(--border);\n  min-height: calc(100vh - 56px);\n}\n\n.menu-section {\n  padding: 20px 0 12px;\n}\n\n.menu-title {\n  padding: 0 20px 12px;\n  color: var(--muted);\n  font-size: 13px;\n  font-weight: 700;\n}\n\n.menu-item {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  padding: 14px 20px;\n  color: #53627b;\n  font-size: 14px;\n  font-weight: 500;\n  position: relative;\n}\n\n.menu-item.active {\n  background: rgba(78, 115, 248, 0.08);\n  color: var(--primary);\n}\n\n.menu-item.active::before {\n  content: \"\";\n  position: absolute;\n  left: 0;\n  top: 0;\n  bottom: 0;\n  width: 4px;\n  background: var(--primary);\n}\n\n.menu-icon {\n  width: 18px;\n  text-align: center;\n  font-size: 15px;\n}\n\n.menu-count {\n  margin-left: auto;\n  min-width: 22px;\n  height: 22px;\n  border-radius: 999px;\n  padding: 0 6px;\n  display: grid;\n  place-items: center;\n  background: #f45c57;\n  color: #fff;\n  font-size: 12px;\n  font-weight: 700;\n}\n\n.main {\n  padding: 20px 20px 24px;\n}\n\n/* ── 面包屑 ── */\n\n.breadcrumb {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  font-size: 14px;\n  margin-bottom: 16px;\n}\n\n.breadcrumb a {\n  color: var(--primary);\n  font-weight: 700;\n}\n\n.breadcrumb span:last-child {\n  color: #7f8ca3;\n  font-weight: 700;\n}\n\n/* ── 卡片 ── */\n\n.card {\n  background: var(--card);\n  border: 1px solid var(--border);\n  border-radius: 8px;\n  box-shadow: var(--shadow);\n  margin-bottom: 16px;\n  overflow: hidden;\n}\n\n.card-header {\n  padding: 16px 20px;\n  border-bottom: 1px solid #edf1f7;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 16px;\n}\n\n.card-title {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  font-size: 15px;\n  font-weight: 600;\n  white-space: nowrap;\n}\n\n.count-pill {\n  padding: 5px 10px;\n  border-radius: 999px;\n  background: #f5f7fb;\n  color: var(--muted);\n  font-size: 12px;\n  font-weight: 500;\n}\n\n/* ── 工具栏 ── */\n\n.toolbar {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 18px;\n  flex-wrap: wrap;\n}\n\n.toolbar-note {\n  color: var(--muted);\n  font-size: 12px;\n  font-weight: 500;\n  display: flex;\n  gap: 18px;\n  align-items: center;\n  flex-wrap: wrap;\n}\n\n.toolbar-note .blue-dot,\n.toolbar-note .red-dot {\n  font-size: 12px;\n  margin-right: 4px;\n}\n\n.toolbar-note .blue-dot {\n  color: var(--primary);\n}\n\n.toolbar-note .red-dot {\n  color: var(--danger);\n}\n\n/* ── 按钮 ── */\n\n.btn-row {\n  display: flex;\n  gap: 12px;\n  align-items: center;\n}\n\n.btn {\n  border: 1px solid #d5deed;\n  background: #fff;\n  color: #46556e;\n  border-radius: 6px;\n  padding: 0 16px;\n  height: 36px;\n  font-weight: 500;\n  cursor: pointer;\n  white-space: nowrap;\n  transition: border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease,\n    background 0.2s ease;\n}\n\n.btn.primary {\n  background: var(--primary);\n  color: #fff;\n  border-color: var(--primary);\n}\n\n.btn.ghost {\n  background: #f8faff;\n}\n\n.btn:hover {\n  border-color: var(--primary);\n  color: var(--primary);\n}\n\n.btn.primary:hover {\n  color: #fff;\n  border-color: var(--primary-dark);\n  background: var(--primary-dark);\n}\n\n.btn.warn {\n  color: var(--warning);\n}\n\n.btn[disabled],\n.action-link.disabled {\n  color: #c4cddb;\n  border-color: #e5eaf2;\n  cursor: not-allowed;\n  pointer-events: none;\n}\n\n/* ── 卡片内容 ── */\n\n.card-body {\n  padding: 20px;\n}\n\n/* ── 筛选区 ── */\n\n.filter-grid {\n  display: grid;\n  grid-template-columns: repeat(3, minmax(260px, 1fr)) auto;\n  gap: 18px 28px;\n  align-items: end;\n}\n\n.field {\n  min-width: 0;\n}\n\n.field label {\n  display: block;\n  margin-bottom: 10px;\n  font-size: 13px;\n  font-weight: 500;\n  color: #7e8aa0;\n  white-space: nowrap;\n}\n\n/* ── 表单控件 ── */\n\n.control,\n.textarea {\n  width: 100%;\n  height: 36px;\n  border: 1px solid #d6ddea;\n  border-radius: 6px;\n  padding: 0 14px;\n  background: #fff;\n  color: #33425c;\n  transition: border-color 0.2s ease, box-shadow 0.2s ease;\n}\n\n.textarea {\n  min-height: 100px;\n  padding: 12px 14px;\n  resize: vertical;\n}\n\n.control:focus,\n.textarea:focus {\n  outline: none;\n  border-color: var(--primary);\n  box-shadow: 0 0 0 3px rgba(76, 120, 245, 0.1);\n}\n\n/* ── 表格 ── */\n\n.table-scroll {\n  overflow-x: auto;\n  padding-bottom: 8px;\n}\n\n.table-scroll::-webkit-scrollbar {\n  height: 10px;\n}\n\n.table-scroll::-webkit-scrollbar-thumb {\n  background: #c7ccd6;\n  border-radius: 999px;\n}\n\ntable {\n  width: 100%;\n  min-width: 1560px;\n  border-collapse: collapse;\n  table-layout: fixed;\n}\n\nth,\ntd {\n  padding: 14px 16px;\n  border-bottom: 1px solid #edf1f7;\n  text-align: left;\n  white-space: nowrap;\n  color: #495870;\n  font-weight: 400;\n}\n\nth {\n  color: var(--muted);\n  background: #fafbfc;\n  font-weight: 500;\n}\n\ntd strong {\n  color: var(--text);\n}\n\ntbody tr:hover {\n  background: #f8faff;\n}\n\n/* ── 状态标签 ── */\n\n.status-tag {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  min-width: 72px;\n  height: 32px;\n  padding: 0 12px;\n  border-radius: 6px;\n  font-size: 13px;\n  font-weight: 500;\n}\n\n.status-draft {\n  background: #fff5df;\n  color: #d48806;\n}\n\n.status-pending {\n  background: #fff7e8;\n  color: #d38b08;\n}\n\n.status-progress {\n  background: #e8efff;\n  color: var(--primary);\n}\n\n.status-finished,\n.status-done {\n  background: #f2f4f8;\n  color: #78849b;\n}\n\n.status-overdue {\n  background: #fff0f0;\n  color: var(--danger);\n}\n\n/* ── 操作链接 ── */\n\n.action-row {\n  display: flex;\n  align-items: center;\n  gap: 18px;\n}\n\n.action-link {\n  color: var(--primary);\n  font-weight: 500;\n}\n\n.action-link.danger {\n  color: var(--danger);\n}\n\n.muted {\n  color: #9ca9bd;\n}\n\n/* ── 分页 ── */\n\n.pagination {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 16px;\n  padding: 16px 20px 20px;\n}\n\n.page-box {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n}\n\n.page-btn,\n.page-number {\n  width: 42px;\n  height: 42px;\n  border-radius: 6px;\n  border: 1px solid #d8dfec;\n  background: #fff;\n  color: #9ea9bc;\n  display: grid;\n  place-items: center;\n  font-weight: 700;\n}\n\n.page-number.active {\n  background: var(--primary);\n  color: #fff;\n  border-color: var(--primary);\n}\n\n/* ── 栅格 & 统计卡片 ── */\n\n.grid-2,\n.grid-3,\n.grid-4 {\n  display: grid;\n  gap: 18px;\n}\n\n.grid-2 {\n  grid-template-columns: repeat(2, minmax(0, 1fr));\n}\n\n.grid-3 {\n  grid-template-columns: repeat(3, minmax(0, 1fr));\n}\n\n.grid-4 {\n  grid-template-columns: repeat(4, minmax(0, 1fr));\n}\n\n.stat-grid {\n  display: grid;\n  grid-template-columns: repeat(4, minmax(0, 1fr));\n  gap: 18px;\n}\n\n.stat-card {\n  background: linear-gradient(180deg, #f8faff 0%, #ffffff 100%);\n  border: 1px solid #ebf0fa;\n  border-radius: 8px;\n  padding: 18px 20px;\n}\n\n.stat-label {\n  font-size: 14px;\n  color: #8a96ab;\n  font-weight: 700;\n  margin-bottom: 10px;\n}\n\n.stat-value {\n  font-size: 28px;\n  font-weight: 800;\n  color: #23314a;\n}\n\n/* ── 描述列表 ── */\n\n.desc-list {\n  display: grid;\n  grid-template-columns: repeat(2, minmax(0, 1fr));\n  border: 1px solid #edf1f7;\n  border-radius: 8px;\n  overflow: hidden;\n}\n\n.desc-item {\n  display: grid;\n  grid-template-columns: 150px minmax(0, 1fr);\n  min-height: 54px;\n  border-bottom: 1px solid #edf1f7;\n}\n\n.desc-item:nth-last-child(-n + 2) {\n  border-bottom: 0;\n}\n\n.desc-item.full {\n  grid-column: 1 / -1;\n}\n\n.desc-label,\n.desc-value {\n  padding: 14px 16px;\n  white-space: nowrap;\n}\n\n.desc-label {\n  background: #fafcff;\n  color: #8b98ad;\n  font-weight: 700;\n  border-right: 1px solid #edf1f7;\n}\n\n.desc-value {\n  overflow: hidden;\n  text-overflow: ellipsis;\n  font-weight: 700;\n}\n\n/* ── 步骤条 ── */\n\n.step-list {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  flex-wrap: wrap;\n}\n\n.step-item {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  color: #6b7890;\n  font-weight: 700;\n}\n\n.step-dot {\n  width: 28px;\n  height: 28px;\n  border-radius: 50%;\n  display: grid;\n  place-items: center;\n  background: #e9eef8;\n  color: #7081a0;\n}\n\n.step-item.active .step-dot {\n  background: var(--primary);\n  color: #fff;\n}\n\n.step-arrow {\n  color: #b6c0d1;\n}\n\n/* ── 高亮面板 & 提示框 ── */\n\n.highlight-panel {\n  background: linear-gradient(135deg, #f4f8ff 0%, #ffffff 100%);\n  border: 1px solid #e5edff;\n  border-radius: 8px;\n  padding: 22px 24px;\n}\n\n.notice-box {\n  padding: 14px 16px;\n  border-radius: 8px;\n  background: #fff8e8;\n  color: #9a6b00;\n  font-weight: 700;\n}\n\n/* ── 导航卡片 ── */\n\n.card-link-grid {\n  display: grid;\n  grid-template-columns: repeat(3, minmax(0, 1fr));\n  gap: 18px;\n}\n\n.nav-card {\n  background: #fff;\n  border: 1px solid #e7edf8;\n  border-radius: 8px;\n  padding: 22px;\n  box-shadow: var(--shadow);\n}\n\n.nav-card h3 {\n  margin: 0 0 10px;\n  font-size: 18px;\n}\n\n.nav-card p {\n  margin: 0 0 18px;\n  color: #8794aa;\n  line-height: 1.6;\n  min-height: 44px;\n}\n\n/* ── 信息横幅 & Toast & 页脚 ── */\n\n.info-banner {\n  background: linear-gradient(90deg, #eff4ff 0%, #ffffff 100%);\n  border: 1px solid #e1eaff;\n  border-radius: 8px;\n  padding: 24px 26px;\n  margin-bottom: 22px;\n}\n\n.toast {\n  position: fixed;\n  top: 20px;\n  left: 50%;\n  transform: translateX(-50%);\n  z-index: 1000;\n  min-width: 240px;\n  max-width: 420px;\n  padding: 10px 16px;\n  border-radius: 8px;\n  color: #fff;\n  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);\n}\n\n.toast.success {\n  background: var(--success);\n}\n\n.toast.info {\n  background: var(--primary);\n}\n\n.toast.warning {\n  background: var(--warning);\n}\n\n.info-banner h2 {\n  margin: 0 0 10px;\n  font-size: 28px;\n}\n\n.info-banner p {\n  margin: 0;\n  color: #74839b;\n  font-weight: 700;\n}\n\n.footer-note {\n  color: #95a2b7;\n  font-size: 14px;\n  font-weight: 700;\n}\n\n/* ── 响应式 ── */\n\n@media (max-width: 1600px) {\n  .filter-grid {\n    grid-template-columns: repeat(2, minmax(260px, 1fr));\n  }\n}\n\n<\/style>\n    <style data-src=\"../../shared/styles/app-phone.css\">\n/* app-phone.css — 专家App手机壳样式组件 */\n/* 来源: expert-app-standalone.html (原 area_checker_static/styles/app.css) */\n\n/* ===== 专家App演示稿 — 手机壳 ===== */\n.app-demo-layout{display:flex;gap:32px;height:100%;padding:24px;align-items:flex-start}\n.app-phone-shell{width:392px;min-width:392px;height:824px;background:linear-gradient(180deg,#3e434d 0%,#12151b 100%);border-radius:44px;padding:9px;box-shadow:0 18px 48px rgba(15,23,42,.24),0 6px 16px rgba(15,23,42,.12),inset 0 0 0 1px rgba(255,255,255,.14);position:relative;flex-shrink:0}\n.app-phone-shell::before{content:'';position:absolute;inset:5px;border-radius:42px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);pointer-events:none}\n.app-phone-shell::after{content:'';position:absolute;right:-4px;top:152px;width:4px;height:64px;border-radius:2px;background:linear-gradient(180deg,#59606d 0%,#2f3440 100%);box-shadow:0 96px 0 0 rgba(60,65,76,.95)}\n.app-phone-screen{width:100%;height:100%;background:#f6f7fb;border-radius:35px;overflow:hidden;position:relative;box-shadow:inset 0 0 0 1px rgba(255,255,255,.68)}\n.app-phone-screen::after{content:'';position:absolute;left:50%;bottom:9px;transform:translateX(-50%);width:136px;height:5px;border-radius:999px;background:rgba(17,24,39,.18);z-index:12}\n.app-phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:198px;height:34px;background:#15181f;border-radius:0 0 22px 22px;z-index:10;box-shadow:0 8px 18px rgba(0,0,0,.12)}\n.app-phone-notch::before{content:'';position:absolute;left:50%;top:16px;transform:translateX(-50%);width:72px;height:7px;border-radius:999px;background:rgba(255,255,255,.12)}\n.app-phone-notch::after{content:'';position:absolute;right:32px;top:13px;width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.3),rgba(255,255,255,.05) 55%,rgba(0,0,0,.35) 100%)}\n.app-phone-statusbar{height:52px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:14px 20px 0;font-size:12px;color:#1f2937;font-weight:700;position:relative;z-index:5}\n.app-phone-statusbar::before{content:'9:41';letter-spacing:.2px}\n.app-phone-statusbar::after{content:'100%';letter-spacing:.2px}\n.app-page{position:absolute;top:52px;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;background:#f6f7fb;-webkit-overflow-scrolling:touch}\n.app-page.hidden{display:none}\n\n/* ===== 导航栏 ===== */\n.app-nav-bar{position:sticky;top:0;z-index:5;background:#fff;display:flex;align-items:center;height:60px;padding:8px 16px 6px}\n.app-nav-bar .back-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#52607a;font-size:22px;border-radius:16px}\n.app-nav-bar .nav-title{flex:1;text-align:center;font-size:17px;font-weight:700;color:#1f2b3d;margin-right:32px;letter-spacing:.2px}\n\n/* ===== 搜索栏 ===== */\n.app-search-bar{padding:10px 16px 4px;position:relative}\n.app-search-bar::before{content:'⌕';position:absolute;left:31px;top:26px;transform:translateY(-50%);font-size:15px;color:#b8bfcb;pointer-events:none}\n.app-search-bar input{width:100%;height:44px;border-radius:16px;border:none;padding:0 16px 0 38px;font-size:15px;color:#2c3e50;background:#eef0f6;outline:none;box-shadow:inset 0 0 0 1px rgba(233,236,243,.7)}\n.app-search-bar input::placeholder{color:#aab2bf}\n\n/* ===== 段式切换器 ===== */\n.app-segment{display:flex;gap:8px;padding:4px 16px 6px}\n.app-segment-item{flex:1;text-align:center;padding:8px 0;border-radius:12px;font-size:13px;color:#7b8797;cursor:pointer;transition:all .2s;background:#edf1f7;font-weight:600}\n.app-segment-item.active{color:#1677ff;background:#e8f1ff;box-shadow:inset 0 0 0 1px rgba(22,119,255,.12)}\n\n/* ===== 任务卡片 ===== */\n.app-task-card{background:#fff;margin:8px 16px;border-radius:18px;padding:14px 14px 0;border:none;box-shadow:0 6px 18px rgba(31,41,55,.07);cursor:pointer;overflow:hidden}\n.app-task-card .card-hd{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:10px}\n.app-task-card .card-hd .t-name{font-size:16px;font-weight:700;color:#23324a;flex:1;line-height:1.4}\n.app-task-card .card-hd .t-status{font-size:12px;padding:5px 10px;border-radius:13px;white-space:nowrap;font-weight:600}\n.app-task-card .card-info{display:flex;align-items:center;gap:8px;font-size:12px;color:#738198;margin-top:6px;line-height:20px}\n.app-task-card .card-info .label{color:#738198;font-weight:600}\n.app-task-card .card-info .value{color:#556277}\n.app-task-card .card-progress{height:8px;background:#dfe4ec;border-radius:999px;overflow:hidden;margin:6px 0 10px}\n.app-task-card .card-progress-fill{height:100%;background:linear-gradient(90deg,#5c8dff 0%,#4b7cf4 100%);border-radius:999px}\n.app-task-card .card-ft{display:flex;justify-content:center;alig ing: 5px 14px;\n  background: rgba(255, 255, 255, 0.12);\n  border-right: 1px solid rgba(255, 255, 255, 0.16);\n}\n\n.switch-item:last-child {\n  border-right: 0;\n}\n\n.chip {\n  padding: 4px 10px;\n  border-radius: 999px;\n  background: rgba(255, 255, 255, 0.12);\n}\n\n.chip.demo {\n  background: #ff9f1a;\n  color: #fff;\n  font-weight: 700;\n}\n\n.avatar {\n  width: 32px;\n  height: 32px;\n  border-radius: 50%;\n  background: rgba(255, 255, 255, 0.18);\n  display: grid;\n  place-items: center;\n}\n\n.body {\n  display: grid;\n  grid-template-columns: 220px minmax(0, 1fr);\n}\n\n.sidebar {\n  background: #fff;\n  border-right: 1px solid var(--border);\n  min-height: calc(100vh - 56px);\n}\n\n.menu-section {\n  padding: 20px 0 12px;\n}\n\n.menu-title {\n  padding: 0 20px 12px;\n  color: var(--muted);\n  font-size: 13px;\n  font-weight: 700;\n}\n\n.menu-item {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  padding: 14px 20px;\n  color: #53627b;\n  font-size: 14px;\n  font-weight: 500;\n  position: relative;\n}\n\n.menu-item.active {\n  background: rgba(78, 115, 248, 0.08);\n  color: var(--primary);\n}\n\n.menu-item.active::before {\n  content: \"\";\n  position: absolute;\n  left: 0;\n  top: 0;\n  bottom: 0;\n  width: 4px;\n  background: var(--primary);\n}\n\n.menu-icon {\n  width: 18px;\n  text-align: center;\n  font-size: 15px;\n}\n\n.menu-count {\n  margin-left: auto;\n  min-width: 22px;\n  height: 22px;\n  border-radius: 999px;\n  padding: 0 6px;\n  display: grid;\n  place-items: center;\n  background: #f45c57;\n  color: #fff;\n  font-size: 12px;\n  font-weight: 700;\n}\n\n.main {\n  padding: 20px 20px 24px;\n}\n\n.breadcrumb {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  font-size: 14px;\n  margin-bottom: 16px;\n}\n\n.breadcrumb a {\n  color: var(--primary);\n  font-weight: 700;\n}\n\n.breadcrumb span:last-child {\n  color: #7f8ca3;\n  font-weight: 700;\n}\n\n.card {\n  background: var(--card);\n  border: 1px solid var(--border);\n  bor x;\n  border-bottom: 1px solid #f0f2f5;\n  white-space: nowrap;\n}\n\n.expert-modal-table-wrap tbody tr:hover {\n  background: #f8faff;\n}\n\n.expert-modal-table-wrap .empty-cell {\n  text-align: center;\n  color: var(--muted);\n  padding: 40px 16px !important;\n  font-size: 14px;\n}\n\n.expert-modal-footer {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 12px 24px;\n  border-top: 1px solid var(--border);\n  flex-shrink: 0;\n}\n\n.expert-modal-footer-count {\n  font-size: 13px;\n  color: #5a6b85;\n}\n\n.expert-modal-footer-actions {\n  display: flex;\n  gap: 8px;\n}\n\n.expert-modal-footer-actions .btn[disabled] {\n  opacity: 0.45;\n  cursor: not-allowed;\n}\n\n<\/style>\n  <style>\n    /* 预约页面内无额外样式，所有样式在 page module 中内联 */\n  <\/style>\n<\/head>\n<body data-page=\"expert-app-preview\">\n  <div id=\"app\"><\/div>\n\n  <script data-src=\"../../shared/utils/helpers.js\">\n/**\n * helpers.js — 公共工具函数\n *\n * 适用于所有原型模块的通用 JS 工具，包括：\n *   showToast  — 全局提示\n *   getQueryParam — URL 查询参数读取\n *   $          — document.getElementById 简写\n *   $on        — addEventListener 简写（含空值检查）\n *\n * ⚠️ 不依赖任何其他 JS 文件，不使用 ES Module。\n *\n * 用法：<script src=\"../../shared/utils/helpers.js\"><\\/script>\n *       然后通过 window.SharedUtils.showToast(...) 调用。\n */\n\n(function () {\n  \"use strict\";\n\n  /**\n   * 显示全局 Toast 提示\n   *\n   * @param {string} message - 提示文本\n   * @param {\"success\"|\"info\"|\"warning\"} [type=\"info\"] - 提示类型，对应不同背景色\n   */\n  function showToast(message, type) {\n    var existing = document.querySelector(\".toast\");\n    if (existing) existing.remove();\n\n    var toast = document.createElement(\"div\");\n    toast.className = \"toast \" + (type || \"info\");\n    toast.textContent = message;\n    document.body.appendChild(toast);\n\n    setTimeout(function () {\n      toast.remove();\n    }, 2500);\n  }\n\n  /**\n   * 读取当前页面 URL 的查询参数\n   *\n   * @param {string} key - 参数名\n   * @returns {string|null} 参数值，不存在时返回 null\n   */\n  function getQueryParam(key) {\n    return new URLSearchParams((window.__NAV_QUERY__!==undefined?window.__NAV_QUERY__:window.location.search)).get(key);\n  }\n\n  /**\n   * document.getElementById 简写\n   *\n   * @param {string} id - 元素 ID\n   * @returns {HTMLElement|null}\n   */\n  function $(id) {\n    return document.getElementById(id);\n  }\n\n  /**\n   * addEventListener 简写，自动做空值检查\n   *\n   * @param {string} id - 元素 ID\n   * @param {string} event - 事件名（如 \"click\"）\n   * @param {Function} handler - 事件处理函数\n   */\n  function $on(id, event, handler) {\n    var el = document.getElementById(id);\n    if (el) el.addEventListener(event, handler);\n  }\n\n  /**\n   * 计算实测复核误差标识\n   *\n   * 规则：\n   *   ≤500㎡       相对误差 ≤ ±3%\n   *   500~2000㎡   相对误差 ≤ ±2%\n   *   >2000㎡      绝对误差 ≤ ±60㎡\n   *\n   * @param {number} originalArea - 普查原面积（㎡）\n   * @param {number} recheckArea  - 复查面积（㎡）\n   * @returns {{ diff: number, relError: string, isOverLimit: boolean, rule: string, diffAbs: number }}\n   */\n  function calcTolerance(originalArea, recheckArea) {\n    if (!originalArea || !recheckArea) return null;\n    var diff = recheckArea - originalArea;\n    var absDiff = Math.abs(diff);\n    var relPct = diff / originalArea * 100;\n\n    var maxRelError, maxAbsError, rule;\n    if (originalArea <= 500) {\n      maxRelError = 3;\n      maxAbsError = originalArea * 0.03;\n      rule = '≤500㎡：相对误差≤±3%';\n    } else if (originalArea <= 2000) {\n      maxRelError = 2;\n      maxAbsError = originalArea * 0.02;\n      rule = '500~2000㎡：相对误差≤±2%';\n    } else {\n      maxAbsError = 60;\n      maxRelError = 60 / originalArea * 100;\n      rule = '>2000㎡：绝对误差≤±60㎡';\n    }\n\n    var isOverLimit;\n    if (originalArea > 2000) {\n      isOverLimit = absDiff > maxAbsError;\n    } else {\n      isOverLimit = Math.abs(relPct) > maxRelError;\n    }\n\n    return {\n      diff: diff,\n      diffAbs: absDiff,\n      relError: relPct,\n      relErrorDisplay: (relPct >= 0 ? '+' : '') + relPct.toFixed(2) + '%',\n      isOverLimit: isOverLimit,\n      maxRelError: maxRelError,\n      maxAbsError: maxAbsError,\n      rule: rule\n    };\n  }\n\n  /* ── 暴露到全局 ── */\n  window.SharedUtils = {\n    showToast: showToast,\n    getQueryParam: getQueryParam,\n    $: $,\n    $on: $on,\n    calcTolerance: calcTolerance\n  };\n})();\n\n<\/script>\n  <script data-src=\"../../shared/components/Layout/layout.js\">\n/**\n * layout.js — 共享 Layout 组件\n *\n * 从原始 components.js 的 renderShell / renderBreadcrumb / menuItem 提取而来，\n * 去除所有硬编码业务数据，全部通过 props 传入。\n *\n * 依赖：无（不依赖 window.AppConfig 或 window.AppComponents）\n * 暴露：window.SharedLayout.render(props) → HTML string\n */\n(function () {\n  /**\n   * @typedef {Object} BrandConfig\n   * @property {string} badge   - 顶栏品牌徽章文字（如 \"面\"）\n   * @property {string} title   - 顶栏品牌标题（如 \"面积检查业务受理中心\"）\n   */\n\n  /**\n   * @typedef {Object} UserConfig\n   * @property {string} role    - 用户角色（如 \"业务管理员\"）\n   * @property {string} demo    - DEMO 标签文字（如 \"DEMO\"），为空则不渲染\n   * @property {string} avatar  - 头像文字（如 \"张\"）\n   * @property {string} name    - 用户姓名（如 \"张建国\"）\n   */\n\n  /**\n   * @typedef {Object} SwitchItem\n   * @property {string} label - 切换项文字（如 \"PC端\"、\"App端\"）\n   */\n\n  /**\n   * @typedef {Object} MenuItem\n   * @property {string} href  - 链接地址\n   * @property {string} key   - 菜单项唯一标识，用于高亮判断\n   * @property {string} icon  - 菜单图标（HTML 字符串）\n   * @property {string} label - 菜单项文字\n   * @property {string|number} [count] - 右侧计数，为空则不渲染\n   */\n\n  /**\n   * @typedef {Object} MenuSection\n   * @property {string} title      - 菜单分区标题\n   * @property {MenuItem[]} items  - 该分区下的菜单项列表\n   */\n\n  /**\n   * @typedef {Object} LayoutProps\n   * @property {BrandConfig}   brand        - 顶栏品牌区域配置\n   * @property {UserConfig}    user         - 顶栏用户区域配置\n   * @property {SwitchItem[]}  switchGroup  - PC/App 切换组\n   * @property {MenuSection[]} menuConfig   - 侧边栏菜单配置\n   * @property {string}        currentPage  - 当前页面标识\n   * @property {string}        currentMenu  - 当前菜单项标识，用于高亮\n   * @property {string[]}      breadcrumb   - 面包屑文字数组\n   * @property {string}        content      - 主内容区 HTML 字符串\n   */\n\n  /**\n   * 渲染面包屑\n   * @param {string[]} items - 面包屑文字数组\n   * @returns {string} 面包屑 HTML\n   */\n  function renderBreadcrumb(items) {\n    return '<div class=\"breadcrumb\">' +\n      items.map(function (item, idx) {\n        if (idx === 0) {\n          return '<a href=\"./index.html\">' + item + '<\/a>';\n        }\n        return '<span>' + item + '<\/span>';\n      }).join('<span>/<\/span>') +\n      '<\/div>';\n  }\n\n  /**\n   * 渲染单个菜单项\n   * @param {string} href   - 链接地址\n   * @param {string} key    - 菜单项标识\n   * @param {string} icon   - 图标 HTML\n   * @param {string} label  - 菜单文字\n   * @param {string|number} [count] - 计数\n   * @param {string} currentMenu - 当前激活菜单标识\n   * @returns {string} 菜单项 HTML\n   */\n  function menuItem(href, key, icon, label, count, currentMenu) {\n    return '<a class=\"menu-item ' + (currentMenu === key ? 'active' : '') + '\" href=\"' + href + '\">' +\n      '<span class=\"menu-icon\">' + icon + '<\/span>' +\n      '<span>' + label + '<\/span>' +\n      (count ? '<span class=\"menu-count\">' + count + '<\/span>' : '') +\n      '<\/a>';\n  }\n\n  /**\n   * 渲染完整页面布局\n   * @param {LayoutProps} props - 布局属性\n   * @returns {string} 完整布局 HTML 字符串\n   */\n  function render(props) {\n    var brand = props.brand;\n    var user = props.user;\n    var switchGroup = props.switchGroup;\n    var menuConfig = props.menuConfig;\n    var currentMenu = props.currentMenu;\n    var breadcrumb = props.breadcrumb;\n    var content = props.content;\n\n    // 渲染侧边栏菜单\n    var menuHTML = menuConfig.map(function (section) {\n      var itemsHTML = section.items.map(function (item) {\n        return menuItem(item.href, item.key, item.icon, item.label, item.count, currentMenu);\n      }).join('\\n');\n      return '<div class=\"menu-section\">' +\n        '<div class=\"menu-title\">' + section.title + '<\/div>' +\n        itemsHTML +\n        '<\/div>';\n    }).join('\\n');\n\n    // 渲染切换组\n    var switchHTML = switchGroup.map(function (item) {\n      return '<div class=\"switch-item\">' + item.label + '<\/div>';\n    }).join('\\n');\n\n    // 渲染用户区域\n    var userHTML = '<div>角色：<\/div>' +\n      '<div class=\"chip\">' + user.role + '<\/div>' +\n      (user.demo ? '<div class=\"chip demo\">' + user.demo + '<\/div>' : '') +\n      '<div class=\"avatar\">' + user.avatar + '<\/div>' +\n      '<div>' + user.name + '<\/div>';\n\n    return '<div class=\"layout\">' +\n      '<header class=\"topbar\">' +\n        '<div class=\"brand\">' +\n          '<div class=\"brand-badge\">' + brand.badge + '<\/div>' +\n          '<div>' + brand.title + '<\/div>' +\n        '<\/div>' +\n        '<div class=\"top-actions\">' +\n          '<div class=\"switch-group\">' + switchHTML + '<\/div>' +\n          userHTML +\n        '<\/div>' +\n      '<\/header>' +\n      '<div class=\"body\">' +\n        '<aside class=\"sidebar\">' + menuHTML + '<\/aside>' +\n        '<main class=\"main\">' +\n          renderBreadcrumb(breadcrumb) +\n          content +\n        '<\/main>' +\n      '<\/div>' +\n    '<\/div>';\n  }\n\n  window.SharedLayout = { render: render };\n})();\n\n<\/script>\n  <script data-src=\"../../shared/components/Table/table.js\">\n/**\n * table.js — 共享 Table 组件\n *\n * 从原始 app.js 的 renderTaskRows / fillSiteTable / renderModalRows / renderExpertModalRows\n * 提取而来，去除所有硬编码业务数据，全部通过 props 传入。\n *\n * 依赖：无（不依赖 window.AppConfig 或 window.AppComponents）\n * 暴露：window.SharedTable.render(props)          → 完整表格 HTML（含滚动容器 + 分页）\n *       window.SharedTable.renderRows(props)       → 仅 tbody innerHTML（用于动态更新）\n *       window.SharedTable.renderPagination(props) → 分页 HTML\n */\n(function () {\n\n  /**\n   * @typedef {Object} ColumnDef\n   * @property {string}   key    - 数据字段名，用于从 row 对象取值\n   * @property {string}   label  - 表头显示文字\n   * @property {string}   [width] - 列宽（如 \"64px\"），生成 th 的 inline style\n   * @property {string}   [align] - 对齐方式（如 \"center\"、\"right\"），生成 td 的 inline style\n   * @property {Function} [render] - 自定义单元格渲染函数 (value, row, rowIndex) → HTML string\n   */\n\n  /**\n   * @typedef {Object} PaginationInfo\n   * @property {number} current  - 当前页码（从 1 开始）\n   * @property {number} total    - 总条数\n   * @property {number} pageSize - 每页条数\n   */\n\n  /**\n   * @typedef {Object} TableProps\n   * @property {ColumnDef[]}    columns          - 列定义数组\n   * @property {Object[]}       data             - 行数据数组\n   * @property {string}         [emptyText]      - 无数据时的提示文字，默认 \"暂无数据\"\n   * @property {boolean}        [showIndex]      - 是否显示序号列，默认 false\n   * @property {PaginationInfo} [pagination]     - 分页信息，不传则不渲染分页\n   * @property {boolean}        [stickyLastColumn] - 是否固定最后一列，默认 false\n   * @property {string}         [minWidth]       - 表格最小宽度，默认 \"1560px\"\n   */\n\n  /**\n   * 转义 HTML 特殊字符，防止 XSS\n   * @param {string} str - 原始字符串\n   * @returns {string} 转义后的字符串\n   */\n  function escapeHTML(str) {\n    if (str == null) return '';\n    return String(str)\n      .replace(/&/g, '&amp;')\n      .replace(/<\/g, '&lt;')\n      .replace(/>/g, '&gt;')\n      .replace(/\"/g, '&quot;')\n      .replace(/'/g, '&#39;');\n  }\n\n  /**\n   * 渲染表头\n   * @param {ColumnDef[]} columns - 列定义\n   * @param {boolean}     showIndex - 是否显示序号列\n   * @returns {string} thead HTML\n   */\n  function renderHead(columns, showIndex) {\n    var ths = [];\n    if (showIndex) {\n      ths.push('<th style=\"width:64px;\">序号<\/th>');\n    }\n    for (var i = 0; i < columns.length; i++) {\n      var col = columns[i];\n      var style = col.width ? ' style=\"width:' + col.width + ';\"' : '';\n      ths.push('<th' + style + '>' + escapeHTML(col.label) + '<\/th>');\n    }\n    return '<thead><tr>' + ths.join('') + '<\/tr><\/thead>';\n  }\n\n  /**\n   * 渲染单个单元格\n   * @param {ColumnDef} col      - 列定义\n   * @param {Object}    row      - 行数据\n   * @param {number}    rowIndex - 行索引\n   * @returns {string} td HTML\n   */\n  function renderCell(col, row, rowIndex) {\n    var value = row[col.key];\n    var content;\n    if (typeof col.render === 'function') {\n      content = col.render(value, row, rowIndex);\n    } else {\n      content = escapeHTML(value);\n    }\n    var style = '';\n    if (col.align) {\n      style = ' style=\"text-align:' + col.align + ';\"';\n    }\n    return '<td' + style + '>' + content + '<\/td>';\n  }\n\n  /**\n   * 渲染表格行（tbody innerHTML）\n   * @param {TableProps} props - 表格属性\n   * @returns {string} tbody 内部 HTML\n   */\n  function renderRows(props) {\n    var columns = props.columns || [];\n    var data = props.data || [];\n    var emptyText = props.emptyText || '暂无数据';\n    var showIndex = props.showIndex || false;\n\n    // 无数据时渲染空状态行\n    if (!data.length) {\n      var colSpan = columns.length + (showIndex ? 1 : 0);\n      return '<tr><td colspan=\"' + colSpan + '\" class=\"empty-cell\">' + escapeHTML(emptyText) + '<\/td><\/tr>';\n    }\n\n    var rows = [];\n    for (var i = 0; i < data.length; i++) {\n      var row = data[i];\n      var cells = [];\n\n      // 序号列\n      if (showIndex) {\n        cells.push('<td>' + (i + 1) + '<\/td>');\n      }\n\n      // 数据列\n      for (var j = 0; j < columns.length; j++) {\n        cells.push(renderCell(columns[j], row, i));\n      }\n\n      rows.push('<tr>' + cells.join('') + '<\/tr>');\n    }\n\n    return rows.join('');\n  }\n\n  /**\n   * 渲染分页区域\n   * @param {TableProps} props - 表格属性\n   * @returns {string} 分页 HTML\n   */\n  function renderPagination(props) {\n    var pagination = props.pagination;\n    if (!pagination) return '';\n\n    var current = pagination.current || 1;\n    var total = pagination.total || 0;\n    var pageSize = pagination.pageSize || 10;\n\n    // 计算分页范围文字\n    var start = (current - 1) * pageSize + 1;\n    var end = Math.min(current * pageSize, total);\n    var infoText = '第 ' + start + ' - ' + end + ' 条 / 共 ' + total + ' 条';\n\n    // 计算总页数和页码按钮\n    var totalPages = Math.ceil(total / pageSize) || 1;\n    var pageNumbers = [];\n\n    if (totalPages <= 7) {\n      // 总页数 <= 7 时全部显示\n      for (var p = 1; p <= totalPages; p++) {\n        pageNumbers.push(p);\n      }\n    } else {\n      // 总页数 > 7 时显示省略号\n      pageNumbers.push(1);\n      if (current > 4) {\n        pageNumbers.push('...');\n      }\n      var rangeStart = Math.max(2, current - 2);\n      var rangeEnd = Math.min(totalPages - 1, current + 2);\n      for (var r = rangeStart; r <= rangeEnd; r++) {\n        pageNumbers.push(r);\n      }\n      if (current < totalPages - 3) {\n        pageNumbers.push('...');\n      }\n      pageNumbers.push(totalPages);\n    }\n\n    // 生成页码按钮 HTML\n    var pageNumHTML = '';\n    for (var n = 0; n < pageNumbers.length; n++) {\n      var pn = pageNumbers[n];\n      if (pn === '...') {\n        pageNumHTML += '<span class=\"page-ellipsis\">...<\/span>';\n      } else {\n        pageNumHTML += '<div class=\"page-number' + (pn === current ? ' active' : '') + '\">' + pn + '<\/div>';\n      }\n    }\n\n    return '<div class=\"pagination\">' +\n      '<div>' + infoText + '<\/div>' +\n      '<div class=\"page-box\">' +\n        '<div class=\"page-btn\"' + (current <= 1 ? ' style=\"pointer-events:none;opacity:0.4;\"' : '') + '>&#8249;<\/div>' +\n        pageNumHTML +\n        '<div class=\"page-btn\"' + (current >= totalPages ? ' style=\"pointer-events:none;opacity:0.4;\"' : '') + '>&#8250;<\/div>' +\n      '<\/div>' +\n    '<\/div>';\n  }\n\n  /**\n   * 渲染完整表格（含滚动容器 + 分页）\n   * @param {TableProps} props - 表格属性\n   * @returns {string} 完整表格 HTML 字符串\n   */\n  function render(props) {\n    var columns = props.columns || [];\n    var minWidth = props.minWidth || '1560px';\n    var stickyLastColumn = props.stickyLastColumn || false;\n\n    var tableStyle = 'min-width:' + minWidth + ';';\n    if (stickyLastColumn) {\n      tableStyle += 'position:relative;';\n    }\n\n    var html = '<div class=\"table-scroll\">';\n    html += '<table style=\"' + tableStyle + '\">';\n    html += renderHead(columns, props.showIndex);\n    html += '<tbody>' + renderRows(props) + '<\/tbody>';\n    html += '<\/table>';\n    html += '<\/div>';\n\n    // 分页\n    html += renderPagination(props);\n\n    return html;\n  }\n\n  window.SharedTable = {\n    render: render,\n    renderRows: renderRows,\n    renderPagination: renderPagination\n  };\n\n})();\n\n<\/script>\n  <script data-src=\"../../shared/components/Form/form.js\">\n/**\n * form.js — 通用表单渲染组件\n *\n * 提供可复用的表单子渲染器，通过 props 驱动，不包含任何硬编码业务逻辑。\n * 所有字段标签、选项值、提示文案均由调用方通过 props 传入。\n *\n * 暴露接口：window.SharedForm\n * - SharedForm.filterGrid(props)  筛选网格\n * - SharedForm.formRow(props)     表单行\n * - SharedForm.noticeBox(props)   提示框\n * - SharedForm.stepBar(props)     步骤条\n * - SharedForm.ruleBlock(props)   规则块\n */\n(function () {\n\n  // ─── 工具函数 ───────────────────────────────────────────────\n\n  /**\n   * 转义 HTML 特殊字符，防止 XSS\n   * @param {string} str - 原始字符串\n   * @returns {string} 转义后的字符串\n   */\n  function escapeHTML(str) {\n    if (typeof str !== 'string') return '';\n    return str\n      .replace(/&/g, '&amp;')\n      .replace(/<\/g, '&lt;')\n      .replace(/>/g, '&gt;')\n      .replace(/\"/g, '&quot;')\n      .replace(/'/g, '&#39;');\n  }\n\n  // ─── filterGrid ─────────────────────────────────────────────\n\n  /**\n   * 渲染筛选网格区域\n   *\n   * 布局采用 CSS Grid：grid-template-columns: repeat(3, minmax(260px, 1fr)) auto\n   * 字段占网格单元，操作按钮行右对齐。\n   *\n   * @param {Object} props\n   * @param {Array<{id: string, label: string, type: string, placeholder?: string, options?: Array<{value: string, text: string}>}>} props.fields - 筛选字段列表\n   *   - type 支持: 'input' | 'select'\n   *   - options 仅 type='select' 时需要\n   * @param {Array<{id: string, label: string, type?: string}>} props.actions - 操作按钮列表\n   *   - type 支持: 'primary'（主按钮）| 空（默认按钮）\n   * @returns {string} filter-grid 区域 HTML\n   */\n  function filterGrid(props) {\n    var fields = props.fields || [];\n    var actions = props.actions || [];\n\n    var fieldsHTML = fields.map(function (f) {\n      if (f.type === 'select') {\n        var optionsHTML = (f.options || []).map(function (opt) {\n          return '<option value=\"' + escapeHTML(opt.value) + '\">' + escapeHTML(opt.text) + '<\/option>';\n        }).join('');\n        return '<div class=\"field\">' +\n          '<label>' + escapeHTML(f.label) + '<\/label>' +\n          '<select id=\"' + escapeHTML(f.id) + '\" class=\"control\">' + optionsHTML + '<\/select>' +\n          '<\/div>';\n      }\n      // 默认 input\n      return '<div class=\"field\">' +\n        '<label>' + escapeHTML(f.label) + '<\/label>' +\n        '<input id=\"' + escapeHTML(f.id) + '\" class=\"control\"' +\n        (f.placeholder ? ' placeholder=\"' + escapeHTML(f.placeholder) + '\"' : '') +\n        ' />' +\n        '<\/div>';\n    }).join('\\n');\n\n    var actionsHTML = actions.map(function (a) {\n      var cls = 'btn' + (a.type === 'primary' ? ' primary' : '');\n      return '<button id=\"' + escapeHTML(a.id) + '\" class=\"' + cls + '\">' + escapeHTML(a.label) + '<\/button>';\n    }).join('\\n');\n\n    return '<div class=\"filter-grid\">' +\n      fieldsHTML +\n      '<div class=\"btn-row\">' + actionsHTML + '<\/div>' +\n      '<\/div>';\n  }\n\n  // ─── formRow ────────────────────────────────────────────────\n\n  /**\n   * 渲染表单行（横向排列的表单字段组）\n   *\n   * @param {Object} props\n   * @param {Array<{id: string, label: string, type: string, placeholder?: string, required?: boolean, disabled?: boolean, width?: string}>} props.fields - 表单字段列表\n   *   - type 支持: 'input' | 'select' | 'date'\n   *   - required 为 true 时标签前显示红色星号\n   *   - disabled 为 true 时控件禁用\n   *   - width 为 CSS 类名后缀，如 'name' → create-form-field--name\n   * @param {string} [props.className] - 额外的行容器 CSS 类名\n   * @returns {string} 表单行 HTML\n   */\n  function formRow(props) {\n    var fields = props.fields || [];\n    var className = props.className || '';\n\n    var fieldsHTML = fields.map(function (f) {\n      var fieldClass = 'create-form-field';\n      if (f.width) {\n        fieldClass += ' create-form-field--' + escapeHTML(f.width);\n      }\n\n      var requiredMark = f.required ? '<span class=\"required\">*<\/span> ' : '';\n      var labelHTML = '<label>' + requiredMark + escapeHTML(f.label) + '<\/label>';\n\n      var disabledAttr = f.disabled ? ' disabled' : '';\n      var placeholderAttr = f.placeholder ? ' placeholder=\"' + escapeHTML(f.placeholder) + '\"' : '';\n\n      var controlHTML;\n      if (f.type === 'select') {\n        var optionsHTML = (f.options || []).map(function (opt) {\n          return '<option value=\"' + escapeHTML(opt.value) + '\">' + escapeHTML(opt.text) + '<\/option>';\n        }).join('');\n        controlHTML = '<select id=\"' + escapeHTML(f.id) + '\" class=\"control\"' + disabledAttr + '>' + optionsHTML + '<\/select>';\n      } else if (f.type === 'date') {\n        controlHTML = '<input id=\"' + escapeHTML(f.id) + '\" class=\"control\" type=\"date\"' + placeholderAttr + disabledAttr + ' />';\n      } else {\n        // 默认 input\n        controlHTML = '<input id=\"' + escapeHTML(f.id) + '\" class=\"control\"' + placeholderAttr + disabledAttr + ' />';\n      }\n\n      return '<div class=\"' + fieldClass + '\">' + labelHTML + controlHTML + '<\/div>';\n    }).join('\\n');\n\n    var rowClass = 'create-form-row' + (className ? ' ' + escapeHTML(className) : '');\n    return '<div class=\"' + rowClass + '\">' + fieldsHTML + '<\/div>';\n  }\n\n  // ─── noticeBox ──────────────────────────────────────────────\n\n  /**\n   * 渲染提示信息框\n   *\n   * @param {Object} props\n   * @param {Array<string>} props.lines - 提示行文本列表，每行前自动添加 \"· \" 前缀\n   * @returns {string} 提示框 HTML\n   */\n  function noticeBox(props) {\n    var lines = props.lines || [];\n\n    var linesHTML = lines.map(function (line) {\n      return '<div class=\"create-notice-line\">· ' + escapeHTML(line) + '<\/div>';\n    }).join('\\n');\n\n    return '<div class=\"create-notice-box\">' + linesHTML + '<\/div>';\n  }\n\n  // ─── stepBar ────────────────────────────────────────────────\n\n  /**\n   * 渲染步骤条\n   *\n   * 步骤状态视觉映射：\n   * - active:    蓝色圆点，显示序号\n   * - completed: 绿色对勾圆点（create-step-dot--check）\n   * - pending:   默认圆点，显示序号\n   *\n   * 步骤之间通过 create-step-connector 连接线相连，\n   * 已完成步骤的连接线添加 create-step-connector--done 类名。\n   *\n   * @param {Object} props\n   * @param {Array<{index: number, title: string, desc: string, status: 'active'|'completed'|'pending'}>} props.steps - 步骤列表\n   * @returns {string} 步骤条 HTML\n   */\n  function stepBar(props) {\n    var steps = props.steps || [];\n\n    var html = '<div class=\"create-step-bar\">';\n\n    steps.forEach(function (step, i) {\n      var stepClass = 'create-step';\n      var dotContent = String(step.index);\n\n      if (step.status === 'active') {\n        stepClass += ' active';\n      } else if (step.status === 'completed') {\n        stepClass += ' completed';\n        dotContent = '✓';\n      }\n\n      var dotClass = 'create-step-dot';\n      if (step.status === 'completed') {\n        dotClass += ' create-step-dot--check';\n      }\n\n      html += '<div class=\"' + stepClass + '\">' +\n        '<div class=\"' + dotClass + '\">' + dotContent + '<\/div>' +\n        '<div class=\"create-step-content\">' +\n          '<div class=\"create-step-title\">' + escapeHTML(step.title) + '<\/div>' +\n          '<div class=\"create-step-desc\">' + escapeHTML(step.desc) + '<\/div>' +\n        '<\/div>' +\n        '<\/div>';\n\n      // 步骤之间的连接线（最后一个步骤后不加）\n      if (i < steps.length - 1) {\n        var connectorClass = 'create-step-connector';\n        if (step.status === 'completed') {\n          connectorClass += ' create-step-connector--done';\n        }\n        html += '<div class=\"' + connectorClass + '\"><\/div>';\n      }\n    });\n\n    html += '<\/div>';\n    return html;\n  }\n\n  // ─── ruleBlock ──────────────────────────────────────────────\n\n  /**\n   * 渲染规则块\n   *\n   * 用于展示单条规则的标签、内容区域和可选提示。\n   * content 为原始 HTML 字符串，由调用方自行构建内部结构\n   * （如 rule-input-row、rule-tags、rule-checkbox-row 等）。\n   *\n   * @param {Object} props\n   * @param {string} props.label - 规则标签文本\n   * @param {string} props.content - 规则内容区域 HTML（由调用方构建）\n   * @param {string} [props.hint] - 可选的规则提示文本\n   * @returns {string} 规则块 HTML\n   */\n  function ruleBlock(props) {\n    var html = '<div class=\"rule-block\">';\n    html += '<div class=\"rule-label\">' + escapeHTML(props.label) + '<\/div>';\n    html += props.content || '';\n    if (props.hint) {\n      html += '<div class=\"rule-hint\">' + escapeHTML(props.hint) + '<\/div>';\n    }\n    html += '<\/div>';\n    return html;\n  }\n\n  // ─── 导出 ───────────────────────────────────────────────────\n\n  window.SharedForm = {\n    filterGrid: filterGrid,\n    formRow: formRow,\n    noticeBox: noticeBox,\n    stepBar: stepBar,\n    ruleBlock: ruleBlock\n  };\n\n})();\n\n<\/script>\n  <script data-src=\"../../shared/components/Modal/modal.js\">\n/**\n * modal.js — 共享 Modal 组件\n *\n * 从原始 app.js 的 buildSiteModalHTML / buildExpertModalHTML 提取通用模态框壳，\n * 去除所有硬编码业务数据（标题、筛选字段、表格列、按钮文字等），全部通过 props 传入。\n *\n * 依赖：无（不依赖 window.AppConfig 或 window.AppComponents）\n * 暴露：window.SharedModal = { render, header, footer, open, close }\n *\n * 用法示例：\n *   var html = SharedModal.render({\n *     id: 'myModalOverlay',\n *     title: '站点选择',\n *     width: '960px',\n *     body: '<div>自定义内容<\/div>',\n *     footer: SharedModal.footer({\n *       countText: '已选',\n *       countId: 'footerCount',\n *       actions: [\n *         { id: 'cancelBtn', label: '取消', type: 'default' },\n *         { id: 'confirmBtn', label: '确认添加', type: 'primary', disabled: true }\n *       ]\n *     }),\n *     onCloseId: 'myModalClose'\n *   });\n *   SharedModal.open(html);\n *   // 关闭：\n *   SharedModal.close('myModalOverlay');\n */\n(function () {\n\n  /**\n   * @typedef {Object} ActionItem\n   * @property {string}  id       - 按钮元素 ID\n   * @property {string}  label    - 按钮文字\n   * @property {string}  type     - 按钮类型：'primary' | 'default'\n   * @property {boolean} [disabled] - 是否禁用，默认 false\n   */\n\n  /**\n   * @typedef {Object} FooterProps\n   * @property {string}       countText - 计数描述文字（如 \"已选\"）\n   * @property {string}       countId   - 计数数字 span 的元素 ID\n   * @property {ActionItem[]} actions   - 底部操作按钮列表\n   */\n\n  /**\n   * @typedef {Object} HeaderProps\n   * @property {string} title   - 模态框标题文字\n   * @property {string} closeId - 关闭按钮元素 ID\n   */\n\n  /**\n   * @typedef {Object} ModalProps\n   * @property {string} id         - 遮罩层元素 ID（如 'siteModalOverlay'）\n   * @property {string} title      - 模态框标题文字\n   * @property {string} [width]    - 模态框宽度（如 '960px'），不传则使用 CSS 默认值\n   * @property {string} body       - 模态框主体内容 HTML 字符串\n   * @property {string} footer     - 模态框底部 HTML 字符串（通常由 SharedModal.footer() 生成）\n   * @property {string} [onCloseId] - 关闭按钮 ID，若提供则自动在 header 中渲染关闭按钮\n   */\n\n  /**\n   * 渲染模态框头部\n   *\n   * @param {HeaderProps} props - 头部属性\n   * @returns {string} 头部 HTML 字符串\n   *\n   * @example\n   *   SharedModal.header({ title: '站点选择', closeId: 'siteModalClose' })\n   *   // → <div class=\"site-modal-header\"><div class=\"site-modal-title\">站点选择<\/div><button class=\"site-modal-close\" id=\"siteModalClose\">&times;<\/button><\/div>\n   */\n  function header(props) {\n    var title = props.title;\n    var closeId = props.closeId;\n\n    return '<div class=\"site-modal-header\">' +\n      '<div class=\"site-modal-title\">' + title + '<\/div>' +\n      (closeId ? '<button class=\"site-modal-close\" id=\"' + closeId + '\">&times;<\/button>' : '') +\n      '<\/div>';\n  }\n\n  /**\n   * 渲染模态框底部\n   *\n   * @param {FooterProps} props - 底部属性\n   * @returns {string} 底部 HTML 字符串\n   *\n   * @example\n   *   SharedModal.footer({\n   *     countText: '已选',\n   *     countId: 'footerSelectedCount',\n   *     actions: [\n   *       { id: 'siteModalCancel', label: '取消', type: 'default' },\n   *       { id: 'siteModalConfirm', label: '确认添加', type: 'primary', disabled: true }\n   *     ]\n   *   })\n   */\n  function footer(props) {\n    var countText = props.countText;\n    var countId = props.countId;\n    var actions = props.actions || [];\n\n    var countHTML = '<div class=\"site-modal-footer-count\">' +\n      countText + ' <span id=\"' + countId + '\">0<\/span>' +\n      '<\/div>';\n\n    var actionsHTML = actions.map(function (action) {\n      var cls = action.type === 'primary' ? 'btn primary' : 'btn';\n      var disabledAttr = action.disabled ? ' disabled' : '';\n      return '<button class=\"' + cls + '\" id=\"' + action.id + '\"' + disabledAttr + '>' + action.label + '<\/button>';\n    }).join('');\n\n    return '<div class=\"site-modal-footer\">' +\n      countHTML +\n      '<div class=\"site-modal-footer-actions\">' + actionsHTML + '<\/div>' +\n      '<\/div>';\n  }\n\n  /**\n   * 渲染完整模态框（遮罩层 + 容器 + 头部 + 主体 + 底部）\n   *\n   * @param {ModalProps} props - 模态框属性\n   * @returns {string} 完整模态框 HTML 字符串\n   *\n   * @example\n   *   SharedModal.render({\n   *     id: 'siteModalOverlay',\n   *     title: '站点选择',\n   *     width: '960px',\n   *     body: myCustomBodyHTML,\n   *     footer: SharedModal.footer({ countText: '已选', countId: 'footerCount', actions: [...] }),\n   *     onCloseId: 'siteModalClose'\n   *   })\n   */\n  function render(props) {\n    var id = props.id;\n    var title = props.title;\n    var width = props.width;\n    var body = props.body || '';\n    var footerHTML = props.footer || '';\n    var onCloseId = props.onCloseId;\n\n    var widthStyle = width ? ' style=\"width:' + width + ';\"' : '';\n\n    return '<div class=\"site-modal-overlay\" id=\"' + id + '\">' +\n      '<div class=\"site-modal\"' + widthStyle + '>' +\n        header({ title: title, closeId: onCloseId }) +\n        '<div class=\"site-modal-body\">' + body + '<\/div>' +\n        footerHTML +\n      '<\/div>' +\n    '<\/div>';\n  }\n\n  /**\n   * 打开模态框：将模态框 HTML 注入 document.body\n   *\n   * 遵循现有代码模式：创建临时 wrapper div，设置 innerHTML，\n   * 然后appendChild wrapper.firstElementChild 到 body。\n   * 若已存在同 ID 遮罩层则先移除。\n   *\n   * @param {string} modalHTML - 由 SharedModal.render() 生成的完整模态框 HTML\n   *\n   * @example\n   *   SharedModal.open(html);\n   */\n  function open(modalHTML) {\n    // 从 HTML 中提取 overlay ID，用于去重\n    var idMatch = modalHTML.match(/id=\"([^\"]+)\"/);\n    if (idMatch) {\n      var old = document.getElementById(idMatch[1]);\n      if (old) old.remove();\n    }\n\n    var wrapper = document.createElement('div');\n    wrapper.innerHTML = modalHTML;\n    document.body.appendChild(wrapper.firstElementChild);\n  }\n\n  /**\n   * 关闭模态框：从 DOM 中移除指定遮罩层\n   *\n   * @param {string} overlayId - 遮罩层元素 ID（如 'siteModalOverlay'）\n   *\n   * @example\n   *   SharedModal.close('siteModalOverlay');\n   */\n  function close(overlayId) {\n    var overlay = document.getElementById(overlayId);\n    if (overlay) overlay.remove();\n  }\n\n  window.SharedModal = {\n    render: render,\n    header: header,\n    footer: footer,\n    open: open,\n    close: close\n  };\n\n})();\n\n<\/script>\n  <script data-src=\"../../shared/components/Status/status.js\">\n/**\n * SharedStatus - 通用状态渲染组件\n *\n * 提供状态标签、描述列表项、步骤指示器和导航卡片的渲染能力。\n * 所有渲染函数均为纯函数，通过 props 驱动，不包含硬编码业务逻辑。\n *\n * @namespace SharedStatus\n * @global\n */\n(function () {\n  \"use strict\";\n\n  /**\n   * 默认状态文本 → CSS 类名映射表\n   * 可通过 tag() 的 classMap 参数覆盖\n   * @type {Object.<string, string>}\n   */\n  var DEFAULT_CLASS_MAP = {\n    草稿: \"status-draft\",\n    待开始: \"status-pending\",\n    待整改: \"status-pending\",\n    待审核: \"status-pending\",\n    进行中: \"status-progress\",\n    整改中: \"status-progress\",\n    已结束: \"status-finished\",\n    审核通过: \"status-finished\",\n    已完成: \"status-finished\",\n    已逾期: \"status-overdue\",\n    审核驳回: \"status-overdue\",\n  };\n\n  /**\n   * 根据状态文本返回对应的 CSS 类名\n   *\n   * @param {string} status - 状态文本（如 \"草稿\"、\"进行中\"）\n   * @param {Object.<string, string>} [classMap] - 自定义映射表，缺省使用默认映射\n   * @returns {string} CSS 类名\n   */\n  function classMap(status, classMap) {\n    var map = classMap || DEFAULT_CLASS_MAP;\n    return map[status] || \"status-done\";\n  }\n\n  /**\n   * 渲染状态标签 HTML\n   *\n   * @param {Object} props\n   * @param {string} props.text - 状态文本\n   * @param {Object.<string, string>} [props.classMap] - 自定义状态→类名映射，缺省使用默认映射\n   * @returns {string} 状态标签 HTML 字符串\n   *\n   * @example\n   * SharedStatus.tag({ text: \"进行中\" });\n   * // → '<span class=\"status-tag status-progress\">进行中<\/span>'\n   *\n   * SharedStatus.tag({ text: \"自定义\", classMap: { 自定义: \"status-custom\" } });\n   * // → '<span class=\"status-tag status-custom\">自定义<\/span>'\n   */\n  function tag(props) {\n    var text = props.text;\n    var className = classMap(text, props.classMap);\n    return '<span class=\"status-tag ' + className + '\">' + text + \"<\/span>\";\n  }\n\n  /**\n   * 渲染描述列表项 HTML\n   *\n   * @param {Object} props\n   * @param {string} props.label - 字段标签\n   * @param {string} props.value - 字段值\n   * @param {boolean} [props.full=false] - 是否占满整行\n   * @returns {string} 描述列表项 HTML 字符串\n   *\n   * @example\n   * SharedStatus.descItem({ label: \"负责人\", value: \"张三\" });\n   * SharedStatus.descItem({ label: \"描述\", value: \"...\", full: true });\n   */\n  function descItem(props) {\n    var fullClass = props.full ? \" full\" : \"\";\n    return (\n      '<div class=\"desc-item' + fullClass + '\">' +\n      '<div class=\"desc-label\">' + props.label + \"<\/div>\" +\n      '<div class=\"desc-value\">' + props.value + \"<\/div>\" +\n      \"<\/div>\"\n    );\n  }\n\n  /**\n   * 渲染步骤指示器项 HTML\n   *\n   * @param {Object} props\n   * @param {number|string} props.index - 步骤序号\n   * @param {string} props.text - 步骤文本\n   * @param {boolean} [props.active=false] - 是否为当前激活步骤\n   * @returns {string} 步骤项 HTML 字符串\n   *\n   * @example\n   * SharedStatus.stepItem({ index: 1, text: \"提交\", active: false });\n   * SharedStatus.stepItem({ index: 2, text: \"审核\", active: true });\n   */\n  function stepItem(props) {\n    var activeClass = props.active ? \" active\" : \"\";\n    return (\n      '<div class=\"step-item' + activeClass + '\">' +\n      '<span class=\"step-dot\">' + props.index + \"<\/span>\" +\n      \"<span>\" + props.text + \"<\/span>\" +\n      \"<\/div>\"\n    );\n  }\n\n  /**\n   * 渲染导航卡片 HTML\n   *\n   * @param {Object} props\n   * @param {string} props.title - 卡片标题\n   * @param {string} props.desc - 卡片描述\n   * @param {string} props.href - 跳转链接\n   * @returns {string} 导航卡片 HTML 字符串\n   *\n   * @example\n   * SharedStatus.navCard({ title: \"任务管理\", desc: \"查看任务列表\", href: \"./task-list.html\" });\n   */\n  function navCard(props) {\n    return (\n      '<a class=\"nav-card\" href=\"' + props.href + '\">' +\n      \"<h3>\" + props.title + \"<\/h3>\" +\n      \"<p>\" + props.desc + \"<\/p>\" +\n      '<span class=\"action-link\">进入页面<\/span>' +\n      \"<\/a>\"\n    );\n  }\n\n  // 暴露到全局\n  window.SharedStatus = {\n    tag: tag,\n    classMap: classMap,\n    descItem: descItem,\n    stepItem: stepItem,\n    navCard: navCard,\n  };\n})();\n\n<\/script>\n  <script data-src=\"./config.js\">\n/**\n * config.js — 全局配置常量\n * 页面路由、菜单结构、当前页面/菜单识别\n */\n(function () {\n  var pageMap = {\n    index: { title: \"整改任务模块首页\", breadcrumb: [\"首页\", \"整改任务模块\"] },\n    \"task-list\": { title: \"面积检查任务管理\", breadcrumb: [\"首页\", \"面积检查任务管理\"] },\n    \"task-detail\": { title: \"面积检查任务详情\", breadcrumb: [\"首页\", \"面积检查任务管理\", \"任务详情\"] },\n    \"task-create\": { title: \"新建面积检查任务\", breadcrumb: [\"首页\", \"面积检查任务管理\", \"新建任务\"] },\n    \"task-expert\": { title: \"抽选专家与分组分配\", breadcrumb: [\"首页\", \"面积检查任务管理\", \"新建任务\"] },\n    \"site-detail\": { title: \"站点详情\", breadcrumb: [\"首页\", \"面积检查任务管理\", \"站点详情\"] },\n    \"my-task-list\": { title: \"我的面积检查任务\", breadcrumb: [\"首页\", \"我的面积检查任务\"] },\n    \"my-task-check\": { title: \"开始检查\", breadcrumb: [\"首页\", \"我的面积检查任务\", \"开始检查\"] },\n    \"review-notice\": { title: \"整改 改': ['待复查'],\n    '待复查': ['已归档'],\n    '已归档': []\n  };\n\n  // ============================================================\n  // 内部工具\n  // ============================================================\n  function assertTransition(fromState, toState, stateMap, label) {\n    var allowed = stateMap[fromState];\n    if (!allowed) throw new Error('[' + label + '] 未知状态: ' + fromState);\n    if (allowed.indexOf(toState) === -1) {\n      throw new Error('[' + label + '] 非法状态流转: ' + fromState + ' → ' + toState);\n    }\n  }\n\n  function clone(obj) {\n    return JSON.parse(JSON.stringify(obj));\n  }\n\n  // ============================================================\n  // 默认种子数据（从 MockData 构建）\n  // ============================================================\n  function buildSeed() {\n    var md = window.MockData || {};\n    var now = new Date().toISOString().slice(0, 10);\n\n    // ——— 1. Tasks ———\n    var tasks = {};\n    (md.tasks || []).forEach(function (t) {\n      tasks[t.id] = clone(t);\n    });\n\n    // ——— 2. taskSites ———\n    var taskSites = clone(md.taskSites || {});\n\n    // ——— 3. expertAssignments ——— 补充张建国的分配\n    var expertAssignments = clone(md.taskExpertAssignments || {});\n    // 为 task 1 添加张建国（裕华管理部）- 进行中，待确认\n    if (!expertAssignments[1]) expertAssignments[1] = {};\n    if (!expertAssignments[1][\"裕华管理部\"]) {\n      expertAssignments[1][\"裕华管理部\"] = [];\n    }\n    if (!expertAssignments[1][\"裕华管理部\"].some(function(s){return s && s.name==='张建国'})) {\n      expertAssignments[1][\"裕华管理部\"].push({ name: \"张建国\", level: \"一类\" });\n    }\n    // 为 task 2 添加张建国 - 待开始，已确认\n    if (!expertAssignments[2]) expertAssignments[2] = {};\n    if (!expertAssignments[2][\"裕华管理部\"]) {\n      expertAssignments[2][\"裕华管理部\"] = [];\n    }\n    if (!expertAssignments[2][\"裕华管理部\"].some(function(s){return s && s.name==='张建国'})) {\n      expertAssignments[2][\"裕华管理部\"].push({ name: \"张建国\", level: \"一类\", confirmed: true });\n    }\n    // 为 task 3 添加张建国 - 已结束，已确认\n
