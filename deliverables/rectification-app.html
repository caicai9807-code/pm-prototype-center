 1;\n  overflow: hidden;\n  text-overflow: ellipsis;\n}\n\n.expert-tree-children {\n  padding-left: 16px;\n}\n\n.expert-tree-node--leaf {\n  padding-left: 32px;\n}\n\n.expert-modal-right {\n  flex: 1;\n  min-width: 0;\n  display: flex;\n  flex-direction: column;\n}\n\n.expert-modal-filter {\n  display: flex;\n  align-items: flex-end;\n  gap: 12px;\n  padding: 12px 20px;\n  border-bottom: 1px solid var(--border);\n  flex-shrink: 0;\n}\n\n.expert-filter-field {\n  flex-shrink: 0;\n}\n.expert-filter-field label {\n  display: block;\n  font-size: 12px;\n  color: #7e8aa0;\n  margin-bottom: 4px;\n  white-space: nowrap;\n}\n.expert-filter-field .control {\n  width: 160px;\n  height: 32px;\n  border: 1px solid #d6ddea;\n  border-radius: 4px;\n  padding: 0 10px;\n  font-size: 13px;\n  color: #33425c;\n  background: #fff;\n}\n.expert-filter-field .control:focus {\n  outline: none;\n  border-color: var(--primary);\n  box-shadow: 0 0 0 2px rgba(76, 120, 245, 0.1);\n}\n\n.expert-filter-actions {\n  display: flex;\n  gap: 8px;\n  align-items: flex-end;\n  padding-bottom: 1px;\n}\n.expert-filter-actions .btn {\n  height: 32px;\n  padding: 0 16px;\n  font-size: 13px;\n}\n\n.expert-modal-tip {\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  padding: 8px 20px;\n  background: #fffbe6;\n  border-bottom: 1px solid #ffe58f;\n  font-size: 13px;\n  color: #d48806;\n  flex-shrink: 0;\n}\n\n.expert-tip-icon {\n  font-size: 14px;\n}\n\n.expert-modal-table-wrap {\n  flex: 1;\n  overflow: auto;\n  padding: 0 20px;\n}\n\n.expert-modal-table-wrap table {\n  width: 100%;\n  min-width: 700px;\n  border-collapse: collapse;\n}\n\n.expert-modal-table-wrap thead th {\n  position: sticky;\n  top: 0;\n  background: #f5f7fa;\n  font-size: 12px;\n  font-weight: 600;\n  color: #5a6b85;\n  padding: 10px 12px;\n  text-align: left;\n  white-space: nowrap;\n  border-bottom: 1px solid var(--border);\n}\n\n.expert-modal-table-wrap tbody td {\n  font-size: 13px;\n  color: #33425c;\n  padding: 10px 12px;\n  border-bottom: 1px solid #f0f2f5;\n  white-space: nowrap;\n}\n\n.expert-modal-table-wrap tbody tr:hover {\n  background: #f8faff;\n}\n\n.expert-modal-table-wrap .empty-cell {\n  text-align: center;\n  color: var(--muted);\n  padding: 40px 16px !important;\n  font-size: 14px;\n}\n\n.expert-modal-footer {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 12px 24px;\n  border-top: 1px solid var(--border);\n  flex-shrink: 0;\n}\n\n.expert-modal-footer-count {\n  font-size: 13px;\n  color: #5a6b85;\n}\n\n.expert-modal-footer-actions {\n  display: flex;\n  gap: 8px;\n}\n\n.expert-modal-footer-actions .btn[disabled] {\n  opacity: 0.45;\n  cursor: not-allowed;\n}\n\n<\/style>\n  <style>\n    /* 预约页面内无额外样式，所有样式在 page module 中内联 */\n  <\/style>\n<\/head>\n<body data-page=\"dept-leader-app-preview\" data-menu=\"dept-leader-app-preview\">\n  <div id=\"app\"><\/div>\n\n  <script data-src=\"../../shared/utils/helpers.js\">\n/**\n * helpers.js — 公共工具函数\n *\n * 适用于所有原型模块的通用 JS 工具，包括：\n *   showToast  — 全局提示\n *   getQueryParam — URL 查询参数读取\n *   $          — document.getElementById 简写\n *   $on        — addEventListener 简写（含空值检查）\n *\n * ⚠️ 不依赖任何其他 JS 文件，不使用 ES Module。\n *\n * 用法：<script src=\"../../shared/utils/helpers.js\"><\\/script>\n *       然后通过 window.SharedUtils.showToast(...) 调用。\n */\n\n(function () {\n  \"use strict\";\n\n  /**\n   * 显示全局 Toast 提示\n   *\n   * @param {string} message - 提示文本\n   * @param {\"success\"|\"info\"|\"warning\"} [type=\"info\"] - 提示类型，对应不同背景色\n   */\n  function showToast(message, type) {\n    var existing = document.querySelector(\".toast\");\n    if (existing) existing.remove();\n\n    var toast = document.createElement(\"div\");\n    toast.className = \"toast \" + (type || \"info\");\n    toast.textContent = message;\n    document.body.appendChild(toast);\n\n    setTimeout(function () {\n      toast.remove();\n    }, 2500);\n  }\n\n  /**\n   * 读取当前页面 URL 的查询参数\n   *\n   * @param {string} key - 参数名\n   * @returns {string|null} 参数值，不存在时返回 null\n   */\n  function getQueryParam(key) {\n    return new URLSearchParams((window.__NAV_QUERY__!==undefined?window.__NAV_QUERY__:window.location.search)).get(key);\n  }\n\n  /**\n   * document.getElementById 简写\n   *\n   * @param {string} id - 元素 ID\n   * @returns {HTMLElement|null}\n   */\n  function $(id) {\n    return document.getElementById(id);\n  }\n\n  /**\n   * addEventListener 简写，自动做空值检查\n   *\n   * @param {string} id - 元素 ID\n   * @param {string} event - 事件名（如 \"click\"）\n   * @param {Function} handler - 事件处理函数\n   */\n  function $on(id, event, handler) {\n    var el = document.getElementById(id);\n    if (el) el.addEventListener(event, handler);\n  }\n\n  /**\n   * 计算实测复核误差标识\n   *\n   * 规则：\n   *   ≤500㎡       相对误差 ≤ ±3%\n   *   500~2000㎡   相对误差 ≤ ±2%\n   *   >2000㎡      绝对误差 ≤ ±60㎡\n   *\n   * @param {number} originalArea - 普查原面积（㎡）\n   * @param {number} recheckArea  - 复查面积（㎡）\n   * @returns {{ diff: number, relError: string, isOverLimit: boolean, rule: string, diffAbs: number }}\n   */\n  function calcTolerance(originalArea, recheckArea) {\n    if (!originalArea || !recheckArea) return null;\n    var diff = recheckArea - originalArea;\n    var absDiff = Math.abs(diff);\n    var relPct = diff / originalArea * 100;\n\n    var maxRelError, maxAbsError, rule;\n    if (originalArea <= 500) {\n      maxRelError = 3;\n      maxAbsError = originalArea * 0.03;\n      rule = '≤500㎡：相对误差≤±3%';\n    } else if (originalArea <= 2000) {\n      maxRelError = 2;\n      maxAbsError = originalArea * 0.02;\n      rule = '500~2000㎡：相对误差≤±2%';\n    } else {\n      maxAbsError = 60;\n      maxRelError = 60 / originalArea * 100;\n      rule = '>2000㎡：绝对误差≤±60㎡';\n    }\n\n    var isOverLimit;\n    if (originalArea > 2000) {\n      isOverLimit = absDiff > maxAbsError;\n    } else {\n      isOverLimit = Math.abs(relPct) > maxRelError;\n    }\n\n    return {\n      diff: diff,\n      diffAbs: absDiff,\n      relError: relPct,\n      relErrorDisplay: (relPct >= 0 ? '+' : '') + relPct.toFixed(2) + '%',\n      isOverLimit: isOverLimit,\n      maxRelError: maxRelError,\n      maxAbsError: maxAbsError,\n      rule: rule\n    };\n  }\n\n  /* ── 暴露到全局 ── */\n  window.SharedUtils = {\n    showToast: showToast,\n    getQueryParam: getQueryParam,\n    $: $,\n    $on: $on,\n    calcTolerance: calcTolerance\n  };\n})();\n\n<\/script>\n  <script data-src=\"../../shared/components/Layout/layout.js\">\n/**\n * layout.js — 共享 Layout 组件\n *\n * 从原始 components.js 的 renderShell / renderBreadcrumb / menuItem 提取而来，\n * 去除所有硬编码业务数据，全部通过 props 传入。\n *\n * 依赖：无（不依赖 window.AppConfig 或 window.AppComponents）\n * 暴露：window.SharedLayout.render(props) → HTML string\n */\n(function () {\n  /**\n   * @typedef {Object} BrandConfig\n   * @property {string} badge   - 顶栏品牌徽章文字（如 \"面\"）\n   * @property {string} title   - 顶栏品牌标题（如 \"面积检查业务受理中心\"）\n   */\n\n  /**\n   * @typedef {Object} UserConfig\n   * @property {string} role    - 用户角色（如 \"业务管理员\"）\n   * @property {string} demo    - DEMO 标签文字（如 \"DEMO\"），为空则不渲染\n   * @property {string} avatar  - 头像文字（如 \"张\"）\n   * @property {string} name    - 用户姓名（如 \"张建国\"）\n   */\n\n  /**\n   * @typedef {Object} SwitchItem\n   * @property {string} label - 切换项文字（如 \"PC端\"、\"App端\"）\n   */\n\n  /**\n   * @typedef {Object} MenuItem\n   * @property {string} href  - 链接地址\n   * @property {string} key   - 菜单项唯一标识，用于高亮判断\n   * @property {string} icon  - 菜单图标（HTML 字符串）\n   * @property {string} label - 菜单项文字\n   * @property {string|number} [count] - 右侧计数，为空则不渲染\n   */\n\n  /**\n   * @typedef {Object} MenuSection\n   * @property {string} title      - 菜单分区标题\n   * @property {MenuItem[]} items  - 该分区下的菜单项列表\n   */\n\n  /**\n   * @typedef {Object} LayoutProps\n   * @property {BrandConfig}   brand        - 顶栏品牌区域配置\n   * @property {UserConfig}    user         - 顶栏用户区域配置\n   * @property {SwitchItem[]}  switchGroup  - PC/App 切换组\n   * @property {MenuSection[]} menuConfig   - 侧边栏菜单配置\n   * @property {string}        currentPage  - 当前页面标识\n   * @property {string}        currentMenu  - 当前菜单项标识，用于高亮\n   * @property {string[]}      breadcrumb   - 面包屑文字数组\n   * @property {string}        content      - 主内容区 HTML 字符串\n   */\n\n  /**\n   * 渲染面包屑\n   * @param {string[]} items - 面包屑文字数组\n   * @returns {string} 面包屑 HTML\n   */\n  function renderBreadcrumb(items) {\n    return '<div class=\"breadcrumb\">' +\n      items.map(function (item, idx) {\n        if (idx === 0) {\n          return '<a href=\"./index.html\">' + item + '<\/a>';\n        }\n        return '<span>' + item + '<\/span>';\n      }).join('<span>/<\/span>') +\n      '<\/div>';\n  }\n\n  /**\n   * 渲染单个菜单项\n   * @param {string} href   - 链接地址\n   * @param {string} key    - 菜单项标识\n   * @param {string} icon   - 图标 HTML\n   * @param {string} label  - 菜单文字\n   * @param {string|number} [count] - 计数\n   * @param {string} currentMenu - 当前激活菜单标识\n   * @returns {string} 菜单项 HTML\n   */\n  function menuItem(href, key, icon, label, count, currentMenu) {\n    return '<a class=\"menu-item ' + (currentMenu === key ? 'active' : '') + '\" href=\"' + href + '\">' +\n      '<span class=\"menu-icon\">' + icon + '<\/span>' +\n      '<span>' + label + '<\/span>' +\n      (count ? '<span class=\"menu-count\">' + count + '<\/span>' : '') +\n      '<\/a>';\n  }\n\n  /**\n   * 渲染完整页面布局\n   * @param {LayoutProps} props - 布局属性\n   * @returns {string} 完整布局 HTML 字符串\n   */\n  function render(props) {\n    var brand = props.brand;\n    var user = props.user;\n    var switchGroup = props.switchGroup;\n    var menuConfig = props.menuConfig;\n    var currentMenu = props.currentMenu;\n    var breadcrumb = props.breadcrumb;\n    var content = props.content;\n\n    // 渲染侧边栏菜单\n    var menuHTML = menuConfig.map(function (section) {\n      var itemsHTML = section.items.map(function (item) {\n        return menuItem(item.href, item.key, item.icon, item.label, item.count, currentMenu);\n      }).join('\\n');\n      return '<div class=\"menu-section\">' +\n        '<div class=\"menu-title\">' + section.title + '<\/div>' +\n        itemsHTML +\n        '<\/div>';\n    }).join('\\n');\n\n    // 渲染切换组\n    var switchHTML = switchGroup.map(function (item) {\n      return '<div class=\"switch-item\">' + item.label + '<\/div>';\n    }).join('\\n');\n\n    // 渲染用户区域\n    var userHTML = '<div>角色：<\/div>' +\n      '<div class=\"chip\">' + user.role + '<\/div>' +\n      (user.demo ? '<div class=\"chip demo\">' + user.demo + '<\/div>' : '') +\n      '<div class=\"avatar\">' + user.avatar + '<\/div>' +\n      '<div>' + user.name + '<\/div>';\n\n    return '<div class=\"layout\">' +\n      '<header class=\"topbar\">' +\n        '<div class=\"brand\">' +\n          '<div class=\"brand-badge\">' + brand.badge + '<\/div>' +\n          '<div>' + brand.title + '<\/div>' +\n        '<\/div>' +\n        '<div class=\"top-actions\">' +\n          '<div class=\"switch-group\">' + switchHTML + '<\/div>' +\n          userHTML +\n        '<\/div>' +\n      '<\/header>' +\n      '<div class=\"body\">' +\n        '<aside class=\"sidebar\">' + menuHTML + '<\/aside>' +\n        '<main class=\"main\">' +\n          renderBreadcrumb(breadcrumb) +\n          content +\n        '<\/main>' +\n      '<\/div>' +\n    '<\/div>';\n  }\n\n  window.SharedLayout = { render: render };\n})();\n\n<\/script>\n  <script data-src=\"../../shared/components/Table/table.js\">\n/**\n * table.js — 共享 Table 组件\n *\n * 从原始 app.js 的 renderTaskRows / fillSiteTable / renderModalRows / renderExpertModalRows\n * 提取而来，去除所有硬编码业务数据，全部通过 props 传入。\n *\n * 依赖：无（不依赖 window.AppConfig 或 window.AppComponents）\n * 暴露：window.SharedTable.render(props)          → 完整表格 HTML（含滚动容器 + 分页）\n *       window.SharedTable.renderRows(props)       → 仅 tbody innerHTML（用于动态更新）\n *       window.SharedTable.renderPagination(props) → 分页 HTML\n */\n(function () {\n\n  /**\n   * @typedef {Object} ColumnDef\n   * @property {string}   key    - 数据字段名，用于从 row 对象取值\n   * @property {string}   label  - 表头显示文字\n   * @property {string}   [width] - 列宽（如 \"64px\"），生成 th 的 inline style\n   * @property {string}   [align] - 对齐方式（如 \"center\"、\"right\"），生成 td 的 inline style\n   * @property {Function} [render] - 自定义单元格渲染函数 (value, row, rowIndex) → HTML string\n   */\n\n  /**\n   * @typedef {Object} PaginationInfo\n   * @property {number} current  - 当前页码（从 1 开始）\n   * @property {number} total    - 总条数\n   * @property {number} pageSize - 每页条数\n   */\n\n  /**\n   * @typedef {Object} TableProps\n   * @property {ColumnDef[]}    columns          - 列定义数组\n   * @property {Object[]}       data             - 行数据数组\n   * @property {string}         [emptyText]      - 无数据时的提示文字，默认 \"暂无数据\"\n   * @property {boolean}        [showIndex]      - 是否显示序号列，默认 false\n   * @property {PaginationInfo} [pagination]     - 分页信息，不传则不渲染分页\n   * @property {boolean}        [stickyLastColumn] - 是否固定最后一列，默认 false\n   * @property {string}         [minWidth]       - 表格最小宽度，默认 \"1560px\"\n   */\n\n  /**\n   * 转义 HTML 特殊字符，防止 XSS\n   * @param {string} str - 原始字符串\n   * @returns {string} 转义后的字符串\n   */\n  function escapeHTML(str) {\n    if (str == null) return '';\n    return String(str)\n      .replace(/&/g, '&amp;')\n      .replace(/<\/g, '&lt;')\n      .replace(/>/g, '&gt;')\n      .replace(/\"/g, '&quot;')\n      .replace(/'/g, '&#39;');\n  }\n\n  /**\n   * 渲染表头\n   * @param {ColumnDef[]} columns - 列定义\n   * @param {boolean}     showIndex - 是否显示序号列\n   * @returns {string} thead HTML\n   */\n  function renderHead(columns, showIndex) {\n    var ths = [];\n    if (showIndex) {\n      ths.push('<th style=\"width:64px;\">序号<\/th>');\n    }\n    for (var i = 0; i < columns.length; i++) {\n      var col = columns[i];\n      var style = col.width ? ' style=\"width:' + col.width + ';\"' : '';\n      ths.push('<th' + style + '>' + escapeHTML(col.label) + '<\/th>');\n    }\n    return '<thead><tr>' + ths.join('') + '<\/tr><\/thead>';\n  }\n\n  /**\n   * 渲染单个单元格\n   * @param {ColumnDef} col      - 列定义\n   * @param {Object}    row      - 行数据\n   * @param {number}    rowIndex - 行索引\n   * @returns {string} td HTML\n   */\n  function renderCell(col, row, rowIndex) {\n    var value = row[col.key];\n    var content;\n    if (typeof col.render === 'function') {\n      content = col.render(value, row, rowIndex);\n    } else {\n      content = escapeHTML(value);\n    }\n    var style = '';\n    if (col.align) {\n      style = ' style=\"text-align:' + col.align + ';\"';\n    }\n    return '<td' + style + '>' + content + '<\/td>';\n  }\n\n  /**\n   * 渲染表格行（tbody innerHTML）\n   * @param {TableProps} props - 表格属性\n   * @returns {string} tbody 内部 HTML\n   */\n  function renderRows(props) {\n    var columns = props.columns || [];\n    var data = props.data || [];\n    var emptyText = props.emptyText || '暂无数据';\n    var showIndex = props.showIndex || false;\n\n    // 无数据时渲染空状态行\n    if (!data.length) {\n      var colSpan = columns.length + (showIndex ? 1 : 0);\n      return '<tr><td colspan=\"' + colSpan + '\" class=\"empty-cell\">' + escapeHTML(emptyText) + '<\/td><\/tr>';\n    }\n\n    var rows = [];\n    for (var i = 0; i < data.length; i++) {\n      var row = data[i];\n      var cells = [];\n\n      // 序号列\n      if (showIndex) {\n        cells.push('<td>' + (i + 1) + '<\/td>');\n      }\n\n      // 数据列\n      for (var j = 0; j < columns.length; j++) {\n        cells.push(renderCell(columns[j], row, i));\n      }\n\n      rows.push('<tr>' + cells.join('') + '<\/tr>');\n    }\n\n    return rows.join('');\n  }\n\n  /**\n   * 渲染分页区域\n   * @param {TableProps} props - 表格属性\n   * @returns {string} 分页 HTML\n   */\n  function renderPagination(props) {\n    var pagination = props.pagination;\n    if (!pagination) return '';\n\n    var current = pagination.current || 1;\n    var total = pagination.total || 0;\n    var pageSize = pagination.pageSize || 10;\n\n    // 计算分页范围文字\n    var start = (current - 1) * pageSize + 1;\n    var end = Math.min(current * pageSize, total);\n    var infoText = '第 ' + start + ' - ' + end + ' 条 / 共 ' + total + ' 条';\n\n    // 计算总页数和页码按钮\n    var totalPages = Math.ceil(total / pageSize) || 1;\n    var pageNumbers = [];\n\n    if (totalPages <= 7) {\n      // 总页数 <= 7 时全部显示\n      for (var p = 1; p <= totalPages; p++) {\n        pageNumbers.push(p);\n      }\n    } else {\n      // 总页数 > 7 时显示省略号\n      pageNumbers.push(1);\n      if (current > 4) {\n        pageNumbers.push('...');\n      }\n      var rangeStart = Math.max(2, current - 2);\n      var rangeEnd = Math.min(totalPages - 1, current + 2);\n      for (var r = rangeStart; r <= rangeEnd; r++) {\n        pageNumbers.push(r);\n      }\n      if (current < totalPages - 3) {\n        pageNumbers.push('...');\n      }\n      pageNumbers.push(totalPages);\n    }\n\n    // 生成页码按钮 HTML\n    var pageNumHTML = '';\n    for (var n = 0; n < pageNumbers.length; n++) {\n      var pn = pageNumbers[n];\n      if (pn === '...') {\n        pageNumHTML += '<span class=\"page-ellipsis\">...<\/span>';\n      } else {\n        pageNumHTML += '<div class=\"page-number' + (pn === current ? ' active' : '') + '\">' + pn + '<\/div>';\n      }\n    }\n\n    return '<div class=\"pagination\">' +\n      '<div>' + infoText + '<\/div>' +\n      '<div class=\"page-box\">' +\n        '<div class=\"page-btn\"' + (current <= 1 ? ' style=\"pointer-events:none;opacity:0.4;\"' : '') + '>&#8249;<\/div>' +\n        pageNumHTML +\n        '<div class=\"page-btn\"' + (current >= totalPages ? ' style=\"pointer-events:none;opacity:0.4;\"' : '') + '>&#8250;<\/div>' +\n      '<\/div>' +\n    '<\/div>';\n  }\n\n  /**\n   * 渲染完整表格（含滚动容器 + 分页）\n   * @param {TableProps} props - 表格属性\n   * @returns {string} 完整表格 HTML 字符串\n   */\n  function render(props) {\n    var columns = props.columns || [];\n    var minWidth = props.minWidth || '1560px';\n    var stickyLastColumn = props.stickyLastColumn || false;\n\n    var tableStyle = 'min-width:' + minWidth + ';';\n    if (stickyLastColumn) {\n      tableStyle += 'position:relative;';\n    }\n\n    var html = '<div class=\"table-scroll\">';\n    html += '<table style=\"' + tableStyle + '\">';\n    html += renderHead(columns, props.showIndex);\n    html += '<tbody>' + renderRows(props) + '<\/tbody>';\n    html += '<\/table>';\n    html += '<\/div>';\n\n    // 分页\n    html += renderPagination(props);\n\n    return html;\n  }\n\n  window.SharedTable = {\n    render: render,\n    renderRows: renderRows,\n    renderPagination: renderPagination\n  };\n\n})();\n\n<\/script>\n  <script data-src=\"../../shared/components/Form/form.js\">\n/**\n * form.js — 通用表单渲染组件\n *\n * 提供可复用的表单子渲染器，通过 props 驱动，不包含任何硬编码业务逻辑。\n * 所有字段标签、选项值、提示文案均由调用方通过 props 传入。\n *\n * 暴露接口：window.SharedForm\n * - SharedForm.filterGrid(props)  筛选网格\n * - SharedForm.formRow(props)     表单行\n * - SharedForm.noticeBox(props)   提示框\n * - SharedForm.stepBar(props)     步骤条\n * - SharedForm.ruleBlock(props)   规则块\n */\n(function () {\n\n  // ─── 工具函数 ───────────────────────────────────────────────\n\n  /**\n   * 转义 HTML 特殊字符，防止 XSS\n   * @param {string} str - 原始字符串\n   * @returns {string} 转义后的字符串\n   */\n  function escapeHTML(str) {\n    if (typeof str !== 'string') return '';\n    return str\n      .replace(/&/g, '&amp;')\n      .replace(/<\/g, '&lt;')\n      .replace(/>/g, '&gt;')\n      .replace(/\"/g, '&quot;')\n      .replace(/'/g, '&#39;');\n  }\n\n  // ─── filterGrid ─────────────────────────────────────────────\n\n  /**\n   * 渲染筛选网格区域\n   *\n   * 布局采用 CSS Grid：grid-template-columns: repeat(3, minmax(260px, 1fr)) auto\n   * 字段占网格单元，操作按钮行右对齐。\n   *\n   * @param {Object} props\n   * @param {Array<{id: string, label: string, type: string, placeholder?: string, options?: Array<{value: string, text: string}>}>} props.fields - 筛选字段列表\n   *   - type 支持: 'input' | 'select'\n   *   - options 仅 type='select' 时需要\n   * @param {Array<{id: string, label: string, type?: string}>} props.actions - 操作按钮列表\n   *   - type 支持: 'primary'（主按钮）| 空（默认按钮）\n   * @returns {string} filter-grid 区域 HTML\n   */\n  function filterGrid(props) {\n    var fields = props.fields || [];\n    var actions = props.actions || [];\n\n    var fieldsHTML = fields.map(function (f) {\n      if (f.type === 'select') {\n        var optionsHTML = (f.options || []).map(function (opt) {\n          return '<option value=\"' + escapeHTML(opt.value) + '\">' + escapeHTML(opt.text) + '<\/option>';\n        }).join('');\n        return '<div class=\"field\">' +\n          '<label>' + escapeHTML(f.label) + '<\/label>' +\n          '<select id=\"' + escapeHTML(f.id) + '\" class=\"control\">' + optionsHTML + '<\/select>' +\n          '<\/div>';\n      }\n      // 默认 input\n      return '<div class=\"field\">' +\n        '<label>' + escapeHTML(f.label) + '<\/label>' +\n        '<input id=\"' + escapeHTML(f.id) + '\" class=\"control\"' +\n        (f.placeholder ? ' placeholder=\"' + escapeHTML(f.placeholder) + '\"' : '') +\n        ' />' +\n        '<\/div>';\n    }).join('\\n');\n\n    var actionsHTML = actions.map(function (a) {\n      var cls = 'btn' + (a.type === 'primary' ? ' primary' : '');\n      return '<button id=\"' + escapeHTML(a.id) + '\" class=\"' + cls + '\">' + escapeHTML(a.label) + '<\/button>';\n    }).join('\\n');\n\n    return '<div class=\"filter-grid\">' +\n      fieldsHTML +\n      '<div class=\"btn-row\">' + actionsHTML + '<\/div>' +\n      '<\/div>';\n  }\n\n  // ─── formRow ────────────────────────────────────────────────\n\n  /**\n   * 渲染表单行（横向排列的表单字段组）\n   *\n   * @param {Object} props\n   * @param {Array<{id: string, label: string, type: string, placeholder?: string, required?: boolean, disabled?: boolean, width?: string}>} props.fields - 表单字段列表\n   *   - type 支持: 'input' | 'select' | 'date'\n   *   - required 为 true 时标签前显示红色星号\n   *   - disabled 为 true 时控件禁用\n   *   - width 为 CSS 类名后缀，如 'name' → create-form-field--name\n   * @param {string} [props.className] - 额外的行容器 CSS 类名\n   * @returns {string} 表单行 HTML\n   */\n  function formRow(props) {\n    var fields = props.fields || [];\n    var className = props.className || '';\n\n    var fieldsHTML = fields.map(function (f) {\n      var fieldClass = 'create-form-field';\n      if (f.width) {\n        fieldClass += ' create-form-field--' + escapeHTML(f.width);\n      }\n\n      var requiredMark = f.required ? '<span class=\"required\">*<\/span> ' : '';\n      var labelHTML = '<label>' + requiredMark + escapeHTML(f.label) + '<\/label>';\n\n      var disabledAttr = f.disabled ? ' disabled' : '';\n      var placeholderAttr = f.placeholder ? ' placeholder=\"' + escapeHTML(f.placeholder) + '\"' : '';\n\n      var controlHTML;\n      if (f.type === 'select') {\n        var optionsHTML = (f.options || []).map(function (opt) {\n          return '<option value=\"' + escapeHTML(opt.value) + '\">' + escapeHTML(opt.text) + '<\/option>';\n        }).join('');\n        controlHTML = '<select id=\"' + escapeHTML(f.id) + '\" class=\"control\"' + disabledAttr + '>' + optionsHTML + '<\/select>';\n      } else if (f.type === 'date') {\n        controlHTML = '<input id=\"' + escapeHTML(f.id) + '\" class=\"control\" type=\"date\"' + placeholderAttr + disabledAttr + ' />';\n      } else {\n        // 默认 input\n        controlHTML = '<input id=\"' + escapeHTML(f.id) + '\" class=\"control\"' + placeholderAttr + disabledAttr + ' />';\n      }\n\n      return '<div class=\"' + fieldClass + '\">' + labelHTML + controlHTML + '<\/div>';\n    }).join('\\n');\n\n    var rowClass = 'create-form-row' + (className ? ' ' + escapeHTML(className) : '');\n    return '<div class=\"' + rowClass + '\">' + fieldsHTML + '<\/div>';\n  }\n\n  // ─── noticeBox ──────────────────────────────────────────────\n\n  /**\n   * 渲染提示信息框\n   *\n   * @param {Object} props\n   * @param {Array<string>} props.lines - 提示行文本列表，每行前自动添加 \"· \" 前缀\n   * @returns {string} 提示框 HTML\n   */\n  function noticeBox(props) {\n    var lines = props.lines || [];\n\n    var linesHTML = lines.map(function (line) {\n      return '<div class=\"create-notice-line\">· ' + escapeHTML(line) + '<\/div>';\n    }).join('\\n');\n\n    return '<div class=\"create-notice-box\">' + linesHTML + '<\/div>';\n  }\n\n  // ─── stepBar ────────────────────────────────────────────────\n\n  /**\n   * 渲染步骤条\n   *\n   * 步骤状态视觉映射：\n   * - active:    蓝色圆点，显示序号\n   * - completed: 绿色对勾圆点（create-step-dot--check）\n   * - pending:   默认圆点，显示序号\n   *\n   * 步骤之间通过 create-step-connector 连接线相连，\n   * 已完成步骤的连接线添加 create-step-connector--done 类名。\n   *\n   * @param {Object} props\n   * @param {Array<{index: number, title: string, desc: string, status: 'active'|'completed'|'pending'}>} props.steps - 步骤列表\n   * @returns {string} 步骤条 HTML\n   */\n  function stepBar(props) {\n    var steps = props.steps || [];\n\n    var html = '<div class=\"create-step-bar\">';\n\n    steps.forEach(function (step, i) {\n      var stepClass = 'create-step';\n      var dotContent = String(step.index);\n\n      if (step.status === 'active') {\n        stepClass += ' active';\n      } else if (step.status === 'completed') {\n        stepClass += ' completed';\n        dotContent = '✓';\n      }\n\n      var dotClass = 'create-step-dot';\n      if (step.status === 'completed') {\n        dotClass += ' create-step-dot--check';\n      }\n\n      html += '<div class=\"' + stepClass + '\">' +\n        '<div class=\"' + dotClass + '\">' + dotContent + '<\/div>' +\n        '<div class=\"create-step-content\">' +\n          '<div class=\"create-step-title\">' + escapeHTML(step.title) + '<\/div>' +\n          '<div class=\"create-step-desc\">' + escapeHTML(step.desc) + '<\/div>' +\n        '<\/div>' +\n        '<\/div>';\n\n      // 步骤之间的连接线（最后一个步骤后不加）\n      if (i < steps.length - 1) {\n        var connectorClass = 'create-step-connector';\n        if (step.status === 'completed') {\n          connectorClass += ' create-step-connector--done';\n        }\n        html += '<div class=\"' + connectorClass + '\"><\/div>';\n      }\n    });\n\n    html += '<\/div>';\n    return html;\n  }\n\n  // ─── ruleBlock ──────────────────────────────────────────────\n\n  /**\n   * 渲染规则块\n   *\n   * 用于展示单条规则的标签、内容区域和可选提示。\n   * content 为原始 HTML 字符串，由调用方自行构建内部结构\n   * （如 rule-input-row、rule-tags、rule-checkbox-row 等）。\n   *\n   * @param {Object} props\n   * @param {string} props.label - 规则标签文本\n   * @param {string} props.content - 规则内容区域 HTML（由调用方构建）\n   * @param {string} [props.hint] - 可选的规则提示文本\n   * @returns {string} 规则块 HTML\n   */\n  function ruleBlock(props) {\n    var html = '<div class=\"rule-block\">';\n    html += '<div class=\"rule-label\">' + escapeHTML(props.label) + '<\/div>';\n    html += props.content || '';\n    if (props.hint) {\n      html += '<div class=\"rule-hint\">' + escapeHTML(props.hint) + '<\/div>';\n    }\n    html += '<\/div>';\n    return html;\n  }\n\n  // ─── 导出 ───────────────────────────────────────────────────\n\n  window.SharedForm = {\n    filterGrid: filterGrid,\n    formRow: formRow,\n    noticeBox: noticeBox,\n    stepBar: stepBar,\n    ruleBlock: ruleBlock\n  };\n\n})();\n\n<\/script>\n  <script data-src=\"../../shared/components/Modal/modal.js\">\n/**\n * modal.js — 共享 Modal 组件\n *\n * 从原始 app.js 的 buildSiteModalHTML / buildExpertModalHTML 提取通用模态框壳，\n * 去除所有硬编码业务数据（标题、筛选字段、表格列、按钮文字等），全部通过 props 传入。\n *\n * 依赖：无（不依赖 window.AppConfig 或 window.AppComponents）\n * 暴露：window.SharedModal = { render, header, footer, open, close }\n *\n * 用法示例：\n *   var html = SharedModal.render({\n *     id: 'myModalOverlay',\n *     title: '站点选择',\n *     width: '960px',\n *     body: '<div>自定义内容<\/div>',\n *     footer: SharedModal.footer({\n *       countText: '已选',\n *       countId: 'footerCount',\n *       actions: [\n *         { id: 'cancelBtn', label: '取消', type: 'default' },\n *         { id: 'confirmBtn', label: '确认添加', type: 'primary', disabled: true }\n *       ]\n *     }),\n *     onCloseId: 'myModalClose'\n *   });\n *   SharedModal.open(html);\n *   // 关闭：\n *   SharedModal.close('myModalOverlay');\n */\n(function () {\n\n  /**\n   * @typedef {Object} ActionItem\n   * @property {string}  id       - 按钮元素 ID\n   * @property {string}  label    - 按钮文字\n   * @property {string}  type     - 按钮类型：'primary' | 'default'\n   * @property {boolean} [disabled] - 是否禁用，默认 false\n   */\n\n  /**\n   * @typedef {Object} FooterProps\n   * @property {string}       countText - 计数描述文字（如 \"已选\"）\n   * @property {string}       countId   - 计数数字 span 的元素 ID\n   * @property {ActionItem[]} actions   - 底部操作按钮列表\n   */\n\n  /**\n   * @typedef {Object} HeaderProps\n   * @property {string} title   - 模态框标题文字\n   * @property {string} closeId - 关闭按钮元素 ID\n   */\n\n  /**\n   * @typedef {Object} ModalProps\n   * @property {string} id         - 遮罩层元素 ID（如 'siteModalOverlay'）\n   * @property {string} title      - 模态框标题文字\n   * @property {string} [width]    - 模态框宽度（如 '960px'），不传则使用 CSS 默认值\n   * @property {string} body       - 模态框主体内容 HTML 字符串\n   * @property {string} footer     - 模态框底部 HTML 字符串（通常由 SharedModal.footer() 生成）\n   * @property {string} [onCloseId] - 关闭按钮 ID，若提供则自动在 header 中渲染关闭按钮\n   */\n\n  /**\n   * 渲染模态框头部\n   *\n   * @param {HeaderProps} props - 头部属性\n   * @returns {string} 头部 HTML 字符串\n   *\n   * @example\n   *   SharedModal.header({ title: '站点选择', closeId: 'siteModalClose' })\n   *   // → <div class=\"site-modal-header\"><div class=\"site-modal-title\">站点选择<\/div><button class=\"site-modal-close\" id=\"siteModalClose\">&times;<\/button><\/div>\n   */\n  function header(props) {\n    var title = props.title;\n    var closeId = props.closeId;\n\n    return '<div class=\"site-modal-header\">' +\n      '<div class=\"site-modal-title\">' + title + '<\/div>' +\n      (closeId ? '<button class=\"site-modal-close\" id=\"' + closeId + '\">&times;<\/button>' : '') +\n      '<\/div>';\n  }\n\n  /**\n   * 渲染模态框底部\n   *\n   * @param {FooterProps} props - 底部属性\n   * @returns {string} 底部 HTML 字符串\n   *\n   * @example\n   *   SharedModal.footer({\n   *     countText: '已选',\n   *     countId: 'footerSelectedCount',\n   *     actions: [\n   *       { id: 'siteModalCancel', label: '取消', type: 'default' },\n   *       { id: 'siteModalConfirm', label: '确认添加', type: 'primary', disabled: true }\n   *     ]\n   *   })\n   */\n  function footer(props) {\n    var countText = props.countText;\n    var countId = props.countId;\n    var actions = props.actions || [];\n\n    var countHTML = '<div class=\"site-modal-footer-count\">' +\n      countText + ' <span id=\"' + countId + '\">0<\/span>' +\n      '<\/div>';\n\n    var actionsHTML = actions.map(function (action) {\n      var cls = action.type === 'primary' ? 'btn primary' : 'btn';\n      var disabledAttr = action.disabled ? ' disabled' : '';\n      return '<button class=\"' + cls + '\" id=\"' + action.id + '\"' + disabledAttr + '>' + action.label + '<\/button>';\n    }).join('');\n\n    return '<div class=\"site-modal-footer\">' +\n      countHTML +\n      '<div class=\"site-modal-footer-actions\">' + actionsHTML + '<\/div>' +\n      '<\/div>';\n  }\n\n  /**\n   * 渲染完整模态框（遮罩层 + 容器 + 头部 + 主体 + 底部）\n   *\n   * @param {ModalProps} props - 模态框属性\n   * @returns {string} 完整模态框 HTML 字符串\n   *\n   * @example\n   *   SharedModal.render({\n   *     id: 'siteModalOverlay',\n   *     title: '站点选择',\n   *     width: '960px',\n   *     body: myCustomBodyHTML,\n   *     footer: SharedModal.footer({ countText: '已选', countId: 'footerCount', actions: [...] }),\n   *     onCloseId: 'siteModalClose'\n   *   })\n   */\n  function render(props) {\n    var id = props.id;\n    var title = props.title;\n    var width = props.width;\n    var body = props.body || '';\n    var footerHTML = props.footer || '';\n    var onCloseId = props.onCloseId;\n\n    var widthStyle = width ? ' style=\"width:' + width + ';\"' : '';\n\n    return '<div class=\"site-modal-overlay\" id=\"' + id + '\">' +\n      '<div class=\"site-modal\"' + widthStyle + '>' +\n        header({ title: title, closeId: onCloseId }) +\n        '<div class=\"site-modal-body\">' + body + '<\/div>' +\n        footerHTML +\n      '<\/div>' +\n    '<\/div>';\n  }\n\n  /**\n   * 打开模态框：将模态框 HTML 注入 document.body\n   *\n   * 遵循现有代码模式：创建临时 wrapper div，设置 innerHTML，\n   * 然后appendChild wrapper.firstElementChild 到 body。\n   * 若已存在同 ID 遮罩层则先移除。\n   *\n   * @param {string} modalHTML - 由 SharedModal.render() 生成的完整模态框 HTML\n   *\n   * @example\n   *   SharedModal.open(html);\n   */\n  function open(modalHTML) {\n    // 从 HTML 中提取 overlay ID，用于去重\n    var idMatch = modalHTML.match(/id=\"([^\"]+)\"/);\n    if (idMatch) {\n      var old = document.getElementById(idMatch[1]);\n      if (old) old.remove();\n    }\n\n    var wrapper = document.createElement('div');\n    wrapper.innerHTML = modalHTML;\n    document.body.appendChild(wrapper.firstElementChild);\n  }\n\n  /**\n   * 关闭模态框：从 DOM 中移除指定遮罩层\n   *\n   * @param {string} overlayId - 遮罩层元素 ID（如 'siteModalOverlay'）\n   *\n   * @example\n   *   SharedModal.close('siteModalOverlay');\n   */\n  function close(overlayId) {\n    var overlay = document.getElementById(overlayId);\n    if (overlay) overlay.remove();\n  }\n\n  window.SharedModal = {\n    render: render,\n    header: header,\n    footer: footer,\n    open: open,\n    close: close\n  };\n\n})();\n\n<\/script>\n  <script data-src=\"../../shared/components/Status/status.js\">\n/**\n * SharedStatus - 通用状态渲染组件\n *\n * 提供状态标签、描述列表项、步骤指示器和导航卡片的渲染能力。\n * 所有渲染函数均为纯函数，通过 props 驱动，不包含硬编码业务逻辑。\n *\n * @namespace SharedStatus\n * @global\n */\n(function () {\n  \"use strict\";\n\n  /**\n   * 默认状态文本 → CSS 类名映射表\n   * 可通过 tag() 的 classMap 参数覆盖\n   * @type {Object.<string, string>}\n   */\n  var DEFAULT_CLASS_MAP = {\n    草稿: \"status-draft\",\n    待开始: \"status-pending\",\n    待整改: \"status-pending\",\n    待审核: \"status-pending\",\n    进行中: \"status-progress\",\n    整改中: \"status-progress\",\n    已结束: \"status-finished\",\n    审核通过: \"status-finished\",\n    已完成: \"status-finished\",\n    已逾期: \"status-overdue\",\n    审核驳回: \"status-overdue\",\n  };\n\n  /**\n   * 根据状态文本返回对应的 CSS 类名\n   *\n   * @param {string} status - 状态文本（如 \"草稿\"、\"进行中\"）\n   * @param {Object.<string, string>} [classMap] - 自定义映射表，缺省使用默认映射\n   * @returns {string} CSS 类名\n   */\n  function classMap(status, classMap) {\n    var map = classMap || DEFAULT_CLASS_MAP;\n    return map[status] || \"status-done\";\n  }\n\n  /**\n   * 渲染状态标签 HTML\n   *\n   * @param {Object} props\n   * @param {string} props.text - 状态文本\n   * @param {Object.<string, string>} [props.classMap] - 自定义状态→类名映射，缺省使用默认映射\n   * @returns {string} 状态标签 HTML 字符串\n   *\n   * @example\n   * SharedStatus.tag({ text: \"进行中\" });\n   * // → '<span class=\"status-tag status-progress\">进行中<\/span>'\n   *\n   * SharedStatus.tag({ text: \"自定义\", classMap: { 自定义: \"status-custom\" } });\n   * // → '<span class=\"status-tag status-custom\">自定义<\/span>'\n   */\n  function tag(props) {\n    var text = props.text;\n    var className = classMap(text, props.classMap);\n    return '<span class=\"status-tag ' + className + '\">' + text + \"<\/span>\";\n  }\n\n  /**\n   * 渲染描述列表项 HTML\n   *\n   * @param {Object} props\n   * @param {string} props.label - 字段标签\n   * @param {string} props.value - 字段值\n   * @param {boolean} [props.full=false] - 是否占满整行\n   * @returns {string} 描述列表项 HTML 字符串\n   *\n   * @example\n   * SharedStatus.descItem({ label: \"负责人\", value: \"张三\" });\n   * SharedStatus.descItem({ label: \"描述\", value: \"...\", full: true });\n   */\n  function descItem(props) {\n    var fullClass = props.full ? \" full\" : \"\";\n    return (\n      '<div class=\"desc-item' + fullClass + '\">' +\n      '<div class=\"desc-label\">' + props.label + \"<\/div>\" +\n      '<div class=\"desc-value\">' + props.value + \"<\/div>\" +\n      \"<\/div>\"\n    );\n  }\n\n  /**\n   * 渲染步骤指示器项 HTML\n   *\n   * @param {Object} props\n   * @param {number|string} props.index - 步骤序号\n   * @param {string} props.text - 步骤文本\n   * @param {boolean} [props.active=false] - 是否为当前激活步骤\n   * @returns {string} 步骤项 HTML 字符串\n   *\n   * @example\n   * SharedStatus.stepItem({ index: 1, text: \"提交\", active: false });\n   * SharedStatus.stepItem({ index: 2, text: \"审核\", active: true });\n   */\n  function stepItem(props) {\n    var activeClass = props.active ? \" active\" : \"\";\n    return (\n      '<div class=\"step-item' + activeClass + '\">' +\n      '<span class=\"step-dot\">' + props.index + \"<\/span>\" +\n      \"<span>\" + props.text + \"<\/span>\" +\n      \"<\/div>\"\n    );\n  }\n\n  /**\n   * 渲染导航卡片 HTML\n   *\n   * @param {Object} props\n   * @param {string} props.title - 卡片标题\n   * @param {string} props.desc - 卡片描述\n   * @param {string} props.href - 跳转链接\n   * @returns {string} 导航卡片 HTML 字符串\n   *\n   * @example\n   * SharedStatus.navCard({ title: \"任务管理\", desc: \"查看任务列表\", href: \"./task-list.html\" });\n   */\n  function navCard(props) {\n    return (\n      '<a class=\"nav-card\" href=\"' + props.href + '\">' +\n      \"<h3>\" + props.title + \"<\/h3>\" +\n      \"<p>\" + props.desc + \"<\/p>\" +\n      '<span class=\"action-link\">进入页面<\/span>' +\n      \"<\/a>\"\n    );\n  }\n\n  // 暴露到全局\n  window.SharedStatus = {\n    tag: tag,\n    classMap: classMap,\n    descItem: descItem,\n    stepItem: stepItem,\n    navCard: navCard,\n  };\n})();\n\n<\/script>\n  <script data-src=\"./config.js\">\n/**\n * config.js — 全局配置常量\n * 页面路由、菜单结构、当前页面/菜单识别\n */\n(function () {\n  var pageMap = {\n    index: { title: \"整改任务模块首页\", breadcrumb: [\"首页\", \"整改任务模块\"] },\n    \"task-list\": { title: \"面积检查任务管理\", breadcrumb: [\"首页\", \"面积检查任务管理\"] },\n    \"task-detail\": { title: \"面积检查任务详情\", breadcrumb: [\"首页\", \"面积检查任务管理\", \"任务详情\"] },\n    \"task-create\": { title: \"新建面积检查任务\", breadcrumb: [\"首页\", \"面积检查任务管理\", \"新建任务\"] },\n    \"task-expert\": { title: \"抽选专家与分组分配\", breadcrumb: [\"首页\", \"面积检查任务管理\", \"新建任务\"] },\n    \"site-detail\": { title: \"站点详情\", breadcrumb: [\"首页\", \"面积检查任务管理\", \"站点详情\"] },\n    \"my-task-list\": { title: \"我的面积检查任务\", breadcrumb: [\"首页\", \"我的面积检查任务\"] },\n    \"my-task-check\": { title: \"开始检查\", breadcrumb: [\"首页\", \"我的面积检查任务\", \"开始检查\"] ntPage = window.AppConfig.currentPage;\n  var currentMenu = window.AppConfig.currentMenu;\n\n  function renderBreadcrumb(items) {\n    return `\n      <div class=\"breadcrumb\">\n        ${items\n          .map((item, idx) =>\n            idx === 0\n              ? `<a href=\"./index.html\">${item}<\/a>`\n              : idx === items.length - 1\n                ? `<span>${item}<\/span>`\n                : `<span>${item}<\/span>`\n          )\n          .join('<span>/<\/span>')}\n      <\/div>\n    `;\n  }\n\n  function menuItem(href, key, icon, label, count, badge, badgeColor) {\n    var badgeHTML = \"\";\n    if (badge) {\n      var bgColor = badgeColor || \"#1890ff\";\n      badgeHTML = '<span class=\"menu-badge\" style=\"background:' + bgColor + ';color:#fff;font-size:11px;min-width:18px;height:18px;line-height:18px;text-align:center;border-radius:9px;padding:0 5px;margin-left:6px;display:inline-block;vertical-align:middle;\">' + badge + '<\/span>';\n    }\n    return '\\\n      <a class=\"menu-item ' + (currentMenu === key ? \"active\" : \"\") + '\" href=\"' + href + '\">\\\n        <span class=\"menu-icon\">' + icon + '<\/span>\\\n        <span>' + label + '<\/span>\\\n        ' + badgeHTML + '\\\n        ' + (count ? '<span class=\"menu-count\">' + count + '<\/span>' : \"\") + '\\\n      <\/a>\\\n    ';\n  }\n\n  function renderShell(content) {\n    var menuHTML = menuConfig.map(function (section) {\n      var itemsHTML = section.items.map(function (item) {\n        return menuItem(item.href, item.key, item.icon, item.label, item.count, item.badge, item.badgeColor);\n      }).join(\"\\n\");\n      return `\n        <div class=\"menu-section\">\n          <div class=\"menu-title\">${section.title}<\/div>\n          ${itemsHTML}\n        <\/div>\n      `;\n    }).join(\"\\n\");\n\n    return `\n      <div class=\"layout\">\n        <header class=\"topbar\">\n          <div class=\"brand\">\n            <div class=\"brand-badge\">面<\/div>\n            <div>面积检查业
