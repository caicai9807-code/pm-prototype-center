sList.remove('active'));\n      tab.classList.add('active');\n      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));\n      document.getElementById('panel-' + tab.dataset.tab).classList.add('active');\n    });\n\n    // 审核弹窗\n    function showRectifyAudit() {\n      document.getElementById('auditOverlay').classList.add('show');\n    }\n    function closeRectifyAudit() {\n      document.getElementById('auditOverlay').classList.remove('show');\n      document.getElementById('auditRejectReason').value = '';\n      document.getElementById('rejectSection').style.display = 'none';\n      document.getElementById('auditCount').textContent = '0';\n      // 重置radio为\"通过\"\n      var passRadio = document.querySelector('input[name=\"auditResult\"][value=\"pass\"]');\n      if (passRadio) passRadio.checked = true;\n    }\n    // 点击背景关闭sheet\n    document.getElementById('auditOverlay').addEventListener('click', function(e) {\n      if (e.target === this) closeRectifyAudit();\n    });\n    function submitRectifyAudit() {\n      var result = document.querySelector('input[name=\"auditResult\"]:checked');\n      if (!result) { showToast('请选择审核结果'); return; }\n      if (result.value === 'reject') {\n        var reason = document.getElementById('auditRejectReason').value.trim();\n        if (!reason) { showToast('请填写驳回原因'); return; }\n      }\n      showToast('审核提交成功');\n      closeRectifyAudit();\n    }\n    // 审核结果radio联动驳回原因\n    document.addEventListener('change', function(e) {\n      if (e.target.name === 'auditResult') {\n        document.getElementById('rejectSection').style.display = e.target.value === 'reject' ? 'block' : 'none';\n      }\n    });\n    // 驳回原因字数统计\n    document.addEventListener('input', function(e) {\n      if (e.target.id === 'auditRejectReason') {\n        document.getElementById('auditCount').textContent = e.target.value.length;\n      }\n    });\n  <\/script>\n<script>\n(function(){\nwindow.__MERGED_NAVIGATE__=function(t){\n  if(window.parent&&window.parent.__MERGED_NAVIGATE__){window.parent.__MERGED_NAVIGATE__(t)}\n  else if(window.frameElement&&parent.__MERGED_GET_HTML__){\n    window.frameElement.setAttribute('data-merged-src',t);\n    window.frameElement.srcdoc=parent.__MERGED_GET_HTML__(t);\n  }\n};\ndocument.addEventListener('click',function(e){\n  var a=e.target.closest?e.target.closest('a[href]'):null;\n  if(!a){var el=e.target;while(el&&el.tagName!=='A')el=el.parentNode;a=el}\n  if(a&&a.tagName==='A'){\n    var h=a.getAttribute('href');\n    if(h&&/^\\.{0,2}\\/[^?#]+\\.html(?:[?#].*)?$/i.test(h)){\n      e.preventDefault();\n      window.__MERGED_NAVIGATE__(h);\n    }\n  }\n},true);\n(function(){\n  var f=document.querySelectorAll('iframe');\n  f.forEach(function(fr){\n    var t=fr.getAttribute('data-merged-src')||fr.getAttribute('src');\n    if(t&&t.indexOf('.html')>=0&&parent&&parent.__MERGED_GET_HTML__){\n      fr.setAttribute('data-merged-src',t);\n      fr.srcdoc=parent.__MERGED_GET_HTML__(t);\n    }\n  });\n})();\n})();<\\/script>\n<\/body>\n<\/html>\n"},"expert-app-building-detail":{"title":"楼栋详情","file":"expert-app-building-detail.html","html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">\n  <title>楼栋详情<\/title>\n  <style>\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html, body {\n      font-family: -apple-system, BlinkMacSystemFont, \"PingFang SC\", \"Hiragino Sans GB\", \"Microsoft YaHei\", sans-serif;\n      background: #f5f6f8; color: #333; font-size: 14px;\n      min-height: 100vh; -webkit-tap-highlight-color: transparent;\n    }\n\n    .cf-nav-bar {\n      position: sticky; top: 0; z-index: 5;\n      background: #fff; display: flex; align-items: center;\n      height: 36px; padding: 0 12px; border-bottom: 1px solid #edf0f2;\n    }\n    .cf-back-btn {\n      width: 28px; height: 28px; display: flex; align-items: center;\n      justify-content: center; cursor: pointer; color: #4b7cf4;\n      font-size: 20px; border-radius: 14px; flex-shrink: 0;\n    }\n    .cf-nav-title {\n      flex: 1; text-align: center; font-size: 16px; font-weight: 600;\n      color: #111827; margin-right: 28px;\n    }\n    .cf-content { padding: 12px; }\n\n    .bd-card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }\n    .bd-card-title { font-size: 14px; font-weight: 600; color: #111827; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #f0f2f5; }\n\n    /* 顶部统计卡片 */\n    .bd-header-card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }\n    .bd-header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }\n    .bd-header-name { font-size: 16px; font-weight: 700; color: #1a1a1a; }\n    .bd-header-tag { font-size: 11px; padding: 2px 10px; border-radius: 10px; font-weight: 500; }\n    .bd-header-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }\n    .bd-header-stat { text-align: center; }\n    .bd-header-stat-num { font-size: 22px; font-weight: 700; color: #1a1a1a; line-height: 1.2; }\n    .bd-header-stat-label { font-size: 11px; color: #999; margin-top: 2px; }\n    .bd-header-meta { display: flex; flex-wrap: wrap; gap: 6px 16px; font-size: 12px; color: #64748b; }\n    .bd-header-meta span { color: #333; font-weight: 500; }\n\n    .tag-blue { background: #e6f7ff; color: #1890ff; }\n    .tag-green { background: #ebfaf3; color: #00b578; }\n    .tag-gray { background: #f5f5f5; color: #999; }\n\n    .bd-tabs { display: flex; background: #fff; border-radius: 8px; padding: 4px; margin-bottom: 10px; gap: 2px; }\n    .bd-tab { flex: 1; text-align: center; font-size: 12px; padding: 7px 0; border-radius: 6px; cursor: pointer; color: #66758a; transition: all .15s; }\n    .bd-tab.active { background: #1677ff; color: #fff; font-weight: 600; }\n    .tab-panel { display: none; }\n    .tab-panel.active { display: block; }\n\n    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f5f5f5; }\n    .info-row:last-child { border-bottom: none; }\n    .info-label { font-size: 12px; color: #999; flex-shrink: 0; }\n    .info-value { font-size: 13px; font-weight: 500; color: #333; text-align: right; }\n    .info-value.link { color: #1677ff; }\n    .room-card {\n      background: #fff; border-radius: 10px; padding: 14px;\n      margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.04);\n    }\n    .room-card:last-child { margin-bottom: 0; }\n    .room-header {\n      display: flex; justify-content: space-between; align-items: center;\n      padding-bottom: 10px; border-bottom: 1px solid #f0f2f5;\n      margin-bottom: 10px;\n    }\n    .room-header-left { font-size: 15px; font-weight: 700; color: #1a1a1a; }\n    .room-header-right { font-size: 13px; color: #999; }\n    .room-row {\n      display: flex; justify-content: space-between; align-items: center;\n      padding: 5px 0; font-size: 13px;\n    }\n    .room-row-label { color: #999; }\n    .room-row-value { color: #333; font-weight: 500; }\n    .room-row-value.link { color: #1677ff; }\n    .room-list-hint {\n      text-align: center; font-size: 13px; color: #999;\n      margin-bottom: 12px;\n    }\n    .text-green { color: #00b578; }\n    .text-red { color: #ff3141; }\n\n    .photo-upload { border: 1px dashed #d9d9d9; border-radius: 8px; padding: 16px; text-align: center; margin-top: 8px; cursor: pointer; }\n    .photo-upload:active { background: #fafafa; }\n    .photo-upload .icon { font-size: 28px; margin-bottom: 4px; }\n    .photo-upload p { font-size: 12px; color: #999; }\n\n    .safe-area { height: 12px; }\n\n    .adm-toast {\n      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);\n      z-index: 1000; padding: 10px 20px; border-radius: 8px;\n      background: rgba(0,0,0,0.75); color: #fff; font-size: 14px;\n      font-weight: 500; white-space: nowrap; pointer-events: none;\n      opacity: 1; transition: opacity 0.3s ease;\n    }\n    .adm-toast.hide { opacity: 0; }\n  <\/style>\n<\/head>\n<body>\n  <div class=\"cf-nav-bar\">\n    <a href=\"javascript:history.back()\" class=\"cf-back-btn\">‹<\/a>\n    <div class=\"cf-nav-title\" id=\"pageTitle\">楼栋详情<\/div>\n  <\/div>\n  <div class=\"cf-content\" id=\"content\"><\/div>\n  <div class=\"safe-area\"><\/div>\n\n  <script>\n    var params = new URLSearchParams((window.__NAV_QUERY__!==undefined?window.__NAV_QUERY__:window.location.search));\n    var buildingId = params.get('id') || '1';\n    var siteCode = params.get('code') || '60218B006';\n\n    var buildings = {\n      '1': {\n        name: '1号楼(住宅)', floors: '1-6F', heatNature: '住宅', chargeType: '多层',\n        status: '已普查', tagClass: 'tag-blue', tagText: '实地核查',\n        originalArea: 3794.00, currentArea: 3794.00,\n        areaDiff: 0.00, diffRate: '0.00%',\n        controlMode: '分户控制', heatingType: '地暖', buildYear: '2009年',\n        basis: '实地核查', attachment: '核查依据.pdf', remark: '—',\n        rooms: [\n          { cardNo: '000900001', seq: 1, censusArea: '1-6F', basis: '实地核查', attachment: '核查依据.pdf', remark: '-' },\n          { cardNo: '000900002', seq: 2, censusArea: '1-6F', basis: '实地核查', attachment: '核查依据.pdf', remark: '-' },\n          { cardNo: '000900003', seq: 3, censusArea: '1-6F', basis: '实测核实', attachment: '实测报告.pdf', remark: '阳台封闭新增面积' },\n          { cardNo: '000900004', seq: 4, censusArea: '1-6F', basis: '确权书', attachment: '确权书.pdf', remark: '-' },\n        ]\n      },\n      '2': {\n        name: '2号楼(住宅)', floors: '1-8F', heatNature: '住宅', chargeType: '多层',\n        status: '已普查', tagClass: 'tag-blue', tagText: '实地核查',\n        originalArea: 2600.00, currentArea: 2600.00,\n        areaDiff: 0.00, diffRate: '0.00%',\n        controlMode: '分户控制', heatingType: '暖气片', buildYear: '2010年',\n        basis: '确权书', attachment: '确权书.pdf', remark: '—',\n        rooms: [\n          { cardNo: '000900005', seq: 1, censusArea: '1-8F', basis: '实地核查', attachment: '核查依据.pdf', remark: '-' },\n          { cardNo: '000900006', seq: 2, censusArea: '1-8F', basis: '确权书', attachment: '确权书.pdf', remark: '-' },\n        ]\n      },\n    };\n\n    var building = buildings[buildingId] || buildings['1'];\n    document.getElementById('pageTitle').textContent = '楼栋详情';\n\n    var currentTab = 'info';\n\n    function render() {\n      var html = '';\n\n      // 顶部统计卡片\n      html += '<div class=\"bd-header-card\">';\n      html += '<div class=\"bd-header-top\">';\n      html += '<span class=\"bd-header-name\">' + building.name + '<\/span>';\n      html += '<span class=\"bd-header-tag ' + building.tagClass + '\">' + building.tagText + '<\/span>';\n      html += '<\/div>';\n      html += '<div class=\"bd-header-stats\">';\n      html += '<div class=\"bd-header-stat\"><div class=\"bd-header-stat-num\">' + building.originalArea.toLocaleString('en-US', {minimumFractionDigits:2}) + '<\/div><div class=\"bd-header-stat-label\">原面积(㎡)<\/div><\/div>';\n      html += '<div class=\"bd-header-stat\"><div class=\"bd-header-stat-num\">' + building.currentArea.toLocaleString('en-US', {minimumFractionDigits:2}) + '<\/div><div class=\"bd-header-stat-label\">现面积(㎡)<\/div><\/div>';\n      html += '<div class=\"bd-header-stat\"><div class=\"bd-header-stat-num\">' + building.areaDiff.toFixed(2) + '<\/div><div class=\"bd-header-stat-label\">面积变化(㎡)<\/div><\/div>';\n      html += '<div class=\"bd-header-stat\"><div class=\"bd-header-stat-num\">' + building.diffRate + '<\/div><div class=\"bd-header-stat-label\">变化率<\/div><\/div>';\n      html += '<\/div>';\n      html += '<div class=\"bd-header-meta\">';\n      html += '用热性质：<span>' + building.heatNature + '<\/span>';\n      html += '收费类别：<span>' + building.chargeType + '<\/span>';\n      html += '变更明细：<span>'  building.remark + '<\/span><\/div>';\n      html += '<div class=\"info-row\"><span class=\"info-label\">层数<\/span><span class=\"info-value\">' + building.floors + '<\/span><\/div>';\n      html += '<div class=\"info-row\"><span class=\"info-label\">用热性质<\/span><span class=\"info-value\">' + building.heatNature + '<\/span><\/div>';\n      html += '<div class=\"info-row\"><span class=\"info-label\">控制方式<\/span><span class=\"info-value\">' + building.controlMode + '<\/span><\/div>';\n      html += '<div class=\"info-row\"><span class=\"info-label\">暖气类型<\/span><span class=\"info-value\">' + building.heatingType + '<\/span><\/div>';\n      html += '<div class=\"info-row\"><span class=\"info-label\">现面积（㎡）<\/span><span class=\"info-value\">' + building.currentArea.toLocaleString('en-US', {minimumFractionDigits:2}) + '<\/span><\/div>';\n      html += '<\/div>';\n      html += '<\/div>';\n\n      // 变更详情\n      html += '<div class=\"tab-panel' + (currentTab === 'change' ? ' active' : '') + '\" id=\"panel-change\">';\n      html += '<div class=\"room-list-hint\">当前楼栋下的热费卡号明细<\/div>';\n      building.rooms.forEach(function(r) {\n        var attachHtml = r.attachment\n          ? '<span class=\"room-row-value link\" onclick=\"alert(\\'下载附件：' + r.attachment + '\\')\">' + r.attachment + '<\/span>'\n          : '<span class=\"room-row-value\">-<\/span>';\n        html += '<div class=\"room-card\">';\n        html += '<div class=\"room-header\">';\n        html += '<span class=\"room-header-left\">热费卡号 ' + r.cardNo + '<\/span>';\n        html += '<span class=\"room-header-right\">序号 ' + r.seq + '<\/span>';\n        html += '<\/div>';\n        html += '<div class=\"room-row\"><span class=\"room-row-label\">普查面积<\/span><span class=\"room-row-value\">' + r.censusArea + '<\/span><\/div>';\n        html += '<div class=\"room-row\"><span class=\"room-row-label\">普查依据<\/span><span class=\"room-row-value\">' + r.basis + '<\/span><\/div>';\n        html += '<div class=\"room-row\"><span dy>\n<\/html>\n"},"expert-app-check-record":{"title":"检查记录单","file":"expert-app-check-record.html","html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">\n  <title>填写检查记录单<\/title>\n  <style>\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html, body {\n      font-family: -apple-system, BlinkMacSystemFont, \"PingFang SC\", \"Hiragino Sans GB\", \"Microsoft YaHei\", sans-serif;\n      background: #f5f6f8; color: #333; font-size: 14px;\n      min-height: 100vh; -webkit-tap-highlight-color: transparent;\n    }\n    a { text-decoration: none; color: inherit; }\n\n    .cf-nav-bar {\n      position: sticky; top: 0; z-index: 5;\n      background: #fff; display: flex; align-items: center;\n      height: 36px; padding: 0 12px; border-bottom: 1px solid #edf0f2;\n    }\n    .cf-back-btn {\n      width: 28px; height: 28px; display: flex; align-items: center;\n      justify-content: center; cursor: pointer; color: #4b7cf4;\n      font-size: 20px; border-radius: 14px; flex-shrink: 0;\n    }\n    .cf-nav-title {\n      flex: 1; text-align: center; font-size: 16px; font-weight: 600;\n      color: #111827; margin-right: 28px;\n    }\n    .cf-content { padding: 12px; }\n\n    .cf-card { background: #fff; border-radius: 8px; padding: 14px; margin-bottom: 10px; }\n    .cf-card-title { font-size: 14px; font-weight: 600; color: #111827; margin-bottom: 12px; }\n\n    .check-item { margin-bottom: 14px; }\n    .check-item:last-child { margin-bottom: 0; }\n    .check-q {\n      font-size: 13px; color: #1a1a1a; font-weight: 500;\n      margin-bottom: 8px; line-height: 1.5;\n    }\n    .check-choices { display: flex; gap: 8px; flex-wrap: wrap; }\n    .check-choice {\n      display: inline-flex; align-items: center; gap: 4px;\n      font-size: 12px; color: #475569;\n      background: #f8fafc; border: 1px solid #e5e7eb;\n      border-radius: 999px; padding: 5px 12px; cursor: pointer;\n      transition: all 0.15s;\n    }\n    .check-choice input { accent-color: #1677ff; margin: 0; }\n    .check-choice.selected { background: #e8f1ff; border-color: #1677ff; color: #1677ff; }\n\n    .issue-group {\n      display: none; margin-top: 8px; padding: 10px; background: #fff7f7;\n      border-radius: 8px; border: 1px solid #ffe8e8;\n    }\n    .issue-group.show { display: block; }\n    .issue-item {\n      display: flex; align-items: flex-start; gap: 6px;\n      font-size: 12px; color: #666; line-height: 20px; margin-bottom: 6px;\n    }\n    .issue-item:last-child { margin-bottom: 0; }\n    .issue-item input { margin-top: 3px; accent-color: #ff4d4f; flex-shrink: 0; }\n    .issue-other {\n      margin-top: 6px; padding-top: 6px; border-top: 1px solid #f0f0f0;\n    }\n    .issue-other input {\n      width: 100%; height: 32px; border: 1px solid #e5e7eb;\n      border-radius: 6px; padding: 0 10px; font-size: 12px; outline: none;\n    }\n    .issue-other input:focus { border-color: #1677ff; }\n\n    .conclusion-row {\n      display: flex; gap: 16px; margin-bottom: 12px;\n    }\n    .conclusion-row label {\n      display: flex; align-items: center; gap: 4px;\n      font-size: 13px; font-weight: 500; cursor: pointer;\n    }\n    .conclusion-row input { accent-color: #1677ff; }\n\n    .cf-textarea {\n      width: 100%; min-height: 72px; border: 1px solid #e5e7eb;\n      border-radius: 8px; padding: 8px 10px; font-size: 13px;\n      resize: none; outline: none; font-family: inherit; color: #333;\n    }\n    .cf-textarea:focus { border-color: #1677ff; }\n    .cf-textarea::placeholder { color: #bbb; }\n\n    .cf-submit {\n      width: 100%; height: 42px; border: none; border-radius: 8px;\n      background: #1677ff; color: #fff; font-size: 15px; font-weight: 600;\n      cursor: pointer; margin-top: 4px; transition: opacity 0.15s;\n    }\n    .cf-submit:active { opacity: 0.8; }\n    .cf-submit:disabled { background: #bae0ff; em.id + ', \\'是\\')\"><input type=\"radio\" name=\"check_' + item.id + '\" value=\"是\"' + (state.result === '是' ? ' checked' : '') + '> 是<\/label>';\n        html += '<label class=\"check-choice\" onclick=\"selectChoice(' + item.id + ', \\'否\\')\"><input type=\"radio\" name=\"check_' + item.id + '\" value=\"否\"' + (state.result === '否' ? ' checked' : '') + '> 否<\/label>';\n        if (item.hasNA) {\n          html += '<label class=\"check-choice\" onclick=\"selectChoice(' + item.id + ', \\'不适用\\')\"><input type=\"radio\" name=\"check_' + item.id + '\" value=\"不适用\"' + (state.result === '不适用' ? ' checked' : '') + '> 不适用<\/label>';\n        }\n        html += '<\/div>';\n        // 不满足项\n        if (item.issues.length > 0) {\n          var show = state.result === '否' ? ' show' : '';\n          html += '<div class=\"issue-group' + show + '\" id=\"issueGroup_' + item.id + '\">';\n          item.issues.forEach(function(issue, idx) {\n            var checked = state.issues.indexOf(issue) >= 0 ? ' checked' : '';\n            html += '<div class=\"issue-item\"><input type=\"checkbox\" value=\"' + issue + '\"' + checked + ' onchange=\"toggleIssue(' + item.id + ', this)\"><span>' + issue + '<\/span><\/div>';\n          });\n          if (item.hasOther) {\n            html += '<div class=\"issue-other\"><input type=\"text\" placeholder=\"其他问题...\" value=\"' + state.other + '\" oninput=\"formState[' + item.id + '].other=this.value\"><\/div>';\n          }\n          html += '<\/div>';\n        }\n        html += '<\/div><\/div>';\n      });\n\n      // 问题描述\n      html += '<div class=\"cf-card\">';\n      html += '<div class=\"cf-card-title\">问题描述<\/div>';\n      html += '<textarea class=\"cf-textarea\" id=\"problemDesc\" placeholder=\"请描述检查中发现的问题...\" maxlength=\"500\"><\/textarea>';\n      html += '<div style=\"text-align:right;font-size:12px;color:#bbb;margin-top:4px;\">0/500<\/div>';\n      html += '<\/div>';\n\n      // 现场说明\n      html += '<div class=\"cf-card\">';\n      html += '<div class=\"cf-card-title\">现场说明<\/div>';\n      html += '<textarea class=\"cf-textarea\" id=\"siteNote\" placeholder=\"请补充现场情况说明...\" maxlength=\"500\"><\/textarea>';\n      html += '<div style=\"text-align:right;font-size:12px;color:#bbb;margin-top:4px;\">0/500<\/div>';\n      html += '<\/div>';\n\n      // 电子签名\n      html += '<div class=\"e-sign-card\">';\n      html += '<div class=\"e-sign-title\">电子签名<\/div>';\n      html += '<div class=\"e-sign-box\" onclick=\"location.href=\\'./expert-app-signature.html\\'\">';\n      html += '<span class=\"e-sign-name\">张建国<\/span>';\n      html += '<\/div>';\n      html += '<div class=\"e-sign-hint\">提交记录前请完成第一名专家确认签字<\/div>';\n      html += '<\/div>';\n\n      // 提交按钮\n      html += '<button class=\"cf-submit\" onclick=\"submitForm()\">提交检查记录单<\/button>';\n\n      document.getElementById('formContent').innerHTML = html;\n    }\n\n    // 选择检查项结果\n    function selectChoice(itemId, value) {\n      formState[itemId].result = value;\n      var group = document.getElementById('issueGroup_' + itemId);\n      if (group) {\n        group.classList.toggle('show', value === '否');\n      }\n      // 如果不是\"否\"，清空子项\n      if (value !== '否') {\n        formState[itemId].issues = [];\n        formState[itemId].other = '';\n      }\n    }\n\n    // 切换子项\n    function toggleIssue(itemId, checkbox) {\n      var state = formState[itemId];\n      if (checkbox.checked) {\n        if (state.issues.indexOf(checkbox.value) < 0) state.issues.push(checkbox.value);\n      } else {\n        var idx = state.issues.indexOf(checkbox.value);\n        if (idx >= 0) state.issues.splice(idx, 1);\n      }\n    }\n\n    // 提交校验\n    function submitForm() {\n      if (!window._conclusion) {\n        showToast('请选择检查结论');\n        return;\n      }\n      var allDone = true;\n      checkItems.forEach(function(item) {\n        var state = formState[item.id];\n        if (!state.result) { allDone = false; }\n      });\n      if (!allDone) {\n        showToast('请完成所有检查项');\n        return;\n      }\n      showToast('检查记录单提交成功');\n      // 模拟通知站点详情页：结论不合格时显示整改通知单Tab\n      if (window._conclusion === '不合格') {\n        try { sessionStorage.setItem('needRectify', 'true'); } catch(e) {}\n      }\n      setTimeout(function() {\n        history.back();\n      }, 1200);\n    }\n\n    function showToast(msg) {\n      var existing = document.querySelector('.adm-toast');\n      if (existing) existing.remove();\n      var toast = document.createElement('div');\n      toast.className = 'adm-toast';\n      toast.textContent = msg;\n      document.body.appendChild(toast);\n      setTimeout(function() { toast.classList.add('hide'); }, 1800);\n      setTimeout(function() { toast.remove(); }, 2200);\n    }\n\n    renderForm();\n\n    // 字数统计（事件委托）\n    document.addEventListener('input', function(e) {\n      if (e.target.id === 'problemDesc' || e.target.id === 'siteNote') {\n        var len = e.target.value.length;\n        var next = e.target.nextElementSibling;\n        if (next) next.textContent = len + '/500';\n      }\n    });\n  <\/script>\n<script>\n(function(){\nwindow.__MERGED_NAVIGATE__=function(t){\n  if(window.parent&&window.parent.__MERGED_NAVIGATE__){window.parent.__MERGED_NAVIGATE__(t)}\n  else if(window.frameElement&&parent.__MERGED_GET_HTML__){\n    window.frameElement.setAttribute('data-merged-src',t);\n    window.frameElement.srcdoc=parent.__MERGED_GET_HTML__(t);\n  }\n};\ndocument.addEventListener('click',function(e){\n  var a=e.target.closest?e.target.closest('a[href]'):null;\n  if(!a){var el=e.target;while(el&&el.tagName!=='A')el=el.parentNode;a=el}\n  if(a&&a.tagName==='A'){\n    var h=a.getAttribute('href');\n    if(h&&/^\\.{0,2}\\/[^?#]+\\.html(?:[?#].*)?$/i.test(h)){\n      e.preventDefault();\n      window.__MERGED_NAVIGATE__(h);\n    }\n  }\n},true);\n(function(){\n  var f=document.querySelectorAll('iframe');\n  f.forEach(function(fr){\n    var t=fr.getAttribute('data-merged-src')||fr.getAttribute('src');\n    if(t&&t.indexOf('.html')>=0&&parent&&parent.__MERGED_GET_HTML__){\n      fr.setAttribute('data-merged-src',t);\n      fr.srcdoc=parent.__MERGED_GET_HTML__(t);\n    }\n  });\n})();\n})();<\\/script>\n<\/body>\n<\/html>\n"},"expert-app-signature":{"title":"电子签名","file":"expert-app-signature.html","html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no\">\n  <title>电子签名<\/title>\n  <style>\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    html, body {\n      font-family: -apple-system, BlinkMacSystemFont, \"PingFang SC\", \"Hiragino Sans GB\", \"Microsoft YaHei\", sans-serif;\n      background: #f5f6f8; color: #333; font-size: 14px;\n      min-height: 100vh; -webkit-tap-highlight-color: transparent;\n    }\n\n    .cf-nav-bar {\n      position: sticky; top: 0; z-index: 5;\n      background: #fff; display: flex; align-items: center;\n      height: 36px; padding: 0 12px; border-bottom: 1px solid #edf0f2;\n    }\n    .cf-back-btn {\n      width: 28px; height: 28px; display: flex; align-items: center;\n      justify-content: center; cursor: pointer; color: #4b7cf4;\n      font-size: 20px; border-radius: 14px; flex-shrink: 0;\n    }\n    .cf-nav-title {\n      flex: 1; text-align: center; font-size: 16px; font-weight: 600;\n      color: #111827; margin-right: 28px;\n    }\n\n    .sig-content { padding: 12px; display: flex; flex-direction: column; height: calc(100vh - 36px); }\n\n    .sig-hint {\n      font-size: 14px; color: #999; margin-bottom: 12px;\n    }\n\n    .sig-canvas-wrap {\n      flex: 1; background: #fff; border-radius: 8px;\n      position: relative; overflow: hidden;\n      border: 1px solid #e5e7eb;\n    }\n    .sig-canvas {\n      position: absolute; top: 0; left: 0;\n      width: 100%; height: 100%; touch-action: none;\n    }\n\n    .sig-actions {\n      display: flex; gap: 10px; margin-top: 12px;\n    }\n    .sig-btn {\n      flex: 1; height: 42px; border-radius: 8px;\n      font-size: 15px; font-weight: 600; border: none;\n      cursor: pointer; display: flex; align-items: center;\n      justify-content: center; transition: opacity 0.15s;\n    }\n    .sig-btn:active { opacity: 0.8; }\n    .sig-btn-clear {\n      background: #fff; color: #ff3141;\n      border: 1px solid #ffe8e8;\n    }\n    .sig-btn-submit {\n      background: #1677ff; color: #fff;\n    }\n    .sig-btn-submit:disabled {\n      background: #bae0ff; cursor: not-allowed;\n    }\n\n    /* Toast */\n    .adm-toast {\n      position: fixed; top: 50%; left: 50%;\n      transform: translate(-50%, -50%); z-index: 1000;\n      padding: 10px 20px; border-radius: 8px;\n      background: rgba(0,0,0,0.75); color: #fff;\n      font-size: 14px; font-weight: 500; white-space: nowrap;\n      pointer-events: none; opacity: 1; transition: opacity 0.3s ease;\n    }\n    .adm-toast.hide { opacity: 0; }\n  <\/style>\n<\/head>\n<body>\n  <div class=\"cf-nav-bar\">\n    <a href=\"javascript:history.back()\" class=\"cf-back-btn\">&lsaquo;<\/a>\n    <div class=\"cf-nav-title\">电子签名<\/div>\n  <\/div>\n\n  <div class=\"sig-content\">\n    <div class=\"sig-hint\">请签署：<strong style=\"color:#1a1a1a;\">张建国<\/strong><\/div>\n    <div class=\"sig-canvas-wrap\" id=\"canvasWrap\">\n      <canvas class=\"sig-canvas\" id=\"sigCanvas\"><\/canvas>\n    <\/div>\n    <div class=\"sig-actions\">\n      <button class=\"sig-btn sig-btn-clear\" onclick=\"clearCanvas()\">清除重写<\/button>\n      <button class=\"sig-btn sig-btn-submit\" id=\"submitBtn\" onclick=\"submitSignature()\">提交签字<\/button>\n    <\/div>\n  <\/div>\n\n  <script>\n    var canvas = document.getElementById('sigCanvas');\n    var ctx = canvas.getContext('2d');\n    var wrap = document.getElementById('canvasWrap');\n    var isDrawing = false;\n    var hasDrawn = false;\n\n    function resizeCanvas() {\n      var rect = wrap.getBoundingClientRect();\n      canvas.width = rect.width * window.devicePixelRatio;\n      canvas.height = rect.height * window.devicePixelRatio;\n      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);\n      ctx.lineCap = 'round';\n      ctx.lineJoin = 'round';\n      ctx.lineWidth = 2;\n      ctx.strokeStyle = '#1a1a1a';\n    }\n\n    resizeCanvas();\n    window.addEventListener('resize', resizeCanvas);\n\n    // 绘制签名示例水印\n    function drawPlaceholder() {\n      var rect = wrap.getBoundingClientRect();\n      ctx.font = '24px \"KaiTi\", \"STKaiti\", \"楷体\", serif';\n      ctx.textAlign = 'center';\n      ctx.textBaseline = 'middle';\n      ctx.fillStyle = '#e5e7eb';\n      ctx.fillText('张建国', rect.width / 2, rect.height / 2);\n    }\n    drawPlaceholder();\n\n    function getPos(e) {\n      var rect = canvas.getBoundingClientRect();\n      var clientX = e.touches ? e.touches[0].clientX : e.clientX;\n      var clientY = e.touches ? e.touches[0].clientY : e.clientY;\n      return { x: clientX - rect.left, y: clientY - rect.top };\n    }\n\n    function startDraw(e) {\n      e.preventDefault();\n      if (!hasDrawn) { clearCanvas(false); }\n      isDrawing = true;\n      hasDrawn = true;\n      var pos = getPos(e);\n      ctx.beginPath();\n      ctx.moveTo(pos.x, pos.y);\n    }\n\n    function moveDraw(e) {\n      e.preventDefault();\n      if (!isDrawing) return;\n      var pos = getPos(e);\n      ctx.lineTo(pos.x, pos.y);\n      ctx.stroke();\n    }\n\n    function endDraw(e) {\n      e.preventDefault();\n      isDrawing = false;\n    }\n\n    canvas.addEventListener('mousedown', startDraw);\n    canvas.addEventListener('mousemove', moveDraw);\n    canvas.addEventListener('mouseup', endDraw);\n    canvas.addEventListener('mouseleave', endDraw);\n    canvas.addEventListener('touchstart', startDraw, { passive: false });\n    canvas.addEventListener('touchmove', moveDraw, { passive: false });\n    canvas.addEventListener('touchend', endDraw, { passive: false });\n\n    function clearCanvas(showToastMsg) {\n      var rect = wrap.getBoundingClientRect();\n      ctx.clearRect(0, 0, rect.width, rect.height);\n      hasDrawn = false;\n      drawPlaceholder();\n      if (showToastMsg !== false) showToast('已清除');\n    }\n\n    function submitSignature() {\n      if (!hasDrawn) {\n        showToast('请先书写签名');\n        return;\n      }\n      showToast('签名提交成功');\n      setTimeout(function() {\n        history.back();\n      }, 1000);\n    }\n\n    function showToast(msg) {\n      var existing = document.querySelector('.adm-toast');\n      if (existing) existing.remove();\n      var toast = document.createElement('div');\n      toast.className = 'adm-toast';\n      toast.textContent = msg;\n      document.body.appendChild(toast);\n      setTimeout(function() { toast.classList.add('hide'); }, 1800);\n      setTimeout(function() { toast.remove(); }, 2200);\n    }\n  <\/script>\n<script>\n(function(){\nwindow.__MERGED_NAVIGATE__=function(t){\n  if(window.parent&&window.parent.__MERGED_NAVIGATE__){window.parent.__MERGED_NAVIGATE__(t)}\n  else if(window.frameElement&&parent.__MERGED_GET_HTML__){\n    window.frameElement.setAttribute('data-merged-src',t);\n    window.frameElement.srcdoc=parent.__MERGED_GET_HTML__(t);\n  }\n};\ndocument.addEventListener('click',function(e){\n  var a=e.target.closest?e.target.closest('a[href]'):null;\n  if(!a){var el=e.target;while(el&&el.tagName!=='A')el=el.parentNode;a=el}\n  if(a&&a.tagName==='A'){\n    var h=a.getAttribute('href');\n    if(h&&/^\\.{0,2}\\/[^?#]+\\.html(?:[?#].*)?$/i.test(h)){\n      e.preventDefault();\n      window.__MERGED_NAVIGATE__(h);\n    }\n  }\n},true);\n(function(){\n  var f=document.querySelectorAll('iframe');\n  f.forEach(function(fr){\n    var t=fr.getAttribute('data-merged-src')||fr.getAttribute('src');\n    if(t&&t.indexOf('.html')>=0&&parent&&parent.__MERGED_GET_HTML__){\n      fr.setAttribute('data-merged-src',t);\n      fr.srcdoc=parent.__MERGED_GET_HTML__(t);\n    }\n  });\n})();\n})();<\\/script>\n<\/body>\n<\/html>\n"},"dept-leader-app-preview":{"title":"部门领导App","file":"dept-leader-app-preview.html","html":"<!DOCTYPE html>\n<html lang=\"zh-CN\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>App 预览 / 部门领导App<\/title>\n  <style data-src=\"../../shared/styles/shared.css\">\n/**\n * shared.css — 公共样式\n *\n * 适用于所有原型模块的通用样式，包括：\n *   CSS 变量、重置、布局骨架（topbar/sidebar/main）、\n *   通用组件（card/btn/table/pagination/status-tag 等）。\n *\n * ⚠️ 不包含：\n *   - 页面特定样式（body[data-page=\"...\"] 选择器）\n *   - 弹窗样式（site-modal-* / expert-modal-*）\n *   - 业务专属样式（.rule-* / .dept-* / .pool-* / .expert-* / .create-*）\n *\n * 用法：<link rel=\"stylesheet\" href=\"../../shared/styles/shared.css\">\n */\n\n:root {\n  --primary: #4c78f5;\n  --primary-dark: #4e7cf0;\n  --bg: #f3f6fa;\n  --card: #ffffff;\n  --border: #e8ecf1;\n  --text: #2c3e50;\n  --muted: #8c95a6;\n  --success: #389e0d;\n  --warning: #d48806;\n  --danger: #ff4d4f;\n  --shadow: 0 1px 4px rgba(0, 0, 0, 0.04);\n}\n\n* {\n  box-sizing: border-box;\n}\n\nhtml,\nbody {\n  margin: 0;\n  min-width: 1440px;\n  font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", \"PingFang SC\",\n    \"Hiragino Sans GB\", \"Microsoft YaHei\", \"Helvetica Neue\", Helvetica, Arial,\n    sans-serif;\n  background: var(--bg);\n  color: var(--text);\n  font-size: 14px;\n}\n\na {\n  color: inherit;\n  text-decoration: none;\n}\n\nbutton,\ninput,\nselect,\ntextarea {\n  font: inherit;\n}\n\n/* ── 布局骨架 ── */\n\n.layout {\n  min-height: 100vh;\n}\n\n.topbar {\n  height: 56px;\n  background: linear-gradient(135deg, #4c78f5 0%, #4e7cf0 100%);\n  color: #fff;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 0 20px 0 24px;\n  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);\n}\n\n.brand {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  font-size: 16px;\n  font-weight: 700;\n}\n\n.brand-badge {\n  width: 36px;\n  height: 36px;\n  border-radius: 8px;\n  background: rgba(255, 255, 255, 0.18);\n  display: grid;\n  place-items: center;\n  font-size: 20px;\n}\n\n.top-actions {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  font-size: 12px;\n  font-weight: 500;\n}\n\n.switch-group {\n  display: inline-flex;\n  border: 1px solid rgba(255, 255, 255, 0.2);\n  border-radius: 6px;\n  overflow: hidden;\n}\n\n.switch-item {\n  padding: 5px 14px;\n  background: rgba(255, 255, 255, 0.12);\n  border-right: 1px solid rgba(255, 255, 255, 0.16);\n}\n\n.switch-item:last-child {\n  border-right: 0;\n}\n\n.chip {\n  padding: 4px 10px;\n  border-radius: 999px;\n  background: rgba(255, 255, 255, 0.12);\n}\n\n.chip.demo {\n  background: #ff9f1a;\n  color: #fff;\n  font-weight: 700;\n}\n\n.avatar {\n  width: 32px;\n  height: 32px;\n  border-radius: 50%;\n  background: rgba(255, 255, 255, 0.18);\n  display: grid;\n  place-items: center;\n}\n\n.body {\n  display: grid;\n  grid-template-columns: 220px minmax(0, 1fr);\n}\n\n.sidebar {\n  background: #fff;\n  border-right: 1px solid var(--border);\n  min-height: calc(100vh - 56px);\n}\n\n.menu-section {\n  padding: 20px 0 12px;\n}\n\n.menu-title {\n  padding: 0 20px 12px;\n  color: var(--muted);\n  font-size: 13px;\n  font-weight: 700;\n}\n\n.menu-item {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  padding: 14px 20px;\n  color: #53627b;\n  font-size: 14px;\n  font-weight: 500;\n  position: relative;\n}\n\n.menu-item.active {\n  background: rgba(78, 115, 248, 0.08);\n  color: var(--primary);\n}\n\n.menu-item.active::before {\n  content: \"\";\n  position: absolute;\n  left: 0;\n  top: 0;\n  bottom: 0;\n  width: 4px;\n  background: var(--primary);\n}\n\n.menu-icon {\n  width: 18px;\n  text-align: center;\n  font-size: 15px;\n}\n\n.menu-count {\n  margin-left: auto;\n  min-width: 22px;\n  height: 22px;\n  border-radius: 999px;\n  padding: 0 6px;\n  display: grid;\n  place-items: center;\n  background: #f45c57;\n  color: #fff;\n  font-size: 12px;\n  font-weight: 700;\n}\n\n.main {\n  padding: 20px 20px 24px;\n}\n\n/* ── 面包屑 ── */\n\n.breadcrumb {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  font-size: 14px;\n  margin-bottom: 16px;\n}\n\n.breadcrumb a {\n  color: var(--primary);\n  font-weight: 700;\n}\n\n.breadcrumb span:last-child {\n  color: #7f8ca3;\n  font-weight: 700;\n}\n\n/* ── 卡片 ── */\n\n.card {\n  background: var(--card);\n  border: 1px solid var(--border);\n  border-radius: 8px;\n  box-shadow: var(--shadow);\n  margin-bottom: 16px;\n  overflow: hidden;\n}\n\n.card-header {\n  padding: 16px 20px;\n  border-bottom: 1px solid #edf1f7;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 16px;\n}\n\n.card-title {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  font-size: 15px;\n  font-weight: 600;\n  white-space: nowrap;\n}\n\n.count-pill {\n  padding: 5px 10px;\n  border-radius: 999px;\n  background: #f5f7fb;\n  color: var(--muted);\n  font-size: 12px;\n  font-weight: 500;\n}\n\n/* ── 工具栏 ── */\n\n.toolbar {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 18px;\n  flex-wrap: wrap;\n}\n\n.toolbar-note {\n  color: var(--muted);\n  font-size: 12px;\n  font-weight: 500;\n  display: flex;\n  gap: 18px;\n  align-items: center;\n  flex-wrap: wrap;\n}\n\n.toolbar-note .blue-dot,\n.toolbar-note .red-dot {\n  font-size: 12px;\n  margin-right: 4px;\n}\n\n.toolbar-note .blue-dot {\n  color: var(--primary);\n}\n\n.toolbar-note .red-dot {\n  color: var(--danger);\n}\n\n/* ── 按钮 ── */\n\n.btn-row {\n  display: flex;\n  gap: 12px;\n  align-items: center;\n}\n\n.btn {\n  border: 1px solid #d5deed;\n  background: #fff;\n  color: #46556e;\n  border-radius: 6px;\n  padding: 0 16px;\n  height: 36px;\n  font-weight: 500;\n  cursor: pointer;\n  white-space: nowrap;\n  transition: border-color 0.2s ease, color 0.2s ease, box-shadow 0.2s ease,\n    background 0.2s ease;\n}\n\n.btn.primary {\n  background: var(--primary);\n  color: #fff;\n  border-color: var(--primary);\n}\n\n.btn.ghost {\n  background: #f8faff;\n}\n\n.btn:hover {\n  border-color: var(--primary);\n  color: var(--primary);\n}\n\n.btn.primary:hover {\n  color: #fff;\n  border-color: var(--primary-dark);\n  background: var(--primary-dark);\n}\n\n.btn.warn {\n  color: var(--warning);\n}\n\n.btn[disabled],\n.action-link.disabled {\n  color: #c4cddb;\n  border-color: #e5eaf2;\n  cursor: not-allowed;\n  pointer-events: none;\n}\n\n/* ── 卡片内容 ── */\n\n.card-body {\n  padding: 20px;\n}\n\n/* ── 筛选区 ── */\n\n.filter-grid {\n  display: grid;\n  grid-template-columns: repeat(3, minmax(260px, 1fr)) auto;\n  gap: 18px 28px;\n  align-items: end;\n}\n\n.field {\n  min-width: 0;\n}\n\n.field label {\n  display: block;\n  margin-bottom: 10px;\n  font-size: 13px;\n  font-weight: 500;\n  color: #7e8aa0;\n  white-space: nowrap;\n}\n\n/* ── 表单控件 ── */\n\n.control,\n.textarea {\n  width: 100%;\n  height: 36px;\n  border: 1px solid #d6ddea;\n  border-radius: 6px;\n  padding: 0 14px;\n  background: #fff;\n  color: #33425c;\n  transition: border-color 0.2s ease, box-shadow 0.2s ease;\n}\n\n.textarea {\n  min-height: 100px;\n  padding: 12px 14px;\n  resize: vertical;\n}\n\n.control:focus,\n.textarea:focus {\n  outline: none;\n  border-color: var(--primary);\n  box-shadow: 0 0 0 3px rgba(76, 120, 245, 0.1);\n}\n\n/* ── 表格 ── */\n\n.table-scroll {\n  overflow-x: auto;\n  padding-bottom: 8px;\n}\n\n.table-scroll::-webkit-scrollbar {\n  height: 10px;\n}\n\n.table-scroll::-webkit-scrollbar-thumb {\n  background: #c7ccd6;\n  border-radius: 999px;\n}\n\ntable {\n  width: 100%;\n  min-width: 1560px;\n  border-collapse: collapse;\n  table-layout: fixed;\n}\n\nth,\ntd {\n  padding: 14px 16px;\n  border-bottom: 1px solid #edf1f7;\n  text-align: left;\n  white-space: nowrap;\n  color: #495870;\n  font-weight: 400;\n}\n\nth {\n  color: var(--muted);\n  background: #fafbfc;\n  font-weight: 500;\n}\n\ntd strong {\n  color: var(--text);\n}\n\ntbody tr:hover {\n  background: #f8faff;\n}\n\n/* ── 状态标签 ── */\n\n.status-tag {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  min-width: 72px;\n  height: 32px;\n  padding: 0 12px;\n  border-radius: 6px;\n  font-size: 13px;\n  font-weight: 500;\n}\n\n.status-draft {\n  background: #fff5df;\n  color: #d48806;\n}\n\n.status-pending {\n  background: #fff7e8;\n  color: #d38b08;\n}\n\n.status-progress {\n  background: #e8efff;\n  color: var(--primary);\n}\n\n.status-finished,\n.status-done {\n  background: #f2f4f8;\n  color: #78849b;\n}\n\n.status-overdue {\n  background: #fff0f0;\n  color: var(--danger);\n}\n\n/* ── 操作链接 ── */\n\n.action-row {\n  display: flex;\n  align-items: center;\n  gap: 18px;\n}\n\n.action-link {\n  color: var(--primary);\n  font-weight: 500;\n}\n\n.action-link.danger {\n  color: var(--danger);\n}\n\n.muted {\n  color: #9ca9bd;\n}\n\n/* ── 分页 ── */\n\n.pagination {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 16px;\n  padding: 16px 20px 20px;\n}\n\n.page-box {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n}\n\n.page-btn,\n.page-number {\n  width: 42px;\n  height: 42px;\n  border-radius: 6px;\n  border: 1px solid #d8dfec;\n  background: #fff;\n  color: #9ea9bc;\n  display: grid;\n  place-items: center;\n  font-weight: 700;\n}\n\n.page-number.active {\n  background: var(--primary);\n  color: #fff;\n  border-color: var(--primary);\n}\n\n/* ── 栅格 & 统计卡片 ── */\n\n.grid-2,\n.grid-3,\n.grid-4 {\n  display: grid;\n  gap: 18px;\n}\n\n.grid-2 {\n  grid-template-columns: repeat(2, minmax(0, 1fr));\n}\n\n.grid-3 {\n  grid-template-columns: repeat(3, minmax(0, 1fr));\n}\n\n.grid-4 {\n  grid-template-columns: repeat(4, minmax(0, 1fr));\n}\n\n.stat-grid {\n  display: grid;\n  grid-template-columns: repeat(4, minmax(0, 1fr));\n  gap: 18px;\n}\n\n.stat-card {\n  background: linear-gradient(180deg, #f8faff 0%, #ffffff 100%);\n  border: 1px solid #ebf0fa;\n  border-radius: 8px;\n  padding: 18px 20px;\n}\n\n.stat-label {\n  font-size: 14px;\n  color: #8a96ab;\n  font-weight: 700;\n  margin-bottom: 10px;\n}\n\n.stat-value {\n  font-size: 28px;\n  font-weight: 800;\n  color: #23314a;\n}\n\n/* ── 描述列表 ── */\n\n.desc-list {\n  display: grid;\n  grid-template-columns: repeat(2, minmax(0, 1fr));\n  border: 1px solid #edf1f7;\n  border-radius: 8px;\n  overflow: hidden;\n}\n\n.desc-item {\n  display: grid;\n  grid-template-columns: 150px minmax(0, 1fr);\n  min-height: 54px;\n  border-bottom: 1px solid #edf1f7;\n}\n\n.desc-item:nth-last-child(-n + 2) {\n  border-bottom: 0;\n}\n\n.desc-item.full {\n  grid-column: 1 / -1;\n}\n\n.desc-label,\n.desc-value {\n  padding: 14px 16px;\n  white-space: nowrap;\n}\n\n.desc-label {\n  background: #fafcff;\n  color: #8b98ad;\n  font-weight: 700;\n  border-right: 1px solid #edf1f7;\n}\n\n.desc-value {\n  overflow: hidden;\n  text-overflow: ellipsis;\n  font-weight: 700;\n}\n\n/* ── 步骤条 ── */\n\n.step-list {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  flex-wrap: wrap;\n}\n\n.step-item {\n  display: flex;\n  align-items: center;\n  gap: 10px;\n  color: #6b7890;\n  font-weight: 700;\n}\n\n.step-dot {\n  width: 28px;\n  height: 28px;\n  border-radius: 50%;\n  display: grid;\n  place-items: center;\n  background: #e9eef8;\n  color: #7081a0;\n}\n\n.step-item.active .step-dot {\n  background: var(--primary);\n  color: #fff;\n}\n\n.step-arrow {\n  color: #b6c0d1;\n}\n\n/* ── 高亮面板 & 提示框 ── */\n\n.highlight-panel {\n  background: linear-gradient(135deg, #f4f8ff 0%, #ffffff 100%);\n  border: 1px solid #e5edff;\n  border-radius: 8px;\n  padding: 22px 24px;\n}\n\n.notice-box {\n  padding: 14px 16px;\n  border-radius: 8px;\n  background: #fff8e8;\n  color: #9a6b00;\n  font-weight: 700;\n}\n\n/* ── 导航卡片 ── */\n\n.card-link-grid {\n  display: grid;\n  grid-template-columns: repeat(3, minmax(0, 1fr));\n  gap: 18px;\n}\n\n.nav-card {\n  background: #fff;\n  border: 1px solid #e7edf8;\n  border-radius: 8px;\n  padding: 22px;\n  box-shadow: var(--shadow);\n}\n\n.nav-card h3 {\n  margin: 0 0 10px;\n  font-size: 18px;\n}\n\n.nav-card p {\n  margin: 0 0 18px;\n  color: #8794aa;\n  line-height: 1.6;\n  min-height: 44px;\n}\n\n/* ── 信息横幅 & Toast & 页脚 ── */\n\n.info-banner {\n  background: linear-gradient(90deg, #eff4ff 0%, #ffffff 100%);\n  border: 1px solid #e1eaff;\n  border-radius: 8px;\n  padding: 24px 26px;\n  margin-bottom: 22px;\n}\n\n.toast {\n  position: fixed;\n  top: 20px;\n  left: 50%;\n  transform: translateX(-50%);\n  z-index: 1000;\n  min-width: 240px;\n  max-width: 420px;\n  padding: 10px 16px;\n  border-radius: 8px;\n  color: #fff;\n  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);\n}\n\n.toast.success {\n  background: var(--success);\n}\n\n.toast.info {\n  background: var(--primary);\n}\n\n.toast.warning {\n  background: var(--warning);\n}\n\n.info-banner h2 {\n  margin: 0 0 10px;\n  font-size: 28px;\n}\n\n.info-banner p {\n  margin: 0;\n  color: #74839b;\n  font-weight: 700;\n}\n\n.footer-note {\n  color: #95a2b7;\n  font-size: 14px;\n  font-weight: 700;\n}\n\n/* ── 响应式 ── */\n\n@media (max-width: 1600px) {\n  .filter-grid {\n    grid-template-columns: repeat(2, minmax(260px, 1fr));\n  }\n}\n\n<\/style>\n  <style data-src=\"../../shared/styles/app-phone.css\">\n/* app-phone.css — 专家App手机壳样式组件 */\n/* 来源: expert-app-standalone.html (原 area_checker_static/styles/app.css) */\n\n/* ===== 专家App演示稿 — 手机壳 ===== */\n.app-demo-layout{display:flex;gap:32px;height:100%;padding:24px;align-items:flex-start}\n.app-phone-shell{width:392px;min-width:392px;height:824px;background:linear-gradient(180deg,#3e434d 0%,#12151b 100%);border-radius:44px;padding:9px;box-shadow:0 18px 48px rgba(15,23,42,.24),0 6px 16px rgba(15,23,42,.12),inset 0 0 0 1px rgba(255,255,255,.14);position:relative;flex-shrink:0}\n.app-phone-shell::before{content:'';position:absolute;inset:5px;border-radius:42px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);pointer-events:none}\n.app-phone-shell::after{content:'';position:absolute;right:-4px;top:152px;width:4px;height:64px;border-radius:2px;background:linear-gradient(180deg,#59606d 0%,#2f3440 100%);box-shadow:0 96px 0 0 rgba(60,65,76,.95)}\n.app-phone-screen{width:100%;height:100%;background:#f6f7fb;border-radius:35px;overflow:hidden;position:relative;box-shadow:inset 0 0 0 1px rgba(255,255,255,.68)}\n.app-phone-screen::after{content:'';position:absolute;left:50%;bottom:9px;transform:translateX(-50%);width:136px;height:5px;border-radius:999px;background:rgba(17,24,39,.18);z-index:12}\n.app-phone-notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:198px;height:34px;background:#15181f;border-radius:0 0 22px 22px;z-index:10;box-shadow:0 8px 18px rgba(0,0,0,.12)}\n.app-phone-notch::before{content:'';position:absolute;left:50%;top:16px;transform:translateX(-50%);width:72px;height:7px;border-radius:999px;background:rgba(255,255,255,.12)}\n.app-phone-notch::after{content:'';position:absolute;right:32px;top:13px;width:12px;height:12px;border-radius:50%;background:radial-gradient(circle at 35% 35%,rgba(255,255,255,.3),rgba(255,255,255,.05) 55%,rgba(0,0,0,.35) 100%)}\n.app-phone-statusbar{height:52px;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:14px 20px 0;font-size:12px;color:#1f2937;font-weight:700;position:relative;z-index:5}\n.app-phone-statusbar::before{content:'9:41';letter-spacing:.2px}\n.app-phone-statusbar::after{content:'100%';letter-spacing:.2px}\n.app-page{position:absolute;top:52px;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;background:#f6f7fb;-webkit-overflow-scrolling:touch}\n.app-page.hidden{display:none}\n\n/* ===== 导航栏 ===== */\n.app-nav-bar{position:sticky;top:0;z-index:5;background:#fff;display:flex;align-items:center;height:60px;padding:8px 16px 6px}\n.app-nav-bar .back-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#52607a;font-size:22px;border-radius:16px}\n.app-nav-bar .nav-title{flex:1;text-align:center;font-size:17px;font-weight:700;color:#1f g: 20px;\n}\n\n.filter-grid {\n  display: grid;\n  grid-template-columns: repeat(3, minmax(260px, 1fr)) auto;\n  gap: 18px 28px;\n  align-items: end;\n}\n\n.field {\n  min-width: 0;\n}\n\n.field label {\n  display: block;\n  margin-bottom: 10px;\n  font-size: 13px;\n  font-weight: 500;\n  color: #7e8aa0;\n  white-space: nowrap;\n}\n\n.control,\n.textarea {\n  width: 100%;\n  height: 36px;\n  border: 1px solid #d6ddea;\n  border-radius: 6px;\n  padding: 0 14px;\n  background: #fff;\n  color: #33425c;\n  transition: border-color 0.2s ease, box-shadow 0.2s ease;\n}\n\n.textarea {\n  min-height: 100px;\n  padding: 12px 14px;\n  resize: vertical;\n}\n\n.control:focus,\n.textarea:focus {\n  outline: none;\n  border-color: var(--primary);\n  box-shadow: 0 0 0 3px rgba(76, 120, 245, 0.1);\n}\n\n.table-scroll {\n  overflow-x: auto;\n  padding-bottom: 8px;\n}\n\n.table-scroll::-webkit-scrollbar {\n  height: 10px;\n}\n\n.table-scroll::-webkit-scrollbar-thumb {\n  background: #c7ccd6;\n  border-radius: 999px;\n}\n\ntable {\n  width: 100%;\n  min-width: 1560px;\n  border-collapse: collapse;\n  table-layout: fixed;\n}\n\nth,\ntd {\n  padding: 14px 16px;\n  border-bottom: 1px solid #edf1f7;\n  text-align: left;\n  white-space: nowrap;\n  color: #495870;\n  font-weight: 400;\n}\n\nth {\n  color: var(--muted);\n  background: #fafbfc;\n  font-weight: 500;\n}\n\ntd strong {\n  color: var(--text);\n}\n\ntbody tr:hover {\n  background: #f8faff;\n}\n\n.status-tag {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  min-width: 72px;\n  height: 32px;\n  padding: 0 12px;\n  border-radius: 6px;\n  font-size: 13px;\n  font-weight: 500;\n}\n\n.status-draft {\n  background: #fff5df;\n  color: #d48806;\n}\n\n.status-pending {\n  background: #fff7e8;\n  color: #d38b08;\n}\n\n.status-progress {\n  background: #e8efff;\n  color: var(--primary);\n}\n\n.status-finished,\n.status-done {\n  background: #f2f4f8;\n  color: #78849b;\n}\n\n.status-overdue {\n  background: #fff0
